<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v7.61</title>
    <style>
        :root { 
            --bg-black: #000; 
            --amber: #ffbf00; 
            --amber-dim: #cc9900;
            --red: #c12718; 
            --grey: #121212; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; }
        
        .logo-box { width: 60px; height: 60px; margin-right: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; text-shadow: 0 0 5px var(--amber); }
        .btn-red { border: 1px solid var(--red); color: var(--red); }
        
        .lyrics-view { flex: 1; height: calc(100vh - 85px); background: #fff; color: #000; overflow-y: auto; padding: 30px; }
        
        /* Dashboard & Menus */
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .full-menu.open { left: 0; }
        .menu-header { padding: 15px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .menu-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        
        .row-item { background: #1c1c1e; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; overflow: hidden; }
        .row-num { width: 50px; text-align: center; font-size: 1.5rem; color: var(--amber); font-weight: bold; }
        .row-name { flex: 1; padding: 20px 10px; font-size: 1.8rem; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .chord-row { color: var(--red); font-weight: bold; height: 1.5rem; position: relative; }
        .chord-item { position: absolute; }
        .lyric-line { margin-bottom: 18px; display: block; white-space: pre; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center;">
            <div class="logo-box" onclick="location.reload()"><img src="logo.png" alt="TDF"></div>
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" style="margin-left:8px;" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; font-size: 1.1rem;">TDF v7.61</div>
        <button class="btn" onclick="location.reload()">↺</button>
    </div>

    <div class="lyrics-view">
        <div id="lyricsArea">Gebruik de menu's om te starten.</div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div class="menu-header">
            <h2 style="margin:0; color:var(--amber);">DATABASE</h2>
            <button class="btn" onclick="closeMenus()">SLUIT</button>
        </div>
        <div class="menu-scroll" id="dbList"></div>
        <div style="padding:15px; background:#111; display:flex; gap:8px;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impDB').click()">IMPORT DB</button>
            <button class="btn" style="flex:1;" onclick="exportDB()">EXPORT DB</button>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div class="menu-header">
            <h2 style="margin:0; color:var(--amber);">SETLIST</h2>
            <button class="btn" onclick="closeMenus()">SLUIT</button>
        </div>
        <div class="menu-scroll" id="setList"></div>
        <div style="padding:15px; background:#111; display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impSet').click()">LAAK SET</button>
            <button class="btn" style="flex:1;" onclick="exportSet()">OPSLAAN SET</button>
            <button class="btn-red" style="flex:1; padding:8px;" onclick="if(confirm('Setlist wissen?')) {setlist=[]; save(); render();}">CLEAR</button>
        </div>
    </div>

    <input type="file" id="impDB" style="display:none;" onchange="importFiles(event, 'db')">
    <input type="file" id="impSet" style="display:none;" onchange="importFiles(event, 'set')">

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        
        window.onload = render;

        function openMenu(id) { document.getElementById(id).classList.add('open'); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }

        function save() {
            localStorage.setItem('tdfSongs', JSON.stringify(db));
            localStorage.setItem('tdfSetlist', JSON.stringify(setlist));
        }

        function render() {
            const dbl = document.getElementById('dbList');
            dbl.innerHTML = "";
            db.sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div');
                d.className = "row-item";
                d.innerHTML = `<div class="row-name" onclick="view('${s.title.replace(/'/g,"\\'")}')">${s.title}</div><button class="btn" style="margin-right:10px" onclick="addToSet('${s.title.replace(/'/g,"\\'")}')">+</button>`;
                dbl.appendChild(d);
            });

            const setl = document.getElementById('setList');
            setl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div');
                d.className = "row-item";
                d.innerHTML = `<div class="row-num">${i+1}</div><div class="row-name" onclick="view('${s.title.replace(/'/g,"\\'")}')">${s.title}</div><button class="btn-red" style="margin-right:10px; padding:10px;" onclick="removeFromSet(${i})">X</button>`;
                setl.appendChild(d);
            });
        }

        function addToSet(t) {
            const s = db.find(x=>x.title === t);
            if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); render(); }
        }

        function removeFromSet(i) {
            setlist.splice(i, 1); save(); render();
        }

        function view(t) {
            const s = db.find(x=>x.title === t) || setlist.find(x=>x.title === t);
            if(!s) return;
            const lines = s.content.split('\n');
            let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i);
                        if(e===-1){txt+=l[i]; i++; continue;}
                        chords.push({p: txt.length, v: l.substring(i+1, e)});
                        i = e+1;
                    } else { txt += l[i]; i++; }
                }
                let r = "";
                chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            document.getElementById('lyricsArea').innerHTML = h;
            document.getElementById('title').innerText = s.title;
            closeMenus();
            document.querySelector('.lyrics-view').scrollTop = 0;
        }

        function exportDB() { downloadJSON(db, 'tdf_database'); }
        function exportSet() { downloadJSON(setlist, 'tdf_setlist'); }

        function downloadJSON(data, name) {
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${name}.json`;
            a.click();
        }

        function importFiles(e, type) {
            const file = e.target.files[0];
            const r = new FileReader();
            r.onload = (prev) => {
                const data = JSON.parse(prev.target.result);
                if(type === 'db') db = data; else setlist = data;
                save(); render(); alert("Geladen!");
            };
            r.readAsText(file);
        }
    </script>
</body>
</html>
