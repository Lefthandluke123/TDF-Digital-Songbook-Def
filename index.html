<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Master v6.17</title>
    <style>
        :root { --header-height: 65px; --griffin-orange: #d48e3d; --griffin-red: #c12718; --gray-header: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100dvh; width: 100vw; background-color: #ffffff; overflow: hidden; position: fixed; top: 0; left: 0; transition: filter 0.2s ease; }
        body.inverted { filter: invert(100%) hue-rotate(180deg); background-color: #000000; }
        
        .top-bar { position: fixed; top: 0 !important; left: 0; width: 100%; height: var(--header-height); background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 99999; }
        body.inverted .top-bar, body.inverted .songs-menu, body.inverted .full-overlay { filter: invert(100%) hue-rotate(180deg); }
        
        .top-bar-left, .top-bar-right { display: flex; align-items: center; gap: 12px; min-width: 140px; }
        .top-bar-center { text-align: center; flex-grow: 1; }
        .title-row h2 { margin: 0; font-size: 1.1rem; color: white; font-family: sans-serif; }
        .top-bar-btn { background: none; border: none; color: #007aff; font-size: 1.1rem; cursor: pointer; font-family: sans-serif; font-weight: bold; }
        .top-bar-icon { width: 28px; height: 28px; fill: #007aff; cursor: pointer; }
        #appLogo { height: 42px; width: auto; display: none; }

        .lyrics-container { width: 100%; height: 100dvh; padding-top: var(--header-height); background-color: inherit; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }
        #lyricsArea, #editorArea { padding: 30px; font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace !important; font-size: 1.35rem; line-height: 1.35; color: #000; width: 100%; min-height: 100%; }
        #editorArea { display: none; white-space: pre; border: none; outline: none; background: transparent; caret-color: var(--griffin-orange); }

        .songs-menu { position: fixed; top: 0; left: -33.33%; width: 33.33%; height: 100dvh; background: #1c1c1e; z-index: 90001; transition: left 0.3s ease; display: flex; flex-direction: column; }
        .songs-menu.open { left: 0; }
        @media (max-width: 768px) { .songs-menu { width: 85%; left: -85%; } }
        
        .menu-header { padding: 15px; color: white; background: #2c2c2e; border-bottom: 1px solid #444; }
        .alpha-header { background: var(--gray-header); color: #aaa; padding: 5px 20px; font-size: 0.8rem; font-weight: bold; border-bottom: 1px solid #444; }
        .index-item { padding: 18px 20px; background: #1c1c1e; color: white; cursor: pointer; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        .full-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.8); z-index: 1000000; padding: 20px; }
        .modal-box { max-width: 500px; margin: 20px auto; background: #2c2c2e; padding: 20px; border-radius: 12px; position: relative; max-height: 90vh; overflow-y: auto; color: white; }
        .modal-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; background: #007aff; color: white; font-weight: bold; cursor: pointer; display: block; }
        
        .selection-list { text-align: left; margin: 15px 0; }
        .selection-item { padding: 12px; border-bottom: 1px solid #444; display: flex; align-items: center; gap: 15px; }
        .selection-item input { transform: scale(1.5); }

        .chord-row { height: 1.5rem; color: var(--griffin-red); font-weight: bold; position: relative; }
        .chord-item { position: absolute; white-space: pre; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <input type="file" id="logoInput" accept="image/png" style="display:none;">
    <input type="file" id="bulkImportInput" accept=".txt" multiple style="display:none;">

    <div class="top-bar">
        <div class="top-bar-left">
            <img id="appLogo">
            <button class="top-bar-btn" onclick="toggleMenu()">Songs</button>
        </div>
        <div class="top-bar-center">
            <div class="title-row"><h2 id="displayTitle">TDF Master</h2></div>
            <p id="curBookDisplay" style="margin:0; font-size:0.7rem; color:var(--griffin-orange); font-weight:bold; cursor:pointer;" onclick="toggleMenu()">ALLE LIEDJES</p>
        </div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" id="scrollIcon" onclick="toggleScroll()" viewBox="0 0 24 24" style="fill:#34c759;"><path d="M8 5v14l11-7z"/></svg>
            <svg class="top-bar-icon" onclick="el('settingsOverlay').style.display='block'" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41l-0.36,2.54c-0.59,0.24-1.13,0.57-1.62,0.94L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.84,9.48l2.03,1.58C4.82,11.36,4.8,11.68,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c(0.18,0.14,0.23,0.41,0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c(0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c(0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div class="menu-header">
            <select id="bookSelector" onchange="switchBook()" style="width:100%; padding:10px; background:#444; color:white; border:none; border-radius:8px;">
                <option value="all">HOOFDBIBLIOTHEEK</option>
            </select>
        </div>
        <div id="indexContent" style="flex-grow:1; overflow-y:auto;"></div>
        <button id="addSongsBtn" class="modal-btn" style="margin:0; border-radius:0; display:none;" onclick="openOrganizer()">+ LIEDJES TOEVOEGEN</button>
    </div>

    <div id="settingsOverlay" class="full-overlay">
        <div class="modal-box">
            <h3>Beheer</h3>
            <button class="modal-btn" onclick="createNewBook()">+ NIEUW BOEK MAKEN</button>
            <button class="modal-btn" onclick="deleteCurrentBook()" id="delBookBtn" style="background:var(--griffin-red); display:none;">VERWIJDER DIT BOEK</button>
            <hr style="margin:15px 0; border:0; border-top:1px solid #444;">
            <button class="modal-btn" id="themeBtn" onclick="cycleTheme()">🌓 WISSEL THEMA</button>
            <button class="modal-btn" onclick="el('bulkImportInput').click()">📂 BULK IMPORT (.TXT)</button>
            <button class="modal-btn" style="background:#444;" onclick="el('settingsOverlay').style.display='none'">SLUITEN</button>
        </div>
    </div>

    <div id="organizerOverlay" class="full-overlay">
        <div class="modal-box">
            <h3 id="orgTitle">Liedjes selecteren</h3>
            <div class="selection-list" id="selectionList"></div>
            <button class="modal-btn" onclick="saveOrganization()">GEREED</button>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Open het menu om een liedje te kiezen.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <script>
        const el = (id) => document.getElementById(id);
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let books = JSON.parse(localStorage.getItem('tdfBooks')) || {}; // { "BookName": ["SongTitle1", "..."] }
        let currentBook = "all";
        let cur = null, sInt = null;

        window.onload = () => {
            if(localStorage.getItem('tdfTheme') === 'dark') document.body.classList.add('inverted');
            const logo = localStorage.getItem('tdfLogo');
            if(logo) { el('appLogo').src = logo; el('appLogo').style.display = 'block'; }
            updateBookSelector();
            renderIndex();
        };

        function cycleTheme() {
            const isDark = document.body.classList.toggle('inverted');
            localStorage.setItem('tdfTheme', isDark ? 'dark' : 'light');
            el('themeBtn').textContent = isDark ? "🌓 NAAR LIGHT MODE" : "🌓 NAAR DARK MODE";
        }

        function toggleMenu() { el('songsMenu').classList.toggle('open'); }

        function updateBookSelector() {
            const sel = el('bookSelector');
            sel.innerHTML = '<option value="all">HOOFDBIBLIOTHEEK</option>';
            Object.keys(books).sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b.toUpperCase();
                sel.appendChild(opt);
            });
            sel.value = currentBook;
        }

        function switchBook() {
            currentBook = el('bookSelector').value;
            el('curBookDisplay').textContent = currentBook === 'all' ? "ALLE LIEDJES" : currentBook.toUpperCase();
            el('addSongsBtn').style.display = currentBook === 'all' ? 'none' : 'block';
            el('delBookBtn').style.display = currentBook === 'all' ? 'none' : 'block';
            renderIndex();
        }

        function createNewBook() {
            const n = prompt("Naam van het nieuwe boek:");
            if(n && !books[n]) {
                books[n] = [];
                localStorage.setItem('tdfBooks', JSON.stringify(books));
                updateBookSelector();
                currentBook = n;
                switchBook();
                el('settingsOverlay').style.display = 'none';
                openOrganizer();
            }
        }

        function deleteCurrentBook() {
            if(confirm(`Weet je zeker dat je het boek "${currentBook}" wilt verwijderen?`)) {
                delete books[currentBook];
                localStorage.setItem('tdfBooks', JSON.stringify(books));
                currentBook = "all";
                updateBookSelector();
                switchBook();
                el('settingsOverlay').style.display = 'none';
            }
        }

        function renderIndex() {
            const c = el('indexContent'); c.innerHTML = "";
            let list = currentBook === 'all' ? db : db.filter(s => books[currentBook].includes(s.title));
            list.sort((a,b) => a.title.localeCompare(b.title));

            let lastChar = "";
            list.forEach(s => {
                const char = s.title.charAt(0).toUpperCase();
                if(char !== lastChar) {
                    const h = document.createElement('div'); h.className = 'alpha-header'; h.textContent = char;
                    c.appendChild(h); lastChar = char;
                }
                const item = document.createElement('div'); item.className = 'index-item';
                item.textContent = s.title;
                item.onclick = () => { loadSong(s.title); toggleMenu(); };
                c.appendChild(item);
            });
        }

        function openOrganizer() {
            el('organizerOverlay').style.display = 'block';
            el('orgTitle').textContent = `Liedjes in "${currentBook}"`;
            const list = el('selectionList'); list.innerHTML = "";
            db.sort((a,b) => a.title.localeCompare(b.title)).forEach(s => {
                const div = document.createElement('div'); div.className = 'selection-item';
                const cb = document.createElement('input'); cb.type = 'checkbox';
                cb.checked = books[currentBook].includes(s.title);
                cb.value = s.title;
                div.append(cb, document.createTextNode(s.title));
                list.appendChild(div);
            });
        }

        function saveOrganization() {
            const checks = el('selectionList').querySelectorAll('input:checked');
            books[currentBook] = Array.from(checks).map(cb => cb.value);
            localStorage.setItem('tdfBooks', JSON.stringify(books));
            el('organizerOverlay').style.display = 'none';
            renderIndex();
        }

        function loadSong(t) { 
            stopScroll(); cur = db.find(s => s.title === t); 
            el('displayTitle').textContent = cur.title; 
            draw(); 
        }

        function draw() {
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                if(l.startsWith('Duration:')) return;
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); chords.push({ p: txt.length, v: l.substring(i+1, e) });
                        i = e + 1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`);
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            el('lyricsArea').innerHTML = h; el('scroller').scrollTop = 0;
        }

        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() {
            const s = el('scroller'); const ch = s.scrollHeight - s.clientHeight;
            let dur = 180; const m = cur.content.match(/Duration:\s*(\d+):(\d+)/i);
            if(m) dur = parseInt(m[1]) * 60 + parseInt(m[2]);
            const pMs = ch / (dur * 1000); const st = Date.now(); const sp = s.scrollTop;
            el('scrollIcon').style.fill = "#c12718";
            sInt = setInterval(() => {
                const elap = Date.now() - st; s.scrollTop = sp + (elap * pMs);
                if(s.scrollTop >= ch) stopScroll();
            }, 50);
        }
        function stopScroll() { clearInterval(sInt); sInt = null; el('scrollIcon').style.fill = "#34c759"; }

        el('bulkImportInput').onchange = async (e) => {
            for (let f of e.target.files) {
                const text = await f.text();
                const title = text.split('\n')[0].replace(/[\[\]]/g, '').trim() || f.name.replace('.txt', '');
                if(!db.find(s => s.title === title)) db.push({ title, content: text });
            }
            localStorage.setItem('tdfSongs', JSON.stringify(db));
            renderIndex();
        };

        const el_single = (id) => document.getElementById(id);
    </script>
</body>
</html>
