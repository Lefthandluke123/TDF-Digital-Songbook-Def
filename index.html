<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Master v6.35</title>
    <style>
        :root { --header-height: 65px; --griffin-orange: #d48e3d; --griffin-red: #c12718; --gray-header: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100dvh; width: 100vw; background-color: #ffffff; overflow: hidden; position: fixed; top: 0; left: 0; }
        body.inverted { filter: invert(100%) hue-rotate(180deg); background-color: #000000; }
        
        /* Top Bar & Scroll Controls */
        .top-bar { position: fixed; top: 0 !important; left: 0; width: 100%; height: var(--header-height); background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; z-index: 99999; }
        .scroll-ui { display: flex; align-items: center; gap: 5px; background: #222; padding: 4px 8px; border-radius: 6px; margin-right: 5px; }
        .scroll-ui span { color: white; font-size: 0.8rem; min-width: 30px; text-align: center; }
        .scroll-btn { background: #444; border: none; color: white; width: 28px; height: 28px; border-radius: 4px; font-weight: bold; }

        .top-bar-btn { background: none; border: none; color: #007aff; font-size: 1rem; cursor: pointer; font-weight: bold; }
        .top-bar-icon { width: 26px; height: 26px; fill: #007aff; cursor: pointer; }

        /* Content Areas */
        .lyrics-container { width: 100%; height: 100dvh; padding-top: var(--header-height); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #lyricsArea, #editorArea { padding: 30px; font-family: ui-monospace, monospace !important; font-size: 1.35rem; line-height: 1.35; color: #000; width: 100%; min-height: 100%; }
        #editorArea { display: none; white-space: pre; border: none; outline: none; background: transparent; caret-color: var(--griffin-orange); padding-bottom: 150px; }

        /* Edit Console */
        .edit-console { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; border-top: 2px solid var(--griffin-orange); z-index: 1000001; padding: 10px; }
        .console-row { display: flex; gap: 5px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 5px; }
        .c-btn { background: #333; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; min-width: 45px; font-weight: bold; font-family: monospace; }
        .nav-btn { background: var(--griffin-orange); color: black; }

        /* Menu & Overlays (Same as v6.34) */
        .songs-menu { position: fixed; top: 0; left: -85%; width: 85%; height: 100dvh; background: #1c1c1e; z-index: 90001; transition: left 0.3s ease; display: flex; flex-direction: column; overflow-y: auto; }
        @media (min-width: 768px) { .songs-menu { width: 33.33%; left: -33.33%; } }
        .songs-menu.open { left: 0; }
        .section-header { background: #333; color: #aaa; padding: 15px 15px 8px 15px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #444; margin-top: 10px; }
        .tag-item { padding: 18px 20px; background: #2c2c2e; color: var(--griffin-orange); border-bottom: 1px solid #444; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .tag-item.active { background: var(--griffin-orange); color: black; }
        .song-item { padding: 18px 20px; background: #1c1c1e; color: white; border-bottom: 1px solid #333; }
        .full-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.8); z-index: 1000000; padding: 20px; }
        .modal-box { max-width: 500px; margin: 20px auto; background: #2c2c2e; padding: 20px; border-radius: 12px; color: white; }
        .modal-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; background: #007aff; color: white; font-weight: bold; display: block; text-align: center; }
        
        .chord-row { height: 1.5rem; color: var(--griffin-red); font-weight: bold; position: relative; }
        .chord-item { position: absolute; white-space: pre; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <input type="file" id="bulkImportInput" accept=".txt" multiple style="display:none;">
    <input type="file" id="restoreInput" accept=".json" style="display:none;">

    <div class="top-bar">
        <button class="top-bar-btn" onclick="toggleMenu()">Songs</button>
        
        <div class="scroll-ui">
            <button class="scroll-btn" onclick="adjustSpeed(-10)">-</button>
            <span id="speedVal">180s</span>
            <button class="scroll-btn" onclick="adjustSpeed(10)">+</button>
            <svg class="top-bar-icon" id="scrollIcon" onclick="toggleScroll()" viewBox="0 0 24 24" style="fill:#34c759; margin-left:5px;"><path d="M8 5v14l11-7z"/></svg>
        </div>

        <div style="display:flex; gap:10px; align-items:center;">
            <svg class="top-bar-icon" onclick="startEdit()" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            <svg class="top-bar-icon" onclick="el('settingsOverlay').style.display='block'" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41l-0.36,2.54c-0.59,0.24-1.13,0.57-1.62,0.94L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.84,9.48l2.03,1.58C4.82,11.36,4.8,11.68,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c(0.18,0.14,0.23,0.41,0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c(0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c(0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            <button class="top-bar-btn" id="saveBtn" onclick="finishEdit()" style="display:none; color:var(--griffin-orange);">GEREED</button>
        </div>
    </div>

    <div class="edit-console" id="editConsole">
        <div class="console-row">
            <button class="c-btn nav-btn" onclick="moveCursor('up')">↑</button>
            <button class="c-btn nav-btn" onclick="moveCursor('down')">↓</button>
            <button class="c-btn nav-btn" onclick="moveCursor('left')">←</button>
            <button class="c-btn nav-btn" onclick="moveCursor('right')">→</button>
            <button class="c-btn" onclick="injectChord('')">[]</button>
        </div>
        <div class="console-row">
            <button class="c-btn" onclick="injectChord('A')">A</button>
            <button class="c-btn" onclick="injectChord('Am')">Am</button>
            <button class="c-btn" onclick="injectChord('B')">B</button>
            <button class="c-btn" onclick="injectChord('Bm')">Bm</button>
            <button class="c-btn" onclick="injectChord('C')">C</button>
            <button class="c-btn" onclick="injectChord('D')">D</button>
            <button class="c-btn" onclick="injectChord('E')">E</button>
            <button class="c-btn" onclick="injectChord('Em')">Em</button>
            <button class="c-btn" onclick="injectChord('G')">G</button>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu"><div id="menuContent"></div></div>

    <div id="settingsOverlay" class="full-overlay">
        <div class="modal-box">
            <h3>Beheer</h3>
            <button class="modal-btn" onclick="createNewTag()">+ NIEUWE TAG</button>
            <button class="modal-btn" onclick="downloadBackup()">💾 BACK-UP</button>
            <button class="modal-btn" onclick="el('restoreInput').click()">🔄 HERSTEL</button>
            <button class="modal-btn" id="themeBtn" onclick="cycleTheme()">🌓 THEMA</button>
            <button class="modal-btn" style="background:#444;" onclick="el('settingsOverlay').style.display='none'">SLUITEN</button>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">TDF Master v6.35 geladen.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <script>
        const el = (id) => document.getElementById(id);
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let tags = JSON.parse(localStorage.getItem('tdfTags')) || {};
        let currentTag = "ALLES", cur = null, sInt = null, scrollSpeed = 180;

        window.onload = () => { if(localStorage.getItem('tdfTheme') === 'dark') document.body.classList.add('inverted'); renderMenu(); };

        function toggleMenu() { el('songsMenu').classList.toggle('open'); }
        function cycleTheme() { document.body.classList.toggle('inverted'); localStorage.setItem('tdfTheme', document.body.classList.contains('inverted') ? 'dark' : 'light'); }

        function renderMenu() {
            const c = el('menuContent'); c.innerHTML = "";
            const tagHead = document.createElement('div'); tagHead.className = 'section-header'; tagHead.textContent = "Filters";
            c.appendChild(tagHead);
            const allBtn = document.createElement('div');
            allBtn.className = `tag-item ${currentTag === 'ALLES' ? 'active' : ''}`;
            allBtn.textContent = "📜 ALLES TONEN";
            allBtn.onclick = () => { currentTag = "ALLES"; renderMenu(); };
            c.appendChild(allBtn);
            Object.keys(tags).sort().forEach(t => {
                const btn = document.createElement('div');
                btn.className = `tag-item ${currentTag === t ? 'active' : ''}`;
                btn.innerHTML = `🏷️ ${t} <span style="color:#007aff" onclick="event.stopPropagation(); currentTag='${t}'; openTagManager();">⚙️</span>`;
                btn.onclick = () => { currentTag = t; renderMenu(); };
                c.appendChild(btn);
            });
            const songHead = document.createElement('div'); songHead.className = 'section-header'; songHead.textContent = "Liedjes";
            c.appendChild(songHead);
            let filtered = currentTag === "ALLES" ? db : db.filter(s => (tags[currentTag] || []).includes(s.title));
            filtered.sort((a,b) => a.title.localeCompare(b.title)).forEach(s => {
                const item = document.createElement('div'); item.className = 'song-item';
                item.textContent = s.title;
                item.onclick = () => { loadSong(s.title); toggleMenu(); };
                c.appendChild(item);
            });
        }

        /* Scroll Logic */
        function adjustSpeed(delta) { 
            scrollSpeed = Math.max(10, scrollSpeed + delta); 
            el('speedVal').textContent = scrollSpeed + 's';
            if(sInt) { stopScroll(); startScroll(); }
        }
        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() {
            const s = el('scroller'); const ch = s.scrollHeight - s.clientHeight;
            const pMs = ch / (scrollSpeed * 1000); const st = Date.now(), sp = s.scrollTop;
            el('scrollIcon').style.fill = "#c12718";
            sInt = setInterval(() => { s.scrollTop = sp + ((Date.now() - st) * pMs); if(s.scrollTop >= ch) stopScroll(); }, 50);
        }
        function stopScroll() { clearInterval(sInt); sInt = null; el('scrollIcon').style.fill = "#34c759"; }

        /* Edit Console Logic */
        function startEdit() { 
            if(!cur) return; el('lyricsArea').style.display='none'; el('saveBtn').style.display='block'; 
            el('editorArea').style.display='block'; el('editConsole').style.display='block';
            el('editorArea').value = cur.content;
        }
        function finishEdit() {
            const idx = db.findIndex(s => s.title === cur.title); db[idx].content = el('editorArea').value;
            localStorage.setItem('tdfSongs', JSON.stringify(db)); cur = db[idx];
            el('lyricsArea').style.display='block'; el('saveBtn').style.display='none'; 
            el('editorArea').style.display='none'; el('editConsole').style.display='none'; draw();
        }
        function injectChord(c) {
            const area = el('editorArea'); const start = area.selectionStart;
            const text = area.value;
            area.value = text.slice(0, start) + `[${c}]` + text.slice(area.selectionEnd);
            area.selectionStart = area.selectionEnd = start + (c ? c.length + 2 : 1);
            area.focus();
        }
        function moveCursor(dir) {
            const area = el('editorArea'); area.focus();
            const pos = area.selectionStart;
            const lines = area.value.split('\n');
            if(dir === 'left') area.selectionStart = area.selectionEnd = pos - 1;
            if(dir === 'right') area.selectionStart = area.selectionEnd = pos + 1;
            if(dir === 'up' || dir === 'down') {
                // Simpele line-jump voor iPad
                const currentLineIdx = area.value.substr(0, pos).split('\n').length - 1;
                const targetLine = dir === 'up' ? currentLineIdx - 1 : currentLineIdx + 1;
                if(targetLine >= 0 && targetLine < lines.length) {
                    let newPos = 0;
                    for(let i=0; i<targetLine; i++) newPos += lines[i].length + 1;
                    area.selectionStart = area.selectionEnd = newPos;
                }
            }
        }

        function loadSong(t) { cur = db.find(x => x.title === t); draw(); }
        function draw() {
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); chords.push({ p: txt.length, v: l.substring(i+1, e) });
                        i = e + 1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`);
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            el('lyricsArea').innerHTML = h; el('scroller').scrollTop = 0;
        }

        function downloadBackup() {
            const data = JSON.stringify({ songs: db, tags: tags });
            const blob = new Blob([data], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `TDF_Backup.json`; a.click();
        }
    </script>
</body>
</html>
