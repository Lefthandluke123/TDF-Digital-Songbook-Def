<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital Setlist v7.54</title>
    <style>
        :root { 
            --bg-deep-black: #000000; 
            --stage-dark-grey: #121212; 
            --amber-glow: #ffbf00; 
            --amber-dim: #cc9900;
            --griffin-red: #c12718; 
            --header-height: 85px; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; display: flex; flex-direction: column; height: 100vh; margin: 0; background-color: var(--bg-deep-black); overflow: hidden; position: fixed; width: 100%; }

        .top-bar { height: var(--header-height); background: var(--stage-dark-grey); border-bottom: 2px solid #222; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; z-index: 3000; }
        .top-bar-btn { background: none; border: 1px solid var(--amber-dim); color: var(--amber-glow); font-size: 1rem; font-weight: bold; cursor: pointer; padding: 8px 18px; border-radius: 6px; text-shadow: 0 0 6px var(--amber-glow); }

        /* Logo Stack v7.50 herstel */
        .logo-container { position: relative; width: 55px; height: 55px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .base-logo { position: absolute; width: 100%; height: 100%; object-fit: contain; z-index: 10; }
        .overlay-logo { position: absolute; width: 85%; height: 85%; object-fit: contain; z-index: 20; }

        #setlistDashboard { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-deep-black); z-index: 45000; display: none; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .dash-header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; height: 85px; }
        .dash-list { flex: 1; overflow-y: auto; padding: 10px 15px; }
        .swipe-container { position: relative; margin-bottom: 10px; overflow: hidden; border-radius: 8px; background: var(--griffin-red); }
        .dash-row, .menu-row { display: flex; align-items: center; background: #1c1c1e; border: 1px solid #222; height: 72px; color: white; width: 100%; position: relative; z-index: 2; transition: transform 0.2s ease; }
        .dash-num { width: 55px; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--amber-glow); font-size: 1.6rem; font-weight: bold; border-right: 2px solid #222; }
        .dash-name { flex: 1; padding: 0 20px; font-size: 1.5rem; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dash-controls { display: flex; gap: 8px; padding-right: 15px; }
        .dash-ctrl-btn { width: 44px; height: 44px; background: #2a2a2a; border: 1px solid #333; color: white; border-radius: 6px; }

        .songs-menu { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #161616; z-index: 40000; transition: left 0.3s ease; display: flex; flex-direction: column; }
        .songs-menu.open { left: 0; }

        .lyrics-container { flex: 1; background: #fff; overflow-y: auto; }
        #lyricsArea { padding: 30px; font-size: 1.5rem; color: #000; line-height: 1.6; }
        #editorArea { display: none; width: 100%; height: 100%; padding: 30px; font-size: 1.5rem; border: none; font-family: monospace; }
        .chord-row { color: var(--griffin-red); font-weight: bold; height: 1.5rem; position: relative; }
        .chord-item { position: absolute; }
        .lyric-line { margin-bottom: 18px; display: block; white-space: pre; }

        .draggable-box { position: fixed; background: #1a1a1a; border-radius: 12px; padding: 8px; display: none; z-index: 50000; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .drag-handle { color: rgba(255,255,255,0.6); text-align: center; font-size: 11px; cursor: move; padding: 6px; background: #2a2a2a; border-radius: 6px; margin-bottom: 8px; }
        .joy-glow-btn, .chord-glow-btn { background: #222; color: var(--amber-glow); border: 1px solid var(--amber-dim); text-shadow: 0 0 8px var(--amber-glow); }
    </style>
</head>
<body>

    <input type="file" id="bulkFiles" accept=".json,.txt" multiple style="display:none;">

    <div class="top-bar">
        <div style="display:flex; gap:12px; align-items:center;">
            <div class="logo-container" onclick="location.reload()">
                <img src="logo.png" class="base-logo">
                <img src="https://i.ibb.co/3S432pG/griffin-logo.png" class="overlay-logo">
            </div>
            <button class="top-bar-btn" onclick="toggleMenu()">SONGS</button>
            <button class="top-bar-btn" onclick="toggleDashboard()">SET</button>
        </div>
        <h2 id="displayTitle" style="color:white; font-size:1.1rem; margin:0;">TDF Digital Setlist</h2>
        <div style="display:flex; gap:10px;">
            <button class="top-bar-btn" onclick="startEdit()">✎</button>
            <button class="top-bar-btn" id="saveBtn" style="display:none; color:#34c759;" onclick="finishEdit()">OK</button>
        </div>
    </div>

    <div id="setlistDashboard">
        <div class="dash-header">
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="top-bar-btn" onclick="pasteFromWA()" style="background:#25D366; color:white;">PLAK WA</button>
                <button class="top-bar-btn" onclick="copySetWhatsApp()" style="background:#25D366; color:white; border-radius:50%; width:44px; padding:0;">🟢</button>
                <button class="top-bar-btn" onclick="addCustomRow()">+ REGEL</button>
            </div>
            <button class="top-bar-btn" onclick="toggleDashboard()">X</button>
        </div>
        <div class="dash-list" id="dashList"></div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div id="indexContent" style="flex:1; overflow-y:auto; padding:15px;"></div>
        <div style="padding:15px; background:#111; display:flex; gap:10px;">
            <button class="top-bar-btn" onclick="document.getElementById('bulkFiles').click()" style="flex:1;">IMPORT</button>
            <button class="top-bar-btn" onclick="toggleMenu()" style="flex:1;">TERUG</button>
        </div>
    </div>

    <div class="lyrics-container"><div id="lyricsArea">Kies een nummer...</div><textarea id="editorArea" spellcheck="false"></textarea></div>

    <div id="joyPad" class="draggable-box" style="bottom:25px; left:25px;"><div class="drag-handle">MOVE</div><div style="display:grid; grid-template-areas: '. u .' 'l . r' '. d .'; gap:6px;"><button class="joy-glow-btn" style="grid-area:u;width:55px;height:55px;border-radius:50%" onclick="moveCursorVertical(-1)">↑</button><button class="joy-glow-btn" style="grid-area:l;width:55px;height:55px;border-radius:50%" onclick="moveCursorHorizontal(-1)">←</button><button class="joy-glow-btn" style="grid-area:r;width:55px;height:55px;border-radius:50%" onclick="moveCursorHorizontal(1)">→</button><button class="joy-glow-btn" style="grid-area:d;width:55px;height:55px;border-radius:50%" onclick="moveCursorVertical(1)">↓</button></div></div>
    <div id="chordStrip" class="draggable-box" style="bottom:25px; right:25px;"><div class="drag-handle">CHORDS</div><div id="chordBar" style="display:flex;flex-direction:column;gap:6px;"></div></div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null;

        window.onload = () => { renderIndex(); buildChordStrip(); setupImport(); ['chordStrip', 'joyPad'].forEach(id => initDrag(document.getElementById(id))); };

        function setupImport() {
            const input = document.getElementById('bulkFiles');
            input.addEventListener('change', (e) => {
                const files = Array.from(e.target.files);
                let loaded = 0;
                files.forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const content = event.target.result;
                        if (file.name.endsWith('.json')) {
                            try {
                                const data = JSON.parse(content);
                                if (Array.isArray(data)) data.forEach(s => addSong(s)); else addSong(data);
                            } catch (err) { alert("JSON Fout in: " + file.name); }
                        } else addSong({ title: file.name.replace('.txt',''), content: content });
                        loaded++;
                        if(loaded === files.length) { saveAll(); renderIndex(); alert(loaded + " bestand(en) geïmporteerd."); input.value = ""; }
                    };
                    reader.readAsText(file);
                });
            });
        }

        async function pasteFromWA() {
            let text = "";
            try { text = await navigator.clipboard.readText(); } catch (err) { text = prompt("Plak hier de tekst:"); }
            if (!text) return;
            const lines = text.split('\n');
            const newSet = [];
            lines.forEach(line => {
                const clean = line.replace(/^\d+[\s.)]*/, '').trim();
                if (!clean) return;
                const song = db.find(s => s.title.toLowerCase() === clean.toLowerCase());
                newSet.push(song ? JSON.parse(JSON.stringify(song)) : { title: clean, content: "" });
            });
            if (newSet.length > 0) { setlist = newSet; saveAll(); renderDashboard(); }
        }

        function copySetWhatsApp() {
            let t = "*SETLIST TDF*\n\n" + setlist.map((s,i) => (i+1)+". "+s.title).join("\n");
            navigator.clipboard.writeText(t); alert("Gekopieerd!");
        }

        function addSong(s) { if (!s.title) return; const idx = db.findIndex(x => x.title === s.title); if (idx !== -1) db[idx] = s; else db.push(s); }
        function saveAll() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }
        function toggleMenu() { document.getElementById('songsMenu').classList.toggle('open'); }
        function toggleDashboard() { const d = document.getElementById('setlistDashboard'); d.style.display = (d.style.display === 'flex') ? 'none' : 'flex'; if(d.style.display === 'flex') renderDashboard(); }
        function renderIndex() { const c = document.getElementById('indexContent'); c.innerHTML = ""; db.sort((a,b) => a.title.localeCompare(b.title)).forEach((x) => { const div = document.createElement('div'); div.className = "swipe-container"; div.innerHTML = `<div class="menu-row"><div class="dash-name" onclick="loadSong('${x.title.replace(/'/g, "\\'")}')">${x.title}</div><div style="padding:20px; color:var(--amber-glow);" onclick="addToSet('${x.title.replace(/'/g, "\\'")}')">+</div></div>`; c.appendChild(div); }); }
        function renderDashboard() { const list = document.getElementById('dashList'); list.innerHTML = ""; setlist.forEach((s, i) => { const div = document.createElement('div'); div.className = "swipe-container"; div.innerHTML = `<div class="dash-row"><div class="dash-num">${i+1}</div><div class="dash-name" onclick="renameItem(${i})">${s.title}</div><div class="dash-controls"><button class="dash-ctrl-btn" onclick="moveItem(${i},-1)">↑</button><button class="dash-ctrl-btn" onclick="moveItem(${i},1)">↓</button></div></div>`; list.appendChild(div); }); }
        function loadSong(t) { cur = db.find(s => s.title === t) || setlist.find(s => s.title === t); if(!cur) return; document.getElementById('displayTitle').textContent = cur.title; draw(); if(document.getElementById('songsMenu').classList.contains('open')) toggleMenu(); }
        function draw() { if(!cur) return; const lines = cur.content.split('\n'); let h = ""; lines.forEach(l => { let chords = [], txt = "", i = 0; while(i < l.length) { if(l[i] === '[') { let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;} chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1; } else { txt += l[i]; i++; } } let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; }); h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`; }); document.getElementById('lyricsArea').innerHTML = h; }
        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); saveAll(); alert("Toegevoegd!"); } }
        function moveItem(idx, dir) { let t = idx + dir; if(t >= 0 && t < setlist.length) { [setlist[idx], setlist[t]] = [setlist[t], setlist[idx]]; saveAll(); renderDashboard(); } }
        function renameItem(i) { const n = prompt("Hernoem:", setlist[i].title); if(n) { setlist[i].title = n; saveAll(); renderDashboard(); } }
        function addCustomRow() { const n = prompt("Tekst:", "--- PAUZE ---"); if(n) { setlist.push({title: n, content: ""}); saveAll(); renderDashboard(); } }
        function buildChordStrip() { const bar = document.getElementById('chordBar'); ["A","Am","B","Bm","C","D","Dm","E","Em","F","G"].forEach(c => { const b = document.createElement('button'); b.className = "chord-glow-btn"; b.style.cssText = "width:65px;height:45px;border-radius:6px;margin-bottom:5px;font-weight:bold;"; b.textContent = c; b.onmousedown = (e) => { e.preventDefault(); insertText(`[${c}]`); }; bar.appendChild(b); }); }
        function insertText(t) { const ed = document.getElementById('editorArea'); const s = ed.selectionStart; ed.value = ed.value.substring(0, s) + t + ed.value.substring(ed.selectionEnd); ed.selectionStart = ed.selectionEnd = s + t.length; ed.focus(); }
        function moveCursorHorizontal(n) { const ed = document.getElementById('editorArea'); ed.selectionStart = ed.selectionEnd = ed.selectionStart + n; ed.focus(); }
        function moveCursorVertical(n) { const ed = document.getElementById('editorArea'); const lines = ed.value.split('\n'); const pos = ed.selectionStart; let curL = ed.value.substr(0, pos).split('\n').length - 1; let tarL = Math.max(0, Math.min(lines.length - 1, curL + n)); let newP = 0; for(let i=0; i<tarL; i++) newP += lines[i].length + 1; ed.selectionStart = ed.selectionEnd = newP; ed.focus(); }
        function initDrag(el) { let p1=0, p2=0, p3=0, p4=0; const h = el.querySelector('.drag-handle'); h.onmousedown = dS; h.ontouchstart = dS; function dS(e) { e.preventDefault(); p3 = e.clientX || e.touches[0].clientX; p4 = e.clientY || e.touches[0].clientY; document.onmouseup = dE; document.onmousemove = dM; document.ontouchend = dE; document.ontouchmove = dM; } function dM(e) { p1 = p3 - (e.clientX || e.touches[0].clientX); p2 = p4 - (e.clientY || e.touches[0].clientY); p3 = e.clientX || e.touches[0].clientX; p4 = e.clientY || e.touches[0].clientY; el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px"; } function dE() { document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null; } }
        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editorArea').style.display='block'; document.getElementById('editorArea').value = cur.content; document.getElementById('saveBtn').style.display='block'; document.querySelectorAll('.draggable-box').forEach(b => b.style.display = 'block'); }
        function finishEdit() { cur.content = document.getElementById('editorArea').value; let idx = db.findIndex(s => s.title === cur.title); if(idx !== -1) db[idx].content = cur.content; saveAll(); document.getElementById('lyricsArea').style.display='block'; document.getElementById('editorArea').style.display='none'; document.getElementById('saveBtn').style.display='none'; document.querySelectorAll('.draggable-box').forEach(b => b.style.display = 'none'); draw(); }
    </script>
</body>
</html>
