<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital Setlist</title>
    <style>
        :root { 
            --bg-dark: #0a0a0a; 
            --top-bar-bg: #1a1a1a; 
            --griffin-orange: #d48e3d; 
            --griffin-red: #c12718; 
            --header-height: 85px; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: ui-monospace, 'SF Mono', monospace; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg-dark); 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
        }

        /* Top Bar */
        .top-bar { 
            height: var(--header-height); 
            background: var(--top-bar-bg); 
            border-bottom: 1px solid #333; 
            display: flex; 
            align-items: flex-end; 
            justify-content: space-between; 
            padding: 0 15px 12px 15px; 
            z-index: 3000; 
            flex-shrink: 0; 
        }

        .top-bar-btn { 
            background: none; 
            border: none; 
            color: var(--griffin-orange); 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
        }

        /* Logo Stack (Oorspronkelijk) */
        .logo-container { 
            position: relative; 
            width: 50px; 
            height: 50px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .base-logo, .overlay-logo { 
            position: absolute; 
            max-width: 100%; 
            max-height: 100%; 
            padding: 2px;
            object-fit: contain; 
        }
        .base-logo { z-index: 1; }
        .overlay-logo { z-index: 2; }

        /* Dashboard Overlay */
        #setlistDashboard { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg-dark); z-index: 45000; display: none; 
            flex-direction: column; padding-top: env(safe-area-inset-top); 
        }

        .dash-header { 
            padding: 10px 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; height: 85px; 
        }

        .dash-list { flex: 1; overflow-y: auto; padding: 10px 15px; background: var(--bg-dark); }

        /* Swipe UI */
        .swipe-container { 
            position: relative; margin-bottom: 8px; overflow: hidden; 
            border-radius: 8px; background: var(--griffin-red); flex-shrink: 0; 
        }

        .dash-row, .menu-row { 
            display: flex; align-items: center; background: #1c1c1e; 
            border: 1px solid #333; height: 72px; color: white; width: 100%; 
            position: relative; z-index: 2; transition: transform 0.2s ease; 
        }

        .dash-num { 
            width: 50px; height: 100%; display: flex; align-items: center; 
            justify-content: center; color: var(--griffin-orange); 
            font-size: 1.5rem; font-weight: bold; border-right: 1px solid #333; 
        }

        .dash-name { 
            flex: 1; padding: 0 15px; font-size: 1.4rem; font-weight: bold; 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
        }

        .dash-controls { display: flex; gap: 5px; padding-right: 10px; }
        .dash-ctrl-btn { width: 40px; height: 40px; background: #333; border: 1px solid #444; color: white; border-radius: 6px; }

        /* Songs Menu */
        .songs-menu { 
            position: fixed; top: 0; left: -100%; width: 85%; height: 100%; 
            background: #1c1c1e; z-index: 40000; transition: left 0.3s ease; 
            display: flex; flex-direction: column; 
        }
        .songs-menu.open { left: 0; }
        #indexContent { flex: 1; overflow-y: auto; padding: 10px; }

        .swipe-hint { 
            position: absolute; right: 20px; top: 0; bottom: 0; 
            display: flex; align-items: center; color: white; font-size: 0.8rem; 
        }

        /* Lyrics Display */
        .lyrics-container { flex: 1; background: #fff; overflow-y: auto; position: relative; }
        #lyricsArea { padding: 25px; font-size: 1.4rem; color: #000; line-height: 1.5; white-space: pre-wrap; }
        #editorArea { 
            display: none; width: 100%; height: 100%; padding: 25px; 
            font-size: 1.4rem; font-family: monospace; border: none; background: #f9f9f9; 
        }

        .chord-row { color: var(--griffin-red); font-weight: bold; height: 1.4rem; position: relative; }
        .chord-item { position: absolute; }
        .lyric-line { margin-bottom: 15px; display: block; }

        /* Floating Tools */
        .draggable-box { 
            position: fixed; background: #1a1a1a; border: 1px solid var(--griffin-orange); 
            border-radius: 8px; padding: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            display: none; z-index: 50000;
        }
        .drag-handle { color: white; text-align: center; font-size: 10px; cursor: move; padding: 5px; background: #333; margin-bottom: 5px; }
        .joy-container { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 5px; }
        .joy-btn { width: 50px; height: 50px; border-radius: 50%; background: #444; color: white; border: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <input type="file" id="bulkFiles" accept=".json,.txt" multiple style="display:none;">

    <div class="top-bar">
        <div style="display:flex; gap:12px; align-items:center;">
            <div class="logo-container" onclick="location.reload()">
                <img src="logo.png" class="base-logo" alt="">
                <img src="https://i.ibb.co/3S432pG/griffin-logo.png" class="overlay-logo" alt="">
            </div>
            <button class="top-bar-btn" onclick="toggleMenu()">SONGS</button>
            <button class="top-bar-btn" onclick="toggleDashboard()" style="background:var(--griffin-orange);color:black;padding:6px 18px;border-radius:6px;">SET</button>
        </div>
        <h2 id="displayTitle" style="color:white; font-size:1rem; margin:0; text-align: center;">TDF Digital Setlist</h2>
        <div style="display:flex; gap:10px;">
            <button class="top-bar-btn" onclick="startEdit()">✎</button>
            <button class="top-bar-btn" id="saveBtn" style="display:none; color:#34c759;" onclick="finishEdit()">OK</button>
        </div>
    </div>

    <div id="setlistDashboard">
        <div class="dash-header">
            <div style="display:flex; gap:15px; align-items:center;">
                <div class="logo-container" style="width:60px; height:60px;">
                    <img src="logo.png" class="base-logo" alt="">
                    <img src="https://i.ibb.co/3S432pG/griffin-logo.png" class="overlay-logo" alt="">
                </div>
                <button class="top-bar-btn" onclick="addCustomRow()" style="background:#444; color:white; padding:6px 14px; border-radius:6px;">+ REGEL</button>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="top-bar-btn" onclick="copySetWhatsApp()" style="background:#25D366; color:white; width:44px; height:44px; border-radius:50%;">🟢</button>
                <button class="top-bar-btn" onclick="toggleDashboard()" style="border:1px solid #444; padding:6px 15px; border-radius:6px;">X</button>
            </div>
        </div>
        <div class="dash-list" id="dashList"></div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div id="indexContent"></div>
        <div style="padding:15px; background:#111; display:flex; gap:10px;">
            <button class="top-bar-btn" onclick="document.getElementById('bulkFiles').click()" style="flex:1; background:#333; color:white; padding:10px; border-radius:5px;">IMPORT</button>
            <button class="top-bar-btn" onclick="toggleMenu()" style="flex:1; background:#333; color:white;">TERUG</button>
        </div>
    </div>

    <div class="lyrics-container">
        <div id="lyricsArea">Kies een nummer...</div>
        <textarea id="editorArea" placeholder="Tekst [Akkoord] hier..."></textarea>
    </div>

    <div id="joyPad" class="draggable-box" style="bottom: 20px; left: 20px;">
        <div class="drag-handle">MOVE</div>
        <div class="joy-container">
            <button class="joy-btn" style="grid-area:up" onclick="moveLine(-1)">↑</button>
            <button class="joy-btn" style="grid-area:left" onclick="moveCursor(-1)">←</button>
            <button class="joy-btn" style="grid-area:right" onclick="moveCursor(1)">→</button>
            <button class="joy-btn" style="grid-area:down" onclick="moveLine(1)">↓</button>
        </div>
    </div>

    <div id="chordStrip" class="draggable-box" style="bottom: 20px; right: 20px;">
        <div class="drag-handle">CHORDS</div>
        <div id="chordBar" style="display: flex; flex-direction: column;"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null;
        let touchStartX = 0;

        window.onload = () => {
            renderIndex();
            buildChordStrip();
            ['chordStrip', 'joyPad'].forEach(id => initDrag(document.getElementById(id)));
            setupImport(); // Import initialiseren
        };

        function toggleMenu() { document.getElementById('songsMenu').classList.toggle('open'); }
        function toggleDashboard() {
            const d = document.getElementById('setlistDashboard');
            d.style.display = (d.style.display === 'flex') ? 'none' : 'flex';
            if(d.style.display === 'flex') renderDashboard();
        }

        // --- IMPORT LOGICA (GECORRIGEERD VOOR FIREFOX IPAD) ---
        function setupImport() {
            const input = document.getElementById('bulkFiles');
            input.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                for (let file of files) {
                    try {
                        const text = await readFileAsText(file);
                        if (file.name.endsWith('.json')) {
                            // JSON verwerken
                            const imported = JSON.parse(text);
                            if (Array.isArray(imported)) {
                                imported.forEach(s => addUniqueToDb(s));
                            } else {
                                addUniqueToDb(imported);
                            }
                        } else if (file.name.endsWith('.txt')) {
                            // TXT verwerken
                            addUniqueToDb({ 
                                title: file.name.replace('.txt',''), 
                                content: text 
                            });
                        }
                    } catch (err) {
                        alert(`Fout bij bestand: ${file.name}. Is dit een geldig bestand?`);
                        console.error(err);
                    }
                }

                saveDb();
                renderIndex();
                input.value = ""; // Input resetten
                alert("Bestanden verwerkt!");
            });
        }

        // Robuuste methode om bestanden als tekst te lezen
        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const fr = new FileReader();
                fr.onload = () => resolve(fr.result);
                fr.onerror = () => reject(fr.error);
                fr.readAsText(file);
            });
        }

        // Liedje uniek toevoegen aan DB (overschrijven indien titel bestaat)
        function addUniqueToDb(newSong) {
            if (!newSong.title || !newSong.content) return;
            newSong.content = newSong.content.replace(/\r\n/g, '\n'); // Line endings fix
            const exists = db.findIndex(s => s.title === newSong.title);
            if (exists !== -1) db[exists] = newSong;
            else db.push(newSong);
        }

        function saveDb() { localStorage.setItem('tdfSongs', JSON.stringify(db)); }
        function saveSet() { localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }

        // --- RENDER FUNCTIES ---
        function renderIndex() {
            const c = document.getElementById('indexContent');
            c.innerHTML = "";
            db.sort((a,b) => a.title.localeCompare(b.title)).forEach((x, i) => {
                const container = document.createElement('div');
                container.className = "swipe-container";
                container.innerHTML = `
                    <div class="swipe-hint">DELETE</div>
                    <div class="menu-row" style="padding: 0 15px;" 
                         ontouchstart="handleTouchStart(event)" 
                         ontouchmove="handleTouchMove(event, this)" 
                         ontouchend="handleTouchEnd(event, this, ${i}, true)">
                        <div style="flex:1" onclick="loadSong('${x.title.replace(/'/g, "\\'")}')">${x.title}</div>
                        <div style="color:var(--griffin-orange); font-size:1.5rem;" onclick="addToSet('${x.title.replace(/'/g, "\\'")}')">+</div>
                    </div>`;
                c.appendChild(container);
            });
        }

        function renderDashboard() {
            const list = document.getElementById('dashList');
            list.innerHTML = "";
            setlist.forEach((s, i) => {
                const container = document.createElement('div');
                container.className = "swipe-container";
                container.innerHTML = `
                    <div class="swipe-hint">REMOVE</div>
                    <div class="dash-row" 
                         ontouchstart="handleTouchStart(event)" 
                         ontouchmove="handleTouchMove(event, this)" 
                         ontouchend="handleTouchEnd(event, this, ${i}, false)">
                        <div class="dash-num">${i+1}</div>
                        <div class="dash-name" onclick="renameOrLoad(${i})">${s.title}</div>
                        <div class="dash-controls">
                            <button class="dash-ctrl-btn" onclick="moveSetItem(${i}, -1)">↑</button>
                            <button class="dash-ctrl-btn" onclick="moveSetItem(${i}, 1)">↓</button>
                        </div>
                    </div>`;
                list.appendChild(container);
            });
        }

        function renameOrLoad(i) {
            const old = setlist[i].title;
            const n = prompt("Hernoem of OK om te laden:", old);
            if (n === null) return;
            if (n === "" || n === old) {
                loadSong(old);
                toggleDashboard();
            } else {
                setlist[i].title = n;
                saveSet();
                renderDashboard();
            }
        }

        function loadSong(t) {
            cur = db.find(s => s.title === t) || setlist.find(s => s.title === t);
            if(!cur) return;
            document.getElementById('displayTitle').textContent = cur.title;
            draw();
            if(document.getElementById('songsMenu').classList.contains('open')) toggleMenu();
        }

        function draw() {
            if(!cur) return;
            const lines = cur.content.split('\n');
            let h = "";
            lines.forEach(l => {
                let cArr = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i);
                        if(e===-1){txt+=l[i]; i++; continue;}
                        cArr.push({p: txt.length, v: l.substring(i+1, e)});
                        i = e+1;
                    } else { txt += l[i]; i++; }
                }
                let r = "";
                cArr.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            document.getElementById('lyricsArea').innerHTML = h;
            document.querySelector('.lyrics-container').scrollTop = 0;
        }

        function handleTouchStart(e) { touchStartX = e.touches[0].clientX; }
        function handleTouchMove(e, el) {
            let move = touchStartX - e.touches[0].clientX;
            if (move > 0) el.style.transform = `translateX(-${Math.min(move, 80)}px)`;
        }
        function handleTouchEnd(e, el, i, isGlobal) {
            let move = touchStartX - e.changedTouches[0].clientX;
            if (move > 60) {
                if(isGlobal) {
                    if(confirm(`"${db[i].title}" definitief wissen?`)) { db.splice(i,1); saveDb(); renderIndex(); }
                } else {
                    setlist.splice(i,1); saveSet(); renderDashboard();
                }
            }
            el.style.transform = `translateX(0)`;
        }

        function addToSet(t) {
            const s = db.find(x=>x.title===t);
            if(s) { 
                setlist.push(JSON.parse(JSON.stringify(s))); // Deep copy
                saveSet(); 
                alert(t + " toegevoegd aan set"); 
            }
        }

        function moveSetItem(idx, dir) {
            let target = idx + dir;
            if(target >= 0 && target < setlist.length) {
                [setlist[idx], setlist[target]] = [setlist[target], setlist[idx]];
                saveSet(); renderDashboard();
            }
        }

        function addCustomRow() {
            const n = prompt("Tekstregel:", "--- PAUZE ---");
            if(n) { setlist.push({title: n, content: ""}); saveSet(); renderDashboard(); }
        }

        function buildChordStrip() {
            const bar = document.getElementById('chordBar');
            ["A","Am","B","Bm","C","D","Dm","E","Em","F","G"].forEach(c => {
                const b = document.createElement('button');
                b.style.cssText = "width:65px; height:45px; background:#333; color:white; border:1px solid #444; border-radius:6px; margin-bottom:5px; font-weight:bold;";
                b.textContent = c;
                b.onmousedown = (e) => { e.preventDefault(); insertText(`[${c}]`); };
                bar.appendChild(b);
            });
        }

        function insertText(t) {
            const ed = document.getElementById('editorArea');
            const start = ed.selectionStart;
            ed.value = ed.value.substring(0, start) + t + ed.value.substring(ed.selectionEnd);
            ed.selectionStart = ed.selectionEnd = start + t.length;
            ed.focus();
        }

        function moveCursorHorizontal(n) { 
            const ed = document.getElementById('editorArea');
            ed.selectionStart = ed.selectionEnd = ed.selectionStart + n;
            ed.focus();
        }

        function moveLine(n) {
            const ed = document.getElementById('editorArea');
            const lines = ed.value.split('\n');
            const pos = ed.selectionStart;
            let currentLine = ed.value.substr(0, pos).split('\n').length - 1;
            let targetLine = Math.max(0, Math.min(lines.length - 1, currentLine + n));
            let newPos = 0;
            for(let i=0; i<targetLine; i++) newPos += lines[i].length + 1;
            ed.selectionStart = ed.selectionEnd = newPos;
            ed.focus();
        }

        function initDrag(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            const handle = el.querySelector('.drag-handle');
            handle.onmousedown = dragMouseDown;
            handle.ontouchstart = dragMouseDown;
            function dragMouseDown(e) {
                e.preventDefault();
                pos3 = e.clientX || e.touches[0].clientX;
                pos4 = e.clientY || e.touches[0].clientY;
                document.onmouseup = dragEnd; document.onmousemove = dragMove;
                document.ontouchend = dragEnd; document.ontouchmove = dragMove;
            }
            function dragMove(e) {
                pos1 = pos3 - (e.clientX || e.touches[0].clientX);
                pos2 = pos4 - (e.clientY || e.touches[0].clientY);
                pos3 = e.clientX || e.touches[0].clientX;
                pos4 = e.clientY || e.touches[0].clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }
            function dragEnd() { document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null; }
        }

        function copySetWhatsApp() {
            let t = "*SETLIST TDF*\n\n" + setlist.map((s,i) => (i+1)+". "+s.title).join("\n");
            navigator.clipboard.writeText(t);
            alert("Gekopieerd voor WhatsApp!");
        }

        function startEdit() {
            if(!cur) return;
            document.getElementById('lyricsArea').style.display='none';
            document.getElementById('editorArea').style.display='block';
            document.getElementById('editorArea').value = cur.content;
            document.getElementById('saveBtn').style.display='block';
            document.getElementById('joyPad').style.display='block';
            document.getElementById('chordStrip').style.display='block';
        }

        function finishEdit() {
            cur.content = document.getElementById('editorArea').value;
            const idx = db.findIndex(s => s.title === cur.title);
            if(idx !== -1) db[idx].content = cur.content;
            saveDb();
            document.getElementById('lyricsArea').style.display='block';
            document.getElementById('editorArea').style.display='none';
            document.getElementById('saveBtn').style.display='none';
            document.getElementById('joyPad').style.display='none';
            document.getElementById('chordStrip').style.display='none';
            draw();
        }
    </script>
</body>
</html>
