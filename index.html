<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Master v6.21</title>
    <style>
        :root { --header-height: 65px; --griffin-orange: #d48e3d; --griffin-red: #c12718; --gray-header: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100dvh; width: 100vw; background-color: #ffffff; overflow: hidden; position: fixed; }
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 99999; }
        .top-bar-btn { background: none; border: none; color: #007aff; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .top-bar-icon { width: 28px; height: 28px; fill: #007aff; }
        .lyrics-container { width: 100%; height: 100dvh; padding-top: var(--header-height); overflow-y: auto; }
        #lyricsArea { padding: 30px; font-family: ui-monospace, monospace; font-size: 1.35rem; line-height: 1.35; }
        .songs-menu { position: fixed; top: 0; left: -85%; width: 85%; height: 100dvh; background: #1c1c1e; z-index: 90001; transition: left 0.3s ease; display: flex; flex-direction: column; }
        @media (min-width: 768px) { .songs-menu { width: 33.33%; left: -33.33%; } }
        .songs-menu.open { left: 0; }
        .menu-header { padding: 15px; background: #2c2c2e; border-bottom: 1px solid #444; }
        .alpha-header { background: var(--gray-header); color: #aaa; padding: 5px 20px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .index-item { padding: 18px 20px; background: #1c1c1e; color: white; cursor: pointer; border-bottom: 1px solid #333; }
        .full-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.8); z-index: 1000000; padding: 20px; }
        .modal-box { max-width: 500px; margin: 20px auto; background: #2c2c2e; padding: 20px; border-radius: 12px; color: white; }
        .modal-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; background: #007aff; color: white; font-weight: bold; cursor: pointer; }
        .selection-item { padding: 12px; border-bottom: 1px solid #444; display: flex; align-items: center; gap: 10px; color: white; }
        .chord-row { height: 1.5rem; color: var(--griffin-red); font-weight: bold; position: relative; }
        .chord-item { position: absolute; white-space: pre; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-left"><button class="top-bar-btn" onclick="toggleMenu()">Songs</button></div>
        <div class="top-bar-center">
            <h2 id="displayTitle" style="color:white; font-size:1rem;">TDF Master</h2>
            <p id="curBookDisplay" style="color:var(--griffin-orange); font-size:0.7rem; font-weight:bold;">ALLE LIEDJES</p>
        </div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" onclick="el('settingsOverlay').style.display='block'" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41l-0.36,2.54c-0.59,0.24-1.13,0.57-1.62,0.94L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.84,9.48l2.03,1.58C4.82,11.36,4.8,11.68,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c(0.18,0.14,0.23,0.41,0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c(0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c(0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div class="menu-header">
            <select id="bookSelector" onchange="switchBook()" style="width:100%; padding:15px; background:#444; color:white; border:none; border-radius:8px; font-size:1.1rem;"></select>
        </div>
        <div id="indexContent" style="flex-grow:1; overflow-y:auto;"></div>
        <button id="addSongsBtn" class="modal-btn" style="margin:0; border-radius:0; display:none; background:var(--griffin-orange);" onclick="openOrganizer()">+ LIEDJES TOEVOEGEN</button>
    </div>

    <div id="settingsOverlay" class="full-overlay">
        <div class="modal-box">
            <h3>Bibliotheek</h3>
            <button class="modal-btn" onclick="createNewBook()">+ NIEUW BOEK MAKEN</button>
            <button class="modal-btn" onclick="deleteCurrentBook()" id="delBookBtn" style="background:var(--griffin-red); display:none;">VERWIJDER DIT BOEK</button>
            <button class="modal-btn" style="background:#444;" onclick="el('settingsOverlay').style.display='none'">SLUITEN</button>
        </div>
    </div>

    <div id="organizerOverlay" class="full-overlay">
        <div class="modal-box" style="max-height:85vh; overflow-y:auto;">
            <h3 id="orgTitle">Selecteer Liedjes</h3>
            <div id="selectionList"></div>
            <button class="modal-btn" onclick="saveOrganization()">OPSLAAN</button>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Gebruik de 'Songs' knop linksboven om te beginnen.</div>
    </div>

    <script>
        const el = (id) => document.getElementById(id);
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let books = JSON.parse(localStorage.getItem('tdfBooks')) || {};
        let currentBook = "all";

        window.onload = () => {
            updateBookSelector();
            renderIndex();
        };

        function toggleMenu() { el('songsMenu').classList.toggle('open'); }

        function updateBookSelector() {
            const sel = el('bookSelector');
            sel.options.length = 0;
            sel.add(new Option("HOOFDBIBLIOTHEEK", "all"));
            Object.keys(books).sort().forEach(b => {
                sel.add(new Option(b.toUpperCase(), b));
            });
            sel.value = currentBook;
        }

        function createNewBook() {
            const n = prompt("Naam van het nieuwe boek:");
            if (n && n.trim()) {
                const bookName = n.trim();
                if (!books[bookName]) books[bookName] = [];
                localStorage.setItem('tdfBooks', JSON.stringify(books));
                currentBook = bookName;
                updateBookSelector();
                switchBook();
                el('settingsOverlay').style.display = 'none';
                if (!el('songsMenu').classList.contains('open')) toggleMenu();
                openOrganizer();
            }
        }

        function switchBook() {
            currentBook = el('bookSelector').value;
            el('curBookDisplay').textContent = currentBook === 'all' ? "ALLE LIEDJES" : currentBook.toUpperCase();
            el('addSongsBtn').style.display = currentBook === 'all' ? 'none' : 'block';
            el('delBookBtn').style.display = currentBook === 'all' ? 'none' : 'block';
            renderIndex();
        }

        function renderIndex() {
            const c = el('indexContent'); c.innerHTML = "";
            let list = currentBook === 'all' ? db : db.filter(s => (books[currentBook] || []).includes(s.title));
            list.sort((a,b) => a.title.localeCompare(b.title));

            let lastChar = "";
            list.forEach(s => {
                const char = s.title.charAt(0).toUpperCase();
                if (char !== lastChar) {
                    const h = document.createElement('div'); h.className = 'alpha-header'; h.textContent = char;
                    c.appendChild(h); lastChar = char;
                }
                const item = document.createElement('div'); item.className = 'index-item';
                item.textContent = s.title;
                item.onclick = () => { loadSong(s.title); toggleMenu(); };
                c.appendChild(item);
            });
        }

        function openOrganizer() {
            el('organizerOverlay').style.display = 'block';
            el('orgTitle').textContent = `Boek: ${currentBook}`;
            const list = el('selectionList'); list.innerHTML = "";
            db.sort((a,b) => a.title.localeCompare(b.title)).forEach(s => {
                const div = document.createElement('div'); div.className = 'selection-item';
                const cb = document.createElement('input'); cb.type = 'checkbox';
                cb.checked = (books[currentBook] || []).includes(s.title);
                cb.style.transform = "scale(1.5)";
                div.append(cb, document.createTextNode(" " + s.title));
                div.onclick = () => { cb.checked = !cb.checked; };
                cb.onclick = (e) => e.stopPropagation();
                list.appendChild(div);
                div.cbRef = cb; div.titleRef = s.title;
            });
        }

        function saveOrganization() {
            const items = el('selectionList').children;
            const selected = [];
            for (let item of items) { if (item.cbRef.checked) selected.push(item.titleRef); }
            books[currentBook] = selected;
            localStorage.setItem('tdfBooks', JSON.stringify(books));
            el('organizerOverlay').style.display = 'none';
            renderIndex();
        }

        function loadSong(t) {
            const s = db.find(x => x.title === t);
            el('displayTitle').textContent = s.title;
            const lines = s.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); chords.push({ p: txt.length, v: l.substring(i+1, e) });
                        i = e + 1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`);
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            el('lyricsArea').innerHTML = h; el('scroller').scrollTop = 0;
        }

        function deleteCurrentBook() {
            if(confirm(`"${currentBook}" verwijderen?`)) {
                delete books[currentBook];
                localStorage.setItem('tdfBooks', JSON.stringify(books));
                currentBook = "all";
                updateBookSelector();
                switchBook();
                el('settingsOverlay').style.display = 'none';
            }
        }
    </script>
</body>
</html>
