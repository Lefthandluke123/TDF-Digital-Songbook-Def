<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <title>TDF Master v6.82</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 20px); 
            --header-height: calc(60px + var(--safe-top)); 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* Basis layout zonder kleur-afhankelijkheid in CSS waar mogelijk */
        html, body { height: 100dvh; width: 100vw; overflow: hidden; position: fixed; font-family: sans-serif; background: #fff !important; }

        .top-bar { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); z-index: 10000; border-bottom: 3px solid #000; background: #fff !important; }
        .top-bar-content { margin-top: var(--safe-top); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        
        .songs-menu { 
            position: fixed; top: var(--header-height); left: -300px; width: 280px; height: calc(100dvh - var(--header-height)); 
            z-index: 9000; transition: left 0.3s ease; border-right: 3px solid #000; background: #fff !important;
            visibility: hidden; /* Voorkomt dat het menu knoppen blokkeert als het dicht is */
        }
        .songs-menu.open { left: 0; visibility: visible; }

        .lyrics-container { width: 100%; height: 100dvh; padding-top: var(--header-height); overflow-y: auto; -webkit-overflow-scrolling: touch; background: #fff !important; }
        #lyricsArea { padding: 30px; font-family: monospace; font-size: 1.5rem; font-weight: bold; }
        
        .chord-row { height: 1.7rem; position: relative; color: #c12718 !important; }
        .chord-item { position: absolute; white-space: pre; font-weight: 900; }

        .floater { position: fixed; border: 3px solid #000; border-radius: 12px; z-index: 11000; text-align: center; padding: 8px; background: #fff !important; }
        #editorArea { display: none; width: 100%; height: 70vh; padding: 20px; font-family: monospace; font-size: 1.3rem; border: none; background: #fff !important; }
        
        .f-btn { border: 2px solid #000; border-radius: 6px; background: #fff !important; font-weight: 900; cursor: pointer; padding: 5px; min-height: 40px; }
        
        .full-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 20000; background: rgba(255,255,255,0.98); padding: 20px; }
    </style>
</head>
<body style="background-color: #ffffff !important; color: #000000 !important;">

    <div class="top-bar">
        <div class="top-bar-content">
            <div style="display:flex; align-items:center; gap:15px;">
                <img id="appLogo" src="" alt="Logo" onclick="showSettings()" style="height:35px; width:auto; border:1px solid #000;">
                <button onclick="toggleMenu()" class="f-btn" style="color:#007aff !important;">SONGS</button>
            </div>
            <div id="displayTitle" onclick="saveFromTitle()" style="font-weight:900; font-size:1.2rem;">TDF Master</div>
            <div style="display:flex; gap:10px;">
                <button onclick="createNewSong()" class="f-btn" style="color:#007aff !important; font-size:1.5rem;">+</button>
                <button onclick="startEdit()" class="f-btn" style="color:#007aff !important;">✎</button>
            </div>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div style="padding:15px; border-bottom:1px solid #000;">
            <input type="text" id="menuSearch" placeholder="Zoek..." oninput="renderMenu()" style="width:100%; padding:10px; border:2px solid #000; font-weight:bold;">
        </div>
        <div id="menuContent" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea"></div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <div class="floater" style="right:15px; top:120px; width:70px;">
        <div id="speedDisplay" style="font-size:0.8rem; font-weight:900;">180s</div>
        <button class="f-btn" style="width:100%; margin-top:5px;" onclick="adjustSpeed(-10)">+</button>
        <button class="f-btn" style="width:100%; margin-top:5px;" onclick="adjustSpeed(10)">-</button>
        <hr style="margin:8px 0; border:1px solid #000;">
        <button class="f-btn" style="width:100%;" onclick="transpose(1)">b+</button>
        <button class="f-btn" style="width:100%; margin-top:5px;" onclick="transpose(-1)">b-</button>
        <button id="playBtn" class="f-btn" style="width:100%; margin-top:10px; background:#007aff !important; color:#fff !important;" onclick="toggleScroll()">▶</button>
    </div>

    <div id="settingsOverlay" class="full-overlay">
        <div style="max-width:400px; margin:40px auto; background:#fff; padding:30px; border:4px solid #000; text-align:center; border-radius:15px;">
            <h2 style="margin-bottom:20px;">BEHEER</h2>
            <button class="f-btn" onclick="location.reload()" style="width:100%; margin:10px 0; background:#ff3b30 !important; color:#fff !important;">🔄 VERVERS APP</button>
            <button class="f-btn" onclick="createNewBook()" style="width:100%; margin:10px 0;">📚 NIEUW BOEK MAKEN</button>
            <button class="f-btn" onclick="downloadBackup()" style="width:100%; margin:10px 0;">💾 BACK-UP</button>
            <button class="f-btn" onclick="hideSettings()" style="width:100%; margin:10px 0; background:#000 !important; color:#fff !important;">SLUITEN</button>
            <input type="file" id="logoInput" accept="image/*" style="display:none;">
        </div>
    </div>

    <script>
        const el = (id) => document.getElementById(id);
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [], tags = JSON.parse(localStorage.getItem('tdfTags')) || {};
        let appLogoData = localStorage.getItem('tdfLogo') || "", currentTag = "ALLES", cur = null, sInt = null, scrollSpeed = 180, transOffset = 0;

        // FORCEER KLEUREN MET JAVASCRIPT (ELKE SECONDE)
        setInterval(() => {
            document.body.style.backgroundColor = "#ffffff";
            document.body.style.color = "#000000";
            const items = document.querySelectorAll('.song-item, #lyricsArea, .top-bar, .songs-menu, #displayTitle');
            items.forEach(i => { i.style.color = "#000000"; i.style.backgroundColor = "#ffffff"; });
        }, 1000);

        window.onload = () => { if(appLogoData) el('appLogo').src = appLogoData; renderMenu(); };

        function showSettings() { el('settingsOverlay').style.display = 'block'; }
        function hideSettings() { el('settingsOverlay').style.display = 'none'; }
        function toggleMenu() { el('songsMenu').classList.toggle('open'); }

        function renderMenu() {
            const c = el('menuContent'); c.innerHTML = "";
            const q = el('menuSearch').value.toLowerCase();
            const all = document.createElement('div');
            all.style.padding = "15px"; all.style.fontWeight = "900"; all.style.borderBottom = "2px solid #000";
            all.style.background = currentTag === 'ALLES' ? "#d48e3d" : "#fff";
            all.textContent = "📜 ALLE LIEDJES"; all.onclick = () => { currentTag = 'ALLES'; renderMenu(); };
            c.appendChild(all);
            
            Object.keys(tags).sort().forEach(t => {
                const b = document.createElement('div');
                b.style.padding = "15px"; b.style.fontWeight = "900"; b.style.borderBottom = "2px solid #000";
                b.style.background = currentTag === t ? "#d48e3d" : "#fff";
                b.textContent = "🏷️ " + t; b.onclick = () => { currentTag = t; renderMenu(); };
                c.appendChild(b);
            });

            let f = currentTag === "ALLES" ? db : db.filter(s => (tags[currentTag] || []).includes(s.title));
            if(q) f = db.filter(s => s.title.toLowerCase().includes(q));
            f.sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const i = document.createElement('div');
                i.className = 'song-item'; i.style.padding = "15px"; i.style.borderBottom = "1px solid #eee";
                i.textContent = s.title; i.onclick = () => loadSong(s.title);
                c.appendChild(i);
            });
        }

        function loadSong(t) { cur = db.find(x => x.title === t); transOffset = 0; el('displayTitle').textContent = t; draw(); el('songsMenu').classList.remove('open'); }
        
        function draw() {
            if(!cur) return;
            const lines = cur.content.split('\n'); let h = "";
            const chordMap = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') { 
                        let e = l.indexOf(']', i); 
                        let c = l.substring(i+1, e).replace(/[A-G][#b]?/g, m => {
                            let n = m; if(n==="Bb")n="A#"; if(n==="Eb")n="D#"; if(n==="Ab")n="G#"; if(n==="Db")n="C#"; if(n==="Gb")n="F#";
                            let idx = chordMap.indexOf(n); if(idx===-1) return m;
                            let ni = (idx + transOffset) % 12; while(ni<0) ni+=12; return chordMap[ni];
                        });
                        chords.push({ p: txt.length, v: c }); i = e + 1; 
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`);
                h += `<div class="chord-row">${r}</div><div style="white-space:pre; margin-bottom:12px;">${txt || ' '}</div>`;
            });
            el('lyricsArea').innerHTML = h; el('scroller').scrollTop = 0;
        }

        function startEdit() { if(!cur) return; el('lyricsArea').style.display='none'; el('editorArea').style.display='block'; el('editorArea').value = cur.content; el('editorArea').focus(); }
        function saveFromTitle() { if(el('editorArea').style.display === 'block') { const idx = db.findIndex(s => s.title === cur.title); db[idx].content = el('editorArea').value; localStorage.setItem('tdfSongs', JSON.stringify(db)); el('lyricsArea').style.display='block'; el('editorArea').style.display='none'; draw(); }}
        function adjustSpeed(d) { scrollSpeed = Math.max(10, scrollSpeed + d); el('speedDisplay').textContent = scrollSpeed + 's'; }
        function transpose(d) { transOffset += d; draw(); }
        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() { if(!cur) return; const s = el('scroller'), ch = s.scrollHeight - s.clientHeight; if(ch <= 0) return; const pMs = ch / (scrollSpeed * 1000), st = Date.now(), sp = s.scrollTop; el('playBtn').textContent = "■"; sInt = setInterval(() => { s.scrollTop = sp + ((Date.now() - st) * pMs); if(s.scrollTop >= ch) stopScroll(); }, 50); }
        function stopScroll() { clearInterval(sInt); sInt = null; el('playBtn').textContent = "▶"; }
        function createNewSong() { const t = prompt("Titel:"); if(t && t.trim()) { const nt = t.trim(); db.push({title: nt, content: nt + "\n..."}); localStorage.setItem('tdfSongs', JSON.stringify(db)); renderMenu(); loadSong(nt); setTimeout(startEdit, 200); }}
        function createNewBook() { const n = prompt("Boek naam:"); if(n && n.trim()) { const nt = n.trim(); tags[nt] = []; localStorage.setItem('tdfTags', JSON.stringify(tags)); hideSettings(); renderMenu(); }}
        function downloadBackup() { const d = JSON.stringify({ songs: db, tags: tags, logo: appLogoData }); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([d], {type: 'application/json'})); a.download = `TDF_Backup.json`; a.click(); }
    </script>
</body>
</html>
