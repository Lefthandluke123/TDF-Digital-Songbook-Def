<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v9.60</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --grey: #121212; --row-bg: #1c1c1e; --red: #ff3b30; --green: #25D366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; flex-shrink: 0; z-index: 4000; }
        .top-left { display: flex; align-items: center; gap: 10px; flex: 1.5; }
        .top-center { flex: 2; text-align: center; font-weight: bold; color: #fff; font-size: 1.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .top-right { display: flex; align-items: center; gap: 8px; flex: 1.5; justify-content: flex-end; }

        .logo-img { height: 45px; width: auto; cursor: pointer; display: block; }
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-sm { padding: 5px 8px; font-size: 1.1rem; min-width: 44px; }
        
        .main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #fff; }
        @keyframes pulseWatermark { 0% { opacity: 0.05; } 50% { opacity: 0.25; } 100% { opacity: 0.05; } }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; pointer-events: none; z-index: 0; animation: pulseWatermark 3.5s infinite ease-in-out; }

        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; position: relative; z-index: 1; background: transparent; }
        #liveContent { font-size: 2.4rem !important; } /* Extra groot voor Live Mode */

        #editorContainer { display: none; flex: 1; flex-direction: column; background: #000; z-index: 10; }
        .chord-bar { height: 60px; background: #222; padding: 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #444; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; outline: none; font-family: monospace; }

        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-scroll { flex: 1; overflow-y: auto; }

        .search-area { padding: 15px 20px; background: #111; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 12px; }
        .search-bar { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; }
        
        #tagList { display: flex; overflow-x: auto; white-space: nowrap; gap: 8px; padding-bottom: 10px; }
        .tag-pill { display: inline-block; padding: 8px 16px; background: #333; color: #aaa; border-radius: 20px; font-size: 0.85rem; cursor: pointer; }
        .tag-pill.active { background: var(--amber); color: #000; font-weight: bold; }

        .row-item { background: var(--row-bg); margin-bottom: 2px; display: flex; align-items: center; padding: 15px 20px; min-height: 75px; position: relative; }
        .setlist-title { font-size: 1.8rem; font-weight: bold; display: block; }
        .note-row { color: var(--amber); font-style: italic; font-size: 1.4rem; }

        .menu-footer { padding: 15px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .admin-submenu { display: none; background: #222; border: 1px solid #444; border-radius: 8px; position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 90%; z-index: 100; padding: 10px; gap: 10px; }
        .admin-submenu.open { display: flex; flex-direction: column; }

        #liveFooter { height: 110px; background: #111; border-top: 2px solid #333; display: none; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 5000; }
        .wheel-wrap { position: relative; width: 110px; height: 85px; background: #000; border: 1px solid #444; border-radius: 12px; overflow: hidden; touch-action: none; }
        .wheel-strip { position: absolute; width: 100%; text-align: center; top: 0; left: 0; pointer-events: none; }
        .wheel-num { height: 28px; line-height: 28px; font-size: 1.1rem; color: #444; }
        .wheel-num.active { color: var(--amber); font-size: 1.7rem; font-weight: 900; }
        .wheel-overlay { position: absolute; width: 100%; height: 30px; top: 27px; border-top: 1px solid var(--amber); border-bottom: 1px solid var(--amber); background: rgba(255,191,0,0.05); pointer-events: none; }

        #liveView { display: none; flex: 1; background: #000; overflow-y: auto; padding: 100px 35px 400px 35px; z-index: 20; }
        #toast { position: fixed; top: 95px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 11000; display: none; }
    </style>
</head>
<body>

    <div id="toast">MELDING</div>

    <div class="top-bar">
        <div class="top-left">
            <img src="logo.png" class="logo-img" onclick="location.reload()">
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" class="top-center">TDF DIGITAL</div>
        <div class="top-right">
            <button class="btn" id="editBtn" onclick="startEdit()">✎</button>
            <button class="btn" id="saveBtn" style="display:none; color:var(--green); border-color:var(--green);" onclick="finishEdit()">OK</button>
            <button class="btn" id="liveBtn" style="background:var(--amber); color:#000;" onclick="enterLiveView()">LIVE</button>
        </div>
    </div>

    <div class="main-container">
        <img src="logo.png" id="bgLogo" class="watermark">
        <div id="lyricsArea"></div>
        <div id="editorContainer">
            <div class="chord-bar" id="chordBar"></div>
            <div style="padding:10px 15px; background:#222;"><input type="text" id="tagField" style="width:100%; background:#000; border:1px solid #444; color:var(--amber); padding:10px; border-radius:6px;" placeholder="Tags..."></div>
            <textarea id="editorArea" spellcheck="false"></textarea>
        </div>
        <div id="liveView"><div id="liveContent"></div></div>
    </div>

    <div id="liveFooter">
        <button class="btn" style="border-radius:50%; width:55px; height:55px; font-size:1.5rem;" onclick="exitLiveView()">X</button>
        <button id="playBtn" class="btn" style="width:75px; font-size:1.8rem; height:55px;" onclick="toggleScroll()">▶</button>
        <div class="wheel-wrap" id="thumbWheel">
            <div class="wheel-overlay"></div>
            <div class="wheel-strip" id="wheelStrip"></div>
        </div>
        <div id="liveClock" style="font-weight:bold; font-size:1.3rem; color:var(--amber);">00:00</div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
            <button class="btn" onclick="toggleSelectMode()">SELECT</button>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div class="search-area">
            <input type="text" id="songSearch" class="search-bar" placeholder="Zoek song..." oninput="render()">
            <div id="tagList"></div>
        </div>
        <div id="dbList" class="menu-scroll"></div>
        <div class="menu-footer">
            <button class="btn" id="bulkToSetBtn" style="display:none; background:var(--amber); color:#000; width:100%; margin-bottom:10px;" onclick="addSelectedToSet()">ZET IN SET</button>
            <button class="btn" style="width:70%;" onclick="toggleAdminMenu('songsAdmin')">BEHEER</button>
            <div id="songsAdmin" class="admin-submenu">
                <button class="btn" onclick="showManual()">MANUAL</button>
                <button class="btn" onclick="exportDB()">EXPORT DB</button>
                <button class="btn" onclick="document.getElementById('importFile').click()">IMPORT DB</button>
            </div>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
            <button class="btn" id="setEditToggle" onclick="toggleSetEdit()">EDIT MODE</button>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div id="setEditTools" style="display:none; padding:10px 20px; background:#111; gap:10px;">
            <input type="text" id="noteInput" class="search-bar" placeholder="+ Regel tekst...">
            <button class="btn" onclick="addNoteRow()">VOEG TOE</button>
        </div>
        <div id="setList" class="menu-scroll"></div>
        <div class="menu-footer">
            <button class="btn" style="width:70%;" onclick="toggleAdminMenu('setAdmin')">SET BEHEER</button>
            <div id="setAdmin" class="admin-submenu">
                <button class="btn" onclick="exportSetlist()">EXPORT JSON</button>
                <button class="btn" onclick="whatsappExport()">WA-EXPORT (TEKST)</button>
                <button class="btn" onclick="whatsappImport()">WA-IMPORT (TEKST)</button>
                <button class="btn btn-danger" onclick="clearSetlist()">WISSEN / CLEAR</button>
            </div>
        </div>
    </div>

    <input type="file" id="importFile" style="display:none" onchange="importDB(event)">

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null, activeTags = [], selectMode = false, selectedSongs = [], isScrolling = false, scrollAcc = 0, currentSpeed = 0, setEditMode = false;
        
        window.onload = () => { createWheelNodes(); initTouchWheel(); createChordBar(); render(); setInterval(updateClock, 1000); requestAnimationFrame(scrollEngine); };
        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }
        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); document.querySelectorAll('.admin-submenu').forEach(s => s.classList.remove('open')); }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 1500); }
        function toggleAdminMenu(id) { document.getElementById(id).classList.toggle('open'); }

        function render() {
            const sQ = document.getElementById('songSearch').value.toLowerCase();
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            const tagsDiv = document.getElementById('tagList'); tagsDiv.innerHTML = "";
            let allTags = new Set(); db.forEach(s => s.tags && s.tags.split(',').forEach(t => allTags.add(t.trim())));

            Array.from(allTags).sort().forEach(t => {
                const p = document.createElement('div'); p.className = 'tag-pill' + (activeTags.includes(t) ? ' active' : '');
                p.innerText = t; p.onclick = () => {
                    if(selectMode) { db.forEach(s => { if(selectedSongs.includes(s.title)) { let ts = s.tags ? s.tags.split(',').map(x=>x.trim()).filter(x=>x) : []; if(!ts.includes(t)) ts.push(t); s.tags = ts.join(', '); } }); save(); toggleSelectMode(); }
                    else { if(activeTags.includes(t)) activeTags = activeTags.filter(x => x !== t); else activeTags.push(t); render(); }
                }; tagsDiv.appendChild(p);
            });

            db.filter(s => {
                const mSearch = s.title.toLowerCase().includes(sQ) || (s.tags||"").toLowerCase().includes(sQ);
                const mTags = activeTags.every(at => (s.tags||"").toLowerCase().includes(at.toLowerCase()));
                return mSearch && (selectMode || mTags);
            }).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div style="flex:1" onclick="loadSongByName('${s.title.replace(/'/g, "\\'")}')"><b>${s.title}</b><br><small>${s.tags||''}</small></div><button class="btn" onclick="addToSetlist('${s.title.replace(/'/g, "\\'")}')">+</button>`;
                dbl.appendChild(d);
            });

            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "row-item";
                const isNote = s.isNote;
                d.innerHTML = `
                    <div class="edit-only-container" style="display:${setEditMode?'flex':'none'}; flex-direction:column; margin-right:15px;">
                        <button class="btn btn-sm" onclick="moveSetItem(${i},-1)">↑</button>
                        <button class="btn btn-sm" onclick="moveSetItem(${i},1)">↓</button>
                    </div>
                    <div style="flex:1" onclick="${setEditMode ? (isNote ? '' : 'editSetSong('+i+')') : (isNote ? '' : 'liveSetSong('+i+')')}">
                        <span class="${isNote?'note-row':'setlist-title'}">${isNote ? '--- '+s.title+' ---' : (i+1)+'. '+s.title}</span>
                    </div>
                    <button class="btn" style="display:${setEditMode?'block':'none'}; border-color:var(--red); color:var(--red);" onclick="setlist.splice(${i},1); save(); render();">X</button>`;
                setl.appendChild(d);
            });
        }

        function addToSetlist(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); showToast("SET BIJGEWERKT"); closeMenus(); openMenu('setMenu'); } }
        function addNoteRow() { const v = document.getElementById('noteInput').value; if(v) { setlist.push({title:v, isNote:true}); save(); render(); document.getElementById('noteInput').value=""; } }
        function moveSetItem(i, d) { let t=i+d; if(t>=0 && t<setlist.length) { [setlist[i],setlist[t]] = [setlist[t],setlist[i]]; save(); render(); } }
        
        function liveSetSong(i) { cur=setlist[i]; enterLiveView(); closeMenus(); }
        function editSetSong(i) { cur=setlist[i]; startEdit(); closeMenus(); }
        function loadSongByName(t) { cur=db.find(x=>x.title===t); document.getElementById('title').innerText=cur.title; drawLyrics('lyricsArea'); closeMenus(); }

        function enterLiveView() { 
            if(!cur) return; 
            document.getElementById('lyricsArea').style.display='none'; 
            document.getElementById('liveView').style.display='block'; 
            document.getElementById('liveFooter').style.display='flex'; 
            document.getElementById('editBtn').style.display='none';
            drawLyrics('liveContent'); 
            currentSpeed=cur.scrollSpeed||0; scrollAcc=0; isScrolling=false;
            document.getElementById('title').innerText = "LIVE: " + cur.title;
            requestAnimationFrame(() => { document.getElementById('liveView').scrollTop=0; updateWheelPosition(); updatePlayBtn(); });
        }

        function exitLiveView() { 
            document.getElementById('liveView').style.display='none'; 
            document.getElementById('liveFooter').style.display='none'; 
            document.getElementById('lyricsArea').style.display='block'; 
            document.getElementById('editBtn').style.display='block';
            document.getElementById('title').innerText = cur.title;
            isScrolling=false;
        }

        function whatsappExport() {
            const txt = setlist.map(s => s.isNote ? `--- ${s.title} ---` : s.title).join('\n');
            navigator.clipboard.writeText(txt).then(() => showToast("SET GEKOPIEERD VOOR WA"));
        }

        function whatsappImport() {
            const input = prompt("Plak de setlist tekst hier:");
            if(input) {
                const lines = input.split('\n');
                setlist = lines.map(l => {
                    const song = db.find(s => s.title === l.trim());
                    return song ? JSON.parse(JSON.stringify(song)) : {title: l.trim(), isNote: true};
                });
                save(); render();
            }
        }

        function drawLyrics(id) {
            const container = document.getElementById(id); if(!cur) return;
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords=[], txt="", i=0;
                while(i<l.length){ if(l[i]==='['){ let e=l.indexOf(']',i); chords.push({p:txt.length, v:l.substring(i+1,e)}); i=e+1; } else { txt+=l[i]; i++; } }
                let r=""; chords.forEach(c => { r+=`<span style="position:absolute; left:${c.p}ch; color:var(--amber); font-weight:bold;">${c.v}</span>`; });
                h+=`<div style="height:2.2rem; position:relative;">${r}</div><div style="margin-bottom:25px; font-weight:bold;">${txt||' '}</div>`;
            });
            container.innerHTML = h;
            if(id==='lyricsArea') { container.scrollTop=0; document.getElementById('bgLogo').style.display='none'; }
        }

        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editorContainer').style.display='flex'; document.getElementById('editorArea').value=cur.content; document.getElementById('tagField').value=cur.tags||""; document.getElementById('editBtn').style.display='none'; document.getElementById('saveBtn').style.display='block'; document.getElementById('liveBtn').style.display='none'; }
        function finishEdit() { cur.content=document.getElementById('editorArea').value; cur.tags=document.getElementById('tagField').value; save(); document.getElementById('editorContainer').style.display='none'; document.getElementById('lyricsArea').style.display='block'; document.getElementById('editBtn').style.display='block'; document.getElementById('saveBtn').style.display='none'; document.getElementById('liveBtn').style.display='block'; drawLyrics('lyricsArea'); }
        function scrollEngine() { const lv=document.getElementById('liveView'); if(lv && lv.style.display==='block' && isScrolling && currentSpeed>0) { scrollAcc+=(currentSpeed*0.4); lv.scrollTop=Math.floor(scrollAcc); } requestAnimationFrame(scrollEngine); }
        function initTouchWheel() { const wheel=document.getElementById('thumbWheel'); let startY=0, startS=0; wheel.addEventListener('touchstart', (e) => { startY=e.touches[0].clientY; startS=currentSpeed; e.preventDefault(); }, {passive:false}); wheel.addEventListener('touchmove', (e) => { currentSpeed=Math.max(0, Math.min(15, startS + ((startY-e.touches[0].clientY)/15))); if(cur) cur.scrollSpeed=currentSpeed; updateWheelPosition(); e.preventDefault(); }, {passive:false}); }
        function createWheelNodes() { const strip=document.getElementById('wheelStrip'); strip.innerHTML=""; for(let i=0; i<=150; i++) { const d=document.createElement('div'); d.className='wheel-num'; d.innerText=(i/10).toFixed(1); strip.appendChild(d); } }
        function updateWheelPosition() { const strip=document.getElementById('wheelStrip'); strip.style.transform=`translateY(${28.5-(currentSpeed*280)}px)`; const activeIdx=Math.round(currentSpeed*10); strip.querySelectorAll('.wheel-num').forEach((n,i)=>n.classList.toggle('active',i===activeIdx)); }
        function toggleScroll() { isScrolling=!isScrolling; document.getElementById('playBtn').innerText=isScrolling?"⏸":"▶"; }
        function updateClock() { document.getElementById('liveClock').innerText=new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}); }
        function exportDB() { const data=JSON.stringify(db); const blob=new Blob([data],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='tdf_db.json'; a.click(); }
        function importDB(e) { const reader=new FileReader(); reader.onload=(ev)=>{db=JSON.parse(ev.target.result); save(); render();}; reader.readAsText(e.target.files[0]); }
        function clearSetlist() { if(confirm("Setlist wissen?")) { setlist=[]; save(); render(); } }
    </script>
</body>
</html>
