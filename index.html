<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>TheaterMode-Prototype v1.0</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #4CAF50; /* Groen ipv Blauw */
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            transition: all 0.5s ease;
        }

        /* De Akkoordenbalk */
        #chord-bar {
            background: #333;
            padding: 20px;
            display: flex;
            gap: 15px;
            border-bottom: 3px solid var(--accent-color);
            overflow-x: auto;
        }

        .chord-box {
            border: 1px solid #555;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.5rem;
            min-width: 60px;
            text-align: center;
        }

        /* Theater Mode Styles */
        .theater-active #sidebar, .theater-active #header {
            display: none;
        }

        .theater-active #chord-bar {
            height: 80vh;
            align-items: center;
            justify-content: center;
            border-bottom: none;
        }

        .theater-active .chord-box {
            font-size: 5rem; /* Gigantische akkoorden voor op afstand */
        }

        #exit-btn {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px;
            background: red;
            color: white;
            cursor: pointer;
            border: none;
        }

        .theater-active #exit-btn {
            display: block;
        }

        .interface-layer { padding: 20px; }
    </style>
</head>
<body>

    <div id="header" class="interface-layer">
        <h1>Muziek App - Dashboard</h1>
        <button onclick="toggleTheater()">Start Theatermode (T)</button>
    </div>

    <div id="sidebar" class="interface-layer">
        <p>Import status: <span style="color: orange;">Desktop-link onderbroken</span></p>
    </div>

    <div id="chord-bar">
        <div class="chord-box">G</div>
        <div class="chord-box">D</div>
        <div class="chord-box">Em</div>
        <div class="chord-box">C</div>
    </div>

    <button id="exit-btn" onclick="toggleTheater()">Sluit Theatermode</button>

    <script>
        function toggleTheater() {
            document.body.classList.toggle('theater-active');
        }

        // Sneltoets 'T' voor Theatermode
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 't') toggleTheater();
        });

        // Fallback voor import-issue
        console.log("TheaterMode-Prototype v1.0 geladen. Gebruik 'T' om te wisselen.");
    </script>
</body>
</html>
