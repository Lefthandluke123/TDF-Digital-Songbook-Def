<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v8.15</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --amber-dim: #cc9900; --red: #c12718; --grey: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; z-index: 3000; }
        .logo-box { width: 60px; height: 60px; margin-right: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; text-shadow: 0 0 5px var(--amber); }
        .btn-green { background: #25D366; color: white; border: none; }
        .btn-red { border: 1px solid var(--red); color: var(--red); background: none; border-radius: 6px; font-weight: bold; }
        
        .search-wrap { padding: 10px 15px; background: #000; border-bottom: 1px solid #222; }
        .search-input { width: 100%; background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; font-size: 1.1rem; outline: none; }

        .alpha-divider { padding: 15px 10px 5px 10px; color: var(--amber); font-size: 0.9rem; font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }

        .main-container { flex: 1; height: calc(100vh - 85px); background: #fff; position: relative; overflow: hidden; }
        #lyricsArea { height: 100%; overflow-y: auto; padding: 30px; color: #000; font-size: 1.5rem; line-height: 1.6; }
        #editorArea { display: none; width: 100%; height: 75%; padding: 30px; font-size: 1.5rem; border: none; font-family: monospace; background: #fcfcfc; color: #000; resize: none; }
        
        /* Tag Editor & Suggesties */
        #tagEditor { display: none; background: #222; padding: 10px 20px; border-top: 2px solid var(--amber); color: #fff; height: 25%; flex-direction: column; gap: 10px; }
        #tagSuggestions { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; min-height: 35px; white-space: nowrap; }
        .tag-sug { background: #444; color: #fff; padding: 4px 12px; border-radius: 15px; font-size: 0.85rem; cursor: pointer; border: 1px solid #666; }
        #tagInput { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 12px; border-radius: 6px; font-size: 1rem; }

        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .full-menu.open { left: 0; }
        .menu-header { padding: 15px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .menu-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        
        .row-item { background: #1c1c1e; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; transition: transform 0.2s; overflow: hidden; position: relative; }
        .row-name { flex: 1; padding: 18px; font-size: 1.6rem; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tag-pill { font-size: 0.75rem; color: var(--amber); background: rgba(255,191,0,0.1); padding: 2px 8px; border-radius: 4px; margin-left: 8px; border: 1px solid rgba(255,191,0,0.3); font-weight: normal; }
        .swiping-left { background: #400000 !important; transform: translateX(-15px); }
        
        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 10px 20px; border-radius: 25px; font-weight: bold; display: none; z-index: 20000; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }

        .chord-row { color: var(--red); font-weight: bold; height: 1.5rem; position: relative; }
        .chord-item { position: absolute; }
        .lyric-line { margin-bottom: 18px; display: block; white-space: pre; }

        .draggable-box { position: fixed; background: #1a1a1a; border-radius: 12px; padding: 8px; display: none; z-index: 50000; }
        .drag-handle { color: rgba(255,255,255,0.6); text-align: center; font-size: 11px; cursor: move; padding: 6px; background: #2a2a2a; border-radius: 6px; margin-bottom: 8px; }
        .joy-btn, .chord-glow-btn { background: #222; color: var(--amber); border: 1px solid var(--amber-dim); width: 55px; height: 55px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center;">
            <div class="logo-box" onclick="location.reload()"><img src="logo.png" alt="TDF"></div>
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" style="margin-left:8px;" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; font-size: 1.1rem; text-align:center; flex:1;">TDF v8.15</div>
        <div style="display:flex; gap:8px;">
            <button class="btn" onclick="startEdit()">✎</button>
            <button class="btn" id="saveBtn" style="display:none; color:#34c759; border-color:#34c759;" onclick="finishEdit()">OK</button>
        </div>
    </div>

    <div id="toast">Gereed</div>

    <div class="main-container">
        <div id="lyricsArea">Gebruik de AUTO-COMPLETE bij het typen van tags.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
        <div id="tagEditor">
            <div id="tagSuggestions"></div>
            <input type="text" id="tagInput" placeholder="Typ tags (scheiden met komma)..." oninput="updateSuggestions()">
        </div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div class="menu-header"><h2 style="color:var(--amber);">SONGS</h2><button class="btn" onclick="closeMenus()">X</button></div>
        <div class="search-wrap"><input type="text" id="songSearch" class="search-input" placeholder="Zoek titel of tag..." oninput="render()"></div>
        <div class="menu-scroll" id="dbList"></div>
        <div style="padding:15px; background:#111; display:flex; gap:5px; flex-wrap:wrap;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impAny').click()">IMPORT</button>
            <button class="btn" style="flex:1;" onclick="exportDB()">EXPORT</button>
            <button class="btn-red" style="flex:1;" onclick="cleanDatabase()">CLEAN</button>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div class="menu-header">
            <div style="display:flex; gap:8px;">
                <button class="btn btn-green" onclick="pasteFromWA()">PLAK WA</button>
                <button class="btn btn-green" onclick="copySetWhatsApp()" style="border-radius:50%; width:44px; padding:0;">🟢</button>
                <button class="btn" onclick="addCustomRow()">+ REGEL</button>
            </div>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div class="menu-scroll" id="setList"></div>
        <div style="padding:15px; background:#111; display:flex; gap:8px;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impSet').click()">LAAD SET</button>
            <button class="btn" style="flex:1;" onclick="exportSet()">OPSLAAN SET</button>
        </div>
    </div>

    <div id="joyPad" class="draggable-box" style="bottom:25px; left:25px;"><div class="drag-handle">MOVE</div><div style="display:grid; grid-template-areas: '. u .' 'l . r' '. d .'; gap:6px;"><button class="joy-btn" style="grid-area:u" onclick="moveCursorVertical(-1)">↑</button><button class="joy-btn" style="grid-area:l" onclick="moveCursorHorizontal(-1)">←</button><button class="joy-btn" style="grid-area:r" onclick="moveCursorHorizontal(1)">→</button><button class="joy-btn" style="grid-area:d" onclick="moveCursorVertical(1)">↓</button></div></div>
    <div id="chordStrip" class="draggable-box" style="bottom:25px; right:25px;"><div class="drag-handle">CHORDS</div><div id="chordBar" style="display:flex; flex-direction:column; gap:6px;"></div></div>

    <input type="file" id="impAny" multiple style="display:none;" onchange="importAnyFile(event)">
    <input type="file" id="impSet" style="display:none;" onchange="importFiles(event, 'set')">

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null;
        let touchStartX = 0;

        window.onload = () => { render(); buildChordStrip(); ['chordStrip', 'joyPad'].forEach(id => initDrag(document.getElementById(id))); };

        function openMenu(id) { document.getElementById(id).classList.add('open'); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }

        function render() {
            const query = document.getElementById('songSearch').value.toLowerCase();
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            let currentLetter = "";
            
            db.filter(s => {
                const tags = s.tags ? s.tags.toLowerCase() : "";
                return s.title.toLowerCase().includes(query) || tags.includes(query);
            }).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const firstLetter = s.title.charAt(0).toUpperCase();
                if (firstLetter !== currentLetter && !query) {
                    currentLetter = firstLetter;
                    const div = document.createElement('div'); div.className = "alpha-divider"; div.innerText = currentLetter; dbl.appendChild(div);
                }
                const idx = db.indexOf(s);
                const tagHtml = s.tags ? s.tags.split(',').map(t => `<span class="tag-pill">${t.trim()}</span>`).join('') : "";
                dbl.appendChild(createSwipeRow(s.title + tagHtml, () => load(s.title), () => deleteFromDb(idx), true, s.title));
            });
            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => setl.appendChild(createSwipeRow(s.title, () => load(s.title), () => removeFromSet(i), false, i+1)));
        }

        function createSwipeRow(html, clickFn, deleteFn, isDb, rawTitle) {
            const d = document.createElement('div'); d.className = "row-item";
            d.ontouchstart = (e) => { touchStartX = e.touches[0].clientX; };
            d.ontouchmove = (e) => { if(touchStartX - e.touches[0].clientX > 30) d.classList.add('swiping-left'); else d.classList.remove('swiping-left'); };
            d.ontouchend = (e) => { if(touchStartX - e.changedTouches[0].clientX > 80) deleteFn(); else d.classList.remove('swiping-left'); };
            let prefixHtml = isDb ? "" : `<div style="width:40px; text-align:center; color:var(--amber); font-weight:bold;">${arguments[4]}</div>`;
            let buttons = isDb ? `<button class="btn" style="margin-right:8px; padding:8px 12px;" onclick="event.stopPropagation(); editInDb('${rawTitle.replace(/'/g,"\\'")}')">✎</button>
                                 <button class="btn" style="margin-right:10px; padding:8px 12px;" onclick="event.stopPropagation(); addToSet('${rawTitle.replace(/'/g,"\\'")}')">+</button>` : "";
            d.innerHTML = `${prefixHtml}<div class="row-name">${html}</div>${buttons}`;
            d.onclick = (e) => { if(e.target.tagName !== 'BUTTON') clickFn(); };
            return d;
        }

        function editInDb(t) { cur = db.find(x => x.title === t); if(cur) { closeMenus(); startEdit(); } }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => { t.style.display = 'none'; }, 1500); }

        function addToSet(t) { 
            const s = db.find(x=>x.title===t); 
            if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); render(); showToast("Toegevoegd aan SET"); } 
        }

        // AUTO-COMPLETE TAGS LOGICA
        function updateSuggestions() {
            const input = document.getElementById('tagInput');
            const currentVal = input.value.split(',').pop().trim().toLowerCase();
            const sugBox = document.getElementById('tagSuggestions');
            sugBox.innerHTML = "";
            
            if(currentVal.length < 1) return;

            const allTags = new Set();
            db.forEach(s => { if(s.tags) s.tags.split(',').forEach(t => allTags.add(t.trim())); });

            Array.from(allTags).filter(t => t.toLowerCase().startsWith(currentVal)).forEach(t => {
                const span = document.createElement('div');
                span.className = "tag-sug";
                span.innerText = t;
                span.onclick = () => {
                    const parts = input.value.split(',');
                    parts.pop();
                    parts.push(" " + t);
                    input.value = parts.join(',').trim() + ", ";
                    input.focus();
                    sugBox.innerHTML = "";
                };
                sugBox.appendChild(span);
            });
        }

        async function importAnyFile(e) {
            const files = e.target.files; if(!files || !files.length) return;
            let count = 0;
            for(let i = 0; i < files.length; i++) {
                const file = files[i]; const ext = file.name.split('.').pop().toLowerCase();
                try {
                    const content = await new Promise((res, rej) => {
                        const r = new FileReader(); r.onload = (p) => res(p.target.result); r.onerror = rej; r.readAsText(file);
                    });
                    if (ext === 'json') {
                        const data = JSON.parse(content); if(Array.isArray(data)) db = [...db, ...data]; else db.push(data);
                    } else {
                        let title = file.name.replace(/\.[^/.]+$/, "");
                        const tMatch = content.match(/\{(?:title|t):\s*(.*)\}/i); if(tMatch) title = tMatch[1];
                        db.push({ title: title, content: content, tags: "" });
                    }
                    count++;
                } catch (err) {}
            }
            save(); render(); showToast(count + " liedjes geïmporteerd!");
            e.target.value = "";
        }

        function deleteFromDb(idx) { if(confirm("Verwijderen uit database?")) { db.splice(idx, 1); save(); render(); } }
        function removeFromSet(idx) { setlist.splice(idx, 1); save(); render(); }
        function cleanDatabase() { const orig = db.length; const unique = new Set(); const cleaned = []; db.forEach(s => { if(s.title && !unique.has(s.title.toLowerCase())) { unique.add(s.title.toLowerCase()); cleaned.push(s); }}); db = cleaned; save(); render(); showToast("Clean klaar!"); }

        function load(t) {
            cur = db.find(x=>x.title === t) || setlist.find(x=>x.title === t);
            if(!cur) return; document.getElementById('title').innerText = cur.title; drawLyrics(); closeMenus();
        }

        function drawLyrics() {
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                if(l.startsWith('{')) return;
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;}
                        chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            document.getElementById('lyricsArea').innerHTML = h; document.getElementById('lyricsArea').scrollTop = 0;
        }

        function startEdit() {
            if(!cur) return;
            document.getElementById('lyricsArea').style.display = 'none'; 
            document.getElementById('editorArea').style.display = 'block'; 
            document.getElementById('tagEditor').style.display = 'flex';
            document.getElementById('editorArea').value = cur.content; 
            document.getElementById('tagInput').value = cur.tags || "";
            document.getElementById('saveBtn').style.display = 'block'; 
            document.querySelectorAll('.draggable-box').forEach(b => b.style.display = 'block');
        }

        function finishEdit() {
            cur.content = document.getElementById('editorArea').value; 
            cur.tags = document.getElementById('tagInput').value.trim().replace(/,\s*$/, "");
            let idx = db.findIndex(s => s.title === cur.title); 
            if(idx !== -1) { db[idx].content = cur.content; db[idx].tags = cur.tags; }
            save(); 
            document.getElementById('lyricsArea').style.display = 'block'; 
            document.getElementById('editorArea').style.display = 'none'; 
            document.getElementById('tagEditor').style.display = 'none'; 
            document.getElementById('saveBtn').style.display = 'none'; 
            document.querySelectorAll('.draggable-box').forEach(b => b.style.display = 'none'); 
            drawLyrics(); render();
        }

        async function pasteFromWA() {
            let text = ""; try { text = await navigator.clipboard.readText(); } catch (err) { text = prompt("Tekst:"); }
            if (!text) return;
            const lines = text.split('\n'); const newSet = [];
            lines.forEach(line => {
                const clean = line.replace(/^\d+[\s.)]*/, '').trim(); if (!clean) return;
                const song = db.find(s => s.title.toLowerCase() === clean.toLowerCase());
                newSet.push(song ? JSON.parse(JSON.stringify(song)) : { title: clean, content: "", tags: "" });
            });
            setlist = newSet; save(); render();
        }

        function copySetWhatsApp() { navigator.clipboard.writeText("*SETLIST TDF*\n\n" + setlist.map((s,i) => (i+1)+". "+s.title).join("\n")); alert("Kopie!"); }
        function addCustomRow() { const n = prompt("Tekst:"); if(n) { setlist.push({title: n, content: "", tags: ""}); save(); render(); } }
        function buildChordStrip() { const bar = document.getElementById('chordBar'); ["A","Am","B","Bm","C","D","Dm","E","Em","F","G"].forEach(c => { const b = document.createElement('button'); b.className = "chord-glow-btn"; b.style.cssText = "width:65px; height:45px; border-radius:8px; margin-bottom:5px;"; b.textContent = c; b.onmousedown = (e) => { e.preventDefault(); insert(`[${c}]`); }; bar.appendChild(b); }); }
        function insert(t) { const ed = document.getElementById('editorArea'); const s = ed.selectionStart; ed.value = ed.value.substring(0, s) + t + ed.value.substring(ed.selectionEnd); ed.selectionStart = ed.selectionEnd = s + t.length; ed.focus(); }
        function moveCursorHorizontal(n) { const ed = document.getElementById('editorArea'); ed.selectionStart = ed.selectionEnd = ed.selectionStart + n; ed.focus(); }
        function moveCursorVertical(n) { const ed = document.getElementById('editorArea'); const lines = ed.value.split('\n'); const pos = ed.selectionStart; let curL = ed.value.substr(0, pos).split('\n').length - 1; let tarL = Math.max(0, Math.min(lines.length - 1, curL + n)); let newP = 0; for(let i=0; i<tarL; i++) newP += lines[i].length + 1; ed.selectionStart = ed.selectionEnd = newP; ed.focus(); }
        function exportDB() { download(db, 'TDF_Database'); }
        function exportSet() { const name = prompt("Naam:"); if (name) download(setlist, name); }
        function download(d, n) { const blob = new Blob([JSON.stringify(d, null, 2)], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = n + ".json"; document.body.appendChild(a); a.click(); setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500); }
        function importFiles(e, type) { const r = new FileReader(); r.onload = (p) => { try { const data = JSON.parse(p.target.result); if(type==='db') { if(Array.isArray(data)) db = [...db, ...data]; else db.push(data); } else setlist = data; save(); render(); alert("Geladen!"); } catch(err) {} }; r.readAsText(e.target.files[0]); }
        function initDrag(el) { let p1=0, p2=0, p3=0, p4=0; const h = el.querySelector('.drag-handle'); h.onmousedown = h.ontouchstart = (e) => { e.preventDefault(); p3 = e.clientX || (e.touches ? e.touches[0].clientX : 0); p4 = e.clientY || (e.touches ? e.touches[0].clientY : 0); document.onmouseup = document.ontouchend = () => { document.onmousemove = document.ontouchmove = null; }; document.onmousemove = document.ontouchmove = (me) => { p1 = p3 - (me.clientX || me.touches[0].clientX); p2 = p4 - (me.clientY || me.touches[0].clientY); p3 = me.clientX || me.touches[0].clientX; p4 = me.clientY || me.touches[0].clientY; el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px"; } } }
    </script>
</body>
</html>
