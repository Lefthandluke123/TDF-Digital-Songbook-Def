<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TDF Digital v10.50 - FINAL STABLE</title>
    <style>
        :root { --bg: #000; --amber: #ffbf00; --row: #1c1c1e; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; overflow: hidden; }
        .top-bar { height: 70px; background: #121212; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #333; }
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .scroll { flex: 1; overflow-y: auto; }
        .row { height: 80px; background: var(--row); margin-bottom: 2px; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; }
        #editor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; flex-direction: column; }
        textarea { flex: 1; width: 100%; padding: 20px; font-size: 1.4rem; background: #fff; color: #000; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 10px; border-radius: 5px; display: none; z-index: 3000; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="top-bar">
    <b onclick="location.reload()">TDF v10.50</b>
    <button class="btn" onclick="document.getElementById('mSongs').style.display='flex'">SONGS</button>
</div>

<div id="lyricsView" style="padding:40px; font-size:1.8rem; color:#fff;">Kies een liedje uit het menu...</div>

<div id="mSongs" class="menu">
    <div class="top-bar">
        <button class="btn" onclick="document.getElementById('mSongs').style.display='none'">SLUIT</button>
        <input type="text" id="src" placeholder="Zoek..." oninput="render()" style="padding:10px; flex:1; margin:0 10px;">
    </div>
    <div id="list" class="scroll"></div>
</div>

<div id="editor">
    <div class="top-bar">
        <button class="btn" onclick="document.getElementById('editor').style.display='none'">ANNULEER</button>
        <b id="edTitle">EDITOR</b>
        <button class="btn" style="background:var(--amber); color:#000;" onclick="saveEd()">OPSLAAN</button>
    </div>
    <textarea id="txt"></textarea>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
    let cur = null;

    function render() {
        const l = document.getElementById('list');
        l.innerHTML = "";
        const q = document.getElementById('src').value.toLowerCase();
        
        db.filter(s => s.title.toLowerCase().includes(q)).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
            const d = document.createElement('div');
            d.className = "row";
            d.innerHTML = `
                <div style="flex:1" onclick="load('${s.title.replace(/'/g, "\\'")}')"><b>${s.title}</b></div>
                <button class="btn" style="margin-right:10px" onclick="edit('${s.title.replace(/'/g, "\\")}')">✎ EDIT</button>
                <button class="btn" onclick="msg('SET +1')">+</button>
            `;
            l.appendChild(d);
        });
    }

    function load(t) {
        cur = db.find(x => x.title === t);
        document.getElementById('lyricsView').innerText = cur.content;
        document.getElementById('mSongs').style.display = 'none';
    }

    function edit(t) {
        cur = db.find(x => x.title === t);
        if(cur) {
            document.getElementById('edTitle').innerText = t;
            document.getElementById('txt').value = cur.content;
            document.getElementById('editor').style.display = 'flex';
        }
    }

    function saveEd() {
        cur.content = document.getElementById('txt').value;
        localStorage.setItem('tdfSongs', JSON.stringify(db));
        document.getElementById('editor').style.display = 'none';
        load(cur.title);
        render();
        msg("OPGESLAGEN");
    }

    function msg(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display='block';
        setTimeout(()=>t.style.display='none', 1000);
    }

    window.onload = render;
</script>
</body>
</html>
