<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v9.07</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --amber-dim: #cc9900; --red: #ff3b30; --grey: #121212; --row-bg: #1c1c1e; --row-header: #252525; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        /* HEADER */
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; z-index: 3000; }
        .logo-box { width: 55px; height: 55px; min-width: 55px; margin-right: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #000; border-radius: 8px; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-shadow: 0 0 5px var(--amber); font-size: 0.95rem; }
        .btn-green { background: #25D366; color: white; border: none; }

        /* LISTS & DRAG FEEDBACK */
        .row-item { background: var(--row-bg); margin-bottom: 2px; display: flex; align-items: center; border-left: 4px solid transparent; transition: transform 0.2s ease; }
        .row-item.alpha-header { background: var(--row-header); border-top: 1px solid #444; border-left-color: var(--amber); margin-top: 15px; }
        .row-item.dragging { opacity: 0.4; background: #444; border: 1px dashed var(--amber); }
        .alpha-label { width: 35px; text-align: center; color: var(--amber); font-weight: bold; font-size: 1.2rem; display: none; }
        .row-item.alpha-header .alpha-label { display: block; }
        
        .row-name { flex: 1; padding: 12px 18px; overflow: hidden; cursor: pointer; }
        .song-title { font-size: 1.4rem; font-weight: bold; color: #fff; display: block; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .tag-display { font-size: 0.9rem; color: var(--amber-dim); display: block; margin-top: 2px; font-style: italic; }
        .tag-field { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 8px; border-radius: 5px; font-size: 0.9rem; margin-top: 5px; }
        .drag-handle { padding: 15px 25px; color: var(--amber); font-size: 2.2rem; cursor: move; user-select: none; -webkit-user-drag: element; }

        /* MAIN CONTAINER */
        .main-container { flex: 1; height: calc(100vh - 85px); background: #fff; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; }
        #editorContainer { display: none; flex: 1; flex-direction: column; background:#1a1a1a; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 1.4rem; border: none; background: #fcfcfc; color: #000; resize: none; font-family: monospace; }

        /* LIVE ELEMENTS */
        #liveView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 15000; overflow-y: auto; padding: 140px 35px 450px 35px; }
        .live-controls { position: fixed; top: 0; left: 0; width: 100%; height: 120px; background: rgba(15,15,15,0.98); padding: 10px 25px; display: flex; align-items: center; justify-content: space-between; z-index: 16000; border-bottom: 2px solid #333; backdrop-filter: blur(10px); }
        .exit-btn { background: var(--red); color: #fff; border: 2px solid #fff; padding: 12px 18px; border-radius: 12px; font-weight: 900; font-size: 1.4rem; cursor: pointer; box-shadow: 0 0 15px #c12718; min-width: 60px; }
        
        /* SCROLL WHEEL */
        .wheel-wrap { position: relative; width: 110px; height: 95px; background: #000; border: 2px solid #555; border-radius: 12px; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; }
        .wheel-strip { position: absolute; width: 100%; text-align: center; transition: transform 0.1s ease-out; pointer-events: none; }
        .wheel-num { height: 30px; line-height: 30px; font-size: 1.4rem; font-weight: 800; color: #555; }
        .wheel-num.active { color: #fff; text-shadow: 0 0 15px #fff; font-size: 2.1rem; }
        .wheel-overlay { position: absolute; width: 100%; height: 38px; border-top: 3px solid var(--amber); border-bottom: 3px solid var(--amber); pointer-events: none; background: rgba(255,191,0,0.1); z-index: 5; }

        /* FULL MENUS */
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-header { padding: 20px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .menu-scroll { flex: 1; overflow-y: auto; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        .search-wrap { padding: 10px 20px; background: #111; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #222; }
        .search-input { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; font-size: 1.2rem; }
        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; display: none; z-index: 60000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center;">
            <div class="logo-box" onclick="location.reload()"><img src="logo.png" alt="TDF"></div>
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" style="margin-left:8px;" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; font-size: 1.1rem; text-align:center; flex:1;">TDF v9.07</div>
        <div style="display:flex; gap:8px;">
            <button class="btn" style="border-color:#34c759; color:#34c759;" onclick="enterLiveView()">LIVE</button>
            <button class="btn" id="editBtn" onclick="startEdit()">✎</button>
            <button class="btn" id="saveBtn" style="display:none; color:#34c759;" onclick="finishEdit()">OK</button>
        </div>
    </div>

    <div id="toast">Bericht</div>

    <div class="main-container">
        <div id="lyricsArea">Songs alfabetisch (SONGS). Setlist sleepbaar via ≡ (SET).</div>
        <div id="editorContainer"><textarea id="editorArea" spellcheck="false"></textarea></div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div class="menu-header"><h2>BIBLIOTHEEK</h2><button class="btn" onclick="closeMenus()">X</button></div>
        <div class="search-wrap">
            <input type="text" id="songSearch" class="search-input" placeholder="Zoek titel of tag..." oninput="render()">
            <button id="tagModeBtn" class="btn" onclick="toggleTagMode()">TAG MODUS</button>
        </div>
        <div id="tagCloud" style="display:none; padding:10px 20px; background:#1a1a1a; border-bottom:1px solid #333; overflow-x:auto; white-space:nowrap; gap:8px;"></div>
        <div class="menu-scroll" id="dbList"></div>
        <div style="padding:20px; background:#111; display:flex; gap:10px;">
            <button class="btn" onclick="document.getElementById('impAny').click()">IMPORT</button>
            <button class="btn" onclick="exportDatabase()">EXPORT</button>
            <button class="btn-red" onclick="cleanDatabase()">CLEAN</button>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div class="menu-header"><h2>SETLIST</h2><button class="btn" onclick="closeMenus()">X</button></div>
        <div class="search-wrap"><input type="text" id="setSearch" class="search-input" placeholder="Zoek in setlist..." oninput="render()"></div>
        <div class="menu-scroll" id="setList"></div>
        <div style="padding:10px; background:#111; display:flex; gap:10px;">
            <button class="btn-green" style="flex:1;" onclick="pasteFromWA()">PLAK WA</button>
            <button class="btn-red" onclick="if(confirm('Setlist wissen?')){setlist=[]; save(); render();}">WIS</button>
        </div>
    </div>

    <div id="liveView">
        <div class="live-controls">
            <button class="exit-btn" onclick="exitLiveView()">X</button>
            <button class="btn" onclick="navSong(-1)">&lt;</button>
            <button id="playBtn" class="btn" style="width:60px" onclick="toggleScroll()">▶</button>
            <button class="btn" onclick="navSong(1)">&gt;</button>
            <div class="wheel-wrap" id="thumbWheel">
                <div class="wheel-overlay"></div>
                <div class="wheel-strip" id="wheelStrip"></div>
            </div>
            <button class="btn" onclick="document.getElementById('liveView').classList.toggle('only-chords')">CHORDS</button>
            <div id="liveClock" style="font-size:1.2rem; color:#fff; font-weight:bold;">00:00</div>
        </div>
        <div id="liveContent"></div>
    </div>

    <input type="file" id="impAny" multiple style="display:none;" onchange="importAnyFile(event)">

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null, draggingIdx = null, isScrolling = false, isTagMode = false, activeTagInput = null;
        let scrollPosAccumulator = 0, currentSpeed = 0;

        window.onload = () => { createWheelNodes(); initThumbWheel(); render(); setInterval(updateClock, 1000); requestAnimationFrame(scrollEngine); };

        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }
        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 1000); }

        function render() {
            const sQ = document.getElementById('songSearch').value.toLowerCase();
            const setQ = document.getElementById('setSearch').value.toLowerCase();
            
            // Songs Render (Alphabetisch)
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            let lastL = "";
            db.filter(s => (s.title + (s.tags||"")).toLowerCase().includes(sQ)).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const L = s.title.charAt(0).toUpperCase();
                const isNew = L !== lastL; if(isNew) lastL = L;
                const d = document.createElement('div');
                d.className = "row-item" + (isNew ? " alpha-header" : "");
                d.innerHTML = `<div class="alpha-label">${L}</div><div class="row-name" onclick="${isTagMode ? '' : `loadSong('${s.title.replace(/'/g,"\\")}')`}">
                    <span class="song-title">${s.title}</span>
                    ${isTagMode ? `<input type="text" class="tag-field" value="${s.tags||''}" onfocus="activeTagInput=this; updateTagCloud();" oninput="updateSongTag('${s.title.replace(/'/g,"\\")}', this.value)">` : `<span class="tag-display">${s.tags||''}</span>`}
                </div><button class="btn" onclick="addToSet('${s.title.replace(/'/g,"\\")}')">+</button>`;
                dbl.appendChild(d);
            });

            // Setlist Render (Draggable)
            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => {
                if(!s.title.toLowerCase().includes(setQ)) return;
                const d = document.createElement('div');
                d.className = "row-item";
                d.draggable = true;
                d.innerHTML = `<div class="drag-handle">≡</div><div class="row-name" onclick="loadSong('${s.title.replace(/'/g,"\\")}')">
                    <span class="song-title">${i+1}. ${s.title}</span>
                </div><button class="btn-red" style="margin-right:10px" onclick="removeFromSet(${i})">X</button>`;
                
                d.ondragstart = (e) => { draggingIdx = i; d.classList.add('dragging'); e.dataTransfer.effectAllowed = "move"; };
                d.ondragend = () => d.classList.remove('dragging');
                d.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; };
                d.ondrop = (e) => {
                    e.preventDefault();
                    if(draggingIdx === i) return;
                    const movedItem = setlist.splice(draggingIdx, 1)[0];
                    setlist.splice(i, 0, movedItem);
                    save(); render();
                };
                setl.appendChild(d);
            });
        }

        function createWheelNodes() {
            const strip = document.getElementById('wheelStrip');
            strip.innerHTML = "";
            for(let i=0; i<=150; i++) {
                const d = document.createElement('div'); d.className = 'wheel-num'; d.innerText = (i/10).toFixed(1); strip.appendChild(d);
            }
        }

        function initThumbWheel() {
            const wheel = document.getElementById('thumbWheel');
            let dragging = false, sY = 0, sSpeed = 0;
            const move = (e) => {
                if(!dragging) return;
                const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
                currentSpeed = Math.max(0, Math.min(15, sSpeed + (sY - y) / 15));
                updateWheelPosition();
            };
            wheel.addEventListener('mousedown', (e) => { dragging=true; sY=e.clientY; sSpeed=currentSpeed; });
            wheel.addEventListener('touchstart', (e) => { dragging=true; sY=e.touches[0].clientY; sSpeed=currentSpeed; });
            window.addEventListener('mousemove', move); window.addEventListener('touchmove', move);
            window.addEventListener('mouseup', () => dragging=false); window.addEventListener('touchend', () => dragging=false);
        }

        function updateWheelPosition() {
            const strip = document.getElementById('wheelStrip');
            const offset = (currentSpeed * 10) * 30;
            strip.style.transform = `translateY(${32.5 - offset}px)`;
            const nums = strip.querySelectorAll('.wheel-num');
            nums.forEach((n, i) => n.classList.toggle('active', Math.abs(currentSpeed - i/10) < 0.05));
        }

        function scrollEngine() {
            const lv = document.getElementById('liveView');
            if(lv.style.display === 'block' && isScrolling && currentSpeed > 0) {
                const increment = (currentSpeed * 0.38) + 0.02;
                scrollPosAccumulator += increment;
                lv.scrollTop = Math.floor(scrollPosAccumulator);
            }
            requestAnimationFrame(scrollEngine);
        }

        function exitLiveView() { saveCurrentSpeed(); isScrolling=false; document.getElementById('liveView').style.display='none'; }
        function enterLiveView() { if(!cur) return; document.getElementById('liveView').style.display='block'; drawLyrics(document.getElementById('liveContent')); currentSpeed=cur.scrollSpeed||0; updateWheelPosition(); isScrolling=false; updatePlayBtn(); }
        function toggleScroll() { isScrolling = !isScrolling; updatePlayBtn(); }
        function updatePlayBtn() { const btn = document.getElementById('playBtn'); btn.innerText = isScrolling ? "⏸" : "▶"; btn.classList.toggle('active', isScrolling); }
        function saveCurrentSpeed() { if(cur) { cur.scrollSpeed = currentSpeed; let idx = db.findIndex(x=>x.title===cur.title); if(idx!==-1) db[idx].scrollSpeed=currentSpeed; save(); } }
        function navSong(dir) { saveCurrentSpeed(); const idx = setlist.findIndex(s=>s.title===cur.title); const nIdx = idx+dir; if(nIdx>=0 && nIdx<setlist.length) { cur=setlist[nIdx]; document.getElementById('title').innerText=cur.title; scrollPosAccumulator = 0; enterLiveView(); document.getElementById('liveView').scrollTop = 0; } }

        function drawLyrics(container) {
            if(!cur) return;
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;}
                        chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span style="position:absolute; left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row" style="height:1.8rem; color:var(--amber); font-weight:bold; position:relative;">${r}</div><div class="lyric-line" style="margin-bottom:15px; white-space:pre; color:inherit;">${txt || ' '}</div>`;
            });
            container.innerHTML = h; container.scrollTop = 0; scrollPosAccumulator = 0;
        }

        function importAnyFile(e) { Array.from(e.target.files).forEach(f => { const reader = new FileReader(); reader.onload = (ev) => { const content = ev.target.result; if(f.name.endsWith('.json')) { try { const p = JSON.parse(content); if(Array.isArray(p)) p.forEach(s => db.push(s)); else db.push(p); } catch(err) {} } else { db.push({title: f.name.replace(/\.[^/.]+$/, ""), content: content, tags: "", scrollSpeed: 0}); } save(); render(); }; reader.readAsText(f); }); showToast("Import klaar!"); }
        function exportDatabase() { const blob = new Blob([JSON.stringify(db, null, 2)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `tdf_backup.json`; a.click(); }
        function cleanDatabase() { const u = new Set(); db = db.filter(s => { const t = s.title.toLowerCase().trim(); if(u.has(t)) return false; u.add(t); return true; }); save(); render(); showToast("Gecleand!"); }
        function toggleTagMode() { isTagMode = !isTagMode; document.getElementById('tagModeBtn').style.background = isTagMode ? "var(--amber)" : "none"; document.getElementById('tagModeBtn').style.color = isTagMode ? "#000" : "var(--amber)"; document.getElementById('tagCloud').style.display = isTagMode ? "flex" : "none"; if(isTagMode) updateTagCloud(); render(); }
        function updateSongTag(t, v) { let s = db.find(x => x.title === t); if(s) { s.tags = v; save(); } }
        function updateTagCloud() {
            const cloud = document.getElementById('tagCloud'); cloud.innerHTML = "";
            let tags = new Set();
            db.forEach(s => { if(s.tags) s.tags.split(',').forEach(t => { if(t.trim()) tags.add(t.trim()); }); });
            Array.from(tags).sort().forEach(t => {
                const span = document.createElement('span'); span.className = 'cloud-tag';
                if(activeTagInput && activeTagInput.value.split(',').map(p=>p.trim()).includes(t)) span.classList.add('present');
                span.innerText = t; span.onclick = () => { if(activeTagInput) toggleTagInInput(t, span); };
                cloud.appendChild(span);
            });
        }
        function toggleTagInInput(tag, el) { let parts = activeTagInput.value.split(',').map(p => p.trim()).filter(p => p); if(parts.includes(tag)) parts = parts.filter(p => p !== tag); else parts.push(tag); activeTagInput.value = parts.join(', '); activeTagInput.dispatchEvent(new Event('input')); updateTagCloud(); }
        function loadSong(t) { cur = db.find(x=>x.title===t) || setlist.find(x=>x.title===t); if(cur) { document.getElementById('title').innerText = cur.title; drawLyrics(document.getElementById('lyricsArea')); closeMenus(); } }
        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); showToast("Toegevoegd!"); } }
        function removeFromSet(i) { setlist.splice(i, 1); save(); render(); }
        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editorContainer').style.display='flex'; document.getElementById('editorArea').value=cur.content; document.getElementById('editBtn').style.display='none'; document.getElementById('saveBtn').style.display='block'; }
        function finishEdit() { cur.content=document.getElementById('editorArea').value; save(); document.getElementById('lyricsArea').style.display='block'; document.getElementById('editorContainer').style.display='none'; document.getElementById('saveBtn').style.display='none'; document.getElementById('editBtn').style.display='block'; drawLyrics(document.getElementById('lyricsArea')); render(); }
        function updateClock() { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'}); }
        function pasteFromWA() { navigator.clipboard.readText().then(text => { if(!text) return; setlist = text.split('\n').map(l => { const t = l.replace(/^\d+[\s.)]*/, '').trim(); const s = db.find(x => x.title.toLowerCase() === t.toLowerCase()); return s ? JSON.parse(JSON.stringify(s)) : {title: t, content: "", tags: "", scrollSpeed: 0}; }).filter(x => x.title); save(); render(); }); }
    </script>
</body>
</html>
