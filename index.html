<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MijnApp">
    
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/000000/FFFFFF?text=App">

    <title>Gekoppelde WebApp</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent-color: #007aff; /* iOS Blauw */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Voorkomt scrollen van de achtergrond op iPad */
            background: #121212;
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
        }

        /* De "onderlaag" (je content) - Deze gaat bewegen */
        #app-canvas {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform; /* Optimalisatie voor vloeiende beweging */
            transition: transform 0.1s linear; /* Voegt lichte demping toe */
        }

        #content-box {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* De zwevende UI container */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Klikken gaat door de laag heen */
            z-index: 100;
            /* Zorgt dat de controls binnen de iPad-safe areas vallen */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
        }

        .floating-group {
            margin: 30px; /* Afstand van de hoek */
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-end;
        }

        /* Glassmorphism panelen */
        .glass-panel {
            pointer-events: auto; /* De knoppen werken wel */
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        /* Subtiele feedback bij indrukken */
        .glass-panel:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Accordeon */
        details { width: 220px; }
        summary { cursor: pointer; font-weight: 600; padding: 10px; list-style: none; outline: none; color: #000; }
        .menu-content { padding: 10px 5px 15px 5px; display: flex; flex-direction: column; gap: 10px; }
        
        .menu-btn { 
            background: rgba(0,0,0,0.05); 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            font-weight: 500; 
            color: #000;
            font-size: 15px;
            -webkit-appearance: none; /* iPad fix voor buttons */
        }
        .menu-btn:active { background: rgba(0,0,0,0.1); }

        /* Joystick Visuals */
        .joy-base {
            width: 120px;
            height: 120px;
            background: rgba(0,0,0,0.08);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* CRUCIAAL voor iPad, voorkomt pagina-scroll */
            margin: 10px;
            border: 2px solid rgba(0,0,0,0.05);
        }
        
        .joy-knob {
            width: 60px;
            height: 60px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            position: relative;
            will-change: transform;
        }

        /* Rode indicator in het midden van de knop */
        .joy-knob::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 12px; height: 12px;
            background: var(--accent-color);
            border-radius: 50%;
        }

    </style>
</head>
<body>

    <div id="app-canvas">
        <div id="content-box">
            <h2 style="margin:0 0 10px 0;">Besturing Actief</h2>
            <p style="margin:0; opacity:0.7;">Beweeg de joystick</p>
        </div>
    </div>

    <div class="ui-overlay">
        <div class="floating-group">
            
            <div class="glass-panel">
                <details>
                    <summary>🛠️ Systeem Opties</summary>
                    <div class="menu-content">
                        <button class="menu-btn" onclick="resetView()">Reset Weergave</button>
                        <button class="menu-btn" onclick="alert('Instelling B')">Instelling B</button>
                    </div>
                </details>
            </div>

            <div class="glass-panel">
                <div class="joy-base" id="base">
                    <div class="joy-knob" id="knob"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const knob = document.getElementById('knob');
        const base = document.getElementById('base');
        const canvas = document.getElementById('app-canvas');

        // Parameters voor de beweging
        const joyLimit = 40; // Hoe ver de knop kan bewegen (pixels)
        const moveSensitivity = 50; // Hoeveel de content beweegt (pixels)

        function moveContent(xPercent, yPercent) {
            // Bereken de nieuwe positie
            const moveX = xPercent * moveSensitivity;
            const moveY = yPercent * moveSensitivity;
            
            // Pas de transformatie toe op het canvas
            canvas.style.transform = `translate(${moveX}px, ${moveY}px)`;
        }

        function resetView() {
            canvas.style.transition = '0.5s ease-out'; // Langzame reset
            canvas.style.transform = 'translate(0px, 0px)';
            setTimeout(() => { canvas.style.transition = '0.1s linear'; }, 500);
        }

        base.addEventListener('touchmove', (e) => {
            // Voorkom ongewenst scrollen op de iPad
            if (e.cancelable) e.preventDefault();

            const touch = e.touches[0];
            const rect = base.getBoundingClientRect();
            
            // Bereken positie ten opzichte van het midden van de basis
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let x = touch.clientX - centerX;
            let y = touch.clientY - centerY;
            
            // Beperk de beweging tot de cirkel (joyLimit)
            const dist = Math.sqrt(x*x + y*y);
            if (dist > joyLimit) {
                x = x * (joyLimit / dist);
                y = y * (joyLimit / dist);
            }
            
            // Beweeg de visuele knop
            knob.style.transform = `translate(${x}px, ${y}px)`;

            // Bereken genormaliseerde waarden (-1 tot 1)
            const xPercent = x / joyLimit;
            const yPercent = y / joyLimit;

            // KOPPELING: Beweeg de content
            moveContent(xPercent, yPercent);
        });

        // Wanneer je de joystick loslaat
        base.addEventListener('touchend', () => {
            // Knop veert terug
            knob.style.transition = '0.3s ease-out';
            knob.style.transform = 'translate(0px, 0px)';
            
            // Content veert terug
            canvas.style.transition = '0.3s ease-out';
            canvas.style.transform = 'translate(0px, 0px)';

            // Reset transities na de beweging
            setTimeout(() => { 
                knob.style.transition = 'none'; 
                canvas.style.transition = '0.1s linear';
            }, 300);
        });
    </script>
</body>
</html>
