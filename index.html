<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v8.30</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --amber-dim: #cc9900; --red: #c12718; --grey: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        /* Interface */
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; z-index: 3000; }
        .logo-box { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; text-shadow: 0 0 5px var(--amber); }
        .btn-green { background: #25D366; color: white; border: none; }
        .btn-red { border: 1px solid var(--red); color: var(--red); background: none; border-radius: 6px; font-weight: bold; }
        
        .main-container { flex: 1; height: calc(100vh - 85px); background: #fff; position: relative; overflow: hidden; }
        #lyricsArea { height: 100%; overflow-y: auto; padding: 30px; color: #000; font-size: 1.5rem; line-height: 1.6; cursor: zoom-in; }
        #editorArea { display: none; width: 100%; height: 70%; padding: 30px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; resize: none; }
        
        /* Live View */
        #liveView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 15000; overflow-y: scroll; padding: 80px 40px; color: #fff; }
        #liveView.only-chords .lyric-line { display: none; }
        #liveView.only-chords .chord-row { font-size: 4rem; height: 5rem; margin-bottom: 25px; }
        .live-controls { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 16000; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; }
        .scroll-slider { -webkit-appearance: slider-vertical; width: 40px; height: 200px; background: #333; }

        /* Menu's */
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-header { padding: 15px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .menu-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        .search-wrap { padding: 10px 15px; background: #000; border-bottom: 1px solid #222; }
        .search-input { width: 100%; background: #1c1c1e; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 8px; outline: none; }
        
        .row-item { background: #1c1c1e; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; }
        .row-name { flex: 1; padding: 18px; font-size: 1.6rem; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tag-pill { font-size: 0.75rem; color: var(--amber); background: rgba(255,191,0,0.1); padding: 2px 8px; border-radius: 4px; margin-left: 8px; border: 1px solid rgba(255,191,0,0.3); font-weight: normal; }
        .drag-handle { padding: 18px; color: var(--amber-dim); cursor: grab; font-size: 1.5rem; }
        .alpha-divider { padding: 15px 10px 5px 10px; color: var(--amber); font-size: 0.9rem; font-weight: bold; border-bottom: 1px solid #333; margin-bottom: 10px; text-transform: uppercase; }

        /* Editor Tools */
        #tagEditor { display: none; background: #222; padding: 10px 20px; border-top: 2px solid var(--amber); color: #fff; height: 30%; flex-direction: column; gap: 10px; }
        #tagSuggestions { display: flex; gap: 8px; overflow-x: auto; min-height: 35px; }
        .tag-sug { background: #444; padding: 4px 12px; border-radius: 15px; font-size: 0.85rem; cursor: pointer; }
        .draggable-box { position: fixed; background: #1a1a1a; border-radius: 12px; padding: 8px; display: none; z-index: 50000; border: 1px solid #444; box-shadow: 0 8px 20px #000; }
        .joy-btn { background: #222; color: var(--amber); border: 1px solid var(--amber-dim); width: 60px; height: 60px; border-radius: 50%; font-size: 1.3rem; }
        .chord-row { color: var(--red); font-weight: bold; height: 1.5rem; position: relative; }
        .chord-item { position: absolute; }
        .lyric-line { margin-bottom: 18px; display: block; white-space: pre; }
        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 10px 20px; border-radius: 25px; font-weight: bold; display: none; z-index: 20000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center;">
            <div class="logo-box" onclick="location.reload()"><img src="logo.png" alt="TDF"></div>
            <button class="btn" style="margin-left:10px;" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" style="margin-left:8px;" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; font-size: 1.1rem; text-align:center; flex:1;">TDF v8.30</div>
        <button class="btn" onclick="startEdit()">✎</button>
        <button class="btn" id="saveBtn" style="display:none; color:#34c759; margin-left:8px;" onclick="finishEdit()">OK</button>
    </div>

    <div id="toast">Gereed</div>

    <div class="main-container">
        <div id="lyricsArea" onclick="enterLiveView()">Selecteer een liedje...</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
        <div id="tagEditor">
            <div id="tagSuggestions"></div>
            <input type="text" id="tagInput" placeholder="Tags..." oninput="updateSuggestions()">
        </div>
    </div>

    <div id="liveView">
        <div class="live-controls">
            <button class="btn" onclick="exitLiveView()">X CLOSE</button>
            <button class="btn" onclick="toggleOnlyChords()">CHORDS ONLY</button>
            <input type="range" id="scrollSpeed" class="scroll-slider" min="0" max="10" step="0.5" value="0">
        </div>
        <div id="liveContent"></div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div class="menu-header"><h2>SONGS</h2><button class="btn" onclick="closeMenus()">X</button></div>
        <div class="search-wrap"><input type="text" id="songSearch" class="search-input" placeholder="Zoek op titel of tag..." oninput="render()"></div>
        <div class="menu-scroll" id="dbList"></div>
        <div style="padding:15px; background:#111; display:flex; gap:5px;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impAny').click()">IMPORT</button>
            <button class="btn" style="flex:1;" onclick="exportDB()">EXPORT</button>
            <button class="btn-red" style="flex:1;" onclick="cleanDatabase()">CLEAN</button>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div class="menu-header">
            <div style="display:flex; gap:8px;">
                <button class="btn btn-green" onclick="pasteFromWA()">PLAK WA</button>
                <button class="btn btn-green" onclick="copySetWhatsApp()" style="border-radius:50%; width:44px; padding:0;">🟢</button>
                <button class="btn" onclick="addCustomRow()">+ REGEL</button>
            </div>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div class="menu-scroll" id="setList" ondragover="handleDragOver(event)"></div>
        <div style="padding:15px; background:#111; display:flex; gap:5px;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impSet').click()">LOAD</button>
            <button class="btn" style="flex:1;" onclick="exportSet()">SAVE</button>
        </div>
    </div>

    <div id="joyPad" class="draggable-box" style="top:150px; left:30px;">
        <div style="display:grid; grid-template-areas: '. u .' 'l . r' '. d .'; gap:10px;">
            <button class="joy-btn" style="grid-area:u" onclick="moveCursorVertical(-1)">↑</button>
            <button class="joy-btn" style="grid-area:l" onclick="moveCursorHorizontal(-1)">←</button>
            <button class="joy-btn" style="grid-area:r" onclick="moveCursorHorizontal(1)">→</button>
            <button class="joy-btn" style="grid-area:d" onclick="moveCursorVertical(1)">↓</button>
        </div>
    </div>
    <div id="chordStrip" class="draggable-box" style="top:150px; right:30px;"><div id="chordBar" style="display:flex; flex-direction:column; gap:8px;"></div></div>

    <input type="file" id="impAny" multiple style="display:none;" onchange="importAnyFile(event)">
    <input type="file" id="impSet" style="display:none;" onchange="importFiles(event, 'set')">

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null
