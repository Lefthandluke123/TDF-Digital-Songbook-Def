<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Stage Pilot v7.18</title>
    <style>
        :root { 
            --bg-dark: #121212; --top-bar-bg: #1a1a1a;
            --griffin-orange: #d48e3d; --griffin-red: #c12718; 
            --header-height: 85px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; overscroll-behavior: none; }
        body { font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace; display: flex; flex-direction: column; }

        /* Top Bar */
        .top-bar { height: var(--header-height); background: var(--top-bar-bg); border-bottom: 1px solid #333; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; z-index: 30000; flex-shrink: 0; }
        #appLogo { height: 42px; width: 42px; background: #333; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: var(--griffin-orange); font-size: 1.5rem; }
        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1rem; font-weight: bold; cursor: pointer; }

        /* Menu */
        .songs-menu { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #1c1c1e; z-index: 40000; transition: left 0.3s ease; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .songs-menu.open { left: 0; }
        .tab-bar { display: flex; background: #1a1a1a; flex-shrink: 0; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 20px; color: #666; background: none; border: none; font-weight: bold; font-size: 1rem; }
        .tab-btn.active { color: var(--griffin-orange); border-bottom: 2px solid var(--griffin-orange); }
        #indexContent { flex-grow: 1; overflow-y: scroll; background: #121212; -webkit-overflow-scrolling: touch; padding-bottom: 200px; }

        /* Edit Tools (Zwevend) */
        .draggable-box { position: fixed; background: rgba(26, 26, 26, 0.95); border: 2px solid var(--griffin-orange); border-radius: 12px; z-index: 50000; display: none; touch-action: none; }
        .drag-handle { height: 26px; background: var(--griffin-orange); border-radius: 9px 9px 0 0; cursor: move; display: flex; justify-content: center; align-items: center; color: black; font-size: 10px; font-weight: bold; }
        .tool-btn { background: #333; color: white; border: 1px solid #555; border-radius: 6px; padding: 10px; font-weight: bold; }

        /* Content Area */
        .lyrics-container { flex-grow: 1; background: #fff; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #lyricsArea { padding: 30px; font-size: 1.4rem; color: #000; }
        #editorArea { display: none; width: 100%; height: 100%; padding: 30px; font-family: inherit; font-size: 1.4rem; background: #fff; border: none; outline: none; }

        .chord-row { position: relative; height: 1.6rem; color: var(--griffin-red); font-weight: bold; margin-bottom: -5px; }
        .chord-item { position: absolute; white-space: pre; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 18px; min-height: 1.2rem; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div style="display:flex; gap:10px;">
            <div id="appLogo">🖼️</div>
            <button class="top-bar-btn" onclick="toggleMenu()">SONGS</button>
            <button class="top-bar-btn" onclick="toggleDashboard()" style="background:var(--griffin-orange);color:black;padding:5px 15px;border-radius:5px;">SET</button>
        </div>
        <h2 id="displayTitle" style="color:white;font-size:0.9rem;margin:0;">v7.18 Tools</h2>
        <div style="display:flex; gap:10px;">
            <button class="top-bar-btn" id="editBtn" onclick="startEdit()">✎</button>
            <button class="top-bar-btn" id="saveBtn" style="display:none; color:#34c759;" onclick="finishEdit()">GEREED</button>
        </div>
    </div>

    <div id="chordStrip" class="draggable-box" style="top:100px; left:20px; width:80px;">
        <div class="drag-handle">AKKOORDEN</div>
        <div id="chordBar" style="display:flex; flex-direction:column; padding:8px; gap:4px; max-height:400px; overflow-y:auto;"></div>
    </div>

    <div id="joyPad" class="draggable-box" style="bottom:40px; right:20px; width:150px;">
        <div class="drag-handle">NAVIGATIE</div>
        <div style="display:grid; grid-template-areas:'. up .' 'left . right' '. down .'; padding:15px; gap:10px;">
            <button class="tool-btn" style="grid-area:up" onmousedown="event.preventDefault(); moveLine(-1)">↑</button>
            <button class="tool-btn" style="grid-area:left" onmousedown="event.preventDefault(); moveCursor(-1)">←</button>
            <button class="tool-btn" style="grid-area:right" onmousedown="event.preventDefault(); moveCursor(1)">→</button>
            <button class="tool-btn" style="grid-area:down" onmousedown="event.preventDefault(); moveLine(1)">↓</button>
        </div>
    </div>

    <div id="transposePad" class="draggable-box" style="top:100px; right:20px; width:100px;">
        <div class="drag-handle">TRANSPOSE</div>
        <div style="display:flex; flex-direction:column; align-items:center; padding:10px; gap:8px;">
            <button class="tool-btn" style="width:50px; height:50px; font-size:1.5rem;" onclick="transpose(1)">+</button>
            <span id="tpVal" style="color:white; font-size:1.2rem;">0</span>
            <button class="tool-btn" style="width:50px; height:50px; font-size:1.5rem;" onclick="transpose(-1)">-</button>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div class="tab-bar">
            <button class="tab-btn active" id="tabLib" onclick="switchTab('lib')">LIB</button>
            <button class="tab-btn" id="tabSet" onclick="switchTab('set')">SET</button>
        </div>
        <div id="indexContent"></div>
        <div style="padding:15px; background:#1a1a1a; display:flex; gap:10px;">
            <button class="top-bar-btn" onclick="toggleMenu()">SLUIT</button>
            <button class="top-bar-btn" onclick="localStorage.clear(); location.reload();" style="font-size:0.7rem; color:#666;">HARD RESET DATA</button>
        </div>
    </div>

    <div class="lyrics-container">
        <div id="lyricsArea">Selecteer een liedje.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <script>
        let db = [], setlist = [], cur = null, tOff = 0, currentTab = 'lib';

        function sync() {
            db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
            setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        }

        window.onload = () => { sync(); buildChordStrip(); renderIndex(); ['chordStrip','joyPad','transposePad'].forEach(id => initDrag(document.getElementById(id))); };

        function renderIndex() {
            sync();
            const c = document.getElementById('indexContent');
            if(!c) return;
            c.innerHTML = "";
            let l = currentTab === 'lib' ? [...db].sort((a,b) => a.title.localeCompare(b.title)) : setlist;
            
            l.forEach((x, i) => {
                const wrapper = document.createElement('div'); wrapper.style.cssText = "border-bottom:1px solid #333; height:70px; display:flex; align-items:center; padding:0 15px; background:#1c1c1e; color:white;";
                wrapper.innerHTML = `<div style="width:40px; color:var(--griffin-orange);" onclick="rename('${x.title}')">✎</div>
                <div style="flex-grow:1; font-weight:bold;" onclick="loadSong('${x.title.replace(/'/g, "\\'")}')">${x.title}</div>
                <div style="color:var(--griffin-orange); font-size:1.5rem;" onclick="addToSet('${x.title}')">${currentTab==='lib'?'+':'×'}</div>`;
                c.appendChild(wrapper);
            });
        }

        function buildChordStrip() {
            const bar = document.getElementById('chordBar');
            const chords = ["A","Am","B","Bm","C","C7","D","Dm","D7","E","Em","E7","F","G","G7"];
            chords.forEach(c => {
                const b = document.createElement('button'); b.className = 'tool-btn'; b.textContent = c;
                b.onmousedown = (e) => { e.preventDefault(); insertText(`[${c}]`); };
                bar.appendChild(b);
            });
        }

        function startEdit() {
            if(!cur) return;
            document.getElementById('lyricsArea').style.display = 'none';
            document.getElementById('editorArea').style.display = 'block';
            document.getElementById('editorArea').value = cur.content;
            document.querySelectorAll('.draggable-box').forEach(b => b.style.display = 'block');
            document.getElementById('editBtn').style.display = 'none';
            document.getElementById('saveBtn').style.display = 'block';
        }

        function finishEdit() {
            const idx = db.findIndex(s => s.title === cur.title);
            db[idx].content = document.getElementById('editorArea').value;
            localStorage.setItem('tdfSongs', JSON.stringify(db));
            document.getElementById('lyricsArea').style.display = 'block';
            document.getElementById('editorArea').style.display = 'none';
            document.querySelectorAll('.draggable-box').forEach(b => b.style.display = 'none');
            document.getElementById('editBtn').style.display = 'block';
            document.getElementById('saveBtn').style.display = 'none';
            draw();
        }

        function insertText(t) {
            const ed = document.getElementById('editorArea'), p = ed.selectionStart;
            ed.value = ed.value.slice(0,p) + t + ed.value.slice(ed.selectionEnd);
            ed.selectionStart = ed.selectionEnd = p + t.length; ed.focus();
        }

        function initDrag(el) {
            const h = el.querySelector('.drag-handle');
            let ix, iy;
            const s = (e) => { ix = e.clientX || e.touches[0].clientX; iy = e.clientY || e.touches[0].clientY; document.onmousemove = m; document.ontouchmove = m; };
            const m = (e) => { e.preventDefault(); let cx = e.clientX || e.touches[0].clientX; let cy = e.clientY || e.touches[0].clientY; el.style.top = (el.offsetTop - (iy - cy)) + "px"; el.style.left = (el.offsetLeft - (ix - cx)) + "px"; ix = cx; iy = cy; };
            const stop = () => { document.onmousemove = null; document.ontouchmove = null; };
            h.onmousedown = s; h.ontouchstart = s; document.onmouseup = stop; document.ontouchend = stop;
        }

        function loadSong(t) { sync(); cur = db.find(s => s.title === t) || setlist.find(s => s.title === t); document.getElementById('displayTitle').textContent = cur.title; draw(); toggleMenu(); }
        function draw() { if(!cur) return; const lines = cur.content.trim().split('\n'); let h = ""; lines.forEach(l => { let cArr = [], txt = "", i = 0; while(i < l.length) { if(l[i] === '[') { let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;} cArr.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1; } else { txt += l[i]; i++; } } let r = ""; cArr.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; }); h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`; }); document.getElementById('lyricsArea').innerHTML = h; }
        function toggleMenu() { document.getElementById('songsMenu').classList.toggle('open'); if(document.getElementById('songsMenu').classList.contains('open')) renderIndex(); }
        function switchTab(t) { currentTab = t; document.getElementById('tabLib').classList.toggle('active', t==='lib'); document.getElementById('tabSet').classList.toggle('active', t==='set'); renderIndex(); }
        function addToSet(t) { sync(); const s = db.find(x=>x.title===t); if(s) { setlist.push({...s}); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); renderIndex(); } }
        function rename(old) { const n = prompt("Nieuw:", old); if(n) { const i = db.findIndex(s=>s.title===old); db[i].title = n; localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); } }
        function moveCursor(d) { const ed=document.getElementById('editorArea'); ed.selectionStart=ed.selectionEnd=ed.selectionStart+d; ed.focus(); }
        function moveLine(d) { const ed=document.getElementById('editorArea'), lines=ed.value.split('\n'), pos=ed.selectionStart; let curL=ed.value.substr(0,pos).split('\n').length-1; let targetL=Math.max(0,Math.min(lines.length-1,curL+d)); let newPos=0; for(let i=0; i<targetL; i++) newPos+=lines[i].length+1; ed.selectionStart=ed.selectionEnd=newPos; ed.focus(); }
    </script>
</body>
</html>
