<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Stage Pilot v6.29</title>
    <style>
        :root { 
            --bg-dark: #121212; --top-bar-bg: #1a1a1a;
            --griffin-orange: #d48e3d; --griffin-red: #c12718; 
            --header-height: 65px;
            --lyric-bg: #ffffff; --lyric-text: #000000;
        }
        [data-theme="dark"] { --lyric-bg: #000000; --lyric-text: #ffffff; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
        body { font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace; display: flex; flex-direction: column; padding-top: var(--header-height); }

        .top-bar { 
            position: fixed; top: 0 !important; left: 0; width: 100%; height: var(--header-height); 
            background: var(--top-bar-bg); border-bottom: 1px solid #333; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; z-index: 99999; 
        }
        .top-bar-center { text-align: center; flex-grow: 1; }
        .title-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .title-row h2 { margin: 0; font-size: 1.1rem; color: white; font-family: sans-serif; }
        
        #titleEditInput { background: #121212; color: var(--griffin-orange); border: 1px solid var(--griffin-orange); border-radius: 4px; padding: 4px 8px; font-size: 1rem; width: 200px; display: none; text-align: center; }

        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .top-bar-icon { width: 28px; height: 28px; fill: var(--griffin-orange); cursor: pointer; }

        .lyrics-container { background: var(--lyric-bg); width: 100%; height: calc(100vh - var(--header-height)); overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }
        #lyricsArea, #editorArea { padding: 30px; font-family: ui-monospace, monospace; font-size: 1.35rem; line-height: 1.35; color: var(--lyric-text); width: 100%; min-height: 100%; }
        #editorArea { display: none; white-space: pre; border: none; outline: none; background: var(--lyric-bg); color: var(--lyric-text); caret-color: var(--griffin-orange); padding-bottom: 400px; }

        /* Menu Styling */
        .songs-menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90000; }
        .songs-menu { position: fixed; top: 0; left: -33.33%; width: 33.33%; height: 100%; background: #1c1c1e; z-index: 90001; transition: left 0.3s ease; display: flex; flex-direction: column; }
        .songs-menu.open { left: 0; }
        @media (max-width: 768px) { .songs-menu { width: 85%; left: -85%; } }
        
        .alphabet-header { background: #242426; color: var(--griffin-orange); padding: 8px 20px; font-size: 0.75rem; font-weight: bold; border-bottom: 1px solid #333; text-transform: uppercase; }
        .index-container { position: relative; width: 100%; border-bottom: 1px solid #282828; background: #333; overflow: hidden; height: 50px; flex-shrink: 0; }
        .index-item { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 0 20px; background: #1c1c1e; color: #eee; cursor: pointer; font-family: sans-serif; z-index: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: transform 0.2s ease-out; display: flex; align-items: center; }
        
        .delete-btn, .rename-btn { position: absolute; top: 0; bottom: 0; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; cursor: pointer; }
        .delete-btn { right: 0; width: 80px; background: var(--griffin-red); }
        .rename-btn { right: 80px; width: 80px; background: var(--griffin-orange); color: black; }

        .chord-row { position: relative; height: 1.5rem; color: var(--griffin-red); font-weight: bold; pointer-events: none; margin-bottom: -5px; }
        .chord-item { position: absolute; top: 0; white-space: pre; font-size: 1.1rem; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 15px; min-height: 1.2rem; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--griffin-orange); color: black; padding: 12px 25px; border-radius: 25px; font-weight: bold; z-index: 2000000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body data-theme="light">
    <div id="toast"></div>
    <input type="file" id="bulkFiles" accept=".txt" multiple style="display:none;">

    <div class="top-bar">
        <button class="top-bar-btn" onclick="toggleMenu()">Songs</button>
        <div class="top-bar-center">
            <h2 id="displayTitle">Stage Pilot v6.29</h2>
            <input type="text" id="titleEditInput">
        </div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" id="editIcon" viewBox="0 0 24 24" onclick="startEdit()"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
            <button class="top-bar-btn" id="saveBtn" style="display:none;" onclick="finishEdit()">GEREED</button>
        </div>
    </div>

    <div class="songs-menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="songs-menu" id="songsMenu">
        <div style="padding:15px; background:#2c2c2e; border-bottom:1px solid #444; color:white; font-weight:bold; display:flex; justify-content: space-between; align-items: center;">
            <span>MY SONGBOOK</span>
            <button class="top-bar-btn" style="font-size: 0.8rem;" onclick="document.getElementById('bulkFiles').click()">IMPORT</button>
        </div>
        <div id="indexContent" style="flex-grow:1; overflow-y:auto;"></div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Selecteer een liedje.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <script>
        const APP_VERSION = "6.29";
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let cur = null;

        window.onload = () => {
            if (localStorage.getItem('tdfVersion') !== APP_VERSION) {
                localStorage.setItem('tdfVersion', APP_VERSION);
                location.reload(true);
            }
            renderIndex();
        };

        function renderIndex() {
            const c = document.getElementById('indexContent'); c.innerHTML = "";
            db.sort((a,b) => a.title.localeCompare(b.title, 'nl', { sensitivity: 'base' }));
            let lastChar = "";
            db.forEach(s => {
                let firstChar = s.title.charAt(0).toUpperCase();
                if (!/[A-Z]/.test(firstChar)) firstChar = "#";
                if (firstChar !== lastChar) {
                    const header = document.createElement('div'); header.className = 'alphabet-header'; header.textContent = firstChar; c.appendChild(header); lastChar = firstChar;
                }
                const container = document.createElement('div'); container.className = 'index-container';
                container.innerHTML = `
                    <div class="delete-btn" onclick="deleteSong('${s.title}')">Wis</div>
                    <div class="rename-btn" onclick="renameSong('${s.title}')">Naam</div>
                    <div class="index-item">${s.title}</div>
                `;
                const item = container.querySelector('.index-item');
                item.onclick = () => { loadSong(s.title); toggleMenu(); };
                initSwipe(item); c.appendChild(container);
            });
        }

        function initSwipe(item) {
            let startX, moveX;
            item.addEventListener('touchstart', e => { startX = e.touches[0].clientX; item.style.transition = 'none'; });
            item.addEventListener('touchmove', e => {
                moveX = e.touches[0].clientX; let d = moveX - startX;
                if(d < 0) item.style.transform = `translateX(${Math.max(d, -160)}px)`;
                if(d > 20) item.style.transform = `translateX(0px)`;
            });
            item.addEventListener('touchend', () => {
                item.style.transition = 'transform 0.2s ease-out';
                if(moveX - startX < -80) item.style.transform = 'translateX(-160px)';
                else item.style.transform = 'translateX(0px)';
            });
        }

        function renameSong(oldTitle) {
            const newTitle = prompt("Nieuwe naam voor liedje:", oldTitle);
            if(newTitle && newTitle !== oldTitle) {
                const i = db.findIndex(s => s.title === oldTitle);
                if(i !== -1) {
                    db[i].title = newTitle;
                    localStorage.setItem('tdfSongs', JSON.stringify(db));
                    renderIndex();
                    if(cur && cur.title === oldTitle) loadSong(newTitle);
                }
            }
        }

        function deleteSong(t) {
            if(confirm(`Wis ${t}?`)) {
                db = db.filter(s => s.title !== t);
                localStorage.setItem('tdfSongs', JSON.stringify(db));
                renderIndex();
            }
        }

        function loadSong(t) { cur = db.find(s => s.title === t); document.getElementById('displayTitle').textContent = cur.title; draw(); }
        
        function draw() {
            if(!cur) return;
            const lines = cur.content.split('\n');
            let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let end = l.indexOf(']', i);
                        if(end === -1) { txt += l[i]; i++; continue; }
                        chords.push({ p: txt.length, v: l.substring(i+1, end) });
                        i = end + 1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            document.getElementById('lyricsArea').innerHTML = h;
        }

        function startEdit() { 
            if(!cur) return;
            document.getElementById('lyricsArea').style.display='none'; 
            document.getElementById('saveBtn').style.display='block'; 
            document.getElementById('editorArea').style.display='block'; 
            document.getElementById('editorArea').value=cur.content; 
        }

        function finishEdit() { 
            const i = db.findIndex(s=>s.title===cur.title);
            db[i].content = document.getElementById('editorArea').value;
            localStorage.setItem('tdfSongs',JSON.stringify(db)); 
            document.getElementById('lyricsArea').style.display='block'; 
            document.getElementById('saveBtn').style.display='none'; 
            document.getElementById('editorArea').style.display='none'; 
            draw();
        }

        function toggleMenu() { const o = document.getElementById('songsMenu').classList.toggle('open'); document.getElementById('menuOverlay').style.display = o ? 'block' : 'none'; }
        
        document.getElementById('bulkFiles').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            for(let f of files) {
                const t = await f.text();
                const title = t.split('\n')[0].replace(/[\[\]\r]/g, '').trim() || f.name.replace('.txt','');
                db.push({title, content: t});
            }
            localStorage.setItem('tdfSongs', JSON.stringify(db));
            renderIndex();
        });

        function toggleScroll() { /* Autoscroll logica hier */ }
    </script>
</body>
</html>
