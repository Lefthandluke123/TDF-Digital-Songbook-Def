<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v10.48</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --grey: #121212; --row-bg: #1c1c1e; --red: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; flex-shrink: 0; z-index: 5000; }
        .logo-img { height: 45px; width: auto; cursor: pointer; }
        
        .main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #fff; z-index: 1000; }
        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; position: relative; z-index: 10; background: transparent; }
        
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 100000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-scroll { flex: 1; overflow-y: auto; padding-bottom: 120px; }

        .setlist-row { height: 75px; background: var(--row-bg); margin-bottom: 2px; display: flex; align-items: center; padding: 0; color: #fff; border-bottom: 1px solid #222; position: relative; }
        .setlist-row.edit-active { border-left: 10px solid var(--amber); }
        
        /* De onzichtbare actie-knop over de hele rij */
        .row-action-btn { position: absolute; top: 0; left: 0; width: calc(100% - 70px); height: 100%; background: transparent; border: none; cursor: pointer; z-index: 10; text-align: left; padding-left: 20px; color: #fff; font-family: inherit; }
        
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; z-index: 100; position: relative; }
        .btn.active { background: var(--amber); color: #000; }

        #editorContainer { display: none; flex: 1; flex-direction: column; background: #000; z-index: 200000; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; outline: none; font-family: monospace; resize: none; }

        #toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 12px 24px; border-radius: 30px; font-weight: bold; z-index: 500000; display: none; }
    </style>
</head>
<body>
    <div id="toast">MELDING</div>
    <div class="top-bar" id="mainTopBar">
        <div class="top-left"><img src="logo.png" class="logo-img" onclick="location.reload()"><button class="btn" onclick="openMenu('songsMenu')">SONGS</button><button class="btn" onclick="openMenu('setMenu')">SET</button></div>
        <div id="title" class="top-center">TDF DIGITAL</div>
        <div class="top-right"></div>
    </div>

    <div class="main-container">
        <div id="lyricsArea"></div>
        <div id="editorContainer">
            <div style="padding:15px; background:#111; display:flex; justify-content:space-between; align-items:center;">
                <button class="btn" onclick="document.getElementById('editorContainer').style.display='none'">SLUIT</button>
                <div style="display:flex; gap:5px;"><button class="btn" onclick="transpose(-1)">[-1]</button><button class="btn" onclick="transpose(1)">[+1]</button></div>
                <button class="btn" style="background:var(--amber); color:#000;" onclick="finishEdit()">OPSLAAN</button>
            </div>
            <textarea id="editorArea" spellcheck="false"></textarea>
        </div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <button class="btn" id="songEditGlobalBtn" onclick="toggleSongEditMode()">EDIT MODUS</button>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div style="padding:15px;"><input type="text" id="songSearch" placeholder="Zoek liedje..." oninput="render()" style="width:100%; background:#111; color:#fff; border:1px solid #444; padding:15px; border-radius:8px; font-size:1.2rem;"></div>
        <div id="dbList" class="menu-scroll"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let songEditMode = false;
        let curSongTitle = "";

        const scale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const flats = { "Db": "C#", "Eb": "D#", "Gb": "F#", "Ab": "G#", "Bb": "A#" };

        function toggleSongEditMode() {
            songEditMode = !songEditMode;
            document.getElementById('songEditGlobalBtn').classList.toggle('active', songEditMode);
            render();
            showToast(songEditMode ? "EDIT AAN" : "EDIT UIT");
        }

        function render() {
            const dbl = document.getElementById('dbList');
            dbl.innerHTML = "";
            const query = document.getElementById('songSearch').value.toLowerCase();

            db.filter(s => s && s.title.toLowerCase().includes(query)).sort((a,b) => a.title.localeCompare(b.title)).forEach(s => {
                const row = document.createElement('div');
                row.className = "setlist-row" + (songEditMode ? " edit-active" : "");
                
                // Onzichtbare knop over de hele breedte voor betrouwbare kliks op iPad
                const actionBtn = document.createElement('button');
                actionBtn.className = "row-action-btn";
                actionBtn.innerHTML = `<b>${s.title}</b>`;
                actionBtn.onclick = () => {
                    if (songEditMode) {
                        openEditor(s.title);
                    } else {
                        loadSong(s.title);
                    }
                };

                // De "+" knop apart houden met hogere z-index
                const addBtn = document.createElement('button');
                addBtn.className = "btn";
                addBtn.style.marginRight = "15px";
                addBtn.innerText = "+";
                addBtn.style.minWidth = "50px";
                addBtn.onclick = (e) => {
                    e.stopPropagation();
                    addToSetlist(s.title);
                };

                row.appendChild(actionBtn);
                row.appendChild(document.createElement('div')).style.flex = "1"; // spacer
                row.appendChild(addBtn);
                dbl.appendChild(row);
            });
        }

        function openEditor(title) {
            const song = db.find(x => x.title === title);
            if(song) {
                curSongTitle = title;
                document.getElementById('editorArea').value = song.content;
                document.getElementById('editorContainer').style.display = 'flex';
                closeMenus();
            }
        }

        function finishEdit() {
            const songIdx = db.findIndex(x => x.title === curSongTitle);
            if(songIdx !== -1) {
                db[songIdx].content = document.getElementById('editorArea').value;
                localStorage.setItem('tdfSongs', JSON.stringify(db));
                document.getElementById('editorContainer').style.display = 'none';
                loadSong(curSongTitle);
                showToast("OPSLAG OK");
            }
        }

        function loadSong(title) {
            const song = db.find(x => x.title === title);
            if(song) {
                document.getElementById('lyricsArea').innerHTML = song.content.replace(/\n/g, '<br>');
                closeMenus();
            }
        }

        function addToSetlist(title) {
            showToast("SET +1");
        }

        function transpose(dir) {
            const area = document.getElementById('editorArea');
            area.value = area.value.replace(/\[(.*?)\]/g, (match, chord) => {
                const transposed = chord.split('/').map(part => {
                    let root = part.match(/^[A-G][#b]?/)?.[0]; if (!root) return part;
                    let suffix = part.slice(root.length), val = flats[root] || root, idx = scale.indexOf(val);
                    if (idx === -1) return part;
                    let newIdx = (idx + dir + 12) % 12; return scale[newIdx] + suffix;
                }).join('/');
                return `[${transposed}]`;
            });
        }

        function openMenu(id) { document.getElementById(id).classList.add('open'); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 1000); }

        window.onload = render;
    </script>
</body>
</html>
