<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Master v6.81</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 20px); 
            --header-height: calc(60px + var(--safe-top)); 
            --griffin-orange: #d48e3d; 
            --griffin-red: #c12718;
        }
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
            color: #000000 !important; 
            -webkit-text-fill-color: #000000 !important;
            -webkit-font-smoothing: none !important;
        }
        html, body { height: 100dvh; width: 100vw; background-color: #ffffff !important; overflow: hidden; position: fixed; font-family: ui-sans-serif, system-ui, sans-serif; }
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); background-color: #ffffff !important; border-bottom: 4px solid #000000 !important; z-index: 100001; }
        .top-bar-content { margin-top: var(--safe-top); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        #displayTitle { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; cursor: pointer; }
        .songs-menu { position: fixed; top: var(--header-height); left: -300px; width: 280px; height: calc(100dvh - var(--header-height)); background-color: #ffffff !important; z-index: 100000; transition: left 0.3s ease; border-right: 4px solid #000000; }
        .songs-menu.open { left: 0; }
        #menuSearch { width: 90%; margin: 15px auto; padding: 12px; border: 3px solid #000; border-radius: 8px; font-weight: 900; background: #fff !important; }
        .lyrics-container { width: 100%; height: 100dvh; padding-top: var(--header-height); background-color: #ffffff !important; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #lyricsArea { padding: 30px; font-family: ui-monospace, monospace; font-size: 1.5rem; font-weight: 700; line-height: 1.4; }
        .chord-row { height: 1.7rem; position: relative; }
        .chord-item { position: absolute; white-space: pre; color: var(--griffin-red) !important; -webkit-text-fill-color: var(--griffin-red) !important; font-weight: 900; text-shadow: 2px 2px 0px #fff; }
        .floater { position: fixed; background: #ffffff !important; border: 4px solid #000; border-radius: 12px; z-index: 10001; text-align: center; padding: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .f-btn { border: 2px solid #000; border-radius: 6px; background: #ffffff !important; font-weight: 900; cursor: pointer; }
        #editorArea { display: none; width: 100%; height: 75dvh; padding: 25px; font-family: monospace; font-size: 1.4rem; font-weight: 700; border: none; outline: none; background: #ffffff !important; }
        .floating-pad { width: 115px; height: 115px; left: 20px; bottom: 40px; border-radius: 50%; display: none; }
        .pad-btn { position: absolute; background: #fff !important; border: 2px solid #000; width: 36px; height: 36px; border-radius: 8px; font-weight: 900; }
        .btn-up { top: 4px; left: 40px; } .btn-down { bottom: 4px; left: 40px; } .btn-left { left: 4px; top: 40px; } .btn-right { right: 4px; top: 40px; }
        .btn-center { left: 40px; top: 40px; width: 36px; height: 36px; background: var(--griffin-orange) !important; border-radius: 50%; border: 2px solid #000; }
        .floating-chords { width: 120px; right: 20px; bottom: 40px; padding: 8px; display: none; grid-template-columns: 1fr 1fr; gap: 5px; }
        .full-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(255,255,255,0.98); z-index: 1000001; padding: 20px; }
        .modal-box { max-width: 400px; margin: 40px auto; background: #fff; padding: 30px; border: 4px solid #000; text-align: center; border-radius: 15px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-content">
            <div style="display:flex; align-items:center; gap:15px;">
                <img id="appLogo" src="" alt=" " onclick="el('settingsOverlay').style.display='block'" style="height:35px; width:auto;">
                <button onclick="toggleMenu()" style="background:none; border:none; color:#007aff !important; -webkit-text-fill-color:#007aff !important; font-weight:900;">MENU</button>
            </div>
            <div id="displayTitle" onclick="saveFromTitle()">TDF Master</div>
            <div style="display:flex; gap:15px;">
                <button onclick="createNewSong()" style="background:none; border:none; color:#007aff !important; -webkit-text-fill-color:#007aff !important; font-size:2rem; font-weight:900;">+</button>
                <button onclick="startEdit()" style="background:none; border:none; color:#007aff !important; -webkit-text-fill-color:#007aff !important; font-size:1.6rem; font-weight:900;">✎</button>
            </div>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div style="padding:10px;"><input type="text" id="menuSearch" placeholder="ZOEK..." oninput="renderMenu()"></div>
        <div id="menuContent" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea"></div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <div class="floater" style="right:15px; top:140px; width:70px;">
        <div id="speedDisplay" style="font-size:0.9rem; font-weight:900;">180s</div>
        <button class="f-btn" style="width:100%; height:45px; margin-top:5px;" onclick="adjustSpeed(-10)">+</button>
        <button class="f-btn" style="width:100%; height:45px; margin-top:5px;" onclick="adjustSpeed(10)">-</button>
        <hr style="margin:8px 0; border:1px solid #000;">
        <button class="f-btn" style="width:100%; height:38px;" onclick="transpose(1)">b+</button>
        <button class="f-btn" style="width:100%; height:38px; margin-top:4px;" onclick="transpose(-1)">b-</button>
        <button id="playBtn" class="f-btn" style="width:100%; height:50px; margin-top:15px; background:#007aff !important; color:#fff !important; -webkit-text-fill-color:#fff !important;" onclick="toggleScroll()">▶</button>
    </div>

    <div class="floater floating-pad" id="floatPad">
        <button class="pad-btn btn-up" onclick="moveCursor('up')">↑</button>
        <button class="pad-btn btn-down" onclick="moveCursor('down')">↓</button>
        <button class="pad-btn btn-left" onclick="moveCursor('left')">←</button>
        <button class="pad-btn btn-right" onclick="moveCursor('right')">→</button>
        <button class="pad-btn btn-center" onclick="injectChord('')">[]</button>
    </div>

    <div class="floater floating-chords" id="floatChords">
        <button class="f-btn" style="padding:10px 0;" onclick="injectChord('A')">A</button><button class="f-btn" style="padding:10px 0;" onclick="injectChord('Am')">Am</button>
        <button class="f-btn" style="padding:10px 0;" onclick="injectChord('C')">C</button><button class="f-btn" style="padding:10px 0;" onclick="injectChord('D')">D</button>
        <button class="f-btn" style="padding:10px 0;" onclick="injectChord('E')">E</button><button class="f-btn" style="padding:10px 0;" onclick="injectChord('G')">G</button>
    </div>

    <div id="settingsOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100dvh; background:rgba(255,255,255,0.98); z-index:1000001; padding:20px;">
        <div class="modal-box">
            <h2 style="margin-bottom:20px; font-weight:900;">BEHEER</h2>
            <button class="f-btn" onclick="location.reload()" style="width:100%; padding:15px; margin:10px 0; background:#ff3b30 !important; color
