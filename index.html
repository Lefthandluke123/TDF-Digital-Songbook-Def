<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v9.28</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --grey: #121212; --row-bg: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        /* HEADER */
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; flex-shrink: 0; }
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* CONTENT AREA */
        .main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #fff; }
        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; }

        /* EDITOR: VASTE OPBOUW VOOR CURSOR VRIJHEID */
        #editorContainer { display: none; flex: 1; flex-direction: column; background: #000; }
        .chord-bar { height: 65px; background: #222; padding: 10px; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid #444; flex-shrink: 0; -webkit-overflow-scrolling: touch; }
        .chord-btn { background: #333; color: var(--amber); border: 1px solid var(--amber); padding: 10px 15px; border-radius: 6px; font-weight: bold; min-width: 55px; text-align: center; flex-shrink: 0; }
        
        /* HET TEKSTVELD: GEEN TOUCH-BLOCKERS */
        #editorArea { flex: 1; width: 100%; padding: 20px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; resize: none; font-family: monospace; outline: none; }

        /* LIVE OVERLAY */
        #liveView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 15000; overflow-y: auto; padding: 120px 35px 120px 35px; }
        .live-footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; background: rgba(15,15,15,0.95); border-top: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 16000; }

        /* MENUS */
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-scroll { flex: 1; overflow-y: auto; padding: 10px 0; }
        .row-item { background: var(--row-bg); margin-bottom: 2px; display: flex; align-items: center; padding: 15px; min-height: 70px; border-bottom: 1px solid #333; }
        .song-title { font-size: 1.4rem; font-weight: bold; flex: 1; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center; gap:8px;">
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; color:#444;">TDF v9.28</div>
        <div style="display:flex; gap:8px;">
            <button class="btn" id="editSongBtn" onclick="startEdit()">✎ EDIT</button>
            <button class="btn" id="saveSongBtn" style="display:none; border-color:#25D366; color:#25D366;" onclick="finishEdit()">SAVE OK</button>
            <button class="btn" id="liveBtn" style="background:var(--amber); color:#000;" onclick="enterLiveView()">LIVE</button>
        </div>
    </div>

    <div class="main-container">
        <div id="lyricsArea">Selecteer een song uit de lijst.</div>
        
        <div id="editorContainer">
            <div class="chord-bar" id="chordBar"></div>
            <textarea id="editorArea" spellcheck="false" placeholder="Typ hier..."></textarea>
        </div>
    </div>

    <div id="liveView">
        <div id="liveContent"></div>
        <div class="live-footer">
            <button class="btn" style="border-radius: 50%; width: 60px; height: 60px; font-size: 1.5rem;" onclick="exitLiveView()">X</button>
            <div id="liveClock" style="font-size: 1.8rem; font-weight: bold; color: var(--amber);">00:00</div>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h2>SETLIST</h2>
            <button class="btn" onclick="closeMenus()">SLUIT</button>
        </div>
        <div class="menu-scroll" id="setList"></div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h2>BIBLIOTHEEK</h2>
            <button class="btn" onclick="closeMenus()">SLUIT</button>
        </div>
        <div class="menu-scroll" id="dbList"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null;
        const chords = ["A","Am","B","Bm","C","Cm","D","Dm","E","Em","F","Fm","G","Gm","7"];

        window.onload = () => { createChordBar(); render(); setInterval(updateClock, 1000); };

        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }
        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }

        function createChordBar() {
            const bar = document.getElementById('chordBar');
            chords.forEach(c => {
                const b = document.createElement('div'); b.className = 'chord-btn'; b.innerText = c;
                b.onclick = () => insertChordAtCursor(`[${c}]`);
                bar.appendChild(b);
            });
        }

        function insertChordAtCursor(chord) {
            const area = document.getElementById('editorArea');
            const start = area.selectionStart;
            const end = area.selectionEnd;
            area.value = area.value.substring(0, start) + chord + area.value.substring(end);
            area.focus();
            area.selectionStart = area.selectionEnd = start + chord.length;
        }

        function startEdit() {
            if(!cur) return;
            document.getElementById('lyricsArea').style.display = 'none';
            document.getElementById('editorContainer').style.display = 'flex';
            document.getElementById('editorArea').value = cur.content;
            document.getElementById('editSongBtn').style.display = 'none';
            document.getElementById('saveSongBtn').style.display = 'block';
            document.getElementById('liveBtn').style.display = 'none';
        }

        function finishEdit() {
            cur.content = document.getElementById('editorArea').value;
            let dbIdx = db.findIndex(s => s.title === cur.title);
            if(dbIdx !== -1) db[dbIdx] = JSON.parse(JSON.stringify(cur));
            save();
            document.getElementById('editorContainer').style.display = 'none';
            document.getElementById('lyricsArea').style.display = 'block';
            document.getElementById('editSongBtn').style.display = 'block';
            document.getElementById('saveSongBtn').style.display = 'none';
            document.getElementById('liveBtn').style.display = 'block';
            drawLyrics('lyricsArea');
        }

        function enterLiveView() {
            if(!cur) return;
            document.getElementById('liveView').style.display = 'block';
            drawLyrics('liveContent');
        }

        function exitLiveView() { document.getElementById('liveView').style.display = 'none'; }

        function drawLyrics(targetId) {
            const container = document.getElementById(targetId);
            if(!cur) return;
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') { let e = l.indexOf(']', i); chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1; } 
                    else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span style="position:absolute; left:${c.p}ch; color:var(--amber); font-weight:bold;">${c.v}</span>`; });
                h += `<div style="height:2.2rem; position:relative;">${r}</div><div style="margin-bottom:25px; font-weight:bold;">${txt || ' '}</div>`;
            });
            container.innerHTML = h; container.scrollTop = 0;
        }

        function updateClock() { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}); }
        
        function render() {
            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div class="song-title" onclick="loadSongByIndex(${i})">${i+1}. ${s.title}</div>
                               <button class="btn" style="color:red; border-color:red;" onclick="setlist.splice(${i},1); save(); render();">X</button>`;
                setl.appendChild(d);
            });
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            db.sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div class="song-title" onclick="loadSongByName('${s.title.replace(/'/g,"\\")}')">${s.title}</div>
                               <button class="btn" onclick="setlist.push(JSON.parse(JSON.stringify(s))); save(); render();">+</button>`;
                dbl.appendChild(d);
            });
        }
        function loadSongByIndex(index) { cur = setlist[index]; document.getElementById('title').innerText = cur.title; drawLyrics('lyricsArea'); closeMenus(); }
        function loadSongByName(t) { cur = db.find(x=>x.title===t); document.getElementById('title').innerText = cur.title; drawLyrics('lyricsArea'); closeMenus(); }
    </script>
</body>
</html>
