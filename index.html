<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Stage Pilot v7.44 - Firefox Perfect</title>
    <style>
        :root { --bg-dark: #0a0a0a; --top-bar-bg: #1a1a1a; --griffin-orange: #d48e3d; --griffin-red: #c12718; --header-height: 85px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; }
        body { font-family: ui-monospace, 'SF Mono', monospace; display: flex; flex-direction: column; }

        /* Top Bar */
        .top-bar { height: var(--header-height); background: var(--top-bar-bg); border-bottom: 1px solid #333; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; z-index: 30000; flex-shrink: 0; }
        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        /* Dashboard: 14 songs fit (72px per rij) */
        #setlistDashboard { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 45000; display: none; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .dash-header { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; height: 75px; }
        .dash-list { flex: 1; overflow-y: auto; padding: 10px 15px; -webkit-overflow-scrolling: touch; background: var(--bg-dark); }
        
        .dash-row { display: flex; align-items: center; background: #1c1c1e; border: 1px solid #333; border-radius: 8px; margin-bottom: 6px; height: 72px; color: white; width: 100%; gap: 8px; padding-right: 10px; }
        .dash-num { width: 65px; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--griffin-orange); font-size: 1.9rem; font-weight: 900; border-right: 1px solid #333; background: rgba(0,0,0,0.2); flex-shrink: 0; }
        .dash-name { flex: 1; padding: 0 15px; font-size: 1.9rem; font-weight: bold; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .dash-controls { display: flex; gap: 6px; flex-shrink: 0; }
        .dash-ctrl-btn { width: 44px; height: 44px; background: #333; border: 1px solid #444; color: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.3rem; }
        .btn-del { color: var(--griffin-red); }

        /* Menu & Footer */
        .songs-menu { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #1c1c1e; z-index: 40000; transition: left 0.3s ease; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .songs-menu.open { left: 0; }
        #indexContent { flex: 1; overflow-y: auto; background: #121212; }
        .list-item { height: 65px; display: flex; align-items: center; border-bottom: 1px solid #333; padding: 0 15px; background: #1c1c1e; color: white; }
        .menu-footer { padding: 15px; background: #1a1a1a; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #333; flex-shrink: 0; }

        /* Lyrics Full Width */
        .lyrics-container { flex: 1; background: #fff; overflow-y: auto; width: 100%; }
        #lyricsArea { padding: 30px; font-size: 1.5rem; color: #000; line-height: 1.4; width: 100%; }
        #editorArea { display: none; width: 100%; height: 100%; padding: 30px; font-size: 1.5rem; border: none; outline: none; background: #fff; }

        /* Joystick & Chord Strip */
        .draggable-box { position: fixed; z-index: 50000; display: none; touch-action: none; }
        .joy-container { background: rgba(26, 26, 26, 0.9); border: 2px solid var(--griffin-orange); border-radius: 50%; padding: 10px; display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .drag-handle { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--griffin-orange); color: black; padding: 2px 10px; border-radius: 10px; font-size: 9px; font-weight: bold; cursor: move; }
        .joy-btn { width: 52px; height: 52px; border-radius: 50%; background: #333; color: white; border: 1px solid #555; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; }

        .chord-row { position: relative; height: 1.7rem; color: var(--griffin-red); font-weight: bold; margin-bottom: -5px; }
        .chord-item { position: absolute; white-space: pre; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 20px; min-height: 1.3rem; }
    </style>
</head>
<body>
    <input type="file" id="bulkFiles" accept=".json,.txt" multiple style="display:none;">

    <div class="top-bar">
        <div style="display:flex; gap:12px; align-items:center;">
            <div id="appLogo" style="height:42px; width:42px; background:#333; border-radius:5px; display:flex; align-items:center; justify-content:center; color:var(--griffin-orange); font-size:1.5rem;">🖼️</div>
            <button class="top-bar-btn" onclick="toggleMenu()">SONGS</button>
            <button class="top-bar-btn" onclick="toggleDashboard()" style="background:var(--griffin-orange);color:black;padding:6px 18px;border-radius:6px;">SET</button>
        </div>
        <h2 id="displayTitle" style="color:white; font-size:1rem; margin:0;">TDF Pilot</h2>
        <div style="display:flex; gap:10px;">
            <button class="top-bar-btn" onclick="startEdit()">✎</button>
            <button class="top-bar-btn" id="saveBtn" style="display:none; color:#34c759;" onclick="finishEdit()">GEREED</button>
        </div>
    </div>

    <div id="setlistDashboard">
        <div class="dash-header">
            <div style="display:flex; gap:15px; align-items:center;">
                <div style="height:35px; width:35px; background:#333; border-radius:5px; display:flex; align-items:center; justify-content:center; color:var(--griffin-orange);">🖼️</div>
                <button class="top-bar-btn" onclick="addCustomRow()" style="background:#444; color:white; padding:6px 14px; border-radius:6px; font-size:0.9rem;">+ LEGE REGEL</button>
            </div>
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="top-bar-btn" onclick="copySetWhatsApp()" style="background:#25D366; color:white; width:44px; height:44px; border-radius:50%; padding:0; display:flex; align-items:center; justify-content:center; font-size:1.2rem;">🟢</button>
                <button class="top-bar-btn" onclick="toggleDashboard()" style="border:1px solid #444; padding:6px 15px; border-radius:6px;">SLUIT</button>
            </div>
        </div>
        <div class="dash-list" id="dashList"></div>
    </div>

    <div id="joyPad" class="draggable-box" style="bottom:60px; right:30px;">
        <div class="drag-handle">MOVE</div>
        <div class="joy-container">
            <button class="joy-btn" style="grid-area:up" onmousedown="event.preventDefault(); moveLine(-1)">↑</button>
            <button class="joy-btn" style="grid-area:left" onmousedown="event.preventDefault(); moveCursor(-1)">←</button>
            <button class="joy-btn" style="grid-area:right" onmousedown="event.preventDefault(); moveCursor(1)">→</button>
            <button class="joy-btn" style="grid-area:down" onmousedown="event.preventDefault(); moveLine(1)">↓</button>
        </div>
    </div>
    <div id="chordStrip" class="draggable-box" style="top:120px; left:20px; width:90px; background:rgba(26,26,26,0.95); border:2px solid var(--griffin-orange); border-radius:12px;">
        <div class="drag-handle">CHORDS</div>
        <div id="chordBar" style="display:flex; flex-direction:column; padding:10px; gap:8px; max-height:400px; overflow-y:auto;"></div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div id="indexContent"></div>
        <div class="menu-footer">
            <div style="display:flex; gap:10px;">
                <button class="top-bar-btn" onclick="document.getElementById('bulkFiles').click()" style="flex:1; background:#444; color:white; padding:12px; border-radius:8px;">📂 IMPORT</button>
                <button class="top-bar-btn" onclick="exportSetlist()" style="flex:1; background:var(--griffin-orange); color:black; padding:12px; border-radius:8px;">💾 EXPORT SET</button>
            </div>
            <button class="top-bar-btn" onclick="toggleMenu()" style="border:1px solid #444; padding:12px; border-radius:8px;">SLUIT</button>
        </div>
    </div>

    <div class="lyrics-container"><div id="lyricsArea">Importeer songs...</div><textarea id="editorArea" spellcheck="false"></textarea></div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null;

        window.onload = () => { renderIndex(); buildChordStrip(); ['chordStrip','joyPad'].forEach(id => initDrag(document.getElementById(id))); };

        // Import Logic for Firefox
        document.getElementById('bulkFiles').onchange = async (e) => {
            const files = Array.from(e.target.files); if (files.length === 0) return;
            for(let f of files) {
                const text = await f.text();
                if(f.name.endsWith('.json')) { try { const imp = JSON.parse(text); if(Array.isArray(imp)) db = imp; } catch(err) { alert("JSON Fout!"); } }
                else db.push({title: f.name.replace('.txt',''), content: text});
            }
            localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); alert("OK!");
        };

        function renderDashboard() {
            const list = document.getElementById('dashList'); list.innerHTML = "";
            setlist.forEach((s, i) => {
                const row = document.createElement('div'); row.className = "dash-row";
                row.innerHTML = `<div class="dash-num">${i+1}</div><div class="dash-name" onclick="renameSetItem(${i})">${s.title}</div>
                    <div class="dash-controls">
                        <button class="dash-ctrl-btn" onclick="moveSetItem(${i}, -1)">↑</button>
                        <button class="dash-ctrl-btn" onclick="moveSetItem(${i}, 1)">↓</button>
                        <button class="dash-ctrl-btn btn-del" onclick="removeFromSet(${i})">X</button>
                    </div>`;
                list.appendChild(row);
            });
        }

        function addCustomRow() {
            const n = prompt("Naam deunenset/regel:", "DEUNENSET");
            if (n) { setlist.push({title: n, content: ""}); saveSet(); renderDashboard(); }
        }

        function renameSetItem(i) {
            const item = setlist[i];
            if(!item.content) {
                const n = prompt("Hernoem deunenset:", item.title);
                if(n) { setlist[i].title = n; saveSet(); renderDashboard(); }
            } else { loadSong(item.title); toggleDashboard(); }
        }

        function moveSetItem(idx, dir) {
            let target = idx + dir; if(target < 0 || target >= setlist.length) return;
            const temp = setlist[idx]; setlist[idx] = setlist[target]; setlist[target] = temp;
            saveSet(); renderDashboard();
        }

        function removeFromSet(idx) { if(confirm("Liedje uit set verwijderen?")) { setlist.splice(idx, 1); saveSet(); renderDashboard(); } }
        function saveSet() { localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }

        function buildChordStrip() {
            const bar = document.getElementById('chordBar'); const chords = ["A","Am","B","Bm","C","C7","D","Dm","D7","E","Em","E7","F","G","G7"];
            chords.forEach(c => { const b = document.createElement('button'); b.style.cssText="background:#333;color:white;border:1px solid #555;padding:12px;border-radius:6px;font-weight:bold;"; b.textContent = c; b.onmousedown = (e) => { e.preventDefault(); insertText(`[${c}]`); }; bar.appendChild(b); });
        }

        function initDrag(el) {
            const h = el.querySelector('.drag-handle'); let ix, iy;
            const s = (e) => { ix = e.clientX || e.touches[0].clientX; iy = e.clientY || e.touches[0].clientY; document.onmousemove = m; document.ontouchmove = m; };
            const m = (e) => { e.preventDefault(); let cx = e.clientX || e.touches[0].clientX; let cy = e.clientY || e.touches[0].clientY; el.style.top = (el.offsetTop - (iy - cy)) + "px"; el.style.left = (el.offsetLeft - (ix - cx)) + "px"; ix = cx; iy = cy; };
            const stop = () => { document.onmousemove = null; document.ontouchmove = null; };
            h.onmousedown = s; h.ontouchstart = s; document.onmouseup = stop; document.ontouchend = stop;
        }

        function renderIndex() {
            const c = document.getElementById('indexContent'); c.innerHTML = "";
            db.sort((a,b) => a.title.localeCompare(b.title)).forEach((x) => {
                const w = document.createElement('div'); w.className = "list-item";
                w.innerHTML = `<div style="flex-grow:1; font-weight:bold; font-size:1.1rem;" onclick="loadSong('${x.title.replace(/'/g, "\\'")}')">${x.title}</div>
                <div style="color:var(--griffin-orange); font-size:1.8rem; padding:10px;" onclick="addToSet('${x.title}')">+</div>`;
                c.appendChild(w);
            });
        }

        function toggleDashboard() { const d = document.getElementById('setlistDashboard'); d.style.display = (d.style.display === 'flex') ? 'none' : 'flex'; if(d.style.display==='flex') renderDashboard(); }
        function loadSong(t) { cur = db.find(s => s.title === t) || setlist.find(s => s.title === t); if(!cur) return; document.getElementById('displayTitle').textContent = cur.title; draw(); if(document.getElementById('songsMenu').classList.contains('open')) toggleMenu(); }
        
        function draw() { 
            if(!cur) return; const lines = cur.content.trim().split('\n'); let h = ""; 
            lines.forEach(l => { 
                let cArr = [], txt = "", i = 0; 
                while(i < l.length) { 
                    if(l[i] === '[') { let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;} cArr.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1; } 
                    else { txt += l[i]; i++; } 
                } 
                let r = ""; cArr.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; }); 
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`; 
            }); 
            document.getElementById('lyricsArea').innerHTML = h; window.scrollTo(0,0); 
        }

        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push({...s}); saveSet(); } }
        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editorArea').style.display='block'; document.getElementById('editorArea').value=cur.content; document.querySelectorAll('.draggable-box').forEach(b=>b.style.display='block'); document.getElementById('saveBtn').style.display='block'; }
        function finishEdit() { const idx = db.findIndex(s=>s.title===cur.title); if(idx!==-1) db[idx].content=document.getElementById('editorArea').value; localStorage.setItem('tdfSongs', JSON.stringify(db)); document.getElementById('lyricsArea').style.display='block'; document.getElementById('editorArea').style.display='none'; document.querySelectorAll('.draggable-box').forEach(b=>b.style.display='none'); document.getElementById('saveBtn').style.display='none'; draw(); }
        
        function insertText(t) { const ed = document.getElementById('editorArea'), p = ed.selectionStart; ed.value = ed.value.slice(0,p) + t + ed.value.slice(ed.selectionEnd); ed.selectionStart = ed.selectionEnd = p + t.length; ed.focus(); }
        function moveCursor(d) { const ed=document.getElementById('editorArea'); ed.selectionStart=ed.selectionEnd=ed.selectionStart+d; ed.focus(); }
        function moveLine(d) { const ed=document.getElementById('editorArea'), lines=ed.value.split('\n'), pos=ed.selectionStart; let curL=ed.value.substr(0,pos).split('\n').length-1; let targetL=Math.max(0,Math.min(lines.length-1,curL+d)); let newPos=0; for(let i=0; i<targetL; i++) newPos+=lines[i].length+1; ed.selectionStart=ed.selectionEnd=newPos; ed.focus(); }
        function copySetWhatsApp() { let txt = "*SETLIST:*\n\n"; setlist.forEach((s, i) => { txt += `${i+1}. ${s.title}\n`; }); navigator.clipboard.writeText(txt).then(() => alert("Gekopieerd!")); }
        function toggleMenu() { document.getElementById('songsMenu').classList.toggle('open'); if(document.getElementById('songsMenu').classList.contains('open')) renderIndex(); }
        function exportSetlist() { if (setlist.length === 0) return; const n = prompt("Bestandsnaam:", "TDF setlist"); if (n) { const b = new Blob([JSON.stringify(setlist)], {type: "application/json"}); const u = URL.createObjectURL(b); const dl = document.createElement('a'); dl.href = u; dl.download = n + ".json"; dl.click(); } }
    </script>
</body>
</html>
