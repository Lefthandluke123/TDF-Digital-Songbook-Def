<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Master v6.84</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 20px); 
            --header-height: calc(60px + var(--safe-top)); 
        }
        
        /* FIREFOX & BROWSER OVERRIDE SHIELD */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; padding: 0; 
            forced-color-adjust: none !important; /* Blokkeert Firefox contrast aanpassingen */
            filter: none !important;             /* Blokkeert Dark Reader filters */
        }
        
        html, body { 
            height: 100dvh; width: 100vw; 
            overflow: hidden; position: fixed; 
            font-family: sans-serif; 
            background-color: #FFFFFF !important; 
            color: #000000 !important; 
        }

        .top-bar { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); z-index: 10000; border-bottom: 3px solid #000; background-color: #FFFFFF !important; }
        .top-bar-content { margin-top: var(--safe-top); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        
        .songs-menu { 
            position: fixed; top: var(--header-height); left: -300px; width: 280px; height: calc(100dvh - var(--header-height)); 
            z-index: 9000; transition: left 0.3s ease; border-right: 3px solid #000; background-color: #FFFFFF !important;
            visibility: hidden;
        }
        .songs-menu.open { left: 0; visibility: visible; }

        .lyrics-container { width: 100%; height: 100dvh; padding-top: var(--header-height); overflow-y: auto; -webkit-overflow-scrolling: touch; background-color: #FFFFFF !important; }
        #lyricsArea { padding: 30px; font-family: monospace; font-size: 1.5rem; font-weight: bold; color: #000000 !important; }
        
        .chord-row { height: 1.7rem; position: relative; color: #c12718 !important; }
        .chord-item { position: absolute; white-space: pre; font-weight: 900; }

        .floater { position: fixed; border: 3px solid #000; border-radius: 12px; z-index: 11000; text-align: center; padding: 8px; background-color: #FFFFFF !important; }
        #editorArea { display: none; width: 100%; height: 70vh; padding: 20px; font-family: monospace; font-size: 1.3rem; border: none; background-color: #FFFFFF !important; color: #000000 !important; }
        
        .f-btn { border: 2px solid #000; border-radius: 6px; background-color: #FFFFFF !important; font-weight: 900; cursor: pointer; padding: 5px; min-height: 40px; color: #000000 !important; }
        
        /* Navigatie Pad */
        .floating-pad { width: 115px; height: 115px; left: 20px; bottom: 40px; border-radius: 50%; display: none; }
        .pad-btn { position: absolute; background-color: #FFFFFF !important; border: 2px solid #000; width: 36px; height: 36px; border-radius: 8px; font-weight: 900; color: #000 !important; }
        .btn-up { top: 4px; left: 40px; } .btn-down { bottom: 4px; left: 40px; } .btn-left { left: 4px; top: 40px; } .btn-right { right: 4px; top: 40px; }
        .btn-center { left: 40px; top: 40px; width: 36px; height: 36px; background-color: #d48e3d !important; border-radius: 50%; border: 2px solid #000; color: #fff !important; }

        .floating-chords { width: 120px; right: 20px; bottom: 40px; padding: 8px; display: none; grid-template-columns: 1fr 1fr; gap: 5px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-content">
            <div style="display:flex; align-items:center; gap:15px;">
                <img id="appLogo" src="" alt="Logo" onclick="el('settingsOverlay').style.display='block'" style="height:35px; width:auto; border:1px solid #000;">
                <button onclick="toggleMenu()" class="f-btn" style="color:#007aff !important;">SONGS</button>
            </div>
            <div id="displayTitle" onclick="saveFromTitle()" style="font-weight:900; font-size:1.2rem; color:#000 !important;">TDF Master</div>
            <div style="display:flex; gap:10px;">
                <button onclick="createNewSong()" class="f-btn" style="color:#007aff !important; font-size:1.5rem;">+</button>
                <button onclick="startEdit()" class="f-btn" style="color:#007aff !important;">✎</button>
            </div>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div style="padding:15px; border-bottom:1px solid #000;">
            <input type="text" id="menuSearch" placeholder="Zoek..." oninput="renderMenu()" style="width:100%; padding:10px; border:2px solid #000; font-weight:bold; background:#fff; color:#000;">
        </div>
        <div id="menuContent" style="flex:1; overflow-y:auto; background:#fff;"></div>
    </div>

    <div class="lyrics-container" id="mainContainer">
        <div id="lyricsArea"></div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <div class="floater" style="right:15px; top:120px; width:70px;">
        <div id="speedDisplay" style="font-size:0.8rem; font-weight:900; color:#000;">180s</div>
        <button class="f-btn" onclick="adjustSpeed(-10)">+</button>
        <button class="f-btn" onclick="adjustSpeed(10)">-</button>
        <hr style="margin:8px 0; border:1px solid #000;">
        <button class="f-btn" onclick="transpose(1)">b+</button>
        <button class="f-btn" onclick="transpose(-1)">b-</button>
        <button id="playBtn" class="f-btn" style="background-color:#007aff !important; color:#ffffff !important;" onclick="toggleScroll()">▶</button>
    </div>

    <div class="floater floating-pad" id="floatPad">
        <button class="pad-btn btn-up" onclick="moveCursor('up')">↑</button>
        <button class="pad-btn btn-down" onclick="moveCursor('down')">↓</button>
        <button class="pad-btn btn-left" onclick="moveCursor('left')">←</button>
        <button class="pad-btn btn-right" onclick="moveCursor('right')">→</button>
        <button class="pad-btn btn-center" onclick="injectChord('')">[]</button>
    </div>

    <div class="floater floating-chords" id="floatChords">
        <button class="f-btn" style="padding:8px 0;" onclick="injectChord('A')">A</button>
        <button class="f-btn" style="padding:8px 0;" onclick="injectChord('Am')">Am</button>
        <button class="f-btn" style="padding:8px 0;" onclick="injectChord('C')">C</button>
        <button class="f-btn" style="padding:8px 0;" onclick="injectChord('G')">G</button>
    </div>

    <div id="settingsOverlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100dvh; z-index:20000; background:rgba(255,255,255,0.98); padding:20px;">
        <div style="max-width:400px; margin:40px auto; background:#fff; padding:30px; border:4px solid #000; text-align:center; border-radius:15px;">
            <h2 style="margin-bottom:20px; color:#000;">BEHEER</h2>
            <button class="f-btn" onclick="location.reload()" style="width:100%; margin:10px 0; background:#ff3b30 !important; color:#fff !important;">🔄 VERVERS</button>
            <button class="f-btn" onclick="downloadBackup()" style="width:100%; margin:10px 0;">💾 BACK-UP</button>
            <button class="f-btn" onclick="el('settingsOverlay').style.display='none'" style="width:100%; margin:10px 0; background:#000 !important; color:#fff !important;">SLUITEN</button>
        </div>
    </div>

    <script>
        const el = (id) => document.getElementById(id);
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [], tags = JSON.parse(localStorage.getItem('tdfTags')) || {};
        let appLogoData = localStorage.getItem('tdfLogo') || "", currentTag = "ALLES", cur = null, sInt = null, scrollSpeed = 180, transOffset = 0;

        window.onload = () => { 
            document.body.style.backgroundColor = "#FFFFFF";
            if(appLogoData) el('appLogo').src = appLogoData; 
            renderMenu(); 
        };

        function toggleMenu() { el('songsMenu').classList.toggle('open'); }
        function renderMenu() {
            const c = el('menuContent'); c.innerHTML = "";
            const q = el('menuSearch').value.toLowerCase();
            let f = currentTag === "ALLES" ? db : db.filter(s => (tags[currentTag] || []).includes(s.title));
            if(q) f = db.filter(s => s.title.toLowerCase().includes(q));
            f.sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const i = document.createElement('div');
                i.style.padding = "15px"; i.style.borderBottom = "1px solid #eee"; i.style.color = "#000"; i.style.background = "#fff";
                i.textContent = s.title; i.onclick = () => loadSong(s.title);
                c.appendChild(i);
            });
        }

        function loadSong(t) { cur = db.find(x => x.title === t); transOffset = 0; el('displayTitle').textContent = t; draw(); el('songsMenu').classList.remove('open'); }
        function draw() { if(!cur) return; const lines = cur.content.split('\n'); let h = ""; const chordMap = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]; lines.forEach(l => { let chords = [], txt = "", i = 0; while(i < l.length) { if(l[i] === '[') { let e = l.indexOf(']', i); let c = l.substring(i+1, e).replace(/[A-G][#b]?/g, m => { let n = m; if(n==="Bb")n="A#"; if(n==="Eb")n="D#"; if(n==="Ab")n="G#"; if(n==="Db")n="C#"; if(n==="Gb")n="F#"; let idx = chordMap.indexOf(n); if(idx===-1) return m; let ni = (idx + transOffset) % 12; while(ni<0) ni+=12; return chordMap[ni]; }); chords.push({ p: txt.length, v: c }); i = e + 1; } else { txt += l[i]; i++; } } let r = ""; chords.forEach(c => r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`); h += `<div class="chord-row">${r}</div><div style="white-space:pre; margin-bottom:12px; color:#000 !important; background:#fff !important;">${txt || ' '}</div>`; }); el('lyricsArea').innerHTML = h; el('scroller').scrollTop = 0; }
        function startEdit() { if(!cur) return; el('lyricsArea').style.display='none'; el('editorArea').style.display='block'; el('floatPad').style.display='block'; el('floatChords').style.display='grid'; el('editorArea').value = cur.content; el('editorArea').focus(); }
        function saveFromTitle() { if(el('editorArea').style.display === 'block') { const idx = db.findIndex(s => s.title === cur.title); db[idx].content = el('editorArea').value; localStorage.setItem('tdfSongs', JSON.stringify(db)); el('lyricsArea').style.display='block'; el('editorArea').style.display='none'; el('floatPad').style.display='none'; el('floatChords').style.display='none'; draw(); }}
        function injectChord(c) { const a = el('editorArea'), s = a.selectionStart, e = a.selectionEnd; a.value = a.value.slice(0, s) + `[${c}]` + a.value.slice(e); a.selectionStart = a.selectionEnd = s + (c ? c.length + 2 : 2); a.focus(); }
        function moveCursor(d) { const a = el('editorArea'); a.focus(); let p = a.selectionStart, v = a.value; if(d === 'left') a.selectionStart = a.selectionEnd = p - 1; else if(d === 'right') a.selectionStart = a.selectionEnd = p + 1; else { const lines = v.split('\n'), currentLineIdx = v.substr(0, p).split('\n').length - 1; const currentCol = p - v.lastIndexOf('\n', p - 1) - 1; const targetLineIdx = d === 'up' ? currentLineIdx - 1 : currentLineIdx + 1; if(targetLineIdx >= 0 && targetLineIdx < lines.length) { let np = 0; for(let i=0; i<targetLineIdx; i++) np += lines[i].length + 1; a.selectionStart = a.selectionEnd = np + Math.min(currentCol, lines[targetLineIdx].length); }}}
        function adjustSpeed(d) { scrollSpeed = Math.max(10, scrollSpeed + d); el('speedDisplay').textContent = scrollSpeed + 's'; }
        function transpose(d) { transOffset += d; draw(); }
        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() { if(!cur) return; const s = el('scroller'), ch = s.scrollHeight - s.clientHeight; if(ch <= 0) return; const pMs = ch / (scrollSpeed * 1000), st = Date.now(), sp = s.scrollTop; el('playBtn').textContent = "■"; sInt = setInterval(() => { s.scrollTop = sp + ((Date.now() - st) * pMs); if(s.scrollTop >= ch) stopScroll(); }, 50); }
        function stopScroll() { clearInterval(sInt); sInt = null; el('playBtn').textContent = "▶"; }
        function createNewSong() { const t = prompt("Titel:"); if(t && t.trim()) { const nt = t.trim(); db.push({title: nt, content: nt + "\n..."}); localStorage.setItem('tdfSongs', JSON.stringify(db)); renderMenu(); loadSong(nt); setTimeout(startEdit, 200); }}
        function downloadBackup() { const d = JSON.stringify({ songs: db, tags: tags, logo: appLogoData }); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([d], {type: 'application/json'})); a.download = `TDF_Backup.json`; a.click(); }
    </script>
</body>
</html>
