<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Digital v10.87</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --grey: #121212; --row-bg: #1c1c1e; --red: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; flex-shrink: 0; z-index: 5000; }
        .main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #fff; z-index: 1000; }

        /* WATERMERK LOGO TERUG */
        @keyframes pulse { 0% { opacity: 0.1; transform: translate(-50%, -50%) scale(0.95); } 50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.05); } 100% { opacity: 0.1; transform: translate(-50%, -50%) scale(0.95); } }
        .watermark { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); width: 70%; pointer-events: none; z-index: 0; animation: pulse 4s infinite ease-in-out; }
        
        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 30px; line-height: 1.6; position: relative; z-index: 10; background: transparent; }
        #lyricsArea.live-mode { background: #000; color: #fff; padding-bottom: 65vh; }
        
        #liveFooter { height: 120px; background: #111; border-top: 2px solid #333; display: none; align-items: center; justify-content: space-around; padding-bottom: 20px; z-index: 10000; }

        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 100000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-scroll { flex: 1; overflow-y: auto; padding-bottom: 50px; }
        
        .setlist-row { height: calc((100vh - 120px) / 12); background: var(--row-bg); margin-bottom: 2px; display: flex; align-items: center; padding: 0 20px; color: #fff; border-bottom: 1px solid #222; overflow: hidden; font-size: 34px; font-weight: bold; }
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        #editorContainer { display: none; flex-direction: column; background: #000; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 200000; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 24px; border: none; background: #fcfcfc; color: #000; outline: none; font-family: monospace; resize: none; }
        #settingsPanel { display: none; background: #222; padding: 20px; border-bottom: 2px solid #444; text-align: center; }
    </style>
</head>
<body>
    <div id="toast" style="position:fixed; top:100px; left:50%; transform:translateX(-50%); background:var(--amber); color:#000; padding:10px 20px; border-radius:20px; display:none; z-index:1000000;">MELDING</div>
    <input type="file" id="importJsonFile" style="display:none" accept="application/json" onchange="importDB(this)">

    <div class="top-bar" id="mainTopBar">
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="location.reload()">HOME</button>
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="liveClock" style="font-size:24px; font-weight:bold;">00:00</div>
    </div>

    <div class="main-container">
        <img src="logo.png" id="bgLogo" class="watermark">
        <div id="lyricsArea"></div>
        <div id="editorContainer">
            <div style="padding:15px; background:#111; display:flex; justify-content:space-between; align-items:center;">
                <button class="btn" onclick="document.getElementById('editorContainer').style.display='none'">X</button>
                <div style="display:flex; gap:5px;"><button class="btn" onclick="transpose(-1)">[-1]</button><button class="btn" onclick="transpose(1)">[+1]</button></div>
                <button class="btn" style="background:var(--amber); color:#000;" onclick="finishEdit()">OPSLAAN</button>
            </div>
            <textarea id="editorArea" spellcheck="false"></textarea>
        </div>
    </div>

    <div id="liveFooter">
        <button class="btn" onclick="exitLive()">EXIT</button>
        <button class="btn" style="font-size:30px;" onclick="toggleScroll()" id="playBtn">▶</button>
        <button class="btn" onclick="resetScroll()">↺</button>
    </div>

    <div id="songsMenu" class="full-menu">
        <div style="padding:20px; display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size:24px;">REPERTOIRE</b>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div id="dbList" class="menu-scroll"></div>
    </div>

    <div id="setMenu" class="full-menu">
        <div style="padding:20px; display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #333;">
            <b style="font-size:24px;">ACTIEVE SET</b>
            <div>
                <button style="font-size:30px; border:none; background:none; color:#666;" onclick="toggleSettings()">⚙️</button>
                <button class="btn" onclick="closeMenus()">X</button>
            </div>
        </div>
        <div id="settingsPanel">
            <button class="btn" style="background:var(--amber); color:#000; margin:5px;" onclick="exportDB()">BACKUP DB</button>
            <button class="btn" style="background:var(--amber); color:#000; margin:5px;" onclick="document.getElementById('importJsonFile').click()">RESTORE DB</button>
            <button class="btn" style="background:var(--red); color:#fff; margin:5px;" onclick="clearSet()">WIS SET</button>
        </div>
        <div id="setList" class="menu-scroll"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null, isScrolling = false, scrollPos = 0;
        const scale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const flats = { "Db": "C#", "Eb": "D#", "Gb": "F#", "Ab": "G#", "Bb": "A#" };

        window.onload = () => { 
            render(); 
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'}); }, 1000);
            requestAnimationFrame(scrollLoop);
        };

        function render() {
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            db.sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div'); d.className = "setlist-row";
                d.innerHTML = `<div style="flex:1;" onclick="loadPreview('${s.title.replace(/'/g, "\\'")}')">${s.title}</div>
                               <button class="btn" style="margin-right:10px;" onclick="startEdit('${s.title.replace(/'/g, "\\'")}')">✎</button>
                               <button class="btn" onclick="addToSet('${s.title.replace(/'/g, "\\'")}')">+</button>`;
                dbl.appendChild(d);
            });
            const sl = document.getElementById('setList'); sl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "setlist-row";
                d.innerHTML = `<div style="flex:1;" onclick="enterLive(${i})">${i+1}. ${s.title}</div>
                               <button class="btn" style="color:var(--red); border-color:var(--red);" onclick="setlist.splice(${i},1); save(); render();">X</button>`;
                sl.appendChild(d);
            });
        }

        function startEdit(t) { cur = db.find(x => x.title === t); if(cur) { document.getElementById('editorArea').value = cur.content; document.getElementById('editorContainer').style.display = 'flex'; } }
        function finishEdit() { cur.content = document.getElementById('editorArea').value; save(); document.getElementById('editorContainer').style.display = 'none'; drawLyrics(); render(); }
        function transpose(dir) { const area = document.getElementById('editorArea'); area.value = area.value.replace(/\[(.*?)\]/g, (match, chord) => { const transposed = chord.split('/').map(part => { let root = part.match(/^[A-G][#b]?/)?.[0]; if (!root) return part; let suffix = part.slice(root.length), val = flats[root] || root, idx = scale.indexOf(val); if (idx === -1) return part; return scale[(idx + dir + 12) % 12] + suffix; }).join('/'); return `[${transposed}]`; }); }

        function enterLive(index) { 
            cur = setlist[index]; 
            document.getElementById('lyricsArea').classList.add('live-mode'); 
            document.getElementById('liveFooter').style.display = 'flex'; 
            document.getElementById('mainTopBar').style.display = 'none'; 
            document.getElementById('bgLogo').style.display = 'none'; // LOGO VERBERGEN IN LIVE
            drawLyrics(); closeMenus(); resetScroll(); 
        }

        function exitLive() { 
            document.getElementById('lyricsArea').classList.remove('live-mode'); 
            document.getElementById('liveFooter').style.display = 'none'; 
            document.getElementById('mainTopBar').style.display = 'flex'; 
            document.getElementById('bgLogo').style.display = 'block'; // LOGO TERUG
            isScrolling = false; 
        }

        function drawLyrics() { const area = document.getElementById('lyricsArea'); if(!cur) return; area.innerHTML = cur.content.split('\n').map(l => { let chords = [], txt = "", i = 0; while(i < l.length) { if(l[i] === '[') { let e = l.indexOf(']', i); chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1; } else { txt += l[i]; i++; } } let r = ""; chords.forEach(c => { r += `<span style="position:absolute; left:${c.p}ch; color:var(--amber); font-weight:bold;">${c.v}</span>`; }); return `<div style="height:2.2rem; position:relative;">${r}</div><div style="margin-bottom:25px; font-weight:bold;">${txt || '&nbsp;'}</div>`; }).join(''); }
        function scrollLoop() { if(isScrolling) { scrollPos += 1; document.getElementById('lyricsArea').scrollTop = scrollPos; } requestAnimationFrame(scrollLoop); }
        function toggleScroll() { isScrolling = !isScrolling; document.getElementById('playBtn').innerText = isScrolling ? "⏸" : "▶"; }
        function resetScroll() { scrollPos = 0; document.getElementById('lyricsArea').scrollTop = 0; isScrolling = false; document.getElementById('playBtn').innerText = "▶"; }
        function toggleSettings() { const p = document.getElementById('settingsPanel'); p.style.display = (p.style.display === 'block') ? 'none' : 'block'; }
        
        function loadPreview(t) { 
            cur = db.find(x=>x.title===t); 
            document.getElementById('bgLogo').style.display = 'none'; // LOGO WEG BIJ PREVIEW
            drawLyrics(); closeMenus(); 
        }

        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); render(); } }
        function clearSet() { if(confirm("Wis set?")) { setlist = []; save(); render(); toggleSettings(); } }
        function openMenu(id) { document.getElementById(id).classList.add('open'); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); document.getElementById('settingsPanel').style.display = 'none'; }
        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }
        function exportDB() { const b = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `tdf_backup.json`; a.click(); }
        function importDB(input) { const f = input.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { try { db = JSON.parse(ev.target.result); save(); render(); alert("OK"); } catch(err) { alert("Fout"); } }; r.readAsText(f); }
    </script>
</body>
</html>
