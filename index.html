<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Master v6.36</title>
    <style>
        :root { --header-height: 65px; --griffin-orange: #d48e3d; --griffin-red: #c12718; --gray-header: #333; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { height: 100dvh; width: 100vw; background-color: #ffffff; overflow: hidden; position: fixed; top: 0; left: 0; }
        body.inverted { filter: invert(100%) hue-rotate(180deg); background-color: #000000; }
        
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; z-index: 9999; }
        .scroll-ui { display: flex; align-items: center; gap: 5px; background: #222; padding: 4px 8px; border-radius: 6px; }
        .scroll-btn { background: #444; border: none; color: white; width: 30px; height: 30px; border-radius: 4px; font-weight: bold; }
        .top-bar-btn { background: none; border: none; color: #007aff; font-size: 1rem; font-weight: bold; }
        .top-bar-icon { width: 26px; height: 26px; fill: #007aff; }

        .lyrics-container { width: 100%; height: 100dvh; padding-top: var(--header-height); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #lyricsArea, #editorArea { padding: 30px; font-family: ui-monospace, monospace !important; font-size: 1.35rem; line-height: 1.35; color: #000; width: 100%; min-height: 100%; }
        #editorArea { display: none; white-space: pre; border: none; outline: none; background: transparent; caret-color: var(--griffin-orange); padding-bottom: 300px; }

        /* Floating Controls */
        .floating-pad { display: none; position: fixed; width: 120px; height: 120px; background: rgba(26,26,26,0.9); border: 2px solid var(--griffin-orange); border-radius: 50%; z-index: 10001; touch-action: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .pad-btn { position: absolute; background: #333; border: 1px solid #555; color: white; width: 35px; height: 35px; border-radius: 4px; font-weight: bold; }
        .btn-up { top: 5px; left: 42px; }
        .btn-down { bottom: 5px; left: 42px; }
        .btn-left { left: 5px; top: 42px; }
        .btn-right { right: 5px; top: 42px; }
        .btn-center { left: 42px; top: 42px; background: var(--griffin-orange); color: black; border-radius: 50%; }

        .floating-chords { display: none; position: fixed; right: 20px; bottom: 150px; width: 60px; background: rgba(26,26,26,0.9); border: 1px solid #444; border-radius: 8px; z-index: 10001; padding: 5px; touch-action: none; }
        .c-btn { width: 100%; margin-bottom: 5px; padding: 8px 0; background: #333; color: white; border: 1px solid #555; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }

        /* Menu & Overlays (Unchanged) */
        .songs-menu { position: fixed; top: 0; left: -85%; width: 85%; height: 100dvh; background: #1c1c1e; z-index: 10000; transition: left 0.3s ease; display: flex; flex-direction: column; overflow-y: auto; }
        .songs-menu.open { left: 0; }
        .tag-item { padding: 18px 20px; background: #2c2c2e; color: var(--griffin-orange); border-bottom: 1px solid #444; cursor: pointer; font-weight: bold; }
        .song-item { padding: 18px 20px; background: #1c1c1e; color: white; border-bottom: 1px solid #333; }
        .full-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.8); z-index: 20000; padding: 20px; }
        .modal-box { max-width: 500px; margin: 20px auto; background: #2c2c2e; padding: 20px; border-radius: 12px; color: white; }
        
        .chord-row { height: 1.5rem; color: var(--griffin-red); font-weight: bold; position: relative; }
        .chord-item { position: absolute; white-space: pre; }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="top-bar-btn" onclick="toggleMenu()">Songs</button>
        <div class="scroll-ui">
            <button class="scroll-btn" onclick="adjustSpeed(-10)">-</button>
            <span id="speedVal" style="color:white; font-size:0.8rem; min-width:30px; text-align:center;">180s</span>
            <button class="scroll-btn" onclick="adjustSpeed(10)">+</button>
            <svg class="top-bar-icon" id="scrollIcon" onclick="toggleScroll()" viewBox="0 0 24 24" style="fill:#34c759; margin-left:5px;"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div style="display:flex; gap:12px;">
            <svg class="top-bar-icon" onclick="startEdit()" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
            <button class="top-bar-btn" id="saveBtn" onclick="finishEdit()" style="display:none; color:var(--griffin-orange);">GEREED</button>
        </div>
    </div>

    <div class="floating-pad" id="floatPad" style="left: 20px; bottom: 150px;">
        <button class="pad-btn btn-up" onclick="moveCursor('up')">↑</button>
        <button class="pad-btn btn-down" onclick="moveCursor('down')">↓</button>
        <button class="pad-btn btn-left" onclick="moveCursor('left')">←</button>
        <button class="pad-btn btn-right" onclick="moveCursor('right')">→</button>
        <button class="pad-btn btn-center" onclick="injectChord('')">[]</button>
    </div>

    <div class="floating-chords" id="floatChords">
        <button class="c-btn" onclick="injectChord('A')">A</button>
        <button class="c-btn" onclick="injectChord('Am')">Am</button>
        <button class="c-btn" onclick="injectChord('C')">C</button>
        <button class="c-btn" onclick="injectChord('D')">D</button>
        <button class="c-btn" onclick="injectChord('E')">E</button>
        <button class="c-btn" onclick="injectChord('G')">G</button>
    </div>

    <div class="songs-menu" id="songsMenu"><div id="menuContent"></div></div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">TDF Master v6.36 geladen.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <script>
        const el = (id) => document.getElementById(id);
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let tags = JSON.parse(localStorage.getItem('tdfTags')) || {};
        let currentTag = "ALLES", cur = null, sInt = null, scrollSpeed = 180;

        window.onload = () => { if(localStorage.getItem('tdfTheme') === 'dark') document.body.classList.add('inverted'); renderMenu(); makeDraggable(el('floatPad')); makeDraggable(el('floatChords')); };

        function toggleMenu() { el('songsMenu').classList.toggle('open'); }
        function renderMenu() {
            const c = el('menuContent'); c.innerHTML = "<div style='padding:15px;color:#888;font-size:0.7rem;'>FILTERS</div>";
            const allBtn = document.createElement('div'); allBtn.className = `tag-item`; allBtn.textContent = "📜 ALLES";
            allBtn.onclick = () => { currentTag = "ALLES"; renderMenu(); }; c.appendChild(allBtn);
            Object.keys(tags).sort().forEach(t => {
                const btn = document.createElement('div'); btn.className = `tag-item`; btn.textContent = `🏷️ ${t}`;
                btn.onclick = () => { currentTag = t; renderMenu(); }; c.appendChild(btn);
            });
            let filtered = currentTag === "ALLES" ? db : db.filter(s => (tags[currentTag] || []).includes(s.title));
            filtered.sort((a,b) => a.title.localeCompare(b.title)).forEach(s => {
                const item = document.createElement('div'); item.className = 'song-item'; item.textContent = s.title;
                item.onclick = () => { loadSong(s.title); toggleMenu(); }; c.appendChild(item);
            });
        }

        function loadSong(t) { cur = db.find(x => x.title === t); draw(); }
        function draw() {
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); chords.push({ p: txt.length, v: l.substring(i+1, e) });
                        i = e + 1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`);
                h += `<div class="chord-row">${r}</div><div style="white-space:pre; margin-bottom:10px;">${txt || ' '}</div>`;
            });
            el('lyricsArea').innerHTML = h; el('scroller').scrollTop = 0;
        }

        function startEdit() { 
            if(!cur) return; el('lyricsArea').style.display='none'; el('saveBtn').style.display='block'; 
            el('editorArea').style.display='block'; el('floatPad').style.display='block'; el('floatChords').style.display='block';
            el('editorArea').value = cur.content;
        }
        function finishEdit() {
            const idx = db.findIndex(s => s.title === cur.title); db[idx].content = el('editorArea').value;
            localStorage.setItem('tdfSongs', JSON.stringify(db)); cur = db[idx];
            el('lyricsArea').style.display='block'; el('saveBtn').style.display='none'; 
            el('editorArea').style.display='none'; el('floatPad').style.display='none'; el('floatChords').style.display='none'; draw();
        }

        function injectChord(c) {
            const area = el('editorArea'); const start = area.selectionStart;
            area.value = area.value.slice(0, start) + `[${c}]` + area.value.slice(area.selectionEnd);
            area.selectionStart = area.selectionEnd = start + (c ? c.length + 2 : 1);
            area.focus();
        }

        function moveCursor(dir) {
            const area = el('editorArea'); area.focus();
            let pos = area.selectionStart;
            const lines = area.value.split('\n');
            if(dir === 'left') area.selectionStart = area.selectionEnd = pos - 1;
            if(dir === 'right') area.selectionStart = area.selectionEnd = pos + 1;
            if(dir === 'up' || dir === 'down') {
                const currentLineArr = area.value.substr(0, pos).split('\n');
                const lineNum = currentLineArr.length - 1;
                const colNum = currentLineArr[lineNum].length;
                const targetLine = dir === 'up' ? lineNum - 1 : lineNum + 1;
                if(targetLine >= 0 && targetLine < lines.length) {
                    let newPos = 0;
                    for(let i=0; i<targetLine; i++) newPos += lines[i].length + 1;
                    area.selectionStart = area.selectionEnd = newPos + Math.min(colNum, lines[targetLine].length);
                }
            }
        }

        function makeDraggable(element) {
            let x = 0, y = 0;
            element.ontouchstart = (e) => { x = e.touches[0].clientX - element.offsetLeft; y = e.touches[0].clientY - element.offsetTop; };
            element.ontouchmove = (e) => { element.style.left = (e.touches[0].clientX - x) + 'px'; element.style.top = (e.touches[0].clientY - y) + 'px'; e.preventDefault(); };
        }

        function adjustSpeed(delta) { scrollSpeed = Math.max(10, scrollSpeed + delta); el('speedVal').textContent = scrollSpeed + 's'; }
        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() {
            const s = el('scroller'); const ch = s.scrollHeight - s.clientHeight;
            const pMs = ch / (scrollSpeed * 1000); const st = Date.now(), sp = s.scrollTop;
            el('scrollIcon').style.fill = "#c12718";
            sInt = setInterval(() => { s.scrollTop = sp + ((Date.now() - st) * pMs); if(s.scrollTop >= ch) stopScroll(); }, 50);
        }
        function stopScroll() { clearInterval(sInt); sInt = null; el('scrollIcon').style.fill = "#34c759"; }
    </script>
</body>
</html>
