<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Stage Pilot v6.64</title>
    <style>
        :root { 
            --bg-dark: #121212; --top-bar-bg: #1a1a1a;
            --griffin-orange: #d48e3d; --griffin-red: #c12718; 
            --header-height: 85px;
            --lyric-bg: #ffffff; --lyric-text: #000000;
        }
        [data-theme="dark"] { --lyric-bg: #000000; --lyric-text: #ffffff; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
        body { font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace; display: flex; flex-direction: column; padding-top: var(--header-height); }

        .top-bar { 
            position: fixed; top: 0 !important; left: 0; width: 100%; height: var(--header-height); 
            background: var(--top-bar-bg); border-bottom: 1px solid #333; 
            display: flex; align-items: flex-end; justify-content: space-between; 
            padding: 0 15px 12px 15px; z-index: 10000; 
        }
        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .top-bar-icon { width: 28px; height: 28px; fill: var(--griffin-orange); cursor: pointer; }
        #appLogo { height: 42px; width: auto; max-width: 80px; object-fit: contain; display: none; }

        .songs-menu { 
            position: fixed; top: 0; left: -33.33%; width: 33.33%; height: 100%; 
            background: #1c1c1e; z-index: 10001; transition: left 0.3s ease; 
            display: flex; flex-direction: column; padding-top: calc(50px + env(safe-area-inset-top)); 
        }
        .songs-menu.open { left: 0; }
        @media (max-width: 768px) { .songs-menu { width: 85%; left: -85%; } }
        
        .menu-nav-section { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0; }
        .manage-btn { width: 100%; padding: 15px; background: none; border: 2px solid var(--griffin-orange); color: var(--griffin-orange); border-radius: 10px; font-weight: bold; margin-bottom: 15px; cursor: pointer; font-size: 1rem; }

        #tagBar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 15px; background: #242426; border-bottom: 1px solid #444; max-height: 120px; overflow-y: auto; flex-shrink: 0; }
        .tag-pill { padding: 6px 14px; border-radius: 20px; background: #333; color: #aaa; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; border: 1px solid transparent; }
        .tag-pill.active { background: var(--griffin-orange); color: black; font-weight: bold; border-color: white; }

        #indexContent { flex-grow: 1; overflow-y: auto; background: #121212; }
        .index-item { width: 100%; border-bottom: 1px solid #222; padding: 18px 20px; background: #1c1c1e; color: #eee; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .item-main { display: flex; align-items: center; gap: 15px; pointer-events: none; }
        .tag-checkbox { width: 35px; height: 35px; accent-color: var(--griffin-orange); cursor: pointer; pointer-events: auto; }

        #bulkActions { display: none; padding: 15px; background: #2c2c2e; border-top: 2px solid var(--griffin-orange); flex-direction: column; gap: 12px; flex-shrink: 0; }
        .bulk-input { background: #121212; color: white; border: 1px solid #444; padding: 15px; border-radius: 10px; width: 100%; font-size: 1.1rem; }
        
        .quick-tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .quick-tag { padding: 5px 10px; background: #444; color: #ddd; border-radius: 5px; font-size: 0.75rem; cursor: pointer; border: 1px solid #555; }

        .item-actions { display: none; background: #2c2c2e; padding: 10px; gap: 10px; border-bottom: 2px solid #444; }
        .action-btn { flex: 1; padding: 12px; border-radius: 5px; border: none; font-weight: bold; color: white; cursor: pointer; }

        .lyrics-container { background: var(--lyric-bg); width: 100%; height: calc(100vh - var(--header-height)); overflow-y: auto; }
        #lyricsArea, #editorArea { padding: 30px; font-family: ui-monospace, monospace; font-size: 1.35rem; line-height: 1.35; color: var(--lyric-text); width: 100%; }
        #editorArea { display: none; white-space: pre; border: none; outline: none; background: var(--lyric-bg); color: var(--lyric-text); min-height: 100%; padding-bottom: 400px; }

        .chord-row { position: relative; height: 1.5rem; color: var(--griffin-red); font-weight: bold; margin-bottom: -5px; pointer-events: none; }
        .chord-item { position: absolute; white-space: pre; font-size: 1.1rem; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 15px; min-height: 1.2rem; }
    </style>
</head>
<body data-theme="light">
    <input type="file" id="bulkFiles" accept=".txt" multiple style="display:none;">
    <input type="file" id="logoInput" accept="image/png" style="display:none;">

    <div class="top-bar">
        <div class="top-bar-left">
            <img id="appLogo" alt="Logo">
            <button class="top-bar-btn" id="btnShowMenu">Songs</button>
        </div>
        <div class="top-bar-center">
            <h2 id="displayTitle" style="margin:0; color:white; font-size:1.1rem;">Stage Pilot v6.64</h2>
            <div class="transpose-pill" style="margin-top:4px; display:inline-flex; align-items:center; gap:8px; background:#2c2c2e; padding:3px 10px; border-radius:20px; border:1px solid #444;">
                <button class="top-bar-btn" style="font-size:1.3rem;" id="btnTpMinus">−</button>
                <span id="tpVal" style="color:white; font-size:0.9rem;">0</span>
                <button class="top-bar-btn" style="font-size:1.3rem;" id="btnTpPlus">+</button>
            </div>
        </div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" id="scrollBtn" viewBox="0 0 24 24" style="fill:#34c759;"><path d="M8 5v14l11-7z"/></svg>
            <svg class="top-bar-icon" id="editIcon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
            <button class="top-bar-btn" id="saveBtn" style="display:none;">GEREED</button>
            <svg class="top-bar-icon" id="btnImport"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div class="menu-nav-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="color:white; font-weight:bold;">SONGBOOK</span>
                <button class="top-bar-btn" id="btnCloseMenu">SLUIT</button>
            </div>
            <button class="manage-btn" id="tagModeBtn">TAGS BEHEREN</button>
        </div>
        <div id="tagBar"></div>
        <div id="indexContent"></div>
        <div id="bulkActions">
            <div style="color:#aaa; font-size:0.8rem; margin-bottom:5px;">SNEL TOEVOEGEN:</div>
            <div id="quickTags" class="quick-tag-list"></div>
            <hr style="border:0; border-top:1px solid #444; margin:10px 0;">
            <input type="text" id="bulkTagInput" class="bulk-input" placeholder="Nieuwe tagnaam...">
            <button class="top-bar-btn" style="background:var(--griffin-orange); color:black; border:none; padding:15px; border-radius:10px;" id="btnExecuteTag">VOEG NIEUWE TAG TOE</button>
            <div id="tagEditorList" style="margin-top:10px;"></div>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Selecteer een liedje.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <script>
        const APP_VERSION = "6.64";
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let cur = null, tOff = 0, sInt = null, tagMode = false, activeTag = null;
        const $ = (id) => document.getElementById(id);

        window.onload = () => {
            const logo = localStorage.getItem('tdfLogo');
            if(logo && $('appLogo')) { $('appLogo').src = logo; $('appLogo').style.display = 'block'; }
            renderIndex(); renderTagBar();
            
            $('btnShowMenu').addEventListener('click', toggleMenu);
            $('btnCloseMenu').addEventListener('click', toggleMenu);
            $('tagModeBtn').addEventListener('click', toggleTagMode);
            $('btnExecuteTag').addEventListener('click', () => applyBulkTag($('bulkTagInput').value));
            $('btnTpMinus').addEventListener('click', () => transpose(-1));
            $('btnTpPlus').addEventListener('click', () => transpose(1));
            $('scrollBtn').addEventListener('click', toggleScroll);
            $('editIcon').addEventListener('click', startEdit);
            $('saveBtn').addEventListener('click', finishEdit);
            $('btnImport').addEventListener('click', () => $('bulkFiles').click());
        };

        function extractTags(text) {
            if (!text) return [];
            const matches = text.match(/#([a-zA-Z0-9]+)/g);
            return matches ? [...new Set(matches.map(m => m.substring(1).toLowerCase()))] : [];
        }

        function renderTagBar() {
            const bar = $('tagBar');
            const quick = $('quickTags');
            let tags = new Set();
            db.forEach(s => extractTags(s.content).forEach(t => tags.add(t)));
            
            bar.innerHTML = `<div class="tag-pill ${!activeTag ? 'active' : ''}" id="pill-all">ALLES</div>`;
            $('pill-all').onclick = () => filterTag(null);
            
            quick.innerHTML = "";
            Array.from(tags).sort().forEach(t => {
                const pill = document.createElement('div');
                pill.className = `tag-pill ${activeTag === t ? 'active' : ''}`;
                pill.textContent = t.toUpperCase();
                pill.onclick = () => filterTag(t);
                bar.appendChild(pill);
                
                const qp = document.createElement('div');
                qp.className = "quick-tag";
                qp.textContent = "#" + t.toUpperCase();
                qp.onclick = () => applyBulkTag(t);
                quick.appendChild(qp);
            });
            if(tagMode) renderTagEditor(tags);
        }

        function renderTagEditor(tags) {
            const list = $('tagEditorList'); list.innerHTML = "";
            Array.from(tags).sort().forEach(t => {
                const item = document.createElement('div');
                item.style.display = "flex"; item.style.justifyContent = "space-between"; item.style.marginTop = "8px";
                item.innerHTML = `<span style="color:white;font-size:0.9rem;">#${t}</span><div><button class="ed-ren">✏️</button><button class="ed-del">🗑️</button></div>`;
                item.querySelector('.ed-ren').onclick = () => { const n = prompt("Hernoem:", t); if(n){ db.forEach(s => s.content = s.content.replace(new RegExp('#'+t+'\\b','g'), '#'+n.toLowerCase())); saveRefresh(); } };
                item.querySelector('.ed-del').onclick = () => { if(confirm("Wis tag overal?")){ db.forEach(s => s.content = s.content.replace(new RegExp('#'+t+'\\b','g'), '')); saveRefresh(); } };
                list.appendChild(item);
            });
        }

        function renderIndex() {
            const c = $('indexContent'); c.innerHTML = "";
            let songs = [...db].sort((a,b) => a.title.localeCompare(b.title));
            if (activeTag) songs = songs.filter(s => extractTags(s.content).includes(activeTag));
            
            songs.forEach((s, index) => {
                const id = `item-${index}`;
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="index-item" id="trigger-${id}">
                        <div class="item-main">
                            <input type="checkbox" class="tag-checkbox" data-title="${s.title}" ${tagMode ? '' : 'style="display:none"'}>
                            <span>${s.title}</span>
                        </div>
                        <div style="color:var(--griffin-orange); font-weight:bold;">⋮</div>
                    </div>
                    <div class="item-actions" id="actions-${id}">
                        <button class="action-btn btn-open" style="background:#444;">OPEN</button>
                        <button class="action-btn btn-rename" style="background:var(--griffin-orange); color:black;">NAAM</button>
                        <button class="action-btn btn-delete" style="background:var(--griffin-red);">WIS</button>
                    </div>`;
                
                div.querySelector(`#trigger-${id}`).onclick = (e) => {
                    if(tagMode) {
                        const cb = div.querySelector('.tag-checkbox');
                        if(e.target !== cb) cb.checked = !cb.checked;
                    } else {
                        const el = div.querySelector(`#actions-${id}`);
                        const isVisible = el.style.display === 'flex';
                        document.querySelectorAll('.item-actions').forEach(a => a.style.display = 'none');
                        el.style.display = isVisible ? 'none' : 'flex';
                    }
                };
                div.querySelector('.btn-open').onclick = () => loadSong(s.title);
                div.querySelector('.btn-rename').onclick = () => { const n = prompt("Nieuwe naam:", s.title); if(n){ const i = db.findIndex(x => x.title === s.title); db[i].title = n; saveRefresh(); } };
                div.querySelector('.btn-delete').onclick = () => { if(confirm("Wis liedje?")){ db = db.filter(x => x.title !== s.title); saveRefresh(); } };
                c.appendChild(div);
            });
        }

        function applyBulkTag(tagName) {
            const tag = tagName.trim().toLowerCase().replace('#', '');
            if(!tag) return;
            const checked = document.querySelectorAll('.tag-checkbox:checked');
            if(checked.length > 0) {
                checked.forEach(cb => {
                    const s = db.find(x => x.title === cb.dataset.title);
                    if(s && !extractTags(s.content).includes(tag)) s.content += "\n\n#" + tag;
                });
            } else if(cur && !extractTags(cur.content).includes(tag)) {
                cur.content += "\n\n#" + tag;
            }
            $('bulkTagInput').value = "";
            saveRefresh(); 
            // We blijven in tagMode zodat je meerdere tags achter elkaar kunt klikken
        }

        function loadSong(t) { cur = db.find(s => s.title === t); tOff = 0; $('tpVal').textContent = "0"; $('displayTitle').textContent = cur.title; draw(); toggleMenu(); }
        function toggleTagMode() { tagMode = !tagMode; $('tagModeBtn').textContent = tagMode ? "KLAAR" : "TAGS BEHEREN"; $('bulkActions').style.display = tagMode ? "flex" : "none"; renderIndex(); renderTagBar(); }
        function saveRefresh() { localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); renderTagBar(); }
        function filterTag(t) { activeTag = t; renderIndex(); renderTagBar(); }
        
        function draw() {
            if(!cur) return;
            const content = cur.content.replace(/#[a-zA-Z0-9]+/g, '').trim();
            const lines = content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let end = l.indexOf(']', i); if(end === -1) { txt += l[i]; i++; continue; }
                        let c = l.substring(i+1, end); if(tOff !== 0) c = tpChord(c, tOff);
                        chords.push({ p: txt.length, v: c }); i = end + 1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            $('lyricsArea').innerHTML = h; $('scroller').scrollTop = 0;
        }

        function transpose(o) { if(!cur) return; tOff += o; $('tpVal').textContent = (tOff > 0 ? "+" : "") + tOff; draw(); }
        function toggleMenu() { $('songsMenu').classList.toggle('open'); }
        function startEdit() { if(!cur) return; $('lyricsArea').style.display='none'; $('editIcon').style.display='none'; $('saveBtn').style.display='block'; $('editorArea').style.display='block'; $('editorArea').value=cur.content; }
        function finishEdit() { const i = db.findIndex(s=>s.title===cur.title); db[i].content = $('editorArea').value; saveRefresh(); $('lyricsArea').style.display='block'; $('editIcon').style.display='block'; $('saveBtn').style.display='none'; $('editorArea').style.display='none'; draw(); renderTagBar(); }
        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() { if(!cur) return; const c = $('scroller'), h = c.scrollHeight - c.clientHeight; let d = 180; const s = h/(d*1000), t = Date.now(), p = c.scrollTop; $('scrollBtn').style.fill = 'var(--griffin-red)'; sInt = setInterval(() => { c.scrollTop = p + ((Date.now()-t)*s); if(c.scrollTop >= h) stopScroll(); }, 50); }
        function stopScroll() { clearInterval(sInt); sInt = null; $('scrollBtn').style.fill = "#34c759"; }
        
        $('bulkFiles').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            for(let f of files) {
                const t = await f.text();
                let fl = t.split('\n')[0].replace(/[\[\]\r]/g, '').trim();
                db.push({title: fl || f.name.replace('.txt',''), content: t});
            }
            saveRefresh();
        });
        function tpChord(c, o) {
            const n = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
            return c.replace(/[A-G][#b]?/g, (m) => {
                let x = m; if(x==="Bb")x="A#"; if(x==="Eb")x="D#"; if(x==="Ab")x="G#"; if(x==="Db")x="C#"; if(x==="Gb")x="F#";
                let i = n.indexOf(x); if(i===-1) return m;
                let j = (i+o)%12; while(j<0)j+=12; return n[j];
            });
        }
    </script>
</body>
</html>
