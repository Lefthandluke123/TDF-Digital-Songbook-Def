<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v10.79</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --grey: #121212; --row-bg: #1c1c1e; --red: #ff3b30; --green: #34c759; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; flex-shrink: 0; z-index: 5000; }
        .logo-img { height: 45px; width: auto; cursor: pointer; }
        
        .main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #fff; z-index: 1000; }
        @keyframes pulse { 0% { opacity: 0.1; transform: translate(-50%, -50%) scale(0.95); } 50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.05); } 100% { opacity: 0.1; transform: translate(-50%, -50%) scale(0.95); } }
        .watermark { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); width: 70%; pointer-events: none; z-index: 0; animation: pulse 4s infinite ease-in-out; }

        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; position: relative; z-index: 10; background: transparent; }
        #lyricsArea.live-mode { background: #000; color: #fff; padding-bottom: 65vh; }
        
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 100000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-scroll { flex: 1; overflow-y: auto; padding-bottom: 120px; }

        .setlist-row { height: calc((100vh - 180px) / 14); background: var(--row-bg); margin-bottom: 2px; display: flex; align-items: center; padding: 0 10px; color: #fff; border-bottom: 1px solid #222; overflow: hidden; }
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-move { border: 1px solid #444; color: #888; padding: 5px 10px; margin: 0 2px; font-size: 1.1rem; border-radius: 4px; background: #222; }
        
        .tag-pill { background: #333; color: #aaa; padding: 8px 18px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; cursor: pointer; white-space: nowrap; margin-right: 8px; border: 1px solid transparent; flex-shrink: 0; }
        .tag-pill.active { background: var(--amber); color: #000; border-color: #fff; }

        #editorContainer { display: none; flex: 1; flex-direction: column; background: #000; z-index: 200000; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; outline: none; font-family: monospace; resize: none; }
        .chord-bar { display: flex; overflow-x: auto; gap: 8px; padding: 10px; background: #222; border-bottom: 1px solid #444; flex-shrink: 0; }
        .chord-btn { background: #333; color: var(--amber); border: 1px solid var(--amber); padding: 8px 12px; border-radius: 6px; font-weight: bold; min-width: 48px; text-align: center; cursor: pointer; }
        
        #liveFooter { height: 140px; background: #111; border-top: 2px solid #333; display: none; align-items: center; justify-content: space-around; padding: 0 10px 25px 10px; z-index: 10000; flex-shrink: 0; }
        .wheel-wrap { position: relative; width: 90px; height: 100px; background: #000; border: 2px solid #444; border-radius: 12px; overflow: hidden; touch-action: none; }
        .wheel-strip { position: absolute; width: 100%; text-align: center; top: 0; left: 0; pointer-events: none; }
        /* CIJFERS VERBETERD */
        .wheel-num { height: 34px; line-height: 34px; font-size: 1.1rem; color: #fff; opacity: 0.4; transition: 0.1s; } 
        .wheel-num.active { color: var(--amber); font-size: 1.7rem; font-weight: 900; opacity: 1; text-shadow: 0 0 10px rgba(255,191,0,0.4); }

        #toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 12px 24px; border-radius: 30px; font-weight: bold; z-index: 500000; display: none; }
        #archiveView { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; flex-direction: column; z-index: 100001; }
        .font-sm { font-size: 1.3rem !important; } .font-std { font-size: 2.1rem !important; } .font-lg { font-size: 3.1rem !important; }
    </style>
</head>
<body>

    <div id="toast">MELDING</div>

    <div class="top-bar" id="mainTopBar">
        <div class="top-left">
            <img src="logo.png" class="logo-img" onclick="location.reload()">
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div style="text-align:right">
            <div id="liveClock" style="font-size:1.2rem; font-weight:bold;">00:00</div>
            <div id="setTimer" style="font-size:0.9rem; color:var(--amber); font-weight:bold;">0m</div>
        </div>
    </div>

    <div class="main-container">
        <img src="logo.png" id="bgLogo" class="watermark">
        <div id="lyricsArea"></div>
        <div id="editorContainer">
            <div style="padding:15px; background:#111; display:flex; justify-content:space-between; align-items:center;">
                <button class="btn" onclick="document.getElementById('editorContainer').style.display='none'">X</button>
                <div style="display:flex; gap:5px;"><button class="btn" onclick="transpose(-1)">[-1]</button><button class="btn" onclick="transpose(1)">[+1]</button></div>
                <div style="display:flex; gap:5px;"><button class="btn" onclick="renameSong()">NAAM</button><button class="btn" onclick="editTags()">TAGS</button></div>
                <button class="btn" style="background:var(--amber); color:#000;" onclick="finishEdit()">OPSLAAN</button>
            </div>
            <div id="editorChordBar" class="chord-bar"></div>
            <textarea id="editorArea" spellcheck="false"></textarea>
        </div>
    </div>

    <div id="liveFooter">
        <button class="btn" onclick="exitLive()">EXIT</button>
        <button class="btn" style="font-size:1.5rem;" onclick="navSet(-1)">❮</button>
        <button id="playBtn" class="btn" style="width:60px; font-size:1.6rem;" onclick="toggleScroll()">▶</button>
        <button class="btn" style="font-size:1.5rem;" onclick="navSet(1)">❯</button>
        <div class="wheel-wrap" id="bpmWheel">
            <div style="position:absolute; width:100%; height:34px; top:33px; border-top:2px solid var(--amber); border-bottom:2px solid var(--amber); background:rgba(255,191,0,0.15); pointer-events:none; z-index:2;"></div>
            <div class="wheel-strip" id="wheelStrip"></div>
        </div>
        <button class="btn" onclick="cycleFontSize()">A+</button>
    </div>

    <div id="songsMenu" class="full-menu">
        <input type="file" id="importJsonFile" style="display:none" accept="application/json">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <button class="btn" id="bulkBtn" onclick="toggleBulk()">BULK</button>
            <b>SONGS DATABASE</b>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div style="padding:15px;"><input type="text" id="songSearch" placeholder="Zoek op titel of tag..." oninput="render()" style="width:100%; background:#111; color:#fff; border:1px solid #444; padding:15px; border-radius:8px; font-size:1.2rem;"></div>
        <div id="tagFilterBar" style="display:flex; overflow-x:auto; padding:15px; border-bottom:1px solid #222;"></div>
        <div id="dbList" class="menu-scroll"></div>
        <div class="menu-footer" style="padding:20px; background:#111; border-top:1px solid #333; display:flex; gap:10px; justify-content:center;">
            <button class="btn" id="bulkTagBtn" style="display:none; background:var(--amber); color:#000;" onclick="bulkTag()">TAG SELECTIE</button>
            <button class="btn" onclick="exportDB()">BACKUP DB</button>
            <button class="btn" onclick="document.getElementById('importJsonFile').click()">RESTORE DB</button>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <button class="btn" onclick="addCustomNote()">NOTITIE +</button>
            <b>ACTIEVE SET</b>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div id="setList" class="menu-scroll"></div>
        
        <div id="archiveView">
            <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
                <button class="btn" onclick="document.getElementById('archiveView').style.display='none'">❮ TERUG</button>
                <b>ARCHIEF</b>
                <div style="width:40px;"></div>
            </div>
            <div id="archiveList" class="menu-scroll"></div>
        </div>

        <div class="menu-footer" style="padding:20px; background:#111; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
            <button class="btn" style="border-color:var(--green); color:var(--green);" onclick="saveSetToArchive()">BEWAAR SET</button>
            <button class="btn" onclick="openArchive()">ARCHIEF</button>
            <button class="btn" onclick="exportSetToWA()">EXPORT (WA)</button>
            <button class="btn" onclick="importSetFromWA()">IMPORT (WA)</button>
            <button class="btn" style="border-color:var(--red); color:var(--red);" onclick="clearSetlist()">WIS ALLES</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let archives = JSON.parse(localStorage.getItem('tdfArchives')) || {};
        let cur = null, curIdx = -1, isScrolling = false, scrollPos = 0, currentSpeed = 100, startTime = localStorage.getItem('tdfStartTime') || null;
        let activeTags = [], bulkMode = false, selectedSongs = [];
        const fixedTags = ["irish", "scots", "british", "country", "si-so", "ballad", "uptempo"];
        const MIN_BPM = 40, MAX_BPM = 220, scale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const flats = { "Db": "C#", "Eb": "D#", "Gb": "F#", "Ab": "G#", "Bb": "A#" };

        window.onload = () => { 
            render(); createChordButtons(); createBpmNodes(); initBpmWheel();
            document.getElementById('importJsonFile').addEventListener('change', importDB);
            setInterval(() => {
                document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'});
                if(startTime) document.getElementById('setTimer').innerText = Math.floor((new Date() - new Date(startTime)) / 60000) + "m";
            }, 1000);
            requestAnimationFrame(scrollLoop);
        };

        function render() {
            const tagBar = document.getElementById('tagFilterBar');
            if(tagBar) {
                tagBar.innerHTML = "";
                fixedTags.forEach(tag => {
                    const p = document.createElement('div');
                    p.className = "tag-pill" + (activeTags.includes(tag) ? " active" : "");
                    p.innerText = tag.toUpperCase();
                    p.onclick = () => { if(activeTags.includes(tag)) activeTags = activeTags.filter(t => t !== tag); else activeTags.push(tag); render(); };
                    tagBar.appendChild(p);
                });
            }

            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            const q = document.getElementById('songSearch').value.toLowerCase();
            db.filter(s => {
                if(!s) return false;
                const mS = s.title.toLowerCase().includes(q) || (s.tags || "").toLowerCase().includes(q);
                const sT = s.tags ? s.tags.toLowerCase().split(',').map(t => t.trim()) : [];
                const mT = activeTags.length === 0 || activeTags.every(at => sT.includes(at.toLowerCase()));
                return mS && mT;
            }).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div'); d.className = "setlist-row";
                const isSel = selectedSongs.includes(s.title);
                d.innerHTML = `
                    ${bulkMode ? `<input type="checkbox" style="width:30px;height:30px;margin-right:15px;" ${isSel?'checked':''} onchange="toggleSel('${s.title.replace(/'/g, "\\'")}')">` : ''}
                    <div style="flex:1;" onclick="loadPreview('${s.title.replace(/'/g, "\\'")}')"><b>${s.title}</b><br><small style="opacity:0.4;text-transform:uppercase;">${s.tags || ''}</small></div>
                    <button class="btn" style="margin-right:10px;" onclick="startEdit('${s.title.replace(/'/g, "\\'")}')">✎</button>
                    <button class="btn" onclick="addToSet('${s.title.replace(/'/g, "\\'")}')">+</button>`;
                dbl.appendChild(d);
            });

            const sl = document.getElementById('setList'); sl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "setlist-row";
                const moveBtns = `<div style="display:flex; flex-direction:column; margin-right:15px;">
                                    <button class="btn-move" onclick="moveItem(${i}, -1)">▲</button>
                                    <button class="btn-move" onclick="moveItem(${i}, 1)">▼</button>
                                  </div>`;
                if(s.isNote) {
                    d.style.background = "#2c2c2e";
                    d.innerHTML = `${moveBtns}<div style="flex:1; color:var(--amber); font-weight:bold;">-- ${s.title} --</div><button class="btn" style="border-color:var(--red); color:var(--red);" onclick="setlist.splice(${i},1); save(); render();">X</button>`;
                } else {
                    d.innerHTML = `${moveBtns}<div style="flex:1;" onclick="enterLive(${i})">${i+1}. ${s.title}</div><button class="btn" style="border-color:var(--red); color:var(--red);" onclick="setlist.splice(${i},1); save(); render();">X</button>`;
                }
                sl.appendChild(d);
            });
        }

        function createBpmNodes() { const s = document.getElementById('wheelStrip'); for(let i=MIN_BPM; i<=MAX_BPM; i++) { const d = document.createElement('div'); d.className='wheel-num'; d.innerText=i; s.appendChild(d); } }
        function initBpmWheel() {
            const w = document.getElementById('bpmWheel'); let sY = 0, sV = 0;
            w.addEventListener('touchstart', e => { sY = e.touches[0].clientY; sV = currentSpeed; e.preventDefault(); }, {passive:false});
            w.addEventListener('touchmove', e => { 
                let delta = Math.round((sY - e.touches[0].clientY) / 5);
                currentSpeed = Math.max(MIN_BPM, Math.min(MAX_BPM, sV + delta));
                if(cur) { cur.scrollSpeed = currentSpeed; save(); }
                updateWheel(); e.preventDefault(); 
            }, {passive:false});
        }
        function updateWheel() {
            const s = document.getElementById('wheelStrip');
            s.style.transform = `translateY(${(1 * 34) - ((currentSpeed - MIN_BPM) * 34)}px)`;
            s.querySelectorAll('.wheel-num').forEach((n, i) => n.classList.toggle('active', (i + MIN_BPM) === currentSpeed));
        }

        function saveSetToArchive() { if(setlist.length === 0) return showToast("LEGE SET"); const name = prompt("Naam voor deze setlist:"); if(name) { archives[name] = JSON.parse(JSON.stringify(setlist)); localStorage.setItem('tdfArchives', JSON.stringify(archives)); showToast("OPGESLAGEN"); } }
        function openArchive() { const view = document.getElementById('archiveView'); const list = document.getElementById('archiveList'); list.innerHTML = ""; Object.keys(archives).forEach(name => { const d = document.createElement('div'); d.className = "setlist-row"; d.innerHTML = `<div style="flex:1;" onclick="loadArchive('${name.replace(/'/g, "\\'")}')"><b>${name.toUpperCase()}</b></div><button class="btn" style="border-color:var(--red); color:var(--red);" onclick="deleteArchive('${name.replace(/'/g, "\\'")}')">X</button>`; list.appendChild(d); }); view.style.display = 'flex'; }
        function loadArchive(name) { if(confirm(`Setlist '${name}' laden?`)) { setlist = JSON.parse(JSON.stringify(archives[name])); save(); render(); document.getElementById('archiveView').style.display = 'none'; showToast("GELADEN"); } }
        function deleteArchive(name) { if(confirm(`Archief '${name}' verwijderen?`)) { delete archives[name]; localStorage.setItem('tdfArchives', JSON.stringify(archives)); openArchive(); } }
        function exportSetToWA() { if(setlist.length === 0) return showToast("LEGE SET"); let text = "TDF SETLIST:\n"; setlist.forEach((s, i) => { text += `${i + 1}. ${s.title}\n`; }); navigator.clipboard.writeText(text).then(() => showToast("TEKST GEKOPIEERD")); }
        function importSetFromWA() { const text = prompt("Plak de WA lijst hier:"); if(text) { const lines = text.split('\n'); let newSet = []; lines.forEach(line => { const title = line.replace(/^\d+\.\s*/, "").trim(); if(title && title !== "TDF SETLIST:") { const song = db.find(s => s && s.title.toUpperCase() === title.toUpperCase()); if(song) newSet.push(JSON.parse(JSON.stringify(song))); else newSet.push({ title: title, isNote: true }); } }); if(newSet.length > 0) { setlist = newSet; save(); render(); showToast("SET GEÏMPORTEERD"); } } }
        function transpose(dir) { const area = document.getElementById('editorArea'); area.value = area.value.replace(/\[(.*?)\]/g, (match, chord) => { const transposed = chord.split('/').map(part => { let root = part.match(/^[A-G][#b]?/)?.[0]; if (!root) return part; let suffix = part.slice(root.length), val = flats[root] || root, idx = scale.indexOf(val); if (idx === -1) return part; return scale[(idx + dir + 12) % 12] + suffix; }).join('/'); return `[${transposed}]`; }); }
        function createChordButtons() { const bar = document.getElementById('editorChordBar'); bar.innerHTML = ""; ["A", "Am", "B", "Bm", "C", "Cm", "D", "Dm", "E", "Em", "F", "Fm", "G", "Gm", "7"].forEach(c => { const b = document.createElement('div'); b.className = 'chord-btn'; b.innerText = c; b.onclick = () => { const a = document.getElementById('editorArea'); const s = a.selectionStart; a.value = a.value.substring(0, s) + `[${c}]` + a.value.substring(a.selectionEnd); a.focus(); a.selectionStart = a.selectionEnd = s + c.length + 2; }; bar.appendChild(b); }); }
        function toggleBulk() { bulkMode = !bulkMode; selectedSongs = []; document.getElementById('bulkBtn').classList.toggle('active', bulkMode); document.getElementById('bulkTagBtn').style.display = bulkMode ? 'block' : 'none'; render(); }
        function toggleSel(t) { if(selectedSongs.includes(t)) selectedSongs = selectedSongs.filter(x => x !== t); else selectedSongs.push(t); }
        function bulkTag() { if(selectedSongs.length === 0) return; const t = prompt("Tag toevoegen aan selectie:"); if(t) { db.forEach(s => { if(selectedSongs.includes(s.title)) { let curTags = s.tags ? s.tags.split(',').map(x=>x.trim()) : []; if(!curTags.includes(t)) curTags.push(t); s.tags = curTags.join(', '); } }); save(); toggleBulk(); render(); } }
        function moveItem(idx, dir) { const newIdx = idx + dir; if (newIdx < 0 || newIdx >= setlist.length) return; const item = setlist.splice(idx, 1)[0]; setlist.splice(newIdx, 0, item); save(); render(); }
        function addCustomNote() { const val = prompt("Notitie/Pauze:"); if (val) { setlist.push({ title: val.toUpperCase(), isNote: true }); save(); render(); } }
        function loadPreview(t) { cur = db.find(x=>x.title===t); drawLyrics(false); closeMenus(); document.getElementById('bgLogo').style.display = 'none'; }
        function enterLive(index) { if (setlist[index].isNote) return; curIdx = index; cur = setlist[curIdx]; if(!startTime) { startTime = new Date().toISOString(); localStorage.setItem('tdfStartTime', startTime); } document.getElementById('lyricsArea').classList.add('live-mode'); document.getElementById('liveFooter').style.display = 'flex'; document.getElementById('mainTopBar').style.display = 'none'; document.getElementById('bgLogo').style.display = 'none'; currentSpeed = cur.scrollSpeed || 100; updateWheel(); resetScroll(); drawLyrics(true); closeMenus(); }
        function exitLive() { document.getElementById('lyricsArea').classList.remove('live-mode'); document.getElementById('liveFooter').style.display = 'none'; document.getElementById('mainTopBar').style.display = 'flex'; isScrolling = false; }
        function drawLyrics(isLive) { const area = document.getElementById('lyricsArea'); if(!cur) return; area.className = (isLive ? 'live-mode ' : '') + 'font-' + (cur.liveSize || 'std'); area.innerHTML = cur.content.split('\n').map(l => { let chords = [], txt = "", i = 0; while(i < l.length) { if(l[i] === '[') { let e = l.indexOf(']', i); chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1; } else { txt += l[i]; i++; } } let r = ""; chords.forEach(c => { r += `<span style="position:absolute; left:${c.p}ch; color:var(--amber); font-weight:bold;">${c.v}</span>`; }); return `<div style="height:2.2rem; position:relative;">${r}</div><div style="margin-bottom:25px; font-weight:bold;">${txt || '&nbsp;'}</div>`; }).join(''); }
        function scrollLoop() { if(isScrolling) { scrollPos += (currentSpeed * 0.006); document.getElementById('lyricsArea').scrollTop = scrollPos; } requestAnimationFrame(scrollLoop); }
        function toggleScroll() { isScrolling = !isScrolling; document.getElementById('playBtn').innerText = isScrolling ? "⏸" : "▶"; if(isScrolling) scrollPos = document.getElementById('lyricsArea').scrollTop; }
        function resetScroll() { scrollPos = 0; document.getElementById('lyricsArea').scrollTop = 0; isScrolling = false; document.getElementById('playBtn').innerText = "▶"; }
        function navSet(dir) { let n = curIdx + dir; while (n >= 0 && n < setlist.length && setlist[n].isNote) { n += dir; } if(n >= 0 && n < setlist.length) enterLive(n); else showToast("EINDE SET"); }
        function cycleFontSize() { if(!cur) return; const sz = ['sm', 'std', 'lg']; cur.liveSize = sz[(sz.indexOf(cur.liveSize || 'std') + 1) % 3]; save(); drawLyrics(true); }
        function startEdit(t) { cur = db.find(x => x.title === t); if(cur) { document.getElementById('editorArea').value = cur.content; document.getElementById('editorContainer').style.display = 'flex'; } }
        function renameSong() { if(!cur) return; const n = prompt("Naam:", cur.title); if(n) { cur.title = n.toUpperCase(); save(); render(); } }
        function editTags() { if(!cur) return; const t = prompt("Tags:", cur.tags); if(t !== null) { cur.tags = t.toLowerCase(); save(); render(); } }
        function finishEdit() { cur.content = document.getElementById('editorArea').value; save(); document.getElementById('editorContainer').style.display = 'none'; drawLyrics(false); render(); }
        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }
        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); render(); showToast("SET +1"); } }
        function clearSetlist() { if(confirm("Setlist wissen?")) { setlist = []; startTime = null; localStorage.removeItem('tdfStartTime'); save(); render(); } }
        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 1000); }
        function exportDB() { const b = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `tdf_backup.json`; a.click(); }
        function importDB(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { try { db = JSON.parse(ev.target.result); save(); render(); showToast("OK"); } catch(err) { showToast("FOUT"); } }; r.readAsText(f); }
    </script>
</body>
