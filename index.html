<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v10.68</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --grey: #121212; --row-bg: #1c1c1e; --red: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; flex-shrink: 0; z-index: 5000; }
        .logo-img { height: 45px; width: auto; cursor: pointer; }
        
        .main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #fff; z-index: 1000; }
        @keyframes pulse { 0% { opacity: 0.1; transform: translate(-50%, -50%) scale(0.95); } 50% { opacity: 0.3; transform: translate(-50%, -50%) scale(1.05); } 100% { opacity: 0.1; transform: translate(-50%, -50%) scale(0.95); } }
        .watermark { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); width: 70%; pointer-events: none; z-index: 0; animation: pulse 4s infinite ease-in-out; }

        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; position: relative; z-index: 10; background: transparent; }
        #lyricsArea.live-mode { background: #000; color: #fff; padding-bottom: 60vh; }
        
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 100000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-scroll { flex: 1; overflow-y: auto; padding-bottom: 120px; }

        .setlist-row { height: calc((100vh - 180px) / 14); background: var(--row-bg); margin-bottom: 2px; display: flex; align-items: center; padding: 0 10px; color: #fff; border-bottom: 1px solid #222; }
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-move { border: 1px solid #444; color: #888; padding: 5px 10px; margin: 0 2px; font-size: 1.1rem; border-radius: 4px; background: #222; }
        
        #editorContainer { display: none; flex: 1; flex-direction: column; background: #000; z-index: 200000; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; outline: none; font-family: monospace; resize: none; }
        #liveFooter { height: 140px; background: #111; border-top: 2px solid #333; display: none; align-items: center; justify-content: space-around; padding: 0 10px 25px 10px; z-index: 10000; flex-shrink: 0; }
        #toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 12px 24px; border-radius: 30px; font-weight: bold; z-index: 500000; display: none; }
    </style>
</head>
<body>

    <div id="toast">MELDING</div>

    <div class="top-bar" id="mainTopBar">
        <div class="top-left"><img src="logo.png" class="logo-img" onclick="location.reload()"><button class="btn" onclick="openMenu('songsMenu')">SONGS</button><button class="btn" onclick="openMenu('setMenu')">SET</button></div>
        <div style="text-align:right"><div id="liveClock" style="font-size:1.2rem; font-weight:bold;">00:00</div><div id="setTimer" style="font-size:0.9rem; color:var(--amber); font-weight:bold;">0m</div></div>
    </div>

    <div class="main-container">
        <img src="logo.png" id="bgLogo" class="watermark">
        <div id="lyricsArea"></div>
        <div id="editorContainer">
            <div style="padding:15px; background:#111; display:flex; justify-content:space-between; align-items:center;">
                <button class="btn" onclick="document.getElementById('editorContainer').style.display='none'">X</button>
                <div style="flex:1; text-align:center;"><b id="edTitle">EDITOR</b></div>
                <button class="btn" style="background:var(--amber); color:#000;" onclick="finishEdit()">OPSLAAN</button>
            </div>
            <textarea id="editorArea" spellcheck="false"></textarea>
        </div>
    </div>

    <div id="liveFooter">
        <button class="btn" onclick="exitLive()">EXIT</button>
        <button class="btn" onclick="navSet(-1)">❮</button>
        <button id="playBtn" class="btn" style="width:60px;" onclick="toggleScroll()">▶</button>
        <button class="btn" onclick="navSet(1)">❯</button>
        <button class="btn" onclick="cycleFontSize()">A+</button>
    </div>

    <div id="songsMenu" class="full-menu">
        <input type="file" id="importJsonFile" style="display:none" accept="application/json">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <b>SONGS</b>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div style="padding:15px;"><input type="text" id="songSearch" placeholder="Zoek..." oninput="render()" style="width:100%; background:#111; color:#fff; border:1px solid #444; padding:15px; border-radius:8px; font-size:1.2rem;"></div>
        <div id="dbList" class="menu-scroll"></div>
        <div class="menu-footer" style="padding:20px; background:#111; border-top:1px solid #333; display:flex; gap:10px; justify-content:center;">
            <button class="btn" onclick="exportDB()">BACKUP</button>
            <button class="btn" onclick="document.getElementById('importJsonFile').click()">RESTORE</button>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <button class="btn" onclick="addCustomNote()">NOTITIE +</button>
            <b>ACTIEVE SET</b>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div id="setList" class="menu-scroll"></div>
        <div class="menu-footer" style="padding:20px; background:#111; text-align:center;"><button class="btn" onclick="clearSetlist()">WIS ALLES</button></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null, curIdx = -1, isScrolling = false, scrollPos = 0, currentSpeed = 100, startTime = localStorage.getItem('tdfStartTime') || null;

        window.onload = () => { 
            render(); 
            document.getElementById('importJsonFile').addEventListener('change', importDB);
            setInterval(() => {
                document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'});
                if(startTime) document.getElementById('setTimer').innerText = Math.floor((new Date() - new Date(startTime)) / 60000) + "m";
            }, 1000);
            requestAnimationFrame(scrollLoop);
        };

        function render() {
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            const q = document.getElementById('songSearch').value.toLowerCase();
            db.filter(s => s && s.title.toLowerCase().includes(q)).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div'); d.className = "setlist-row";
                d.innerHTML = `<div style="flex:1;" onclick="loadPreview('${s.title.replace(/'/g, "\\'")}')"><b>${s.title}</b></div>
                               <button class="btn" style="margin-right:10px;" onclick="startEdit('${s.title.replace(/'/g, "\\'")}')">✎</button>
                               <button class="btn" onclick="addToSet('${s.title.replace(/'/g, "\\'")}')">+</button>`;
                dbl.appendChild(d);
            });

            const sl = document.getElementById('setList'); sl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "setlist-row";
                const moveBtns = `<div style="display:flex; flex-direction:column; margin-right:15px;">
                                    <button class="btn-move" onclick="moveItem(${i}, -1)">▲</button>
                                    <button class="btn-move" onclick="moveItem(${i}, 1)">▼</button>
                                  </div>`;
                if(s.isNote) {
                    d.style.background = "#2c2c2e";
                    d.innerHTML = `${moveBtns}<div style="flex:1; color:var(--amber); font-weight:bold;">-- ${s.title} --</div><button class="btn" style="border-color:var(--red); color:var(--red);" onclick="setlist.splice(${i},1); save(); render();">X</button>`;
                } else {
                    d.innerHTML = `${moveBtns}<div style="flex:1;" onclick="enterLive(${i})">${i+1}. ${s.title}</div><button class="btn" style="border-color:var(--red); color:var(--red);" onclick="setlist.splice(${i},1); save(); render();">X</button>`;
                }
                sl.appendChild(d);
            });
        }

        function moveItem(idx, dir) {
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= setlist.length) return;
            const item = setlist.splice(idx, 1)[0];
            setlist.splice(newIdx, 0, item);
            save(); render();
        }

        function addCustomNote() {
            const val = prompt("Notitie/Pauze:");
            if (val) { setlist.push({ title: val.toUpperCase(), isNote: true }); save(); render(); }
        }

        function loadPreview(t) { cur = db.find(x=>x.title===t); drawLyrics(false); closeMenus(); document.getElementById('bgLogo').style.display = 'none'; }
        
        function enterLive(index) {
            if (setlist[index].isNote) return;
            curIdx = index; cur = setlist[curIdx];
            if(!startTime) { startTime = new Date().toISOString(); localStorage.setItem('tdfStartTime', startTime); }
            document.getElementById('lyricsArea').classList.add('live-mode');
            document.getElementById('liveFooter').style.display = 'flex';
            document.getElementById('mainTopBar').style.display = 'none';
            document.getElementById('bgLogo').style.display = 'none';
            drawLyrics(true); closeMenus();
        }

        function drawLyrics(isLive) {
            const area = document.getElementById('lyricsArea'); if(!cur) return;
            area.className = (isLive ? 'live-mode ' : '') + 'font-' + (cur.liveSize || 'std');
            area.innerHTML = cur.content.split('\n').map(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') { let e = l.indexOf(']', i); chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1; }
                    else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span style="position:absolute; left:${c.p}ch; color:var(--amber); font-weight:bold;">${c.v}</span>`; });
                return `<div style="height:2.2rem; position:relative;">${r}</div><div style="margin-bottom:25px; font-weight:bold;">${txt || '&nbsp;'}</div>`;
            }).join('');
        }

        function scrollLoop() { if(isScrolling) { scrollPos += (currentSpeed * 0.006); document.getElementById('lyricsArea').scrollTop = scrollPos; } requestAnimationFrame(scrollLoop); }
        function toggleScroll() { isScrolling = !isScrolling; document.getElementById('playBtn').innerText = isScrolling ? "⏸" : "▶"; if(isScrolling) scrollPos = document.getElementById('lyricsArea').scrollTop; }
        function navSet(dir) { let n = curIdx + dir; while (n >= 0 && n < setlist.length && setlist[n].isNote) { n += dir; } if(n >= 0 && n < setlist.length) enterLive(n); }
        function exitLive() { document.getElementById('lyricsArea').classList.remove('live-mode'); document.getElementById('liveFooter').style.display = 'none'; document.getElementById('mainTopBar').style.display = 'flex'; isScrolling = false; }
        function cycleFontSize() { if(!cur) return; const sz = ['sm', 'std', 'lg']; cur.liveSize = sz[(sz.indexOf(cur.liveSize || 'std') + 1) % 3]; save(); drawLyrics(true); }
        function startEdit(t) { cur = db.find(x => x.title === t); if(cur) { document.getElementById('edTitle').innerText = cur.title; document.getElementById('editorArea').value = cur.content; document.getElementById('editorContainer').style.display = 'flex'; } }
        function finishEdit() { cur.content = document.getElementById('editorArea').value; save(); document.getElementById('editorContainer').style.display = 'none'; drawLyrics(false); render(); }
        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }
        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); render(); showToast("SET +1"); } }
        function clearSetlist() { if(confirm("Setlist wissen?")) { setlist = []; startTime = null; localStorage.removeItem('tdfStartTime'); save(); render(); } }
        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 1000); }
        function exportDB() { const b = new Blob([JSON.stringify(db)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `tdf_backup.json`; a.click(); }
        function importDB(e) { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (ev) => { try { db = JSON.parse(ev.target.result); save(); render(); showToast("OK"); } catch(err) { showToast("FOUT"); } }; r.readAsText(f); }
    </script>
</body>
</html>
