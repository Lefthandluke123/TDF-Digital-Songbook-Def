<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v8.50</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --amber-dim: #cc9900; --red: #c12718; --grey: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        /* HEADER */
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; z-index: 3000; }
        .logo-box { width: 60px; height: 60px; margin-right: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-shadow: 0 0 5px var(--amber); font-size: 1rem; }
        .btn-green { background: #25D366; color: white; border: none; }
        .btn-red { border: 1px solid var(--red); color: var(--red); background: none; border-radius: 8px; }

        /* VIEWER AREA */
        .main-container { flex: 1; height: calc(100vh - 85px); background: #fff; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; -webkit-overflow-scrolling: touch; }
        #editorArea { display: none; height: 60%; width: 100%; padding: 25px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; resize: none; font-family: monospace; }
        
        #tagEditor { display: none; background: #222; padding: 15px 25px; border-top: 3px solid var(--amber); height: 40%; flex-direction: column; gap: 10px; z-index: 4000; }

        /* LIVE OVERLAY */
        #liveView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 15000; overflow-y: auto; padding: 120px 35px 400px 35px; }
        #liveView .lyric-line { font-size: 2.2rem; line-height: 1.2; margin-bottom: 35px; color: #eee; font-weight: bold; white-space: pre-wrap; word-wrap: break-word; }
        #liveView .chord-row { font-size: 2.8rem; height: 3.2rem; margin-bottom: 5px; color: var(--amber); white-space: pre; }
        
        #liveView.only-chords .lyric-line { display: none; }
        #liveView.only-chords .chord-row { font-size: 5rem; height: 6.5rem; margin-bottom: 50px; }
        
        .live-controls { position: fixed; top: 0; left: 0; width: 100%; background: rgba(15,15,15,0.95); padding: 15px; display: flex; align-items: center; justify-content: space-between; z-index: 16000; border-bottom: 2px solid #333; backdrop-filter: blur(10px); gap: 10px; }
        .scroll-slider { -webkit-appearance: none; flex: 1; height: 12px; background: #333; border-radius: 10px; outline: none; border: 1px solid #444; }
        .scroll-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 35px; height: 35px; background: var(--amber); border-radius: 50%; }
        .speed-label { color: var(--amber); font-weight: bold; font-size: 1.4rem; min-width: 45px; text-align: center; }
        .time-display { font-size: 1.2rem; font-weight: bold; min-width: 85px; text-align: right; cursor: pointer; color: #fff; }

        /* MENUS */
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-header { padding: 20px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .menu-scroll { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        
        .row-item { background: #1c1c1e; margin-bottom: 12px; border-radius: 10px; border: 1px solid #333; display: flex; align-items: center; }
        .row-name { flex: 1; padding: 22px; font-size: 1.8rem; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .drag-handle { padding: 22px; color: var(--amber); font-size: 2.2rem; cursor: move; }

        .chord-row { color: var(--red); font-weight: bold; height: 1.8rem; position: relative; }
        .chord-item { position: absolute; }
        .lyric-line { margin-bottom: 22px; display: block; white-space: pre; }

        .draggable-box { position: fixed; background: #1a1a1a; border-radius: 15px; padding: 12px; display: none; z-index: 50000; border: 2px solid #444; }
        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; display: none; z-index: 60000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center;">
            <div class="logo-box" onclick="location.reload()"><img src="logo.png" alt="TDF"></div>
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" style="margin-left:10px;" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; font-size: 1.2rem; text-align:center; flex:1;">TDF v8.50</div>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="border-color:#34c759; color:#34c759;" onclick="enterLiveView()">LIVE</button>
            <button class="btn" onclick="startEdit()">✎</button>
            <button class="btn" id="saveBtn" style="display:none; color:#34c759;" onclick="finishEdit()">OK</button>
        </div>
    </div>

    <div id="toast">Bericht</div>

    <div class="main-container">
        <div id="lyricsArea">Selecteer een liedje of importeer JSON/TXT bestanden.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
        <div id="tagEditor">
            <div id="tagSuggestions" style="display:flex; gap:10px; overflow-x:auto;"></div>
            <input type="text" id="tagInput" style="width:100%; padding:15px; background:#000; color:var(--amber); border:1px solid #444; border-radius:10px;" placeholder="Tags...">
        </div>
    </div>

    <div id="liveView">
        <div class="live-controls">
            <button class="btn-red" style="padding:10px 20px;" onclick="exitLiveView()">X</button>
            <button class="btn" onclick="navSong(-1)">&lt;</button>
            <button id="playBtn" class="btn" style="width:60px" onclick="toggleScroll()">▶</button>
            <button class="btn" onclick="navSong(1)">&gt;</button>
            <input type="range" id="scrollSpeed" class="scroll-slider" min="0" max="15" step="0.1" value="0" oninput="updateSpeedLabel()">
            <div class="speed-label" id="speedValue">0.0</div>
            <button class="btn" id="chordToggleBtn" onclick="toggleOnlyChords()">CHORDS</button>
            <div id="liveClock" class="time-display" onclick="toggleTimeMode()">00:00</div>
        </div>
        <div id="liveContent"></div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div class="menu-header"><h2>SONGS</h2><button class="btn" onclick="closeMenus()">X</button></div>
        <div class="menu-scroll" id="dbList"></div>
        <div style="padding:20px; background:#111; display:flex; gap:10px;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impAny').click()">IMPORT</button>
            <button class="btn-red" style="flex:1;" onclick="cleanDatabase()">CLEAN</button>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div class="menu-header"><h2>SETLIST</h2><button class="btn" onclick="closeMenus()">X</button></div>
        <div class="menu-scroll" id="setList"></div>
        <div style="padding:10px; background:#111; display:flex; gap:10px;">
            <button class="btn-green" style="flex:1;" onclick="pasteFromWA()">PLAK WA</button>
        </div>
    </div>

    <div id="joyPad" class="draggable-box" style="top:200px; left:40px;">
        <div class="drag-handle" style="text-align:center; padding:5px; background:#333; border-radius:5px; margin-bottom:10px;">DRAG</div>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
            <div></div><button class="btn" onclick="moveCursorVertical(-1)">↑</button><div></div>
            <button class="btn" onclick="moveCursorHorizontal(-1)">←</button><div></div><button class="btn" onclick="moveCursorHorizontal(1)">→</button>
            <div></div><button class="btn" onclick="moveCursorVertical(1)">↓</button><div></div>
        </div>
    </div>

    <input type="file" id="impAny" multiple style="display:none;" onchange="importAnyFile(event)">

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null, draggingIdx = null, isScrolling = false, setStartTime = 0, isTimerMode = false;

        window.onload = () => { render(); startAutoScrollLoop(); startClockLoop(); initDrag(document.getElementById('joyPad')); };

        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }

        function render() {
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            db.sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div class="row-name" onclick="loadSong('${s.title.replace(/'/g,"\\")}')">${s.title}</div><button class="btn" onclick="addToSet('${s.title.replace(/'/g,"\\")}')">+</button>`;
                dbl.appendChild(d);
            });
            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "row-item"; d.draggable = true;
                d.innerHTML = `<div class="drag-handle">≡</div><div class="row-name" onclick="loadSong('${s.title.replace(/'/g,"\\")}')">${i+1}. ${s.title}</div><button class="btn-red" style="margin-right:10px" onclick="removeFromSet(${i})">X</button>`;
                d.ondragstart = () => { draggingIdx = i; };
                d.ondrop = (e) => { e.preventDefault(); const item = setlist.splice(draggingIdx, 1)[0]; setlist.splice(i, 0, item); save(); render(); };
                d.ondragover = (e) => e.preventDefault();
                setl.appendChild(d);
            });
        }

        function loadSong(t) { cur = db.find(x=>x.title===t) || setlist.find(x=>x.title===t); if(cur) { document.getElementById('title').innerText = cur.title; drawLyrics(document.getElementById('lyricsArea')); closeMenus(); } }
        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); showToast("Toegevoegd!"); } }
        function removeFromSet(i) { setlist.splice(i, 1); save(); render(); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 1000); }

        function drawLyrics(container) {
            if(!cur) return;
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;}
                        chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            container.innerHTML = h; container.scrollTop = 0;
        }

        function importAnyFile(e) {
            const files = Array.from(e.target.files);
            if(!files.length) return;
            
            files.forEach(f => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const content = event.target.result;
                    const ext = f.name.split('.').pop().toLowerCase();

                    if(ext === 'json') {
                        try {
                            const parsed = JSON.parse(content);
                            if(Array.isArray(parsed)) {
                                parsed.forEach(s => { if(s.title && s.content) db.push(s); });
                            } else {
                                if(parsed.title && parsed.content) db.push(parsed);
                            }
                        } catch(err) { console.error("JSON Error"); }
                    } else {
                        let t = f.name.replace(/\.[^/.]+$/, "");
                        const m = content.match(/\{(?:title|t):\s*(.*)\}/i);
                        db.push({title: m ? m[1] : t, content: content, tags: "", scrollSpeed: 0});
                    }
                    save(); render();
                };
                reader.readAsText(f);
            });
            showToast("Geladen!");
        }

        function enterLiveView() { 
            if(!cur) return; 
            document.getElementById('liveView').style.display = 'block'; 
            drawLyrics(document.getElementById('liveContent')); 
            document.getElementById('scrollSpeed').value = cur.scrollSpeed || 0; 
            if(!setStartTime) setStartTime = Date.now(); 
            isScrolling = false; updateSpeedLabel(); document.getElementById('playBtn').innerText = "▶"; 
        }

        function exitLiveView() { saveCurrentSpeed(); isScrolling = false; document.getElementById('liveView').style.display = 'none'; }
        function toggleScroll() { isScrolling = !isScrolling; document.getElementById('playBtn').innerText = isScrolling ? "⏸" : "▶"; }
        function updateSpeedLabel() { document.getElementById('speedValue').innerText = parseFloat(document.getElementById('scrollSpeed').value).toFixed(1); }
        function saveCurrentSpeed() { if(cur) { const s = parseFloat(document.getElementById('scrollSpeed').value); cur.scrollSpeed = s; let idx = db.findIndex(x => x.title === cur.title); if(idx !== -1) db[idx].scrollSpeed = s; save(); }}

        function navSong(dir) { 
            saveCurrentSpeed(); 
            const idx = setlist.findIndex(s => s.title === cur.title); 
            const nIdx = idx + dir; 
            if(nIdx >= 0 && nIdx < setlist.length) { 
                cur = setlist[nIdx]; 
                document.getElementById('title').innerText = cur.title; 
                drawLyrics(document.getElementById('liveContent')); 
                document.getElementById('scrollSpeed').value = cur.scrollSpeed || 0; 
                isScrolling = false; updateSpeedLabel(); document.getElementById('playBtn').innerText = "▶"; 
                document.getElementById('liveView').scrollTop = 0; 
            } 
        }

        function startAutoScrollLoop() { const lv = document.getElementById('liveView'); const sp = document.getElementById('scrollSpeed'); function step() { if(lv.style.display==='block' && isScrolling && sp.value > 0) { lv.scrollTop += Math.pow(parseFloat(sp.value), 1.5) / 12; } requestAnimationFrame(step); } requestAnimationFrame(step); }
        function startClockLoop() { setInterval(() => { const clock = document.getElementById('liveClock'); if(!isTimerMode) { clock.innerText = new Date().toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'}); } else { const diff = Date.now() - setStartTime; const m = Math.floor((diff % 3600000) / 60000); const s = Math.floor((diff % 60000) / 1000); clock.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }}, 1000); }
        function toggleTimeMode() { isTimerMode = !isTimerMode; document.getElementById('liveClock').style.color = isTimerMode ? "var(--amber)" : "#fff"; }
        
        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editorArea').style.display='block'; document.getElementById('tagEditor').style.display='flex'; document.getElementById('editorArea').value=cur.content; document.getElementById('saveBtn').style.display='block'; document.getElementById('joyPad').style.display='block'; }
        function finishEdit() { cur.content=document.getElementById('editorArea').value; save(); document.getElementById('lyricsArea').style.display='block'; document.getElementById('editorArea').style.display='none'; document.getElementById('tagEditor').style.display='none'; document.getElementById('saveBtn').style.display='none'; document.getElementById('joyPad').style.display='none'; drawLyrics(document.getElementById('lyricsArea')); }
        function toggleOnlyChords() { const lv = document.getElementById('liveView'); lv.classList.toggle('only-chords'); document.getElementById('chordToggleBtn').innerText = lv.classList.contains('only-chords') ? "LYRICS" : "CHORDS"; }
        
        function moveCursorHorizontal(n) { const ed = document.getElementById('editorArea'); ed.selectionStart = ed.selectionEnd = ed.selectionStart + n; ed.focus(); }
        function moveCursorVertical(n) { const ed = document.getElementById('editorArea'); const lines = ed.value.split('\n'); const pos = ed.selectionStart; let curL = ed.value.substr(0, pos).split('\n').length - 1; let tarL = Math.max(0, Math.min(lines.length - 1, curL + n)); let newP = 0; for(let i=0; i<tarL; i++) newP += lines[i].length + 1; ed.selectionStart = ed.selectionEnd = newP; ed.focus(); }
        function initDrag(el) { const h = el.querySelector('.drag-handle'); let p1=0,p2=0,p3=0,p4=0; h.onmousedown = h.ontouchstart = (e) => { e.preventDefault(); p3=e.clientX||(e.touches?e.touches[0].clientX:0); p4=e.clientY||(e.touches?e.touches[0].clientY:0); document.onmouseup=document.ontouchend=()=>{document.onmousemove=document.ontouchmove=null;}; document.onmousemove=document.ontouchmove=(me)=>{p1=p3-(me.clientX||(me.touches?me.touches[0].clientX:0)); p2=p4-(me.clientY||(me.touches?me.touches[0].clientY:0)); p3=me.clientX||(me.touches?me.touches[0].clientX:0); p4=me.clientY||(me.touches?me.touches[0].clientY:0); el.style.top=(el.offsetTop-p2)+"px"; el.style.left=(el.offsetLeft-p1)+"px";}} }
        function pasteFromWA() { navigator.clipboard.readText().then(text => { if(!text) return; setlist = text.split('\n').map(l => { const t = l.replace(/^\d+[\s.)]*/, '').trim(); const s = db.find(x => x.title.toLowerCase() === t.toLowerCase()); return s ? JSON.parse(JSON.stringify(s)) : {title: t, content: "", tags: "", scrollSpeed: 0}; }).filter(x => x.title); save(); render(); }); }
        function cleanDatabase() { const unique = new Set(); const cleaned = []; db.forEach(s => { if(s.title && !unique.has(s.title.toLowerCase())) { unique.add(s.title.toLowerCase()); cleaned.push(s); }}); db = cleaned; save(); render(); }
    </script>
</body>
</html>
