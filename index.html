<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Stage Pilot v6.69</title>
    <style>
        :root { 
            --bg-dark: #121212; --top-bar-bg: #1a1a1a;
            --griffin-orange: #d48e3d; --griffin-red: #c12718; 
            --header-height: 85px;
            --lyric-bg: #ffffff; --lyric-text: #000000;
        }
        [data-theme="dark"] { --lyric-bg: #000000; --lyric-text: #ffffff; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
        body { font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace; display: flex; flex-direction: column; padding-top: var(--header-height); }

        /* Top Bar */
        .top-bar { 
            position: fixed; top: 0 !important; left: 0; width: 100%; height: var(--header-height); 
            background: var(--top-bar-bg); border-bottom: 1px solid #333; 
            display: flex; align-items: flex-end; justify-content: space-between; 
            padding: 0 15px 12px 15px; z-index: 20000; 
        }
        .top-bar-left, .top-bar-right { display: flex; align-items: center; gap: 12px; }
        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .top-bar-icon { width: 28px; height: 28px; fill: var(--griffin-orange); cursor: pointer; }
        #appLogo { height: 42px; width: auto; max-width: 80px; object-fit: contain; cursor: pointer; }

        /* Menu */
        .songs-menu { 
            position: fixed; top: 0; left: -33.33%; width: 33.33%; height: 100%; 
            background: #1c1c1e; z-index: 30000; transition: left 0.3s ease; 
            display: flex; flex-direction: column; padding-top: calc(50px + env(safe-area-inset-top)); 
        }
        .songs-menu.open { left: 0; }
        @media (max-width: 768px) { .songs-menu { width: 85%; left: -85%; } }
        
        .menu-nav-section { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0; }
        .manage-btn { width: 100%; padding: 15px; background: none; border: 2px solid var(--griffin-orange); color: var(--griffin-orange); border-radius: 10px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }

        #tagBar { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 15px; background: #242426; border-bottom: 1px solid #444; max-height: 120px; overflow-y: auto; flex-shrink: 0; }
        .tag-pill { padding: 6px 14px; border-radius: 20px; background: #333; color: #aaa; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; }
        .tag-pill.active { background: var(--griffin-orange); color: black; font-weight: bold; }

        #indexContent { flex-grow: 1; overflow-y: auto; background: #121212; }
        .index-item { width: 100%; border-bottom: 1px solid #222; padding: 18px 20px; background: #1c1c1e; color: #eee; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        
        #bulkActions { display: none; padding: 15px; background: #2c2c2e; border-top: 2px solid var(--griffin-orange); flex-direction: column; gap: 10px; flex-shrink: 0; }
        .quick-tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .quick-tag { padding: 5px 10px; background: #444; color: #ddd; border-radius: 5px; font-size: 0.75rem; cursor: pointer; }

        /* Floating Toolbar */
        #editorToolbar { 
            display: none; position: fixed; top: var(--header-height); left: 0; width: 100%; 
            background: rgba(26, 26, 26, 0.85); border-bottom: 2px solid var(--griffin-orange); 
            z-index: 25000; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .chord-bar { display: flex; overflow-x: auto; padding: 10px; gap: 8px; border-bottom: 1px solid #333; }
        .chord-btn { background: #333; color: white; border: 1px solid #555; padding: 8px 14px; border-radius: 6px; font-weight: bold; min-width: 50px; }
        
        .joystick-container { display: flex; justify-content: center; padding: 12px; gap: 30px; align-items: center; }
        .joy-btn { background: var(--griffin-orange); color: black; border: none; width: 42px; height: 42px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* Editor Area */
        #editorArea { display: none; width: 100%; height: calc(100vh - var(--header-height)); padding: 210px 30px 400px 30px; font-family: ui-monospace, monospace; font-size: 1.35rem; line-height: 1.35; border: none; outline: none; background: var(--lyric-bg); color: var(--lyric-text); overflow-y: auto; }
        #lyricsArea { padding: 30px; font-family: ui-monospace, monospace; font-size: 1.35rem; line-height: 1.35; color: var(--lyric-text); width: 100%; }
        .lyrics-container { background: var(--lyric-bg); width: 100%; height: calc(100vh - var(--header-height)); overflow-y: auto; }

        .chord-row { position: relative; height: 1.5rem; color: var(--griffin-red); font-weight: bold; margin-bottom: -5px; }
        .chord-item { position: absolute; white-space: pre; font-size: 1.1rem; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 15px; min-height: 1.2rem; }
    </style>
</head>
<body data-theme="light">
    <input type="file" id="bulkFiles" accept=".txt" multiple style="display:none;">
    <input type="file" id="logoInput" accept="image/png" style="display:none;">

    <div class="top-bar">
        <div class="top-bar-left">
            <img id="appLogo" alt="TDF" onclick="$('logoInput').click()">
            <button class="top-bar-btn" id="btnShowMenu">Songs</button>
        </div>
        <div class="top-bar-center">
            <h2 id="displayTitle" style="margin:0; color:white; font-size:1.1rem;">Stage Pilot v6.69</h2>
            <div id="tpControl" style="margin-top:4px; display:inline-flex; align-items:center; gap:8px; background:#2c2c2e; padding:3px 10px; border-radius:20px; border:1px solid #444;">
                <button class="top-bar-btn" id="btnTpMinus">−</button>
                <span id="tpVal" style="color:white; font-size:0.9rem;">0</span>
                <button class="top-bar-btn" id="btnTpPlus">+</button>
            </div>
        </div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" id="scrollBtn" viewBox="0 0 24 24" style="fill:#34c759;"><path d="M8 5v14l11-7z"/></svg>
            <svg class="top-bar-icon" id="editIcon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
            <button class="top-bar-btn" id="saveBtn" style="display:none;">GEREED</button>
            <svg class="top-bar-icon" id="btnImport" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div class="menu-nav-section">
            <button class="top-bar-btn" id="btnCloseMenu" style="margin-bottom:15px;">SLUIT</button>
            <button class="manage-btn" id="tagModeBtn">TAGS BEHEREN</button>
        </div>
        <div id="tagBar"></div>
        <div id="indexContent"></div>
        <div id="bulkActions">
            <div id="quickTags" class="quick-tag-list"></div>
            <input type="text" id="bulkTagInput" placeholder="Nieuwe tag..." style="background:#121212; color:white; border:1px solid #444; padding:12px; border-radius:8px; margin:10px 0; width:100%;">
            <button class="top-bar-btn" style="background:var(--griffin-orange); color:black; padding:12px; border-radius:8px; width:100%;" id="btnExecuteTag">VOEG TAG TOE</button>
            <button class="top-bar-btn" style="background:var(--griffin-red); color:white; padding:8px; border-radius:8px; font-size:0.8rem; margin-top:5px; width:100%;" id="btnClearTags">WIS SELECTIE TAGS</button>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Selecteer een liedje.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <div id="editorToolbar">
        <div class="chord-bar" id="chordBar"></div>
        <div class="joystick-container">
            <button class="joy-btn" id="joyLeft">←</button>
            <button class="joy-btn" id="joyUp">↑</button>
            <button class="joy-btn" id="joyDown">↓</button>
            <button class="joy-btn" id="joyRight">→</button>
        </div>
    </div>

    <script>
        const APP_VERSION = "6.69";
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let cur = null, tOff = 0, sInt = null, tagMode = false, activeTag = null;
        const $ = (id) => document.getElementById(id);
        const chordsList = ["A","Am","B","Bm","C","Cm","D","Dm","E","Em","F","Fm","G","Gm","G7","A7","D7","C7"];

        window.onload = () => {
            const logo = localStorage.getItem('tdfLogo');
            if(logo) { $('appLogo').src = logo; $('appLogo').style.display = 'block'; }
            renderIndex(); renderTagBar(); buildChordBar();
            
            $('btnShowMenu').onclick = toggleMenu;
            $('btnCloseMenu').onclick = toggleMenu;
            $('tagModeBtn').onclick = toggleTagMode;
            $('btnExecuteTag').onclick = () => applyBulkTag($('bulkTagInput').value);
            $('btnClearTags').onclick = clearSelectionTags;
            $('btnTpMinus').onclick = () => transpose(-1);
            $('btnTpPlus').onclick = () => transpose(1);
            $('scrollBtn').onclick = toggleScroll;
            $('editIcon').onclick = startEdit;
            $('saveBtn').onclick = finishEdit;
            $('btnImport').onclick = () => $('bulkFiles').click();
            
            $('logoInput').onchange = (e) => {
                const r = new FileReader();
                r.onload = (ev) => { localStorage.setItem('tdfLogo', ev.target.result); $('appLogo').src = ev.target.result; $('appLogo').style.display = 'block'; };
                r.readAsDataURL(e.target.files[0]);
            };

            const joyEvent = (id, fn) => {
                $(id).onmousedown = (e) => { e.preventDefault(); fn(); };
                $(id).ontouchstart = (e) => { e.preventDefault(); fn(); };
            };
            joyEvent('joyLeft', () => moveCursor(-1));
            joyEvent('joyRight', () => moveCursor(1));
            joyEvent('joyUp', () => moveLine(-1));
            joyEvent('joyDown', () => moveLine(1));
        };

        function buildChordBar() {
            chordsList.forEach(c => {
                const b = document.createElement('button'); b.className = 'chord-btn'; b.textContent = c;
                const insert = (e) => { e.preventDefault(); insertText(`[${c}]`); };
                b.onmousedown = insert; b.ontouchstart = insert;
                $('chordBar').appendChild(b);
            });
        }

        function insertText(t) {
            const ed = $('editorArea'), p = ed.selectionStart;
            ed.value = ed.value.slice(0, p) + t + ed.value.slice(ed.selectionEnd);
            ed.selectionStart = ed.selectionEnd = p + t.length;
            ed.focus();
        }

        function moveCursor(d) { const ed = $('editorArea'); ed.selectionStart = ed.selectionEnd = ed.selectionStart + d; ed.focus(); }
        function moveLine(d) {
            const ed = $('editorArea'), lines = ed.value.split('\n'), pos = ed.selectionStart;
            let curLine = ed.value.substr(0, pos).split('\n').length - 1;
            let col = pos - ed.value.lastIndexOf('\n', pos - 1) - 1;
            let targetLine = Math.max(0, Math.min(lines.length - 1, curLine + d));
            let newPos = 0;
            for(let i=0; i<targetLine; i++) newPos += lines[i].length + 1;
            ed.selectionStart = ed.selectionEnd = newPos + Math.min(col, lines[targetLine].length);
            ed.focus();
        }

        function extractTags(text) {
            const m = text.match(/#([a-zA-Z0-9]+)/g);
            return m ? [...new Set(m.map(x => x.substring(1).toLowerCase()))] : [];
        }

        function renderTagBar() {
            const bar = $('tagBar'), quick = $('quickTags'); let tags = new Set();
            db.forEach(s => extractTags(s.content).forEach(t => tags.add(t)));
            bar.innerHTML = `<div class="tag-pill ${!activeTag?'active':''}" onclick="filterTag(null)">ALLES</div>`;
            quick.innerHTML = "";
            Array.from(tags).sort().forEach(t => {
                const p = document.createElement('div'); p.className = `tag-pill ${activeTag===t?'active':''}`;
                p.textContent = t.toUpperCase(); p.onclick = () => filterTag(t); bar.appendChild(p);
                const qp = document.createElement('div'); qp.className = 'quick-tag'; qp.textContent = "#"+t.toUpperCase();
                qp.onclick = () => applyBulkTag(t); quick.appendChild(qp);
            });
        }

        function renderIndex() {
            const c = $('indexContent'); c.innerHTML = "";
            let s = [...db].sort((a,b) => a.title.localeCompare(b.title));
            if(activeTag) s = s.filter(x => extractTags(x.content).includes(activeTag));
            s.forEach((x, i) => {
                const div = document.createElement('div');
                div.innerHTML = `<div class="index-item" onclick="handleItemClick(this, '${x.title.replace(/'/g,"\\'")}')">
                    <input type="checkbox" class="tag-checkbox" data-title="${x.title}" ${tagMode?'':'style="display:none"'} onclick="event.stopPropagation()">
                    <span>${x.title}</span><div style="color:var(--griffin-orange)">⋮</div>
                </div>
                <div class="item-actions" id="act-${i}" style="display:none; padding:10px; gap:10px; background:#2c2c2e;">
                    <button class="action-btn" style="background:#444; border:none; padding:10px; color:white; border-radius:5px;" onclick="loadSong('${x.title.replace(/'/g,"\\'")}')">OPEN</button>
                    <button class="action-btn" style="background:var(--griffin-orange); border:none; padding:10px; color:black; border-radius:5px;" onclick="renameSong('${x.title.replace(/'/g,"\\'")}')">NAAM</button>
                    <button class="action-btn" style="background:var(--griffin-red); border:none; padding:10px; color:white; border-radius:5px;" onclick="deleteSong('${x.title.replace(/'/g,"\\'")}')">WIS</button>
                </div>`;
                c.appendChild(div);
            });
        }

        function handleItemClick(el, title) {
            if(tagMode) { const cb = el.querySelector('.tag-checkbox'); cb.checked = !cb.checked; }
            else { const act = el.nextElementSibling; const vis = act.style.display === 'block'; document.querySelectorAll('.item-actions').forEach(a => a.style.display='none'); act.style.display = vis ? 'none' : 'block'; }
        }

        function applyBulkTag(t) {
            const tag = t.trim().toLowerCase().replace('#',''); if(!tag) return;
            document.querySelectorAll('.tag-checkbox:checked').forEach(cb => {
                const s = db.find(x => x.title === cb.dataset.title);
                if(s && !extractTags(s.content).includes(tag)) s.content += "\n\n#" + tag;
            });
            saveRefresh();
        }

        function clearSelectionTags() {
            if(!confirm("Wis alle tags van selectie?")) return;
            document.querySelectorAll('.tag-checkbox:checked').forEach(cb => {
                const s = db.find(x => x.title === cb.dataset.title);
                if(s) s.content = s.content.replace(/#[a-zA-Z0-9]+/g, '').trim();
            });
            saveRefresh(); toggleTagMode();
        }

        function loadSong(t) { cur = db.find(s => s.title === t); tOff = 0; $('tpVal').textContent = "0"; $('displayTitle').textContent = cur.title; draw(); toggleMenu(); }
        function toggleTagMode() { tagMode = !tagMode; $('tagModeBtn').textContent = tagMode?"KLAAR":"TAGS BEHEREN"; $('bulkActions').style.display = tagMode?"flex":"none"; renderIndex(); }
        function saveRefresh() { localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); renderTagBar(); }
        function filterTag(t) { activeTag = t; renderIndex(); renderTagBar(); }
        function toggleMenu() { $('songsMenu').classList.toggle('open'); }
        function transpose(o) { tOff += o; $('tpVal').textContent = (tOff>0?"+":"")+tOff; draw(); }

        function draw() {
            if(!cur) return; const lines = cur.content.replace(/#[a-zA-Z0-9]+/g, '').trim().split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;}
                        let c = l.substring(i+1, e); if(tOff!==0) c = tpChord(c, tOff);
                        chords.push({p: txt.length, v: c}); i = e+1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            $('lyricsArea').innerHTML = h; $('scroller').scrollTop = 0;
        }

        function startEdit() { if(!cur) return; $('lyricsArea').style.display='none'; $('editIcon').style.display='none'; $('saveBtn').style.display='block'; $('editorArea').style.display='block'; $('editorToolbar').style.display='block'; $('editorArea').value=cur.content; }
        function finishEdit() { const i = db.findIndex(s=>s.title===cur.title); db[i].content = $('editorArea').value; saveRefresh(); $('lyricsArea').style.display='block'; $('editIcon').style.display='block'; $('saveBtn').style.display='none'; $('editorArea').style.display='none'; $('editorToolbar').style.display='none'; draw(); }
        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() { const c = $('scroller'), h = c.scrollHeight-c.clientHeight; let d = 180, s = h/(d*1000), t = Date.now(), p = c.scrollTop; $('scrollBtn').style.fill = 'var(--griffin-red)'; sInt = setInterval(() => { c.scrollTop = p + ((Date.now()-t)*s); if(c.scrollTop >= h) stopScroll(); }, 50); }
        function stopScroll() { clearInterval(sInt); sInt = null; $('scrollBtn').style.fill = "#34c759"; }

        function tpChord(c, o) {
            const n = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
            return c.replace(/[A-G][#b]?/g, m => {
                let x = m; if(x==="Bb")x="A#"; if(x==="Eb")x="D#"; if(x==="Ab")x="G#"; if(x==="Db")x="C#"; if(x==="Gb")x="F#";
                let i = n.indexOf(x); if(i===-1) return m;
                let j = (i+o)%12; while(j<0)j+=12; return n[j];
            });
        }

        $('bulkFiles').onchange = async (e) => {
            for(let f of Array.from(e.target.files)) {
                const t = await f.text(), fl = t.split('\n')[0].replace(/[\[\]\r]/g, '').trim();
                db.push({title: fl || f.name.replace('.txt',''), content: t});
            }
            saveRefresh();
        };
    </script>
</body>
</html>
