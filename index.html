<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v9.55</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --grey: #121212; --row-bg: #1c1c1e; --red: #ff3b30; --green: #25D366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        /* Top Bar Herstel */
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; flex-shrink: 0; z-index: 4000; }
        .top-left { display: flex; align-items: center; gap: 10px; flex: 1.5; }
        .top-center { flex: 2; text-align: center; font-weight: bold; color: #fff; font-size: 1.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .top-right { display: flex; align-items: center; gap: 8px; flex: 1.5; justify-content: flex-end; }

        .logo-img { height: 45px; width: auto; cursor: pointer; display: block; }

        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-sm { padding: 5px 8px; font-size: 1.1rem; min-width: 44px; }
        .btn-danger { border-color: var(--red); color: var(--red); }

        .main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #fff; }
        
        /* Watermerk met knipper-animatie */
        @keyframes pulseWatermark { 0% { opacity: 0.05; } 50% { opacity: 0.15; } 100% { opacity: 0.05; } }
        .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; opacity: 0.1; pointer-events: none; z-index: 0; animation: pulseWatermark 4s infinite ease-in-out; }

        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; position: relative; z-index: 1; background: transparent; }

        #editorContainer { display: none; flex: 1; flex-direction: column; background: #000; z-index: 10; }
        .chord-bar { height: 60px; background: #222; padding: 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #444; }
        .chord-btn { background: #333; color: var(--amber); border: 1px solid var(--amber); padding: 8px 12px; border-radius: 6px; font-weight: bold; min-width: 50px; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; resize: none; outline: none; font-family: monospace; }

        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-scroll { flex: 1; overflow-y: auto; }

        .search-area { padding: 15px 20px; background: #111; border-bottom: 1px solid #333; display: flex; flex-direction: column; gap: 12px; }
        .search-bar { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; }
        
        .tag-action-row { display: flex; gap: 8px; align-items: center; margin-bottom: 5px; }
        #tagList { display: flex; overflow-x: auto; white-space: nowrap; gap: 8px; padding-bottom: 10px; flex: 1; }
        .tag-pill { display: inline-block; padding: 8px 16px; background: #333; color: #aaa; border-radius: 20px; font-size: 0.85rem; cursor: pointer; border: 1px solid transparent; }
        .tag-pill.active { background: var(--amber); color: #000; font-weight: bold; }
        .new-tag-input { background: #000; border: 1px solid #444; color: var(--amber); padding: 6px 10px; border-radius: 20px; width: 100px; font-size: 0.8rem; }

        .swipe-container { position: relative; overflow: hidden; background: var(--red); margin-bottom: 2px; }
        .row-item { background: var(--row-bg); display: flex; align-items: center; padding: 15px 20px; min-height: 75px; position: relative; z-index: 2; transition: transform 0.2s ease-out; touch-action: pan-y; }
        
        /* XL Setlist Title */
        .setlist-title { font-size: 1.8rem; font-weight: bold; display: block; }
        
        .delete-btn { position: absolute; right: 0; top: 0; height: 100%; width: 80px; background: var(--red); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; }

        .select-check { display: none; transform: scale(1.8); margin-right: 25px; accent-color: var(--amber); }
        .is-selecting .select-check { display: block; }

        .edit-only-container { display: none; flex-direction: column; margin-right: 15px; }
        .is-editing .edit-only-container { display: flex; }

        .menu-footer { padding: 15px; background: #111; border-top: 1px solid #333; display: flex; gap: 10px; justify-content: space-around; flex-wrap: wrap; }
        #toast { position: fixed; top: 95px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 10001; display: none; }

        #liveFooter { height: 110px; background: #111; border-top: 2px solid #333; display: none; align-items: center; justify-content: space-between; padding: 0 25px; flex-shrink: 0; z-index: 5000; }
        .wheel-wrap { position: relative; width: 110px; height: 85px; background: #000; border: 1px solid #444; border-radius: 12px; overflow: hidden; touch-action: none; }
        .wheel-strip { position: absolute; width: 100%; text-align: center; top: 0; left: 0; pointer-events: none; }
        .wheel-num { height: 28px; line-height: 28px; font-size: 1.1rem; color: #444; }
        .wheel-num.active { color: var(--amber); font-size: 1.7rem; font-weight: 900; }
        .wheel-overlay { position: absolute; width: 100%; height: 30px; top: 27px; border-top: 1px solid var(--amber); border-bottom: 1px solid var(--amber); background: rgba(255,191,0,0.05); z-index: 5; pointer-events: none; }

        #liveView { display: none; flex: 1; background: #000; overflow-y: auto; padding: 100px 35px 400px 35px; z-index: 20; }
    </style>
</head>
<body>

    <div id="toast">MELDING</div>

    <div class="top-bar">
        <div class="top-left">
            <img src="logo.png" class="logo-img" onclick="location.reload()" alt="TDF">
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" class="top-center">Gebruik het menu.</div>
        <div class="top-right">
            <button class="btn" id="editBtn" onclick="startEdit()">✎</button>
            <button class="btn" id="saveBtn" style="display:none; color:var(--green); border-color:var(--green);" onclick="finishEdit()">OK</button>
            <button class="btn" id="liveBtn" style="background:var(--amber); color:#000;" onclick="enterLiveView()">LIVE</button>
        </div>
    </div>

    <div class="main-container">
        <img src="logo.png" class="watermark" alt="">
        <div id="lyricsArea">Gebruik het SONGS of SET menu om een liedje te laden.</div>
        <div id="editorContainer">
            <div class="chord-bar" id="chordBar"></div>
            <div style="padding:10px 15px; background:#222;"><input type="text" id="tagField" style="width:100%; background:#000; border:1px solid #444; color:var(--amber); padding:10px; border-radius:6px;" placeholder="Tags (komma gescheiden)..."></div>
            <textarea id="editorArea" spellcheck="false"></textarea>
        </div>
        <div id="liveView"><div id="liveContent"></div></div>
    </div>

    <div id="liveFooter">
        <button class="btn" style="border-radius:50%; width:55px; height:55px; font-size:1.5rem;" onclick="exitLiveView()">X</button>
        <button id="playBtn" class="btn" style="width:75px; font-size:1.8rem; height:55px;" onclick="toggleScroll()">▶</button>
        <div class="wheel-wrap" id="thumbWheel">
            <div class="wheel-overlay"></div>
            <div class="wheel-strip" id="wheelStrip"></div>
        </div>
        <div id="liveClock" style="font-weight:bold; font-size:1.3rem; color:var(--amber);">00:00</div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <button class="btn" id="selectBtn" onclick="toggleSelectMode()">SELECT</button>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div class="search-area">
            <input type="text" id="songSearch" class="search-bar" placeholder="Zoek op titel of tag..." oninput="render()">
            <div class="tag-action-row">
                <div id="tagList"></div>
                <input type="text" id="newTagInput" class="new-tag-input" placeholder="+ Tag">
                <button class="btn-sm" style="border-radius:50%; color:var(--green); border-color:var(--green); font-size:1rem;" onclick="createNewTag()">+</button>
            </div>
        </div>
        <div id="dbList" class="menu-scroll"></div>
        <div class="menu-footer">
            <button class="btn" id="bulkToSetBtn" style="display:none; background:var(--green); color:#000; flex:1;" onclick="addSelectedToSet()">ZET IN SET</button>
            <button class="btn" onclick="document.getElementById('importFile').click()">IMPORT</button>
            <button class="btn" onclick="exportDB()">EXPORT</button>
            <button class="btn btn-danger" onclick="cleanDuplicates()">CLEAN</button>
            <input type="file" id="importFile" style="display:none" onchange="importDB(event)">
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <button class="btn" id="setEditToggle" onclick="toggleSetEdit()">EDIT MODE</button>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div class="menu-scroll" id="setList"></div>
        <div class="menu-footer">
            <button class="btn" style="flex:1" onclick="exportSetlist()">EXPORT SET</button>
            <button class="btn btn-danger" onclick="clearSetlist()">WISSEN</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null, activeTags = [], selectMode = false, selectedSongs = [], isScrolling = false, scrollAcc = 0, currentSpeed = 0, setEditMode = false;
        let startX = 0, currentSwipeItem = null;

        window.onload = () => { createWheelNodes(); initTouchWheel(); createChordBar(); render(); setInterval(updateClock, 1000); requestAnimationFrame(scrollEngine); };

        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }
        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => { t.style.display = 'none'; }, 1500); }

        function createNewTag() {
            const input = document.getElementById('newTagInput');
            const val = input.value.trim();
            if(!val) return;
            if(selectedSongs.length === 0) { showToast("SELECTEER EERST LIEDJES"); return; }
            db.forEach(s => { if(selectedSongs.includes(s.title)) { let ts = s.tags ? s.tags.split(',').map(x=>x.trim()).filter(x=>x) : []; if(!ts.includes(val)) ts.push(val); s.tags = ts.join(', '); } });
            input.value = ""; save(); showToast("NIEUWE TAG TOEGEVOEGD"); render();
        }

        function toggleSelectMode() { 
            selectMode = !selectMode; selectedSongs = []; 
            document.getElementById('songsMenu').classList.toggle('is-selecting', selectMode); 
            document.getElementById('bulkToSetBtn').style.display = selectMode ? 'block' : 'none';
            render(); 
        }

        function toggleSetEdit() { setEditMode = !setEditMode; document.getElementById('setMenu').classList.toggle('is-editing', setEditMode); render(); }

        function render() {
            const sQ = document.getElementById('songSearch').value.toLowerCase();
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            const tagsDiv = document.getElementById('tagList'); tagsDiv.innerHTML = "";
            let allTags = new Set();
            db.forEach(s => s.tags && s.tags.split(',').forEach(t => allTags.add(t.trim())));

            Array.from(allTags).sort().forEach(t => {
                if(!t) return;
                const p = document.createElement('div'); 
                p.className = 'tag-pill' + (activeTags.includes(t) ? ' active' : '');
                p.innerText = t; 
                p.onclick = () => {
                    if(selectMode && selectedSongs.length > 0) {
                        db.forEach(s => { if(selectedSongs.includes(s.title)) { let ts = s.tags ? s.tags.split(',').map(x=>x.trim()).filter(x=>x) : []; if(!ts.includes(t)) ts.push(t); s.tags = ts.join(', '); } });
                        save(); showToast("TAGS BIJGEWERKT"); toggleSelectMode();
                    } else { 
                        if(activeTags.includes(t)) activeTags = activeTags.filter(x => x !== t); else activeTags.push(t); 
                        render(); 
                    }
                };
                tagsDiv.appendChild(p);
            });

            db.filter(s => {
                const mSearch = s.title.toLowerCase().includes(sQ) || (s.tags && s.tags.toLowerCase().includes(sQ));
                const sTags = s.tags ? s.tags.split(',').map(t => t.trim().toLowerCase()) : [];
                const mTags = activeTags.every(at => sTags.includes(at.toLowerCase()));
                return mSearch && (selectMode || mTags);
            }).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const safeTitle = s.title.replace(/'/g, "\\'");
                const container = document.createElement('div');
                container.className = 'swipe-container';
                container.innerHTML = `
                    <div class="delete-btn" onclick="deleteSong('${safeTitle}')">DELETE</div>
                    <div class="row-item" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)" ontouchend="handleTouchEnd(event)">
                        <input type="checkbox" class="select-check" ${selectedSongs.includes(s.title) ? 'checked' : ''} onchange="toggleSongSelection('${safeTitle}')">
                        <div style="flex:1" onclick="${selectMode ? "toggleSongSelection('"+safeTitle+"'); render();" : "loadSongByName('"+safeTitle+"')" }">
                            <span style="font-size:1.4rem; font-weight:bold; display:block;">${s.title}</span><span style="font-size:0.8rem; color:#666;">${s.tags||''}</span>
                        </div>
                        <button class="btn" style="display:${selectMode?'none':'block'}" onclick="addToSetlist('${safeTitle}')">+</button>
                    </div>`;
                dbl.appendChild(container);
            });

            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => { 
                const d = document.createElement('div'); d.className = "row-item"; 
                d.innerHTML = `
                    <div class="edit-only-container">
                        <button class="btn btn-sm" onclick="moveSetItem(${i},-1)">↑</button>
                        <button class="btn btn-sm" onclick="moveSetItem(${i},1)">↓</button>
                    </div>
                    <div style="flex:1" onclick="loadSongByIndex(${i})"><span class="setlist-title">${i+1}. ${s.title}</span></div>
                    <button class="btn" style="display:${setEditMode?'block':'none'}; color:var(--red); border-color:var(--red);" onclick="setlist.splice(${i},1); save(); render();">X</button>`; 
                setl.appendChild(d); 
            });
        }

        function handleTouchStart(e) { if(selectMode) return; startX = e.touches[0].clientX; currentSwipeItem = e.currentTarget; }
        function handleTouchMove(e) { if(selectMode || !currentSwipeItem) return; let diff = e.touches[0].clientX - startX; if (diff < 0 && diff > -100) currentSwipeItem.style.transform = `translateX(${diff}px)`; }
        function handleTouchEnd(e) { if(selectMode || !currentSwipeItem) return; let diff = e.changedTouches[0].clientX - startX; if (diff < -50) currentSwipeItem.style.transform = `translateX(-80px)`; else currentSwipeItem.style.transform = `translateX(0px)`; }
        function addSelectedToSet() { selectedSongs.forEach(title => { const s = db.find(x => x.title === title); if(s) setlist.push(JSON.parse(JSON.stringify(s))); }); save(); showToast(`${selectedSongs.length} TOEGEVOEGD`); toggleSelectMode(); }
        function addToSetlist(title) { const s = db.find(x => x.title === title); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); showToast("TOEGEVOEGD"); render(); } }
        function cleanDuplicates() { if(!confirm("Dubbele liedjes verwijderen?")) return; const unique = {}; db.forEach(s => unique[s.title] = s); db = Object.values(unique); save(); render(); }
        
        function exportDB() { const data = JSON.stringify(db, null, 2); const blob = new Blob([data], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `tdf_db_backup.json`; a.click(); }
        function importDB(e) { const reader = new FileReader(); reader.onload = (ev) => { db = JSON.parse(ev.target.result); save(); render(); }; reader.readAsText(e.target.files[0]); }
        
        function exportSetlist() {
            if(setlist.length === 0) { showToast("SETLIST IS LEEG"); return; }
            const data = JSON.stringify(setlist, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `tdf_setlist_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            showToast("SET GEËXPORTEERD");
        }
        
        function clearSetlist() {
            if(setlist.length === 0) return;
            if(!confirm("Weet je zeker dat je de GEHELE setlist wilt wissen?")) return;
            setlist = []; save(); showToast("SETLIST GEWIST"); render();
        }

        function deleteSong(title) { db = db.filter(s => s.title !== title); save(); render(); }
        function toggleSongSelection(t) { if(selectedSongs.includes(t)) selectedSongs = selectedSongs.filter(s => s !== t); else selectedSongs.push(t); }
        function moveSetItem(index, dir) { let target = index + dir; if (target >= 0 && target < setlist.length) { [setlist[index], setlist[target]] = [setlist[target], setlist[index]]; save(); render(); } }
        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editorContainer').style.display='flex'; document.getElementById('editorArea').value=cur.content; document.getElementById('tagField').value=cur.tags||""; document.getElementById('editBtn').style.display='none'; document.getElementById('saveBtn').style.display='block'; document.getElementById('liveBtn').style.display='none'; }
        function finishEdit() { cur.content=document.getElementById('editorArea').value; cur.tags=document.getElementById('tagField').value; let idx=db.findIndex(s=>s.title===cur.title); if(idx!==-1) db[idx]=JSON.parse(JSON.stringify(cur)); save(); document.getElementById('editorContainer').style.display='none'; document.getElementById('lyricsArea').style.display='block'; document.getElementById('editBtn').style.display='block'; document.getElementById('saveBtn').style.display='none'; document.getElementById('liveBtn').style.display='block'; drawLyrics('lyricsArea'); }
        function drawLyrics(id) { const container=document.getElementById(id); if(!cur) return; const lines=cur.content.split('\n'); let h=""; lines.forEach(l => { let chords=[], txt="", i=0; while(i<l.length){ if(l[i]==='['){ let e=l.indexOf(']',i); chords.push({p:txt.length, v:l.substring(i+1,e)}); i=e+1; } else { txt+=l[i]; i++; } } let r=""; chords.forEach(c => { r+=`<span style="position:absolute; left:${c.p}ch; color:var(--amber); font-weight:bold;">${c.v}</span>`; }); h+=`<div style="height:2.2rem; position:relative;">${r}</div><div style="margin-bottom:25px; font-weight:bold;">${txt||' '}</div>`; }); container.innerHTML=h; if(id === 'lyricsArea') container.scrollTop=0; }
        function enterLiveView() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('liveView').style.display='block'; document.getElementById('liveFooter').style.display='flex'; drawLyrics('liveContent'); currentSpeed=cur.scrollSpeed||0; scrollAcc=0; isScrolling=false; requestAnimationFrame(() => { document.getElementById('liveView').scrollTop = 0; updateWheelPosition(); updatePlayBtn(); }); }
        function exitLiveView() { if(cur) save(); document.getElementById('liveView').style.display='none'; document.getElementById('liveFooter').style.display='none'; document.getElementById('lyricsArea').style.display='block'; isScrolling=false; document.getElementById('editBtn').style.display='block'; document.getElementById('liveBtn').style.display='block'; }
        function toggleScroll() { isScrolling = !isScrolling; updatePlayBtn(); }
        function updatePlayBtn() { document.getElementById('playBtn').innerText = isScrolling ? "⏸" : "▶"; }
        function scrollEngine() { const lv = document.getElementById('liveView'); if(lv && lv.style.display === 'block' && isScrolling && currentSpeed > 0) { scrollAcc += (currentSpeed * 0.4); lv.scrollTop = Math.floor(scrollAcc); } requestAnimationFrame(scrollEngine); }
        function updateClock() { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}); }
        function loadSongByIndex(i) { cur=setlist[i]; document.getElementById('title').innerText=cur.title; drawLyrics('lyricsArea'); closeMenus(); }
        function loadSongByName(t) { cur=db.find(x=>x.title===t); document.getElementById('title').innerText=cur.title; drawLyrics('lyricsArea'); closeMenus(); }
        function createChordBar() { const bar = document.getElementById('chordBar'); ["A","Am","B","Bm","C","Cm","D","Dm","E","Em","F","Fm","G","Gm","7"].forEach(c => { const b = document.createElement('div'); b.className = 'chord-btn'; b.innerText = c; b.onclick = () => { const a = document.getElementById('editorArea'); const s = a.selectionStart; a.value = a.value.substring(0, s) + `[${c}]` + a.value.substring(a.selectionEnd); a.focus(); a.selectionStart = a.selectionEnd = s + c.length + 2; }; bar.appendChild(b); }); }
        function initTouchWheel() { const wheel = document.getElementById('thumbWheel'); let startY = 0, startS = 0; wheel.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; startS = currentSpeed; e.preventDefault(); }, {passive: false}); wheel.addEventListener('touchmove', (e) => { currentSpeed = Math.max(0, Math.min(15, startS + ((startY - e.touches[0].clientY) / 15))); if(cur) cur.scrollSpeed = currentSpeed; updateWheelPosition(); e.preventDefault(); }, {passive: false}); }
        function createWheelNodes() { const strip = document.getElementById('wheelStrip'); strip.innerHTML = ""; for(let i=0; i<=150; i++) { const d = document.createElement('div'); d.className = 'wheel-num'; d.innerText = (i/10).toFixed(1); strip.appendChild(d); } }
        function updateWheelPosition() { const strip = document.getElementById('wheelStrip'); strip.style.transform = `translateY(${28.5 - (currentSpeed * 280)}px)`; const activeIdx = Math.round(currentSpeed * 10); strip.querySelectorAll('.wheel-num').forEach((n, i) => n.classList.toggle('active', i === activeIdx)); }
    </script>
</body>
</html>
