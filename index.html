<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v9.22</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --red: #ff3b30; --grey: #121212; --row-bg: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; z-index: 4000; }
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-sm { padding: 5px 10px; font-size: 1.2rem; min-width: 44px; }

        /* CONTENT AREAS */
        .main-container { flex: 1; height: calc(100vh - 85px); background: #fff; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; display: block; }
        #editorContainer { display: none; flex: 1; flex-direction: column; background:#1a1a1a; padding-top: 110px; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 1.4rem; border: none; background: #fcfcfc; color: #000; resize: none; font-family: monospace; }

        /* PERSISTENT CONTROLS (Joystick in Edit Mode) */
        .control-bar { position: fixed; top: 85px; left: 0; width: 100%; height: 110px; background: rgba(20,20,20,0.98); padding: 10px 25px; display: none; align-items: center; justify-content: space-between; z-index: 5000; border-bottom: 2px solid #333; backdrop-filter: blur(10px); }
        .exit-btn { width: 50px; height: 50px; background: var(--amber); color: #000; border-radius: 25px; font-weight: 900; font-size: 1.5rem; border: none; display: flex; align-items: center; justify-content: center; }

        /* JOYSTICK */
        .wheel-wrap { position: relative; width: 100px; height: 85px; background: #000; border: 1px solid #444; border-radius: 12px; overflow: hidden; touch-action: none; }
        .wheel-strip { position: absolute; width: 100%; text-align: center; top: 0; left: 0; will-change: transform; pointer-events: none; }
        .wheel-num { height: 28px; line-height: 28px; font-size: 1.1rem; color: #444; }
        .wheel-num.active { color: var(--amber); text-shadow: 0 0 10px var(--amber); font-size: 1.7rem; font-weight: 900; }
        .wheel-overlay { position: absolute; width: 100%; height: 30px; top: 27px; border-top: 1px solid var(--amber); border-bottom: 1px solid var(--amber); background: rgba(255,191,0,0.05); z-index: 5; pointer-events: none; }

        /* MENUS */
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-scroll { flex: 1; overflow-y: auto; padding: 10px 0; -webkit-overflow-scrolling: touch; }
        .row-item { background: var(--row-bg); margin-bottom: 2px; display: flex; align-items: center; padding: 5px 15px; min-height: 60px; }
        .row-name { flex: 1; cursor: pointer; }
        .song-title { font-size: 1.3rem; font-weight: bold; }
        
        .edit-controls { display: none; }
        .is-editing .edit-controls { display: flex; }
        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 15px 30px; border-radius: 30px; display: none; z-index: 60000; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center; gap:8px;">
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; font-size:0.9rem; color:#444;">TDF v9.22</div>
        <div style="display:flex; gap:8px;">
            <button class="btn" id="editSongBtn" onclick="startEdit()">✎</button>
            <button class="btn" id="saveSongBtn" style="display:none; color:#25D366;" onclick="finishEdit()">OK</button>
            <button class="btn" style="background:var(--amber); color:#000;" onclick="enterLiveView()">LIVE</button>
        </div>
    </div>

    <div id="controlBar" class="control-bar">
        <button id="exitLiveBtn" class="exit-btn" onclick="exitLiveView()">X</button>
        <button id="playBtn" class="btn" style="width:70px; font-size:1.5rem;" onclick="toggleScroll()">▶</button>
        <div class="wheel-wrap" id="thumbWheel">
            <div class="wheel-overlay"></div>
            <div class="wheel-strip" id="wheelStrip"></div>
        </div>
        <div id="liveClock" style="font-weight:bold; font-size:1.2rem; color:var(--amber);">00:00</div>
    </div>

    <div id="toast">Bericht</div>

    <div class="main-container">
        <div id="lyricsArea">Selecteer een song uit de lijst om deze te bewerken (✎).</div>
        <div id="editorContainer">
            <textarea id="editorArea" spellcheck="false"></textarea>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <button id="setEditBtn" class="btn" onclick="toggleSetEdit()">EDIT</button>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div class="menu-scroll" id="setList"></div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h2>DATABASE</h2>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div style="padding:10px 20px; background:#111;"><input type="text" id="songSearch" class="btn" style="width:100%; text-align:left; color:#fff;" placeholder="Zoek titel..." oninput="render()"></div>
        <div class="menu-scroll" id="dbList"></div>
    </div>

    <div id="liveView" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:4500; overflow-y:auto; padding:200px 35px 450px 35px;">
        <div id="liveContent"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null, isScrolling = false, scrollAcc = 0, currentSpeed = 0, setEditMode = false;

        window.onload = () => { createWheelNodes(); initTouchWheel(); render(); setInterval(updateClock, 1000); requestAnimationFrame(scrollEngine); };

        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }
        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

        // --- EDIT LOGICA ---
        function startEdit() {
            if(!cur) return;
            document.getElementById('lyricsArea').style.display = 'none';
            document.getElementById('editorContainer').style.display = 'flex';
            document.getElementById('controlBar').style.display = 'flex';
            document.getElementById('exitLiveBtn').style.display = 'none'; // Verberg X in Edit
            document.getElementById('editorArea').value = cur.content;
            document.getElementById('editSongBtn').style.display = 'none';
            document.getElementById('saveSongBtn').style.display = 'block';
            currentSpeed = cur.scrollSpeed || 0;
            updateWheelPosition();
        }

        function finishEdit() {
            cur.content = document.getElementById('editorArea').value;
            cur.scrollSpeed = currentSpeed;
            // Update in DB als het daarvandaan kwam
            let dbIdx = db.findIndex(s => s.title === cur.title);
            if(dbIdx !== -1) db[dbIdx] = JSON.parse(JSON.stringify(cur));
            save();
            document.getElementById('controlBar').style.display = 'none';
            showNormalMode();
            render();
        }

        function showNormalMode() {
            document.getElementById('lyricsArea').style.display = 'block';
            document.getElementById('editorContainer').style.display = 'none';
            document.getElementById('editSongBtn').style.display = 'block';
            document.getElementById('saveSongBtn').style.display = 'none';
            drawLyrics('lyricsArea');
        }

        // --- RENDER & NAV ---
        function render() {
            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div class="edit-controls"><button class="btn btn-sm" onclick="moveItem(${i},-1)">↑</button><button class="btn btn-sm" onclick="moveItem(${i},1)">↓</button></div>
                    <div class="row-name" onclick="loadSongByIndex(${i})"><span class="song-title">${i+1}. ${s.title}</span></div>
                    <button class="btn edit-controls" style="border-color:red; color:red; margin-left:10px;" onclick="setlist.splice(${i},1); save(); render();">X</button>`;
                setl.appendChild(d);
            });
            const sQ = (document.getElementById('songSearch')?.value || "").toLowerCase();
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            db.filter(s => s.title.toLowerCase().includes(sQ)).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div class="row-name" onclick="loadSongByName('${s.title.replace(/'/g,"\\")}')"><span class="song-title">${s.title}</span></div>
                    <button class="btn" onclick="addToSet('${s.title.replace(/'/g,"\\")}')">+</button>`;
                dbl.appendChild(d);
            });
        }

        function loadSongByIndex(index) { cur = setlist[index]; document.getElementById('title').innerText = cur.title; showNormalMode(); closeMenus(); }
        function loadSongByName(t) { cur = db.find(x=>x.title===t); document.getElementById('title').innerText = cur.title; showNormalMode(); closeMenus(); }
        function addToSet(t) { let s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); showToast("Toegevoegd"); } }
        function moveItem(index, direction) { let target = index + direction; if (target >= 0 && target < setlist.length) { [setlist[index], setlist[target]] = [setlist[target], setlist[index]]; save(); render(); } }
        function toggleSetEdit() { setEditMode = !setEditMode; document.getElementById('setMenu').classList.toggle('is-editing', setEditMode); render(); }

        // --- JOYSTICK & SCROLL ---
        function createWheelNodes() { const strip = document.getElementById('wheelStrip'); strip.innerHTML = ""; for(let i=0; i<=150; i++) { const d = document.createElement('div'); d.className = 'wheel-num'; d.innerText = (i/10).toFixed(1); strip.appendChild(d); } updateWheelPosition(); }
        function initTouchWheel() {
            const wheel = document.getElementById('thumbWheel');
            let startY = 0, startSpeed = 0;
            wheel.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; startSpeed = currentSpeed; e.preventDefault(); }, {passive: false});
            wheel.addEventListener('touchmove', (e) => { currentSpeed = Math.max(0, Math.min(15, startSpeed + ((startY - e.touches[0].clientY) / 15))); updateWheelPosition(); e.preventDefault(); }, {passive: false});
        }
        function updateWheelPosition() { const strip = document.getElementById('wheelStrip'); strip.style.transform = `translateY(${28.5 - (currentSpeed * 280)}px)`; const activeIdx = Math.round(currentSpeed * 10); strip.querySelectorAll('.wheel-num').forEach((n, i) => n.classList.toggle('active', i === activeIdx)); }
        function scrollEngine() { const lv = document.getElementById('liveView'); if(lv.style.display === 'block' && isScrolling && currentSpeed > 0) { scrollAcc += (currentSpeed * 0.4); lv.scrollTop = Math.floor(scrollAcc); } requestAnimationFrame(scrollEngine); }
        function toggleScroll() { isScrolling = !isScrolling; updatePlayBtn(); }
        function updatePlayBtn() { const b = document.getElementById('playBtn'); b.innerText = isScrolling ? "⏸" : "▶"; b.style.background = isScrolling ? "var(--amber)" : "none"; b.style.color = isScrolling ? "#000" : "var(--amber)"; }
        function updateClock() { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}); }

        function drawLyrics(targetId) {
            const container = document.getElementById(targetId);
            if(!cur) return;
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') { let e = l.indexOf(']', i); chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1; } 
                    else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span style="position:absolute; left:${c.p}ch; color:var(--amber); font-weight:bold;">${c.v}</span>`; });
                h += `<div style="height:2.2rem; position:relative;">${r}</div><div style="margin-bottom:25px; font-weight:bold; color:inherit;">${txt || ' '}</div>`;
            });
            container.innerHTML = h; scrollAcc = 0;
        }

        function enterLiveView() { if(!cur) return; document.getElementById('liveView').style.display='block'; document.getElementById('controlBar').style.display='flex'; document.getElementById('exitLiveBtn').style.display='flex'; drawLyrics('liveContent'); currentSpeed=cur.scrollSpeed||0; updateWheelPosition(); isScrolling=false; updatePlayBtn(); }
        function exitLiveView() { if(cur){cur.scrollSpeed = currentSpeed; save();} document.getElementById('liveView').style.display='none'; document.getElementById('controlBar').style.display='none'; isScrolling=false; }
    </script>
</body>
</html>
