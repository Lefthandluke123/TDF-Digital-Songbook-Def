<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v8.43</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --amber-dim: #cc9900; --red: #c12718; --grey: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; z-index: 3000; }
        .logo-box { width: 60px; height: 60px; margin-right: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-shadow: 0 0 5px var(--amber); font-size: 1rem; }
        .btn-green { background: #25D366; color: white; border: none; }
        .btn-red { border: 1px solid var(--red); color: var(--red); background: none; border-radius: 8px; }

        .main-container { flex: 1; height: calc(100vh - 85px); background: #fff; position: relative; overflow: hidden; }
        #lyricsArea { height: 100%; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; -webkit-overflow-scrolling: touch; }
        #editorArea { display: none; width: 100%; height: 65%; padding: 25px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; resize: none; font-family: monospace; }
        
        #tagEditor { display: none; background: #222; padding: 15px 25px; border-top: 3px solid var(--amber); height: 35%; flex-direction: column; gap: 10px; z-index: 4000; }
        #tagSuggestions { display: flex; gap: 10px; overflow-x: auto; min-height: 40px; }
        .tag-sug { background: #444; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; border: 1px solid #666; white-space: nowrap; }

        /* LIVE VIEW MET SPEED INDICATOR */
        #liveView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 15000; overflow-y: auto; padding: 120px 35px 400px 35px; }
        #liveView .lyric-line { font-size: 2.2rem; line-height: 1.2; margin-bottom: 35px; color: #eee; font-weight: bold; white-space: pre-wrap; word-wrap: break-word; }
        #liveView .chord-row { font-size: 2.8rem; height: 3.2rem; margin-bottom: 5px; color: var(--amber); white-space: pre; }
        
        #liveView.only-chords .lyric-line { display: none; }
        #liveView.only-chords .chord-row { font-size: 5rem; height: 6.5rem; margin-bottom: 50px; }
        
        .live-controls { position: fixed; top: 0; left: 0; width: 100%; background: rgba(15,15,15,0.95); padding: 15px; display: flex; align-items: center; justify-content: space-between; z-index: 16000; border-bottom: 2px solid #333; backdrop-filter: blur(10px); }
        .scroll-slider { -webkit-appearance: none; flex: 1; margin: 0 20px; height: 12px; background: #333; border-radius: 10px; outline: none; border: 1px solid #444; }
        .scroll-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 35px; height: 35px; background: var(--amber); border-radius: 50%; cursor: pointer; }
        .speed-label { color: var(--amber); font-weight: bold; font-size: 1.4rem; min-width: 50px; text-align: center; font-variant-numeric: tabular-nums; }

        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.4s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-header { padding: 20px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .menu-scroll { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        
        .row-item { background: #1c1c1e; margin-bottom: 12px; border-radius: 10px; border: 1px solid #333; display: flex; align-items: center; }
        .row-name { flex: 1; padding: 22px; font-size: 1.8rem; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .drag-handle { padding: 22px; color: var(--amber); font-size: 2.2rem; cursor: move; }

        .chord-row { color: var(--red); font-weight: bold; height: 1.8rem; position: relative; }
        .chord-item { position: absolute; }
        .lyric-line { margin-bottom: 22px; display: block; white-space: pre; }

        .draggable-box { position: fixed; background: #1a1a1a; border-radius: 15px; padding: 12px; display: none; z-index: 50000; border: 2px solid #444; }
        .joy-btn { background: #222; color: var(--amber); border: 1px solid var(--amber-dim); width: 70px; height: 70px; border-radius: 50%; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; }
        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; display: none; z-index: 60000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center;">
            <div class="logo-box" onclick="location.reload()"><img src="logo.png" alt="TDF"></div>
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" style="margin-left:10px;" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; font-size: 1.2rem; text-align:center; flex:1;">TDF v8.43</div>
        <div style="display:flex; gap:10px;">
            <button class="btn" style="border-color:#34c759; color:#34c759;" onclick="enterLiveView()">LIVE</button>
            <button class="btn" onclick="startEdit()">✎</button>
            <button class="btn" id="saveBtn" style="display:none; color:#34c759; border-color:#34c759;" onclick="finishEdit()">OK</button>
        </div>
    </div>

    <div id="toast">Bericht</div>

    <div class="main-container">
        <div id="lyricsArea">Laden...</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
        <div id="tagEditor">
            <div id="tagSuggestions"></div>
            <input type="text" id="tagInput" placeholder="Tags..." oninput="updateSuggestions()">
        </div>
    </div>

    <div id="liveView">
        <div class="live-controls">
            <button class="btn-red" style="padding:10px 25px;" onclick="exitLiveView()">STOP</button>
            <input type="range" id="scrollSpeed" class="scroll-slider" min="0" max="15" step="0.1" value="0" oninput="updateSpeedLabel()">
            <div class="speed-label" id="speedValue">0.0</div>
            <button class="btn" id="chordToggleBtn" onclick="toggleOnlyChords()">CHORDS</button>
        </div>
        <div id="liveContent"></div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div class="menu-header"><h2>SONGS</h2><button class="btn" onclick="closeMenus()">X</button></div>
        <div class="search-wrap"><input type="text" id="songSearch" class="search-input" placeholder="Zoek op titel of tag..." oninput="render()"></div>
        <div class="menu-scroll" id="dbList"></div>
        <div style="padding:20px; background:#111; display:flex; gap:10px;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impAny').click()">IMPORT</button>
            <button class="btn" style="flex:1;" onclick="exportDB()">EXPORT</button>
            <button class="btn-red" style="flex:1;" onclick="cleanDatabase()">CLEAN</button>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div class="menu-header">
            <button class="btn-green" onclick="pasteFromWA()">PLAK WA</button>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div class="menu-scroll" id="setList"></div>
        <div style="padding:20px; background:#111; display:flex; gap:10px;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impSet').click()">LOAD SET</button>
            <button class="btn" style="flex:1;" onclick="exportSet()">SAVE SET</button>
        </div>
    </div>

    <div id="joyPad" class="draggable-box" style="top:200px; left:40px;">
        <div class="drag-handle" style="font-size:12px; padding:8px; background:#333; border-radius:6px; margin-bottom:10px; text-align:center;">DRAG</div>
        <div style="display:grid; grid-template-areas: '. u .' 'l . r' '. d .'; gap:12px;">
            <button class="joy-btn" style="grid-area:u" onclick="moveCursorVertical(-1)">↑</button>
            <button class="joy-btn" style="grid-area:l" onclick="moveCursorHorizontal(-1)">←</button>
            <button class="joy-btn" style="grid-area:r" onclick="moveCursorHorizontal(1)">→</button>
            <button class="joy-btn" style="grid-area:d" onclick="moveCursorVertical(1)">↓</button>
        </div>
    </div>

    <input type="file" id="impAny" multiple style="display:none;" onchange="importAnyFile(event)">
    <input type="file" id="impSet" style="display:none;" onchange="importFiles(event, 'set')">

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null;
        let draggingIdx = null;

        window.onload = () => { render(); startAutoScrollLoop(); initDrag(document.getElementById('joyPad')); };

        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }

        function render() {
            const query = document.getElementById('songSearch').value.toLowerCase();
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            let currentLetter = "";
            db.filter(s => (s.title + (s.tags||"")).toLowerCase().includes(query)).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const first = s.title[0].toUpperCase();
                if (first !== currentLetter && !query) { currentLetter = first; const d = document.createElement('div'); d.className="alpha-divider"; d.innerText=first; dbl.appendChild(d); }
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div class="row-name" onclick="loadSong('${s.title.replace(/'/g,"\\'")}')">${s.title}</div><button class="btn" style="margin-right:10px" onclick="editInDb('${s.title.replace(/'/g,"\\'")}')">✎</button><button class="btn" onclick="addToSet('${s.title.replace(/'/g,"\\'")}')">+</button>`;
                dbl.appendChild(d);
            });

            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "row-item"; d.draggable = true;
                d.innerHTML = `<div class="drag-handle">≡</div><div class="row-name" onclick="loadSong('${s.title.replace(/'/g,"\\'")}')">${i+1}. ${s.title}</div><button class="btn-red" style="margin-right:10px; padding:12px;" onclick="removeFromSet(${i})">X</button>`;
                d.ondragstart = () => { draggingIdx = i; d.style.opacity = "0.4"; };
                d.ondragend = () => { d.style.opacity = "1"; draggingIdx = null; };
                d.ondragover = (e) => e.preventDefault();
                d.ondrop = (e) => { e.preventDefault(); const from = draggingIdx; const to = i; const item = setlist.splice(from, 1)[0]; setlist.splice(to, 0, item); save(); render(); };
                setl.appendChild(d);
            });
        }

        function loadSong(t) { 
            cur = db.find(x=>x.title===t) || setlist.find(x=>x.title===t); 
            if(cur) { document.getElementById('title').innerText = cur.title; drawLyrics(document.getElementById('lyricsArea')); closeMenus(); } 
        }
        
        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); showToast("Toegevoegd!"); } }
        function removeFromSet(i) { setlist.splice(i, 1); save(); render(); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 1000); }

        function drawLyrics(container) {
            if(!cur) return;
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                if(l.startsWith('{')) return;
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;}
                        chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            container.innerHTML = h; container.scrollTop = 0;
        }

        function enterLiveView() { 
            if(!cur) return; 
            document.getElementById('liveView').style.display = 'block'; 
            drawLyrics(document.getElementById('liveContent'));
            const speed = cur.scrollSpeed || 0;
            document.getElementById('scrollSpeed').value = speed;
            updateSpeedLabel();
        }

        function updateSpeedLabel() {
            document.getElementById('speedValue').innerText = parseFloat(document.getElementById('scrollSpeed').value).toFixed(1);
        }

        function exitLiveView() { 
            if(cur) {
                const speed = parseFloat(document.getElementById('scrollSpeed').value);
                cur.scrollSpeed = speed;
                let dbIdx = db.findIndex(s => s.title === cur.title);
                if(dbIdx !== -1) db[dbIdx].scrollSpeed = speed;
                save();
            }
            document.getElementById('liveView').style.display = 'none'; 
        }

        function toggleOnlyChords() { 
            const lv = document.getElementById('liveView');
            lv.classList.toggle('only-chords');
            document.getElementById('chordToggleBtn').innerText = lv.classList.contains('only-chords') ? "LYRICS" : "CHORDS";
        }

        function startAutoScrollLoop() { 
            const lv = document.getElementById('liveView'); 
            const sp = document.getElementById('scrollSpeed'); 
            function step() { 
                if(lv.style.display==='block' && sp.value > 0) {
                    const actualSpeed = Math.pow(parseFloat(sp.value), 1.5) / 12;
                    lv.scrollTop += actualSpeed; 
                }
                requestAnimationFrame(step); 
            } 
            requestAnimationFrame(step); 
        }

        async function importAnyFile(e) {
            const files = e.target.files; if(!files.length) return;
            for(let f of files) {
                const content = await f.text(); const ext = f.name.split('.').pop().toLowerCase();
                if(ext === 'json') { const d = JSON.parse(content); if(Array.isArray(d)) db=[...db, ...d]; else db.push(d); }
                else { let t = f.name.replace(/\.[^/.]+$/, ""); const m = content.match(/\{(?:title|t):\s*(.*)\}/i); if(m) t=m[1]; db.push({title:t, content:content, tags:"", scrollSpeed:0}); }
            }
            save(); render(); showToast("Geïmporteerd!");
        }

        function editInDb(t) { cur = db.find(x=>x.title===t); if(cur) { closeMenus(); startEdit(); } }
        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editorArea').style.display='block'; document.getElementById('tagEditor').style.display='flex'; document.getElementById('editorArea').value=cur.content; document.getElementById('tagInput').value=cur.tags||""; document.getElementById('saveBtn').style.display='block'; document.getElementById('joyPad').style.display='block'; }
        function finishEdit() { cur.content=document.getElementById('editorArea').value; cur.tags=document.getElementById('tagInput').value; const idx=db.findIndex(s=>s.title===cur.title); if(idx!==-1) db[idx]=cur; save(); document.getElementById('lyricsArea').style.display='block'; document.getElementById('editorArea').style.display='none'; document.getElementById('tagEditor').style.display='none'; document.getElementById('saveBtn').style.display='none'; document.getElementById('joyPad').style.display='none'; drawLyrics(document.getElementById('lyricsArea')); render(); }

        function updateSuggestions() {
            const input = document.getElementById('tagInput');
            const currentVal = input.value.split(',').pop().trim().toLowerCase();
            const sugBox = document.getElementById('tagSuggestions');
            sugBox.innerHTML = ""; if(currentVal.length < 1) return;
            const allTags = new Set(); db.forEach(s => { if(s.tags) s.tags.split(',').forEach(t => allTags.add(t.trim())); });
            Array.from(allTags).filter(t => t.toLowerCase().startsWith(currentVal)).forEach(t => {
                const span = document.createElement('div'); span.className = "tag-sug"; span.innerText = t;
                span.onclick = () => { const parts = input.value.split(','); parts.pop(); parts.push(" " + t); input.value = parts.join(',').trim() + ", "; input.focus(); sugBox.innerHTML = ""; };
                sugBox.appendChild(span);
            });
        }

        function moveCursorHorizontal(n) { const ed = document.getElementById('editorArea'); ed.selectionStart = ed.selectionEnd = ed.selectionStart + n; ed.focus(); }
        function moveCursorVertical(n) { const ed = document.getElementById('editorArea'); const lines = ed.value.split('\n'); const pos = ed.selectionStart; let curL = ed.value.substr(0, pos).split('\n').length - 1; let tarL = Math.max(0, Math.min(lines.length - 1, curL + n)); let newP = 0; for(let i=0; i<tarL; i++) newP += lines[i].length + 1; ed.selectionStart = ed.selectionEnd = newP; ed.focus(); }
        function initDrag(el) { const h = el.querySelector('.drag-handle'); let p1=0,p2=0,p3=0,p4=0; h.onmousedown = h.ontouchstart = (e) => { e.preventDefault(); p3=e.clientX||(e.touches?e.touches[0].clientX:0); p4=e.clientY||(e.touches?e.touches[0].clientY:0); document.onmouseup=document.ontouchend=()=>{document.onmousemove=document.ontouchmove=null;}; document.onmousemove=document.ontouchmove=(me)=>{p1=p3-(me.clientX||(me.touches?me.touches[0].clientX:0)); p2=p4-(me.clientY||(me.touches?me.touches[0].clientY:0)); p3=me.clientX||(me.touches?me.touches[0].clientX:0); p4=me.clientY||(me.touches?me.touches[0].clientY:0); el.style.top=(el.offsetTop-p2)+"px"; el.style.left=(el.offsetLeft-p1)+"px";}} }
        function exportDB() { download(db, 'TDF_Database'); }
        function exportSet() { const name = prompt("Naam:"); if (name) download(setlist, name); }
        function download(d, n) { const blob = new Blob([JSON.stringify(d, null, 2)], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = n + ".json"; document.body.appendChild(a); a.click(); setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500); }
        function importFiles(e, type) { const r = new FileReader(); r.onload = (p) => { try { const data = JSON.parse(p.target.result); if(type==='db') db = [...db, ...data]; else setlist = data; save(); render(); } catch(err) {} }; r.readAsText(e.target.files[0]); }
        function pasteFromWA() { navigator.clipboard.readText().then(text => { if(!text) return; const lines = text.split('\n'); setlist = lines.map(l => { const t = l.replace(/^\d+[\s.)]*/, '').trim(); const s = db.find(x => x.title.toLowerCase() === t.toLowerCase()); return s ? JSON.parse(JSON.stringify(s)) : {title: t, content: "", tags: "", scrollSpeed: 0}; }).filter(x => x.title); save(); render(); }); }
        function cleanDatabase() { const unique = new Set(); const cleaned = []; db.forEach(s => { if(s.title && !unique.has(s.title.toLowerCase())) { unique.add(s.title.toLowerCase()); cleaned.push(s); }}); db = cleaned; save(); render(); showToast("Clean klaar!"); }
    </script>
</body>
</html>
