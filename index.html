<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>TDF Stage Pilot v6.85</title>
    <style>
        :root { 
            --bg-dark: #121212; --top-bar-bg: #1a1a1a;
            --griffin-orange: #d48e3d; --griffin-red: #c12718; 
            --header-height: 85px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
        body { font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace; display: flex; flex-direction: column; padding-top: var(--header-height); }

        /* Top Bar */
        .top-bar { 
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); 
            background: var(--top-bar-bg); border-bottom: 1px solid #333; 
            display: flex; align-items: flex-end; justify-content: space-between; 
            padding: 0 15px 12px 15px; z-index: 30000; 
        }
        #appLogo { height: 42px; width: 42px; cursor: pointer; background: #333; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: var(--griffin-orange); font-size: 1.5rem; overflow: hidden; }
        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .top-bar-icon { width: 28px; height: 28px; fill: var(--griffin-orange); cursor: pointer; }

        /* Menu */
        .songs-menu { position: fixed; top: 0; left: -33.33%; width: 33.33%; height: 100%; background: #1c1c1e; z-index: 40000; transition: left 0.3s ease; display: flex; flex-direction: column; padding-top: calc(40px + env(safe-area-inset-top)); }
        .songs-menu.open { left: 0; }
        @media (max-width: 768px) { .songs-menu { width: 85%; left: -85%; } }
        .menu-nav-section { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        #settingsPanel { display: none; padding: 15px; background: #2c2c2e; border-bottom: 2px solid var(--griffin-orange); flex-direction: column; gap: 12px; }
        .admin-btn { width: 100%; padding: 12px; background: #444; color: white; border: 1px solid #666; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; }

        /* Draggable Compact Toolbar */
        #editorToolbar { 
            display: none; position: fixed; top: 100px; right: 20px; width: 220px;
            background: rgba(26, 26, 26, 0.9); border: 2px solid var(--griffin-orange); border-radius: 12px;
            z-index: 50000; box-shadow: 0 10px 30px rgba(0,0,0,0.6); touch-action: none;
        }
        .drag-handle { height: 20px; background: rgba(212, 142, 61, 0.2); border-radius: 10px 10px 0 0; cursor: move; display: flex; justify-content: center; align-items: center; }
        .drag-handle::after { content: '...'; color: var(--griffin-orange); letter-spacing: 2px; font-weight: bold; margin-bottom: 5px; }
        
        .chord-bar { display: flex; overflow-x: auto; padding: 8px; gap: 6px; border-bottom: 1px solid #333; }
        .chord-btn { background: #333; color: white; border: 1px solid #555; padding: 6px 10px; border-radius: 4px; font-size: 0.9rem; min-width: 40px; }
        
        .joystick-container { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; justify-content: center; padding: 10px; gap: 5px; }
        .joy-btn { background: var(--griffin-orange); color: black; border: none; width: 38px; height: 38px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; }
        
        /* Content Area */
        .lyrics-container { background: #fff; width: 100%; height: calc(100vh - var(--header-height)); overflow-y: auto; }
        #lyricsArea { padding: 30px; font-family: ui-monospace, monospace; font-size: 1.4rem; line-height: 1.4; color: #000; }
        #editorArea { display: none; width: 100%; height: 100%; padding: 30px; font-family: ui-monospace, monospace; font-size: 1.4rem; line-height: 1.4; border: none; outline: none; background: #fff; color: #000; overflow-y: auto; }

        .chord-row { position: relative; height: 1.6rem; color: var(--griffin-red); font-weight: bold; margin-bottom: -5px; }
        .chord-item { position: absolute; white-space: pre; font-size: 1.15rem; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 18px; min-height: 1.2rem; }
    </style>
</head>
<body>
    <input type="file" id="bulkFiles" multiple style="display:none;">
    <input type="file" id="logoInput" accept="image/png" style="display:none;">

    <div class="top-bar">
        <div class="top-bar-left">
            <div id="appLogo" onclick="document.getElementById('logoInput').click()">🖼️</div>
            <button class="top-bar-btn" onclick="toggleMenu()">Songs</button>
        </div>
        <div class="top-bar-center">
            <h2 id="displayTitle" style="margin:0; color:white; font-size:1.1rem;">Stage Pilot v6.85</h2>
            <div style="margin-top:4px; display:inline-flex; align-items:center; gap:8px; background:#2c2c2e; padding:3px 10px; border-radius:20px; border:1px solid #444;">
                <button class="top-bar-btn" onmousedown="transpose(-1)">−</button>
                <span id="tpVal" style="color:white; font-size:0.9rem;">0</span>
                <button class="top-bar-btn" onmousedown="transpose(1)">+</button>
            </div>
        </div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" id="scrollBtn" viewBox="0 0 24 24" onclick="toggleScroll()"><path d="M8 5v14l11-7z"/></svg>
            <svg class="top-bar-icon" id="editIcon" viewBox="0 0 24 24" onclick="startEdit()"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
            <button class="top-bar-btn" id="saveBtn" style="display:none;" onclick="finishEdit()">GEREED</button>
            <svg class="top-bar-icon" onclick="document.getElementById('bulkFiles').click()" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div class="menu-nav-section">
            <button class="top-bar-btn" onclick="toggleMenu()">SLUIT</button>
            <svg class="top-bar-icon" onclick="toggleSettings()" viewBox="0 0 24 24"><path d="M12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </div>
        <div id="settingsPanel">
            <button class="admin-btn" style="background:var(--griffin-orange); color:black;" onclick="toggleTagMode()">TAGS BEHEREN</button>
            <button class="admin-btn" onclick="exportLibrary()">📥 OPSLAAN IN BESTANDEN (.JSON)</button>
        </div>
        <div class="search-container"><input type="text" id="songSearch" placeholder="Zoek op titel..." oninput="renderIndex()"></div>
        <div id="tagBar"></div>
        <div id="indexContent"></div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Selecteer een liedje.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <div id="editorToolbar">
        <div class="drag-handle" id="dragHandle"></div>
        <div class="chord-bar" id="chordBar"></div>
        <div class="joystick-container">
            <button class="joy-btn" style="grid-area: left" onmousedown="event.preventDefault(); moveCursor(-1)">←</button>
            <button class="joy-btn" style="grid-area: up" onmousedown="event.preventDefault(); moveLine(-1)">↑</button>
            <button class="joy-btn" style="grid-area: down" onmousedown="event.preventDefault(); moveLine(1)">↓</button>
            <button class="joy-btn" style="grid-area: right" onmousedown="event.preventDefault(); moveCursor(1)">→</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let cur = null, tOff = 0, sInt = null, tagMode = false, activeTag = null;
        const chordsList = ["A","Am","B","Bm","C","Cm","D","Dm","E","Em","F","Fm","G","Gm"];

        window.onload = () => {
            const logo = localStorage.getItem('tdfLogo');
            if(logo) updateLogoUI(logo);
            renderIndex(); renderTagBar(); buildChordBar();
            initDraggable();
        };

        function toggleMenu() { document.getElementById('songsMenu').classList.toggle('open'); }
        function toggleSettings() { const p = document.getElementById('settingsPanel'); p.style.display = p.style.display === 'flex' ? 'none' : 'flex'; }
        function exportLibrary() { const blob = new Blob([localStorage.getItem('tdfSongs')], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'tdf_backup.json'; a.click(); }

        function renderIndex() {
            const c = document.getElementById('indexContent'), q = document.getElementById('songSearch').value.toLowerCase();
            c.innerHTML = "";
            let s = [...db].sort((a,b) => a.title.localeCompare(b.title));
            if(q) s = s.filter(x => x.title.toLowerCase().includes(q));
            s.forEach(x => {
                const div = document.createElement('div');
                div.innerHTML = `<div class="index-item" onclick="handleItemClick(this)"><span>${x.title}</span><div style="color:var(--griffin-orange)">⋮</div></div>
                <div class="item-actions" style="display:none; padding:10px; gap:10px; background:#2c2c2e;"><button class="top-bar-btn" onclick="loadSong('${x.title.replace(/'/g,"\\'")}')">OPEN</button></div>`;
                c.appendChild(div);
            });
        }

        function handleItemClick(el) { const act = el.nextElementSibling; act.style.display = act.style.display === 'none' ? 'flex' : 'none'; }
        function loadSong(t) { cur = db.find(s => s.title === t); tOff = 0; document.getElementById('tpVal').textContent = "0"; document.getElementById('displayTitle').textContent = cur.title; draw(); toggleMenu(); }
        function saveRefresh() { localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); }
        function transpose(o) { tOff += o; document.getElementById('tpVal').textContent = (tOff>0?"+":"")+tOff; draw(); }

        function draw() {
            if(!cur) return; const lines = cur.content.replace(/#[a-zA-Z0-9]+/g, '').trim().split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;}
                        let c = l.substring(i+1, e); chords.push({p: txt.length, v: c}); i = e+1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            document.getElementById('lyricsArea').innerHTML = h;
        }

        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editorArea').style.display='block'; document.getElementById('editorToolbar').style.display='block'; document.getElementById('editorArea').value=cur.content; }
        function finishEdit() { const i = db.findIndex(s=>s.title===cur.title); db[i].content = document.getElementById('editorArea').value; saveRefresh(); document.getElementById('lyricsArea').style.display='block'; document.getElementById('editorArea').style.display='none'; document.getElementById('editorToolbar').style.display='none'; draw(); }
        
        function moveCursor(d) { const ed = document.getElementById('editorArea'); ed.selectionStart = ed.selectionEnd = ed.selectionStart + d; ed.focus(); }
        function moveLine(d) {
            const ed = document.getElementById('editorArea'), lines = ed.value.split('\n'), pos = ed.selectionStart;
            let curL = ed.value.substr(0, pos).split('\n').length - 1;
            let targetL = Math.max(0, Math.min(lines.length - 1, curL + d));
            let newPos = 0; for(let i=0; i<targetL; i++) newPos += lines[i].length + 1;
            ed.selectionStart = ed.selectionEnd = newPos; ed.focus();
        }

        function buildChordBar() {
            const bar = document.getElementById('chordBar');
            chordsList.forEach(c => {
                const b = document.createElement('button'); b.className = 'chord-btn'; b.textContent = c;
                b.onmousedown = (e) => { e.preventDefault(); insertText(`[${c}]`); };
                bar.appendChild(b);
            });
        }
        function insertText(t) { const ed = document.getElementById('editorArea'), p = ed.selectionStart; ed.value = ed.value.slice(0, p) + t + ed.value.slice(ed.selectionEnd); ed.selectionStart = ed.selectionEnd = p + t.length; ed.focus(); }

        function initDraggable() {
            const el = document.getElementById('editorToolbar'), handle = document.getElementById('dragHandle');
            let x = 0, y = 0, nx = 0, ny = 0;
            handle.onpointerdown = (e) => {
                nx = e.clientX; ny = e.clientY;
                document.onpointermove = (e) => {
                    x = nx - e.clientX; y = ny - e.clientY;
                    nx = e.clientX; ny = e.clientY;
                    el.style.top = (el.offsetTop - y) + "px"; el.style.left = (el.offsetLeft - x) + "px";
                    el.style.right = "auto";
                };
                document.onpointerup = () => { document.onpointermove = null; document.onpointerup = null; };
            };
        }

        function updateLogoUI(src) { const l = document.getElementById('appLogo'); l.innerHTML = `<img src="${src}" style="width:100%;height:100%;object-fit:contain;">`; l.style.background = "none"; }
    </script>
</body>
</html>
