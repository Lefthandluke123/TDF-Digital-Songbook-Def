<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Stage Pilot v6.31</title>
    <style>
        :root { 
            --bg-dark: #121212; --top-bar-bg: #1a1a1a;
            --griffin-orange: #d48e3d; --griffin-red: #c12718; 
            --header-height: 65px;
            --lyric-bg: #ffffff; --lyric-text: #000000;
        }
        [data-theme="dark"] { --lyric-bg: #000000; --lyric-text: #ffffff; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
        body { font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace; display: flex; flex-direction: column; padding-top: var(--header-height); }

        .top-bar { 
            position: fixed; top: 0 !important; left: 0; width: 100%; height: var(--header-height); 
            background: var(--top-bar-bg); border-bottom: 1px solid #333; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; z-index: 99999; 
        }
        .top-bar-left, .top-bar-right { display: flex; align-items: center; gap: 12px; min-width: 140px; }
        .top-bar-center { text-align: center; flex-grow: 1; }
        .title-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .title-row h2 { margin: 0; font-size: 1.1rem; color: white; font-family: sans-serif; }
        
        .transpose-pill { display: flex; align-items: center; gap: 8px; background: #2c2c2e; padding: 2px 10px; border-radius: 20px; border: 1px solid #444; }
        .tp-btn { color: var(--griffin-orange); font-weight: bold; font-size: 1.4rem; background: none; border: none; cursor: pointer; padding: 0 5px; }
        #tpVal { font-size: 0.9rem; color: #fff; min-width: 15px; }

        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .top-bar-icon { width: 28px; height: 28px; fill: var(--griffin-orange); cursor: pointer; }
        #appLogo { height: 42px; width: auto; max-width: 80px; object-fit: contain; display: none; }

        .lyrics-container { background: var(--lyric-bg); width: 100%; height: calc(100vh - var(--header-height)); overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }
        #lyricsArea, #editorArea { padding: 30px; font-family: ui-monospace, monospace; font-size: 1.35rem; line-height: 1.35; color: var(--lyric-text); width: 100%; min-height: 100%; }
        #editorArea { display: none; white-space: pre; border: none; outline: none; background: var(--lyric-bg); color: var(--lyric-text); caret-color: var(--griffin-orange); padding-bottom: 400px; }

        .songs-menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90000; }
        .songs-menu { position: fixed; top: 0; left: -33.33%; width: 33.33%; height: 100%; background: #1c1c1e; z-index: 90001; transition: left 0.3s ease; display: flex; flex-direction: column; }
        .songs-menu.open { left: 0; }
        @media (max-width: 768px) { .songs-menu { width: 85%; left: -85%; } }
        
        #menuListWrapper { display: flex; flex-grow: 1; overflow: hidden; }
        #indexContent { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; }
        #alphabetScroller { width: 30px; background: #1c1c1e; display: flex; flex-direction: column; justify-content: space-around; align-items: center; padding: 10px 0; border-left: 1px solid #333; }
        .alpha-link { color: #888; font-size: 0.7rem; font-weight: bold; cursor: pointer; width: 100%; text-align: center; }

        .alphabet-header { background: #242426; color: var(--griffin-orange); padding: 8px 20px; font-size: 0.75rem; font-weight: bold; border-bottom: 1px solid #333; text-transform: uppercase; }
        .index-container { position: relative; width: 100%; border-bottom: 1px solid #282828; background: #333; overflow: hidden; height: 50px; flex-shrink: 0; }
        .index-item { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 0 20px; background: #1c1c1e; color: #eee; cursor: pointer; z-index: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: transform 0.2s ease-out; display: flex; align-items: center; }
        .delete-btn { right: 0; width: 80px; background: var(--griffin-red); position: absolute; top: 0; bottom: 0; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; }
        .rename-btn { right: 80px; width: 80px; background: var(--griffin-orange); color: black; position: absolute; top: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; }

        .chord-row { position: relative; height: 1.5rem; color: var(--griffin-red); font-weight: bold; pointer-events: none; margin-bottom: -5px; }
        .chord-item { position: absolute; top: 0; white-space: pre; font-size: 1.1rem; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 15px; min-height: 1.2rem; }
    </style>
</head>
<body data-theme="light">
    <div id="toast" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--griffin-orange); padding:10px 20px; border-radius:20px; display:none; z-index:1000000; font-weight:bold; color:black;"></div>
    <input type="file" id="logoInput" accept="image/png" style="display:none;">
    <input type="file" id="bulkFiles" accept=".txt" multiple style="display:none;">
    <input type="file" id="restoreInput" accept=".json" style="display:none;">

    <div class="top-bar">
        <div class="top-bar-left">
            <img id="appLogo" alt="Logo">
            <button class="top-bar-btn" onclick="toggleMenu()">Songs</button>
        </div>
        <div class="top-bar-center">
            <div class="title-row">
                <h2 id="displayTitle">Stage Pilot v6.31</h2>
                <div class="transpose-pill">
                    <button class="tp-btn" onclick="transpose(-1)">−</button>
                    <span id="tpVal">0</span>
                    <button class="tp-btn" onclick="transpose(1)">+</button>
                </div>
            </div>
            <p style="margin:0; font-size:0.7rem; color:var(--griffin-orange); font-weight:bold;">THE DOGGY FEW</p>
        </div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" id="scrollBtn" viewBox="0 0 24 24" style="fill:#34c759;" onclick="toggleScroll()"><path d="M8 5v14l11-7z"/></svg>
            <svg class="top-bar-icon" id="editIcon" viewBox="0 0 24 24" onclick="startEdit()"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
            <svg class="top-bar-icon" id="settingsIcon" viewBox="0 0 24 24" onclick="openSettings()"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41l-0.36,2.54c-0.59,0.24-1.13,0.57-1.62,0.94L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.84,9.48l2.03,1.58C4.82,11.36,4.8,11.68,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            <button class="top-bar-btn" id="saveBtn" style="display:none;" onclick="finishEdit()">GEREED</button>
        </div>
    </div>

    <div class="songs-menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="songs-menu" id="songsMenu">
        <div style="padding:15px; background:#2c2c2e; border-bottom:1px solid #444; color:white; font-weight:bold; display:flex; justify-content: space-between; align-items: center;">
            <span>MY SONGBOOK</span>
            <button class="top-bar-btn" style="font-size: 0.8rem;" onclick="toggleMenu()">TERUG</button>
        </div>
        <div id="menuListWrapper">
            <div id="indexContent"></div>
            <div id="alphabetScroller"></div>
        </div>
    </div>

    <div id="settingsOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000000; padding:20px;">
        <div style="max-width:400px; margin:50px auto; background:#2c2c2e; padding:20px; border-radius:12px; text-align:center;">
            <h3 style="color:white; margin:0 0 10px 0;">Beheer</h3>
            <button class="modal-btn" style="width:100%; padding:15px; margin:10px 0; border:none; border-radius:8px; background:var(--griffin-orange); color:white; font-weight:bold;" onclick="downloadBackup()">💾 BACKUP OPSLAAN</button>
            <button class="modal-btn" style="width:100%; padding:15px; margin:10px 0; border:none; border-radius:8px; background:var(--griffin-orange); color:white; font-weight:bold;" onclick="document.getElementById('restoreInput').click()">🔄 BACKUP HERSTELLEN</button>
            <button class="modal-btn" style="width:100%; padding:15px; margin:10px 0; border:none; border-radius:8px; background:var(--griffin-orange); color:white; font-weight:bold;" onclick="document.getElementById('bulkFiles').click()">📂 TEXT FILES IMPORTEREN</button>
            <button class="modal-btn" style="width:100%; padding:15px; margin:10px 0; border:none; border-radius:8px; background:#444; color:white; font-weight:bold;" onclick="document.getElementById('settingsOverlay').style.display='none'">SLUITEN</button>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Songbook geladen. Kies een liedje.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <script>
        const APP_VERSION = "6.31";
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let cur = null, tOff = 0, sInt = null;

        window.onload = () => {
            if (localStorage.getItem('tdfVersion') !== APP_VERSION) {
                localStorage.setItem('tdfVersion', APP_VERSION);
                location.reload(true);
            }
            renderIndex(); initAlphaScroller();
        };

        function renderIndex() {
            const c = document.getElementById('indexContent'); c.innerHTML = "";
            db.sort((a,b) => a.title.localeCompare(b.title, 'nl', { sensitivity: 'base' }));
            let lastChar = "";
            db.forEach(s => {
                let firstChar = s.title.charAt(0).toUpperCase();
                if (!/[A-Z]/.test(firstChar)) firstChar = "#";
                if (firstChar !== lastChar) {
                    const header = document.createElement('div'); header.className = 'alphabet-header'; header.textContent = firstChar; header.id = `sect-${firstChar}`; c.appendChild(header); lastChar = firstChar;
                }
                const container = document.createElement('div'); container.className = 'index-container';
                container.innerHTML = `<div class="delete-btn" onclick="deleteSong('${s.title}')">Wis</div><div class="rename-btn" onclick="renameSong('${s.title}')">Naam</div><div class="index-item">${s.title}</div>`;
                const item = container.querySelector('.index-item');
                item.onclick = () => { loadSong(s.title); toggleMenu(); };
                initSwipe(item); c.appendChild(container);
            });
        }

        function initAlphaScroller() {
            const scroller = document.getElementById('alphabetScroller');
            const chars = "#ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
            scroller.innerHTML = "";
            chars.forEach(char => {
                const div = document.createElement('div'); div.className = 'alpha-link'; div.textContent = char;
                div.onclick = () => { const t = document.getElementById(`sect-${char}`); if(t) t.scrollIntoView(); };
                scroller.appendChild(div);
            });
        }

        function initSwipe(item) {
            let startX, moveX;
            item.addEventListener('touchstart', e => { startX = e.touches[0].clientX; item.style.transition = 'none'; });
            item.addEventListener('touchmove', e => { moveX = e.touches[0].clientX; let d = moveX - startX; if(d < 0) item.style.transform = `translateX(${Math.max(d, -160)}px)`; });
            item.addEventListener('touchend', () => { item.style.transition = 'transform 0.2s ease-out'; if(moveX - startX < -80) item.style.transform = 'translateX(-160px)'; else item.style.transform = 'translateX(0px)'; });
        }

        function loadSong(t) { cur = db.find(s => s.title === t); tOff = 0; document.getElementById('tpVal').textContent = "0"; document.getElementById('displayTitle').textContent = cur.title; draw(); }
        function draw() {
            if(!cur) return; const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let end = l.indexOf(']', i); if(end === -1) { txt += l[i]; i++; continue; }
                        let c = l.substring(i+1, end); if(tOff !== 0) c = tpChord(c, tOff);
                        chords.push({ p: txt.length, v: c }); i = end + 1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            document.getElementById('lyricsArea').innerHTML = h; document.getElementById('scroller').scrollTop = 0;
        }

        function tpChord(c, o) {
            const n = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
            return c.replace(/[A-G][#b]?/g, (m) => {
                let x = m; if(x==="Bb")x="A#"; if(x==="Eb")x="D#"; if(x==="Ab")x="G#"; if(x==="Db")x="C#"; if(x==="Gb")x="F#";
                let i = n.indexOf(x); if(i===-1) return m;
                let j = (i+o)%12; while(j<0)j+=12; return n[j];
            });
        }

        function toggleMenu() { document.getElementById('songsMenu').classList.toggle('open'); document.getElementById('menuOverlay').style.display = document.getElementById('songsMenu').classList.contains('open') ? 'block' : 'none'; }
        function openSettings() { document.getElementById('settingsOverlay').style.display = 'block'; }
        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editIcon').style.display='none'; document.getElementById('saveBtn').style.display='block'; document.getElementById('editorArea').style.display='block'; document.getElementById('editorArea').value=cur.content; }
        function finishEdit() { const i = db.findIndex(s=>s.title===cur.title); db[i].content = document.getElementById('editorArea').value; localStorage.setItem('tdfSongs',JSON.stringify(db)); document.getElementById('lyricsArea').style.display='block'; document.getElementById('editIcon').style.display='block'; document.getElementById('saveBtn').style.display='none'; document.getElementById('editorArea').style.display='none'; draw(); }
        function transpose(o) { if(!cur) return; tOff += o; document.getElementById('tpVal').textContent = (tOff > 0 ? "+" : "") + tOff; draw(); }
        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() { if(!cur) return; const c = document.getElementById('scroller'), h = c.scrollHeight - c.clientHeight; let d = 180; const s = h/(d*1000), t = Date.now(), p = c.scrollTop; document.getElementById('scrollBtn').style.fill = 'var(--griffin-red)'; sInt = setInterval(() => { c.scrollTop = p + ((Date.now()-t)*s); if(c.scrollTop >= h) stopScroll(); }, 50); }
        function stopScroll() { clearInterval(sInt); sInt = null; document.getElementById('scrollBtn').style.fill = "#34c759"; }
        function deleteSong(t) { if(confirm(`Wis ${t}?`)) { db = db.filter(s => s.title !== t); localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); } }
        function renameSong(o) { const n = prompt("Nieuwe naam:", o); if(n && n !== o) { const i = db.findIndex(s => s.title === o); db[i].title = n; localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); if(cur && cur.title === o) loadSong(n); } }
        function downloadBackup() { const d = JSON.stringify({date: new Date().toISOString(), data: db}), b = new Blob([d], {type: 'application/json'}), a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `TDF_Backup.json`; a.click(); }
        document.getElementById('bulkFiles').addEventListener('change', async function(e) { const files = Array.from(e.target.files); for(let f of files) { const t = await f.text(); const title = t.split('\n')[0].replace(/[\[\]\r]/g, '').trim() || f.name.replace('.txt',''); db.push({title, content: t}); } localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); });
    </script>
</body>
</html>
