<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v9.31</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --grey: #121212; --row-bg: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        /* HEADER */
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; flex-shrink: 0; }
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        /* MAIN */
        .main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #fff; }
        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; }

        /* EDITOR (CLEAN & PINNED) */
        #editorContainer { display: none; flex: 1; flex-direction: column; background: #000; }
        .editor-nav { background: #222; border-bottom: 1px solid #444; flex-shrink: 0; }
        .chord-bar { height: 60px; padding: 10px; display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .chord-btn { background: #333; color: var(--amber); border: 1px solid var(--amber); padding: 8px 15px; border-radius: 6px; font-weight: bold; min-width: 55px; text-align: center; }
        .tag-row { padding: 0 15px 10px 15px; }
        .tag-input { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 10px; border-radius: 6px; font-size: 1rem; outline: none; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; resize: none; font-family: monospace; outline: none; }

        /* TAG CLOUD UI */
        .search-area { padding: 10px 20px; background: #111; border-bottom: 1px solid #333; display: flex; gap: 10px; }
        .search-bar { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; font-size: 1.1rem; }
        #tagCloud { display: none; padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #333; overflow-x: auto; white-space: nowrap; gap: 8px; }
        .tag-pill { display: inline-block; padding: 6px 15px; background: #333; color: #aaa; border-radius: 20px; font-size: 0.9rem; margin-right: 6px; cursor: pointer; }
        .tag-pill.active { background: var(--amber); color: #000; font-weight: bold; }

        /* LISTS */
        .menu-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .row-item { background: var(--row-bg); margin-bottom: 2px; display: flex; align-items: center; padding: 15px 20px; min-height: 75px; }
        .song-info { flex: 1; cursor: pointer; }
        .song-title { font-size: 1.4rem; font-weight: bold; display: block; }
        .song-tags { font-size: 0.85rem; color: #666; margin-top: 5px; display: block; }

        /* LIVE */
        #liveView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 15000; overflow-y: auto; padding: 80px 35px 120px 35px; }
        .live-footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; background: rgba(15,15,15,0.98); border-top: 1px solid #333; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }

        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center; gap:8px;">
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; color:#555;">TDF v9.31</div>
        <div style="display:flex; gap:8px;">
            <button class="btn" id="editBtn" onclick="startEdit()">✎</button>
            <button class="btn" id="saveBtn" style="display:none; color:#25D366; border-color:#25D366;" onclick="finishEdit()">OK</button>
            <button class="btn" id="liveBtn" style="background:var(--amber); color:#000;" onclick="enterLiveView()">LIVE</button>
        </div>
    </div>

    <div class="main-container">
        <div id="lyricsArea">Selecteer een liedje uit de bibliotheek.</div>
        <div id="editorContainer">
            <div class="editor-nav">
                <div class="chord-bar" id="chordBar"></div>
                <div class="tag-row"><input type="text" id="tagField" class="tag-input" placeholder="Tags (gescheiden door komma's)..."></div>
            </div>
            <textarea id="editorArea" spellcheck="false"></textarea>
        </div>
    </div>

    <div id="liveView">
        <div id="liveContent"></div>
        <div class="live-footer">
            <button class="btn" style="border-radius:50%; width:60px; height:60px; font-size:1.5rem;" onclick="exitLiveView()">X</button>
            <div id="liveClock" style="font-size:1.8rem; font-weight:bold; color:var(--amber);">00:00</div>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h2>SETLIST</h2>
            <button class="btn" onclick="closeMenus()">SLUIT</button>
        </div>
        <div class="menu-scroll" id="setList"></div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h2>BIBLIOTHEEK</h2>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div class="search-area">
            <input type="text" id="songSearch" class="search-bar" placeholder="Zoek op titel of tag..." oninput="render()">
            <button class="btn" onclick="toggleCloud()">TAGS</button>
        </div>
        <div id="tagCloud"></div>
        <div class="menu-scroll" id="dbList"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null, activeTag = null;
        const chords = ["A","Am","B","Bm","C","Cm","D","Dm","E","Em","F","Fm","G","Gm","7"];

        window.onload = () => { 
            createChordBar(); 
            render(); 
            setInterval(() => { document.getElementById('liveClock').innerText = new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}); }, 1000); 
        };

        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }
        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function toggleCloud() { const c = document.getElementById('tagCloud'); c.style.display = (c.style.display === 'flex') ? 'none' : 'flex'; }

        function createChordBar() {
            const bar = document.getElementById('chordBar');
            chords.forEach(c => {
                const b = document.createElement('div'); b.className = 'chord-btn'; b.innerText = c;
                b.onclick = () => {
                    const a = document.getElementById('editorArea');
                    const s = a.selectionStart;
                    a.value = a.value.substring(0, s) + `[${c}]` + a.value.substring(a.selectionEnd);
                    a.focus(); a.selectionStart = a.selectionEnd = s + c.length + 2;
                };
                bar.appendChild(b);
            });
        }

        function startEdit() {
            if(!cur) return;
            document.getElementById('lyricsArea').style.display = 'none';
            document.getElementById('editorContainer').style.display = 'flex';
            document.getElementById('editorArea').value = cur.content;
            document.getElementById('tagField').value = cur.tags || "";
            document.getElementById('editBtn').style.display = 'none';
            document.getElementById('saveBtn').style.display = 'block';
        }

        function finishEdit() {
            cur.content = document.getElementById('editorArea').value;
            cur.tags = document.getElementById('tagField').value;
            let idx = db.findIndex(s => s.title === cur.title);
            if(idx !== -1) db[idx] = JSON.parse(JSON.stringify(cur));
            save(); render();
            document.getElementById('editorContainer').style.display = 'none';
            document.getElementById('lyricsArea').style.display = 'block';
            document.getElementById('editBtn').style.display = 'block';
            document.getElementById('saveBtn').style.display = 'none';
            drawLyrics('lyricsArea');
        }

        function render() {
            const sQ = document.getElementById('songSearch').value.toLowerCase();
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            const cloud = document.getElementById('tagCloud'); cloud.innerHTML = "";
            let tags = new Set();

            db.filter(s => {
                if(s.tags) s.tags.split(',').forEach(t => tags.add(t.trim()));
                const mSearch = s.title.toLowerCase().includes(sQ) || (s.tags && s.tags.toLowerCase().includes(sQ));
                const mTag = !activeTag || (s.tags && s.tags.split(',').map(t=>t.trim()).includes(activeTag));
                return mSearch && mTag;
            }).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div class="song-info" onclick="loadSongByName('${s.title.replace(/'/g,"\\")}')">
                    <span class="song-title">${s.title}</span><span class="song-tags">${s.tags||''}</span></div>
                    <button class="btn" onclick="setlist.push(JSON.parse(JSON.stringify(s))); save(); render();">+</button>`;
                dbl.appendChild(d);
            });

            Array.from(tags).sort().forEach(t => {
                const p = document.createElement('div'); p.className = 'tag-pill' + (activeTag===t ? ' active' : '');
                p.innerText = t; p.onclick = () => { activeTag = (activeTag === t ? null : t); render(); };
                cloud.appendChild(p);
            });

            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div class="song-info" onclick="loadSongByIndex(${i})"><span class="song-title">${i+1}. ${s.title}</span></div>
                    <button class="btn" style="color:red; border-color:red;" onclick="setlist.splice(${i},1); save(); render();">X</button>`;
                setl.appendChild(d);
            });
        }

        function drawLyrics(id) {
            const container = document.getElementById(id);
            if(!cur) return;
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') { let e = l.indexOf(']', i); chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1; } 
                    else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span style="position:absolute; left:${c.p}ch; color:var(--amber); font-weight:bold;">${c.v}</span>`; });
                h += `<div style="height:2.2rem; position:relative;">${r}</div><div style="margin-bottom:25px; font-weight:bold;">${txt || ' '}</div>`;
            });
            container.innerHTML = h; container.scrollTop = 0;
        }

        function enterLiveView() { if(!cur) return; document.getElementById('liveView').style.display = 'block'; drawLyrics('liveContent'); }
        function exitLiveView() { document.getElementById('liveView').style.display = 'none'; }
        function loadSongByIndex(i) { cur = setlist[i]; document.getElementById('title').innerText = cur.title; drawLyrics('lyricsArea'); closeMenus(); }
        function loadSongByName(t) { cur = db.find(x=>x.title===t); document.getElementById('title').innerText = cur.title; drawLyrics('lyricsArea'); closeMenus(); }
    </script>
</body>
</html>
