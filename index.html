<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v7.70</title>
    <style>
        :root { 
            --bg-black: #000; --amber: #ffbf00; --amber-dim: #cc9900; --red: #c12718; --grey: #121212; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; z-index: 3000; }
        .logo-box { width: 60px; height: 60px; margin-right: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; text-shadow: 0 0 5px var(--amber); }
        .btn-green { background: #25D366; color: white; border: none; }
        .btn-red { border: 1px solid var(--red); color: var(--red); background: none; border-radius: 6px; font-weight: bold; }
        
        .main-container { flex: 1; height: calc(100vh - 85px); background: #fff; position: relative; overflow: hidden; }
        #lyricsArea { height: 100%; overflow-y: auto; padding: 30px; color: #000; font-size: 1.5rem; line-height: 1.6; }
        #editorArea { display: none; width: 100%; height: 100%; padding: 30px; font-size: 1.5rem; border: none; font-family: monospace; background: #fcfcfc; color: #000; resize: none; }

        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .full-menu.open { left: 0; }
        .menu-header { padding: 15px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .menu-scroll { flex: 1; overflow-y: auto; padding: 15px; }
        
        .row-item { background: #1c1c1e; margin-bottom: 12px; border-radius: 8px; border: 1px solid #333; display: flex; align-items: center; }
        .row-name { flex: 1; padding: 20px; font-size: 1.8rem; font-weight: bold; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .chord-row { color: var(--red); font-weight: bold; height: 1.5rem; position: relative; }
        .chord-item { position: absolute; }
        .lyric-line { margin-bottom: 18px; display: block; white-space: pre; }

        /* Export Overlay */
        #exportOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 60000; display: none; flex-direction: column; padding: 40px 20px; }

        .draggable-box { position: fixed; background: #1a1a1a; border-radius: 12px; padding: 8px; display: none; z-index: 50000; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .drag-handle { color: rgba(255,255,255,0.6); text-align: center; font-size: 11px; cursor: move; padding: 6px; background: #2a2a2a; border-radius: 6px; margin-bottom: 8px; }
        .joy-btn, .chord-glow-btn { background: #222; color: var(--amber); border: 1px solid var(--amber-dim); text-shadow: 0 0 8px var(--amber); width: 55px; height: 55px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center;">
            <div class="logo-box" onclick="location.reload()"><img src="logo.png" alt="TDF"></div>
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" style="margin-left:8px;" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; font-size: 1.1rem; text-align:center; flex:1;">TDF v7.70</div>
        <div style="display:flex; gap:8px;">
            <button class="btn" onclick="startEdit()">✎</button>
            <button class="btn" id="saveBtn" style="display:none; color:#34c759; border-color:#34c759;" onclick="finishEdit()">OK</button>
        </div>
    </div>

    <div class="main-container">
        <div id="lyricsArea">Lokaal v7.70 geladen...</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <div id="exportOverlay">
        <h2 id="exportTitle" style="color:var(--amber);">Bestand voorbereiden...</h2>
        <p>Tik op de knop hieronder en kies daarna <b>'Bewaar in Bestanden'</b> om de map en naam te kiezen.</p>
        <button id="finalDownloadBtn" class="btn" style="padding:20px; font-size:1.5rem; margin-top:20px;">BEWAAR BESTAND</button>
        <button class="btn-red" style="margin-top:40px; padding:10px;" onclick="document.getElementById('exportOverlay').style.display='none'">ANNULEREN</button>
    </div>

    <div id="songsMenu" class="full-menu">
        <div class="menu-header"><h2 style="color:var(--amber);">SONGS</h2><button class="btn" onclick="closeMenus()">X</button></div>
        <div class="menu-scroll" id="dbList"></div>
        <div style="padding:15px; background:#111; display:flex; gap:8px;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impDB').click()">IMPORT DB</button>
            <button class="btn" style="flex:1;" onclick="exportDB()">EXPORT DB</button>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div class="menu-header">
            <div style="display:flex; gap:8px;">
                <button class="btn btn-green" onclick="pasteFromWA()">PLAK WA</button>
                <button class="btn btn-green" onclick="copySetWhatsApp()" style="border-radius:50%; width:44px; padding:0;">🟢</button>
                <button class="btn" onclick="addCustomRow()">+ REGEL</button>
            </div>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div class="menu-scroll" id="setList"></div>
        <div style="padding:15px; background:#111; display:flex; gap:8px;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impSet').click()">LAAD SET</button>
            <button class="btn" style="flex:1;" onclick="exportSet()">OPSLAAN SET</button>
        </div>
    </div>

    <div id="joyPad" class="draggable-box" style="bottom:25px; left:25px;"><div class="drag-handle">MOVE</div><div style="display:grid; grid-template-areas: '. u .' 'l . r' '. d .'; gap:6px;"><button class="joy-btn" style="grid-area:u" onclick="moveCursorVertical(-1)">↑</button><button class="joy-btn" style="grid-area:l" onclick="moveCursorHorizontal(-1)">←</button><button class="joy-btn" style="grid-area:r" onclick="moveCursorHorizontal(1)">→</button><button class="joy-btn" style="grid-area:d" onclick="moveCursorVertical(1)">↓</button></div></div>
    <div id="chordStrip" class="draggable-box" style="bottom:25px; right:25px;"><div class="drag-handle">CHORDS</div><div id="chordBar" style="display:flex; flex-direction:column; gap:6px;"></div></div>

    <input type="file" id="impDB" style="display:none;" onchange="importFiles(event, 'db')">
    <input type="file" id="impSet" style="display:none;" onchange="importFiles(event, 'set')">

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null;

        window.onload = () => { render(); buildChordStrip(); ['chordStrip', 'joyPad'].forEach(id => initDrag(document.getElementById(id))); };

        function openMenu(id) { document.getElementById(id).classList.add('open'); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }

        function render() {
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            db.sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div class="row-name" onclick="load('${s.title.replace(/'/g,"\\'")}')">${s.title}</div><button class="btn" style="margin-right:10px" onclick="addToSet('${s.title.replace(/'/g,"\\'")}')">+</button>`;
                dbl.appendChild(d);
            });
            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div style="width:40px; text-align:center; color:var(--amber); font-weight:bold;">${i+1}</div><div class="row-name" onclick="load('${s.title.replace(/'/g,"\\'")}')">${s.title}</div><button class="btn-red" style="margin-right:10px; padding:10px;" onclick="removeFromSet(${i})">X</button>`;
                setl.appendChild(d);
            });
        }

        function load(t) {
            cur = db.find(x=>x.title === t) || setlist.find(x=>x.title === t);
            if(!cur) return;
            document.getElementById('title').innerText = cur.title;
            drawLyrics(); closeMenus();
        }

        function drawLyrics() {
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;}
                        chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            document.getElementById('lyricsArea').innerHTML = h; document.getElementById('lyricsArea').scrollTop = 0;
        }

        async function pasteFromWA() {
            let text = ""; try { text = await navigator.clipboard.readText(); } catch (err) { text = prompt("Plak de tekst:"); }
            if (!text) return;
            const lines = text.split('\n'); const newSet = [];
            lines.forEach(line => {
                const clean = line.replace(/^\d+[\s.)]*/, '').trim(); if (!clean) return;
                const song = db.find(s => s.title.toLowerCase() === clean.toLowerCase());
                newSet.push(song ? JSON.parse(JSON.stringify(song)) : { title: clean, content: "" });
            });
            if (newSet.length > 0) { setlist = newSet; save(); render(); }
        }

        function copySetWhatsApp() {
            let t = "*SETLIST TDF*\n\n" + setlist.map((s,i) => (i+1)+". "+s.title).join("\n");
            navigator.clipboard.writeText(t); alert("Tekst gekopieerd!");
        }

        function addCustomRow() { const n = prompt("Tekst voor nieuwe regel:", "--- PAUZE ---"); if(n) { setlist.push({title: n, content: ""}); save(); render(); } }

        function startEdit() {
            if(!cur) return;
            document.getElementById('lyricsArea').style.display = 'none'; document.getElementById('editorArea').style.display = 'block';
            document.getElementById('editorArea').value = cur.content; document.getElementById('saveBtn').style.display = 'block';
            document.querySelectorAll('.draggable-box').forEach(b => b.style.display = 'block');
        }

        function finishEdit() {
            cur.content = document.getElementById('editorArea').value;
            let idx = db.findIndex(s => s.title === cur.title); if(idx !== -1) db[idx].content = cur.content;
            save(); document.getElementById('lyricsArea').style.display = 'block';
            document.getElementById('editorArea').style.display = 'none'; document.getElementById('saveBtn').style.display = 'none';
            document.querySelectorAll('.draggable-box').forEach(b => b.style.display = 'none'); drawLyrics();
        }

        function buildChordStrip() {
            const bar = document.getElementById('chordBar');
            ["A","Am","B","Bm","C","D","Dm","E","Em","F","G"].forEach(c => {
                const b = document.createElement('button'); b.className = "chord-glow-btn"; b.style.cssText = "width:65px; height:45px; border-radius:8px; margin-bottom:5px;";
                b.textContent = c; b.onmousedown = (e) => { e.preventDefault(); insert(`[${c}]`); }; bar.appendChild(b);
            });
        }

        function insert(t) {
            const ed = document.getElementById('editorArea'); const s = ed.selectionStart;
            ed.value = ed.value.substring(0, s) + t + ed.value.substring(ed.selectionEnd);
            ed.selectionStart = ed.selectionEnd = s + t.length; ed.focus();
        }

        function moveCursorHorizontal(n) { const ed = document.getElementById('editorArea'); ed.selectionStart = ed.selectionEnd = ed.selectionStart + n; ed.focus(); }
        function moveCursorVertical(n) {
            const ed = document.getElementById('editorArea'); const lines = ed.value.split('\n'); const pos = ed.selectionStart;
            let curL = ed.value.substr(0, pos).split('\n').length - 1; let tarL = Math.max(0, Math.min(lines.length - 1, curL + n));
            let newP = 0; for(let i=0; i<tarL; i++) newP += lines[i].length + 1; ed.selectionStart = ed.selectionEnd = newP; ed.focus();
        }

        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); render(); } }
        function removeFromSet(i) { setlist.splice(i, 1); save(); render(); }
        
        function exportDB() { 
            const name = prompt("Naam voor database backup:", "TDF_Database");
            if(name) prepareDownload(db, name); 
        }
        
        function exportSet() { 
            const name = prompt("Naam voor deze setlist:", "Setlist");
            if (name) { 
                const date = new Date().toISOString().slice(0,10);
                prepareDownload(setlist, `${name}_${date}`); 
            }
        }

        // GEWELDLOZE EXPORT VOOR FIREFOX IPAD
        function prepareDownload(data, filename) {
            const json = JSON.stringify(data, null, 2);
            const overlay = document.getElementById('exportOverlay');
            const btn = document.getElementById('finalDownloadBtn');
            const title = document.getElementById('exportTitle');
            
            title.innerText = "Bestand: " + filename + ".json";
            overlay.style.display = 'flex';
            
            btn.onclick = () => {
                const blob = new Blob([json], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename + ".json";
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    overlay.style.display = 'none';
                }, 500);
            };
        }

        function importFiles(e, type) {
            const r = new FileReader(); r.onload = (p) => { 
                try {
                    const data = JSON.parse(p.target.result); 
                    if(type==='db') db = data; else setlist = data; 
                    save(); render(); alert("Geladen!"); 
                } catch(err) { alert("Fout bij laden."); }
            };
            r.readAsText(e.target.files[0]);
        }

        function initDrag(el) {
            let p1=0, p2=0, p3=0, p4=0; const h = el.querySelector('.drag-handle');
            h.onmousedown = h.ontouchstart = (e) => {
                e.preventDefault(); p3 = e.clientX || e.touches[0].clientX; p4 = e.clientY || e.touches[0].clientY;
                document.onmouseup = document.ontouchend = () => { document.onmousemove = document.ontouchmove = null; };
                document.onmousemove = document.ontouchmove = (me) => {
                    p1 = p3 - (me.clientX || me.touches[0].clientX); p2 = p4 - (me.clientY || me.touches[0].clientY);
                    p3 = me.clientX || me.touches[0].clientX; p4 = me.clientY || me.touches[0].clientY;
                    el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px";
                }
            }
        }
    </script>
</body>
</html>
