<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Master v6.90</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 20px); 
            --header-height: calc(60px + var(--safe-top)); 
            --griffin-orange: #d48e3d;
            --griffin-red: #c12718;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            height: 100dvh; width: 100vw; overflow: hidden; position: fixed; 
            background: #ffffff; color: #000000; font-family: sans-serif;
        }
        .top-bar { 
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); 
            z-index: 1000; border-bottom: 2px solid #000; background: #fff;
        }
        .top-bar-content { margin-top: var(--safe-top); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; }
        .lyrics-container { 
            position: absolute; top: var(--header-height); bottom: 0; left: 0; right: 0;
            overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px;
        }
        #lyricsArea { font-family: monospace; font-size: 1.4rem; font-weight: 800; white-space: pre-wrap; }
        #editorArea { 
            display: none; width: 100%; height: 100%; font-family: monospace; 
            font-size: 1.2rem; border: none; outline: none; padding: 10px;
        }
        .floater { 
            position: fixed; z-index: 2000; background: #fff; border: 2px solid #000; 
            border-radius: 10px; padding: 5px; text-align: center;
        }
        .f-btn { border: 1px solid #000; background: #fff; font-weight: 900; padding: 8px; cursor: pointer; }
        .floating-pad { width: 120px; height: 120px; left: 20px; bottom: 30px; border-radius: 50%; display: none; }
        .floating-chords { width: 140px; right: 20px; bottom: 30px; display: none; grid-template-columns: 1fr 1fr; gap: 5px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-content">
            <button onclick="toggleMenu()" class="f-btn">SONGS</button>
            <div id="displayTitle" onclick="saveFromTitle()" style="font-weight:900;">TDF MASTER</div>
            <div style="display:flex; gap:5px;">
                <button onclick="downloadBackup()" class="f-btn">💾</button>
                <button onclick="createNewSong()" class="f-btn">+</button>
                <button onclick="startEdit()" class="f-btn">✎</button>
            </div>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea"></div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <div class="floater floating-pad" id="floatPad">
        <button class="f-btn" style="position:absolute; top:5px; left:40px;" onclick="moveCursor('up')">↑</button>
        <button class="f-btn" style="position:absolute; bottom:5px; left:40px;" onclick="moveCursor('down')">↓</button>
        <button class="f-btn" style="position:absolute; left:5px; top:40px;" onclick="moveCursor('left')">←</button>
        <button class="f-btn" style="position:absolute; right:5px; top:40px;" onclick="moveCursor('right')">→</button>
    </div>

    <div class="floater floating-chords" id="floatChords">
        <button class="f-btn" onclick="injectChord('A')">A</button><button class="f-btn" onclick="injectChord('Am')">Am</button>
        <button class="f-btn" onclick="injectChord('C')">C</button><button class="f-btn" onclick="injectChord('G')">G</button>
    </div>

    <script>
        const el = (id) => document.getElementById(id);
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let cur = null;

        function draw() {
            if(!cur) return;
            el('lyricsArea').innerText = cur.content;
        }

        function startEdit() {
            if(!cur) return;
            el('lyricsArea').style.display = 'none';
            el('editorArea').style.display = 'block';
            el('floatPad').style.display = 'block';
            el('floatChords').style.display = 'grid';
            el('editorArea').value = cur.content;
        }

        function saveFromTitle() {
            if(el('editorArea').style.display === 'block') {
                const idx = db.findIndex(s => s.title === cur.title);
                db[idx].content = el('editorArea').value;
                localStorage.setItem('tdfSongs', JSON.stringify(db));
                el('lyricsArea').style.display = 'block';
                el('editorArea').style.display = 'none';
                el('floatPad').style.display = 'none';
                el('floatChords').style.display = 'none';
                draw();
            }
        }

        function downloadBackup() {
            const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'tdf_master_v690.json';
            a.click();
        }

        window.onload = () => { if(db.length > 0) { cur = db[0]; draw(); } };
    </script>
</body>
</html>
