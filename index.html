<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v10.49</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --grey: #121212; --row-bg: #1c1c1e; --red: #ff3b30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; }
        
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; flex-shrink: 0; z-index: 5000; }
        .logo-img { height: 45px; width: auto; cursor: pointer; }
        
        .main-container { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: #fff; z-index: 1000; }
        .watermark { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); width: 70%; pointer-events: none; z-index: 0; opacity: 0.1; }

        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; position: relative; z-index: 10; background: transparent; }
        #liveView { display: none; flex: 1; background: #000; overflow-y: auto; padding: 40px 35px 600px 35px; z-index: 2000; color: #fff; }
        
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 100000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-scroll { flex: 1; overflow-y: auto; padding-bottom: 120px; }

        .setlist-row { height: 75px; background: var(--row-bg); margin-bottom: 2px; display: flex; align-items: center; padding: 0 10px 0 20px; color: #fff; border-bottom: 1px solid #222; position: relative; cursor: pointer; }
        .setlist-row.edit-active { border-left: 8px solid var(--amber); background: #252525; }
        
        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; z-index: 100; position: relative; }
        .btn.active { background: var(--amber); color: #000; }

        #editorContainer { display: none; flex: 1; flex-direction: column; background: #000; z-index: 200000; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 1.5rem; border: none; background: #fcfcfc; color: #000; outline: none; font-family: monospace; resize: none; }

        #toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 12px 24px; border-radius: 30px; font-weight: bold; z-index: 500000; display: none; }
    </style>
</head>
<body>
    <div id="toast">MELDING</div>
    <input type="file" id="importJsonFile" style="display:none" accept="application/json">
    <input type="file" id="importTxtFile" style="display:none" accept="text/plain">

    <div class="top-bar" id="mainTopBar">
        <div class="top-left"><img src="logo.png" class="logo-img" onclick="location.reload()"><button class="btn" onclick="openMenu('songsMenu')">SONGS</button><button class="btn" onclick="openMenu('setMenu')">SET</button></div>
        <div id="title" class="top-center">TDF DIGITAL</div>
        <div class="top-right"><button class="btn" id="liveBtn" style="background:var(--amber); color:#000;" onclick="enterLiveView()">LIVE</button></div>
    </div>

    <div class="main-container">
        <img src="logo.png" id="bgLogo" class="watermark">
        <div id="lyricsArea"></div>
        <div id="liveView"><div id="liveContent"></div></div>
        
        <div id="editorContainer">
            <div style="padding:15px; background:#111; display:flex; justify-content:space-between; align-items:center;">
                <button class="btn" onclick="renameSong()">NAAM</button>
                <div style="display:flex; gap:5px;"><button class="btn" onclick="transpose(-1)">[-1]</button><button class="btn" onclick="transpose(1)">[+1]</button></div>
                <div style="display:flex; gap:5px;"><button class="btn" onclick="exportSingleTxt()">TXT</button><button class="btn" style="background:var(--amber); color:#000;" onclick="finishEdit()">OPSLAAN</button></div>
            </div>
            <div id="editorChordBar" style="display:flex; overflow-x:auto; padding:10px; background:#222; gap:8px;"></div>
            <textarea id="editorArea" spellcheck="false"></textarea>
        </div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex; gap:8px;">
                <button class="btn" id="selectBtn" onclick="toggleSelectMode()">SELECT</button>
                <button class="btn" id="songEditGlobalBtn" onclick="toggleSongEditMode()">EDIT</button>
            </div>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div style="padding:15px;"><input type="text" id="songSearch" placeholder="Zoek..." oninput="render()" style="width:100%; background:#111; color:#fff; border:1px solid #444; padding:15px; border-radius:8px; font-size:1.2rem;"></div>
        <div id="dbList" class="menu-scroll"></div>
        <div class="menu-footer" style="padding:20px; background:#111; border-top:1px solid #333;">
            <button class="btn" style="width:100%;" onclick="toggleSub('songsAdmin')">BEHEER DATABASE</button>
            <div id="songsAdmin" style="display:none; flex-direction:column; gap:10px; margin-top:10px;">
                <button class="btn" onclick="exportDB()">BACKUP JSON</button>
                <button class="btn" onclick="document.getElementById('importJsonFile').click()">RESTORE JSON</button>
                <button class="btn btn-danger" onclick="cleanDuplicates()">CLEAN DB</button>
            </div>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <button class="btn" onclick="toggleSetEdit()">EDIT</button>
            <b id="headerTime">00:00</b>
            <button class="btn" onclick="closeMenus()">X</button>
        </div>
        <div id="setList" class="menu-scroll"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let archives = JSON.parse(localStorage.getItem('tdfArchives')) || [];
        let songEditMode = false;
        let selectMode = false;
        let selectedSongs = [];
        let cur = null;

        const scale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const flats = { "Db": "C#", "Eb": "D#", "Gb": "F#", "Ab": "G#", "Bb": "A#" };

        window.onload = () => { render(); createChordButtons(); setInterval(() => { document.getElementById('headerTime').innerText = new Date().toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'}); }, 1000); };

        function toggleSongEditMode() {
            songEditMode = !songEditMode;
            document.getElementById('songEditGlobalBtn').classList.toggle('active', songEditMode);
            render();
            showToast(songEditMode ? "EDIT MODUS AAN" : "PREVIEW MODUS");
        }

        function render() {
            const dbl = document.getElementById('dbList');
            dbl.innerHTML = "";
            const query = document.getElementById('songSearch').value.toLowerCase();

            db.filter(s => s && s.title.toLowerCase().includes(query)).sort((a,b) => a.title.localeCompare(b.title)).forEach(s => {
                const row = document.createElement('div');
                row.className = "setlist-row" + (songEditMode ? " edit-active" : "");
                
                // Touch-safe afhandeling
                row.onmousedown = (e) => {
                    if (e.target.tagName === 'BUTTON') return;
                    if (songEditMode) startEdit(s.title); else loadSong(s.title);
                };

                row.innerHTML = `
                    <div style="flex:1; font-size:1.4rem;"><b>${s.title}</b><br><small style="opacity:0.5">${s.tags || ''}</small></div>
                    <button class="btn" style="min-width:60px;" onclick="event.stopPropagation(); addToSetlist('${s.title.replace(/'/g, "\\'")}')">+</button>
                `;
                dbl.appendChild(row);
            });
        }

        function startEdit(title) {
            cur = db.find(x => x.title === title);
            if(cur) {
                document.getElementById('editorArea').value = cur.content;
                document.getElementById('editorContainer').style.display = 'flex';
                closeMenus();
            }
        }

        function finishEdit() {
            if(cur) {
                cur.content = document.getElementById('editorArea').value;
                localStorage.setItem('tdfSongs', JSON.stringify(db));
                document.getElementById('editorContainer').style.display = 'none';
                loadSong(cur.title);
                render();
            }
        }

        function loadSong(title) {
            cur = db.find(x => x.title === title);
            if(cur) {
                document.getElementById('lyricsArea').innerHTML = cur.content.replace(/\n/g, '<br>');
                document.getElementById('bgLogo').style.display = 'none';
                closeMenus();
            }
        }

        function addToSetlist(title) {
            const s = db.find(x => x.title === title);
            if(s) {
                setlist.push(JSON.parse(JSON.stringify(s)));
                localStorage.setItem('tdfSetlist', JSON.stringify(setlist));
                showToast("SET +1");
            }
        }

        function transpose(dir) {
            const area = document.getElementById('editorArea');
            area.value = area.value.replace(/\[(.*?)\]/g, (match, chord) => {
                const transposed = chord.split('/').map(part => {
                    let root = part.match(/^[A-G][#b]?/)?.[0]; if (!root) return part;
                    let suffix = part.slice(root.length), val = flats[root] || root, idx = scale.indexOf(val);
                    if (idx === -1) return part;
                    let newIdx = (idx + dir + 12) % 12; return scale[newIdx] + suffix;
                }).join('/');
                return `[${transposed}]`;
            });
        }

        function createChordButtons() {
            const bar = document.getElementById('editorChordBar');
            ["A", "Am", "B", "Bm", "C", "Cm", "D", "Dm", "E", "Em", "F", "Fm", "G", "Gm", "7"].forEach(c => {
                const b = document.createElement('button');
                b.className = 'chord-btn';
                b.innerText = c;
                b.onclick = () => {
                    const area = document.getElementById('editorArea');
                    const start = area.selectionStart;
                    area.value = area.value.substring(0, start) + `[${c}]` + area.value.substring(area.selectionEnd);
                    area.focus();
                };
                bar.appendChild(b);
            });
        }

        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function toggleSub(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'none') ? 'flex' : 'none'; }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 1000); }
        function exportDB() { const data = JSON.stringify(db); const blob = new Blob([data], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `tdf_backup.json`; a.click(); }
        function exportSingleTxt() { if(!cur) return; const blob = new Blob([document.getElementById('editorArea').value], {type:'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${cur.title}.txt`; a.click(); }
    </script>
</body>
</html>
