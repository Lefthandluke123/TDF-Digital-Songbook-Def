<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Digital v8.88</title>
    <style>
        :root { --bg-black: #000; --amber: #ffbf00; --amber-dim: #cc9900; --red: #c12718; --grey: #121212; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { font-family: ui-monospace, 'SF Mono', monospace; background: var(--bg-black); color: #fff; margin: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        /* HEADER */
        .top-bar { height: 85px; background: var(--grey); display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; border-bottom: 2px solid #222; z-index: 3000; }
        .logo-box { width: 55px; height: 55px; min-width: 55px; margin-right: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: #000; border-radius: 8px; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: contain; }

        .btn { border: 1px solid var(--amber); color: var(--amber); background: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-shadow: 0 0 5px var(--amber); font-size: 0.95rem; }
        .btn-green { background: #25D366; color: white; border: none; }
        .btn-red { border: 1px solid var(--red); color: var(--red); background: none; border-radius: 8px; }

        /* VIEWER & EDITOR AREA */
        .main-container { flex: 1; height: calc(100vh - 85px); background: #fff; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #lyricsArea { flex: 1; overflow-y: auto; padding: 40px; color: #000; font-size: 1.8rem; line-height: 1.6; -webkit-overflow-scrolling: touch; }
        
        /* Editor Styles */
        #editorContainer { display: none; flex-direction: column; height: 100%; background: #1a1a1a; }
        #editorArea { flex: 1; width: 100%; padding: 25px; font-size: 1.4rem; border: none; background: #fcfcfc; color: #000; resize: none; font-family: monospace; }
        #tagEditor { background: #222; padding: 15px 25px; display: flex; flex-direction: column; gap: 8px; border-top: 2px solid var(--amber); }
        #tagInput { width: 100%; padding: 12px; background: #000; color: var(--amber); border: 1px solid #444; border-radius: 8px; font-size: 1.1rem; }

        /* LIVE OVERLAY */
        #liveView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 15000; overflow-y: auto; padding: 140px 35px 450px 35px; scroll-behavior: auto; }
        #liveView .lyric-line { font-size: 2.2rem; line-height: 1.2; margin-bottom: 35px; color: #eee; font-weight: bold; white-space: pre-wrap; word-wrap: break-word; }
        #liveView .chord-row { font-size: 2.8rem; height: 3.2rem; margin-bottom: 5px; color: var(--amber); white-space: pre; }
        
        .live-controls { position: fixed; top: 0; left: 0; width: 100%; height: 120px; background: rgba(15,15,15,0.98); padding: 10px 25px; display: flex; align-items: center; justify-content: space-between; z-index: 16000; border-bottom: 2px solid #333; backdrop-filter: blur(10px); }
        
        /* HIGH CONTRAST THUMBWHEEL */
        .wheel-wrap { position: relative; width: 110px; height: 95px; background: #000; border: 2px solid #555; border-radius: 12px; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; }
        .wheel-strip { position: absolute; width: 100%; text-align: center; transition: transform 0.08s ease-out; pointer-events: none; }
        .wheel-num { height: 30px; line-height: 30px; font-size: 1.4rem; font-weight: 800; color: #777; }
        .wheel-num.active { color: #fff; text-shadow: 0 0 15px #fff, 0 0 5px var(--amber); font-size: 2.1rem; }
        .wheel-overlay { position: absolute; width: 100%; height: 38px; border-top: 3px solid var(--amber); border-bottom: 3px solid var(--amber); pointer-events: none; background: rgba(255,191,0,0.1); z-index: 5; }

        .time-display { font-size: 1.2rem; font-weight: bold; min-width: 85px; text-align: right; cursor: pointer; color: #fff; }

        /* MENUS */
        .full-menu { position: fixed; top: 0; left: -100%; width: 100%; height: 100%; background: #000; z-index: 10000; transition: 0.3s; display: flex; flex-direction: column; }
        .full-menu.open { left: 0; }
        .menu-header { padding: 20px; border-bottom: 2px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .menu-scroll { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        .search-wrap { padding: 10px 20px; background: #111; }
        .search-input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; font-size: 1.2rem; }
        
        .row-item { background: #1c1c1e; margin-bottom: 12px; border-radius: 10px; border: 1px solid #333; display: flex; align-items: center; }
        .row-name { flex: 1; padding: 15px 22px; overflow: hidden; }
        .song-title { font-size: 1.6rem; font-weight: bold; color: #fff; display: block; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .song-tags { font-size: 1rem; color: var(--amber-dim); display: block; margin-top: 4px; }
        .drag-handle { padding: 22px; color: var(--amber); font-size: 2.2rem; }

        .chord-row { color: var(--red); font-weight: bold; height: 1.8rem; position: relative; }
        .chord-item { position: absolute; }
        .lyric-line { margin-bottom: 22px; display: block; white-space: pre; }
        #toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: var(--amber); color: #000; padding: 15px 30px; border-radius: 30px; font-weight: bold; display: none; z-index: 60000; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="display:flex; align-items:center;">
            <div class="logo-box" onclick="location.reload()"><img src="logo.png" alt="TDF"></div>
            <button class="btn" onclick="openMenu('songsMenu')">SONGS</button>
            <button class="btn" style="margin-left:8px;" onclick="openMenu('setMenu')">SET</button>
        </div>
        <div id="title" style="font-weight:bold; font-size: 1.1rem; text-align:center; flex:1; overflow:hidden; white-space:nowrap; margin:0 5px;">TDF v8.88</div>
        <div style="display:flex; gap:8px;">
            <button class="btn" style="border-color:#34c759; color:#34c759;" onclick="enterLiveView()">LIVE</button>
            <button class="btn" id="editBtn" onclick="startEdit()">✎</button>
            <button class="btn" id="saveBtn" style="display:none; color:#34c759;" onclick="finishEdit()">OK</button>
        </div>
    </div>

    <div id="toast">Bericht</div>

    <div class="main-container">
        <div id="lyricsArea">Selecteer een song. Gebruik ✎ om tekst of tags aan te passen.</div>
        
        <div id="editorContainer">
            <textarea id="editorArea" spellcheck="false"></textarea>
            <div id="tagEditor">
                <label style="font-size: 0.8rem; color: #888;">TAGS (KOMMA GESCHEIDEN):</label>
                <input type="text" id="tagInput" placeholder="bijv. Jazz, Luke, Repetitie">
            </div>
        </div>
    </div>

    <div id="liveView">
        <div class="live-controls">
            <button class="btn-red" onclick="exitLiveView()">X</button>
            <button class="btn" onclick="navSong(-1)">&lt;</button>
            <button id="playBtn" class="btn" style="width:60px" onclick="toggleScroll()">▶</button>
            <button class="btn" onclick="navSong(1)">&gt;</button>
            
            <div class="wheel-wrap" id="thumbWheel">
                <div class="wheel-overlay"></div>
                <div class="wheel-strip" id="wheelStrip"></div>
            </div>

            <button class="btn" id="chordToggleBtn" onclick="toggleOnlyChords()">CHORDS</button>
            <div id="liveClock" class="time-display" onclick="toggleTimeMode()">00:00</div>
        </div>
        <div id="liveContent"></div>
    </div>

    <div id="songsMenu" class="full-menu">
        <div class="menu-header"><h2>SONGS</h2><button class="btn" onclick="closeMenus()">X</button></div>
        <div class="search-wrap"><input type="text" id="songSearch" class="search-input" placeholder="Zoek op titel of tag..." oninput="render()"></div>
        <div class="menu-scroll" id="dbList"></div>
        <div style="padding:20px; background:#111; display:flex; gap:10px;">
            <button class="btn" style="flex:1;" onclick="document.getElementById('impAny').click()">IMPORT</button>
            <button class="btn-red" style="flex:1;" onclick="cleanDatabase()">CLEAN</button>
        </div>
    </div>

    <div id="setMenu" class="full-menu">
        <div class="menu-header"><h2>SETLIST</h2><button class="btn" onclick="closeMenus()">X</button></div>
        <div class="menu-scroll" id="setList"></div>
        <div style="padding:10px; background:#111;"><button class="btn-green" style="width:100%" onclick="pasteFromWA()">PLAK WA</button></div>
    </div>

    <input type="file" id="impAny" multiple style="display:none;" onchange="importAnyFile(event)">

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null, draggingIdx = null, isScrolling = false, setStartTime = 0, isTimerMode = false;
        let scrollY = 0, currentSpeed = 0;

        window.onload = () => { createWheelNodes(); initThumbWheel(); render(); startClockLoop(); requestAnimationFrame(scrollEngine); };

        function openMenu(id) { document.getElementById(id).classList.add('open'); render(); }
        function closeMenus() { document.querySelectorAll('.full-menu').forEach(m => m.classList.remove('open')); }
        function save() { localStorage.setItem('tdfSongs', JSON.stringify(db)); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); }

        function render() {
            const query = document.getElementById('songSearch') ? document.getElementById('songSearch').value.toLowerCase() : "";
            const dbl = document.getElementById('dbList'); dbl.innerHTML = "";
            db.filter(s => (s.title + (s.tags||"")).toLowerCase().includes(query)).sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const d = document.createElement('div'); d.className = "row-item";
                d.innerHTML = `<div class="row-name" onclick="loadSong('${s.title.replace(/'/g,"\\")}')"><span class="song-title">${s.title}</span><span class="song-tags">${s.tags || ''}</span></div><button class="btn" onclick="addToSet('${s.title.replace(/'/g,"\\")}')">+</button>`;
                dbl.appendChild(d);
            });
            const setl = document.getElementById('setList'); setl.innerHTML = "";
            setlist.forEach((s, i) => {
                const d = document.createElement('div'); d.className = "row-item"; d.draggable = true;
                d.innerHTML = `<div class="drag-handle">≡</div><div class="row-name" onclick="loadSong('${s.title.replace(/'/g,"\\")}')"><span class="song-title">${i+1}. ${s.title}</span></div><button class="btn-red" onclick="removeFromSet(${i})">X</button>`;
                d.ondragstart = () => { draggingIdx = i; };
                d.ondrop = (e) => { e.preventDefault(); const item = setlist.splice(draggingIdx, 1)[0]; setlist.splice(i, 0, item); save(); render(); };
                d.ondragover = (e) => e.preventDefault();
                setl.appendChild(d);
            });
        }

        function loadSong(t) { cur = db.find(x=>x.title===t) || setlist.find(x=>x.title===t); if(cur) { document.getElementById('title').innerText = cur.title; drawLyrics(document.getElementById('lyricsArea')); closeMenus(); } }
        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push(JSON.parse(JSON.stringify(s))); save(); showToast("Toegevoegd!"); } }
        function removeFromSet(i) { setlist.splice(i, 1); save(); render(); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 1000); }

        function drawLyrics(container) {
            if(!cur) return;
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;}
                        chords.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            container.innerHTML = h; container.scrollTop = 0; scrollY = 0;
        }

        function enterLiveView() { if(!cur) return; document.getElementById('liveView').style.display = 'block'; drawLyrics(document.getElementById('liveContent')); currentSpeed = cur.scrollSpeed || 0; updateWheelPosition(); isScrolling = false; updatePlayBtn(); if(!setStartTime) setStartTime = Date.now(); }
        function exitLiveView() { saveCurrentSpeed(); isScrolling = false; document.getElementById('liveView').style.display = 'none'; }
        function toggleScroll() { isScrolling = !isScrolling; updatePlayBtn(); }
        function scrollEngine() { const lv = document.getElementById('liveView'); if (lv.style.display === 'block' && isScrolling && currentSpeed > 0) { scrollY += (currentSpeed * 0.35) + 0.05; lv.scrollTop = Math.floor(scrollY); } requestAnimationFrame(scrollEngine); }

        function createWheelNodes() { const strip = document.getElementById('wheelStrip'); strip.innerHTML = ""; for(let i=0; i<=150; i++) { const d = document.createElement('div'); d.className = 'wheel-num'; d.innerText = (i/10).toFixed(1); strip.appendChild(d); } }
        function initThumbWheel() { const wheel = document.getElementById('thumbWheel'); let isDragging = false, startY = 0, startSpeed = 0; const handleMove = (e) => { if (!isDragging) return; const y = e.clientY || (e.touches ? e.touches[0].clientY : 0); currentSpeed = Math.max(0, Math.min(15, startSpeed + (startY - y) / 10)); updateWheelPosition(); }; wheel.addEventListener('mousedown', (e) => { isDragging = true; startY = e.clientY; startSpeed = currentSpeed; }); wheel.addEventListener('touchstart', (e) => { isDragging = true; startY = e.touches[0].clientY; startSpeed = currentSpeed; }); window.addEventListener('mousemove', handleMove); window.addEventListener('touchmove', handleMove); window.addEventListener('mouseup', () => isDragging = false); window.addEventListener('touchend', () => isDragging = false); }
        function updateWheelPosition() { const strip = document.getElementById('wheelStrip'); const offset = (currentSpeed * 10) * 30; strip.style.transform = `translateY(${47.5 - 15 - offset}px)`; const nums = strip.querySelectorAll('.wheel-num'); nums.forEach((n, i) => { n.classList.toggle('active', Math.abs(currentSpeed - i/10) < 0.05); }); }

        function startEdit() { 
            if(!cur) return; 
            document.getElementById('lyricsArea').style.display='none'; 
            document.getElementById('editorContainer').style.display='flex'; 
            document.getElementById('editorArea').value=cur.content; 
            document.getElementById('tagInput').value=cur.tags||""; 
            document.getElementById('editBtn').style.display='none';
            document.getElementById('saveBtn').style.display='block'; 
        }

        function finishEdit() { 
            cur.content=document.getElementById('editorArea').value; 
            cur.tags=document.getElementById('tagInput').value; 
            save(); 
            document.getElementById('lyricsArea').style.display='block'; 
            document.getElementById('editorContainer').style.display='none'; 
            document.getElementById('saveBtn').style.display='none'; 
            document.getElementById('editBtn').style.display='block';
            drawLyrics(document.getElementById('lyricsArea')); 
            render(); 
        }

        function updatePlayBtn() { const btn = document.getElementById('playBtn'); btn.innerText = isScrolling ? "⏸" : "▶"; btn.style.background = isScrolling ? "rgba(255,191,0,0.2)" : "none"; }
        function saveCurrentSpeed() { if(cur) { cur.scrollSpeed = currentSpeed; let idx = db.findIndex(x => x.title === cur.title); if(idx !== -1) db[idx].scrollSpeed = currentSpeed; save(); } }
        function navSong(dir) { saveCurrentSpeed(); const idx = setlist.findIndex(s => s.title === cur.title); const nIdx = idx + dir; if(nIdx >= 0 && nIdx < setlist.length) { cur = setlist[nIdx]; document.getElementById('title').innerText = cur.title; drawLyrics(document.getElementById('liveContent')); currentSpeed = cur.scrollSpeed || 0; isScrolling = false; scrollY = 0; updateWheelPosition(); updatePlayBtn(); document.getElementById('liveView').scrollTop = 0; } }
        function startClockLoop() { setInterval(() => { const clock = document.getElementById('liveClock'); if(!isTimerMode) { clock.innerText = new Date().toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'}); } else { const diff = Date.now() - setStartTime; const m = Math.floor((diff % 3600000) / 60000); const s = Math.floor((diff % 60000) / 1000); clock.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; } }, 1000); }
        function toggleTimeMode() { isTimerMode = !isTimerMode; document.getElementById('liveClock').style.color = isTimerMode ? "var(--amber)" : "#fff"; }
        function toggleOnlyChords() { const lv = document.getElementById('liveView'); lv.classList.toggle('only-chords'); document.getElementById('chordToggleBtn').innerText = lv.classList.contains('only-chords') ? "LYRICS" : "CHORDS"; }
        function cleanDatabase() { const unique = new Set(); const cleaned = []; db.forEach(s => { if(s.title && !unique.has(s.title.toLowerCase())) { unique.add(s.title.toLowerCase()); cleaned.push(s); }}); db = cleaned; save(); render(); }
        function importAnyFile(e) { const files = Array.from(e.target.files); files.forEach(f => { const reader = new FileReader(); reader.onload = (event) => { const content = event.target.result; const ext = f.name.split('.').pop().toLowerCase(); if(ext === 'json') { try { const parsed = JSON.parse(content); if(Array.isArray(parsed)) { parsed.forEach(s => { if(s.title && (s.content || s.lyrics)) db.push({title: s.title, content: s.content || s.lyrics, tags: s.tags || "", scrollSpeed: s.scrollSpeed || 0}); }); } else { if(parsed.title) db.push({title: parsed.title, content: parsed.content || parsed.lyrics, tags: parsed.tags || "", scrollSpeed: parsed.scrollSpeed || 0}); } } catch(err) { console.error("JSON Error"); } } else { let t = f.name.replace(/\.[^/.]+$/, ""); const m = content.match(/\{(?:title|t):\s*(.*)\}/i); db.push({title: m ? m[1] : t, content: content, tags: "", scrollSpeed: 0}); } save(); render(); }; reader.readAsText(f); }); showToast("Geladen!"); }
        function pasteFromWA() { navigator.clipboard.readText().then(text => { if(!text) return; setlist = text.split('\n').map(l => { const t = l.replace(/^\d+[\s.)]*/, '').trim(); const s = db.find(x => x.title.toLowerCase() === t.toLowerCase()); return s ? JSON.parse(JSON.stringify(s)) : {title: t, content: "", tags: "", scrollSpeed: 0}; }).filter(x => x.title); save(); render(); }); }
    </script>
</body>
</html>
