<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Stage Pilot v6.24</title>
    <style>
        :root { 
            --bg-dark: #121212; --top-bar-bg: #1a1a1a;
            --griffin-orange: #d48e3d; --griffin-red: #c12718; 
            --header-height: 65px;
            --lyric-bg: #ffffff; --lyric-text: #000000;
        }
        [data-theme="dark"] { --lyric-bg: #000000; --lyric-text: #ffffff; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
        body { font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace; display: flex; flex-direction: column; padding-top: var(--header-height); }

        .top-bar { 
            position: fixed; top: 0 !important; left: 0; width: 100%; height: var(--header-height); 
            background: var(--top-bar-bg); border-bottom: 1px solid #333; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; z-index: 99999; 
        }
        .top-bar-center { text-align: center; flex-grow: 1; }
        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .top-bar-icon { width: 28px; height: 28px; fill: var(--griffin-orange); cursor: pointer; }

        /* Lyrics & Editor */
        .lyrics-container { background: var(--lyric-bg); width: 100%; height: calc(100vh - var(--header-height)); overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }
        #lyricsArea, #editorArea { padding: 30px; font-family: ui-monospace, monospace; font-size: 1.35rem; line-height: 1.35; color: var(--lyric-text); width: 100%; min-height: 100%; }
        #editorArea { display: none; white-space: pre; border: none; outline: none; background: var(--lyric-bg); color: var(--lyric-text); padding-bottom: 400px; }

        /* Menu & Tags */
        .songs-menu { position: fixed; top: 0; left: -33.33%; width: 33.33%; height: 100%; background: #1c1c1e; z-index: 90001; transition: left 0.3s ease; display: flex; flex-direction: column; }
        .songs-menu.open { left: 0; }
        @media (max-width: 768px) { .songs-menu { width: 85%; left: -85%; } }
        
        #tagBar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #2c2c2e; border-bottom: 1px solid #444; scrollbar-width: none; flex-shrink: 0; }
        .tag-pill { padding: 6px 14px; border-radius: 18px; background: #444; color: white; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
        .tag-pill.active { background: var(--griffin-orange); color: black; font-weight: bold; }

        .index-container { position: relative; width: 100%; border-bottom: 1px solid #333; background: var(--griffin-red); height: 60px; flex-shrink: 0; display: flex; align-items: center; }
        .index-item { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 18px 20px; background: #1c1c1e; color: white; cursor: pointer; z-index: 2; transition: transform 0.2s; display: flex; align-items: center; gap: 15px; }
        .delete-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: var(--griffin-red); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; }
        
        .tag-checkbox { width: 22px; height: 22px; accent-color: var(--griffin-orange); display: none; margin-right: 10px; flex-shrink: 0; }

        /* Bulk Tag UI */
        #bulkTagActions { display: none; padding: 10px; background: #2c2c2e; border-top: 1px solid #444; gap: 10px; flex-direction: column; }
        .bulk-input { background: #121212; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; width: 100%; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--griffin-orange); padding: 12px 25px; border-radius: 25px; display: none; z-index: 2000000; font-weight: bold; color: black; }
    </style>
</head>
<body data-theme="light">
    <div id="toast"></div>
    
    <div class="top-bar">
        <button class="top-bar-btn" onclick="toggleMenu()">Songs</button>
        <div class="top-bar-center"><h2 id="displayTitle">Stage Pilot v6.24</h2></div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" onclick="toggleScroll()" id="scrollBtn" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg class="top-bar-icon" onclick="startEdit()" id="editIcon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
            <button class="top-bar-btn" id="saveBtn" style="display:none;" onclick="finishEdit()">GEREED</button>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div style="padding: 10px; display: flex; justify-content: space-between; background: #1c1c1e;">
            <button class="top-bar-btn" style="font-size: 0.8rem;" id="tagModeBtn" onclick="toggleTagMode()">TAGS BEHEREN</button>
            <button class="top-bar-btn" style="font-size: 0.8rem;" onclick="toggleMenu()">SLUIT</button>
        </div>
        <div id="tagBar"></div>
        <div id="indexContent" style="flex-grow:1; overflow-y:auto;"></div>
        <div id="bulkTagActions">
            <input type="text" id="bulkTagInput" class="bulk-input" placeholder="Tagnaam (bijv: set1)">
            <div style="display: flex; gap: 5px;">
                <button class="modal-btn" style="margin:0; padding: 8px; flex:1;" onclick="applyBulkTag(true)">VOEG TOE</button>
                <button class="modal-btn" style="margin:0; padding: 8px; flex:1; background: #444;" onclick="applyBulkTag(false)">VERWIJDER</button>
            </div>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Selecteer een liedje uit het menu.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let activeTag = null, cur = null, tagMode = false;

        function extractTags(text) {
            const matches = text.match(/#(\w+)/g);
            return matches ? matches.map(m => m.substring(1).toLowerCase()) : [];
        }

        function toggleTagMode() {
            tagMode = !tagMode;
            document.getElementById('tagModeBtn').textContent = tagMode ? "ANNULEREN" : "TAGS BEHEREN";
            document.getElementById('bulkTagActions').style.display = tagMode ? "flex" : "none";
            renderIndex();
        }

        function applyBulkTag(add) {
            const tagName = document.getElementById('bulkTagInput').value.trim().toLowerCase();
            if(!tagName) return;
            const selected = document.querySelectorAll('.tag-checkbox:checked');
            if(selected.length === 0) return;

            selected.forEach(cb => {
                const title = cb.dataset.title;
                const song = db.find(s => s.title === title);
                if(song) {
                    let tags = new Set(extractTags(song.content));
                    if(add) tags.add(tagName); else tags.delete(tagName);
                    
                    let cleanContent = song.content.replace(/#\w+/g, '').trim();
                    let tagString = Array.from(tags).map(t => `#${t}`).join(' ');
                    song.content = cleanContent + (tagString ? "\n\n" + tagString : "");
                }
            });

            localStorage.setItem('tdfSongs', JSON.stringify(db));
            document.getElementById('bulkTagInput').value = "";
            toggleTagMode();
            showToast(add ? "Tags toegevoegd" : "Tags verwijderd");
        }

        function renderIndex() {
            const c = document.getElementById('indexContent');
            const tBar = document.getElementById('tagBar');
            let allTags = new Set();
            db.forEach(s => extractTags(s.content).forEach(t => allTags.add(t)));

            tBar.innerHTML = `<div class="tag-pill ${!activeTag ? 'active' : ''}" onclick="filterTag(null)">ALLES</div>`;
            Array.from(allTags).sort().forEach(t => {
                tBar.innerHTML += `<div class="tag-pill ${activeTag === t ? 'active' : ''}" onclick="filterTag('${t}')">${t.toUpperCase()}</div>`;
            });

            c.innerHTML = "";
            let songs = activeTag ? db.filter(s => extractTags(s.content).includes(activeTag)) : db;
            songs.sort((a,b) => a.title.localeCompare(b.title)).forEach(s => {
                const div = document.createElement('div'); div.className = 'index-container';
                div.innerHTML = `
                    <div class="delete-btn" onclick="deleteSong('${s.title}')">Wis</div>
                    <div class="index-item">
                        <input type="checkbox" class="tag-checkbox" data-title="${s.title}" style="display:${tagMode ? 'block' : 'none'}">
                        <span>${s.title}</span>
                    </div>`;
                const item = div.querySelector('.index-item');
                item.onclick = (e) => {
                    if(tagMode) {
                        const cb = item.querySelector('.tag-checkbox');
                        if(e.target !== cb) cb.checked = !cb.checked;
                    } else {
                        loadSong(s.title); toggleMenu();
                    }
                };
                if(!tagMode) initSwipe(item);
                c.appendChild(div);
            });
        }

        function filterTag(t) { activeTag = t; renderIndex(); }
        function loadSong(t) { cur = db.find(s => s.title === t); document.getElementById('displayTitle').textContent = cur.title; draw(); }
        function toggleMenu() { document.getElementById('songsMenu').classList.toggle('open'); if(tagMode) toggleTagMode(); }
        
        function startEdit() { 
            if(!cur) return;
            document.getElementById('lyricsArea').style.display='none'; 
            document.getElementById('editorArea').style.display='block';
            document.getElementById('saveBtn').style.display='block';
            document.getElementById('editorArea').value = cur.content;
        }
        function finishEdit() {
            cur.content = document.getElementById('editorArea').value;
            localStorage.setItem('tdfSongs', JSON.stringify(db));
            document.getElementById('lyricsArea').style.display='block'; 
            document.getElementById('editorArea').style.display='none';
            document.getElementById('saveBtn').style.display='none';
            draw(); renderIndex();
        }
        function draw() { document.getElementById('lyricsArea').innerHTML = cur.content.replace(/#\w+/g, '').trim().replace(/\n/g, '<br>'); }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2000); }
        function initSwipe(item) {
            let startX, moveX;
            item.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            item.addEventListener('touchmove', e => { moveX = e.touches[0].clientX; let d = moveX - startX; if(d < 0) item.style.transform = `translateX(${Math.max(d, -80)}px)`; });
            item.addEventListener('touchend', () => { if(moveX - startX < -40) item.style.transform = 'translateX(-80px)'; else item.style.transform = 'translateX(0px)'; });
        }
        function deleteSong(t) { db = db.filter(s => s.title !== t); localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); }
        
        window.onload = renderIndex;
    </script>
</body>
</html>
