<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Core v6.10</title>
    <style>
        :root { 
            --bg-dark: #121212; --top-bar-bg: #1a1a1a;
            --griffin-orange: #d48e3d; --griffin-red: #c12718; 
            --header-height: 65px;
            --lyric-bg: #ffffff; --lyric-text: #000000;
        }
        [data-theme="dark"] { --lyric-bg: #000000; --lyric-text: #ffffff; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
        body { font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace; display: flex; flex-direction: column; padding-top: var(--header-height); }

        .top-bar { 
            position: fixed; top: 0 !important; left: 0; width: 100%; height: var(--header-height); 
            background: var(--top-bar-bg); border-bottom: 1px solid #333; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; z-index: 99999; 
        }
        .top-bar-left, .top-bar-right { display: flex; align-items: center; gap: 12px; min-width: 140px; }
        .top-bar-center { text-align: center; flex-grow: 1; }
        .title-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .title-row h2 { margin: 0; font-size: 1.1rem; color: white; font-family: sans-serif; }
        
        .transpose-pill { display: flex; align-items: center; gap: 8px; background: #2c2c2e; padding: 2px 10px; border-radius: 20px; border: 1px solid #444; }
        .tp-btn { color: var(--griffin-orange); font-weight: bold; font-size: 1.4rem; background: none; border: none; }
        #tpVal { font-size: 0.9rem; color: #fff; min-width: 15px; }

        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; font-weight: bold; }
        .top-bar-icon { width: 28px; height: 28px; fill: var(--griffin-orange); }
        #appLogo { height: 42px; width: auto; max-width: 80px; object-fit: contain; display: none; }

        .lyrics-container { background: var(--lyric-bg); width: 100%; height: calc(100vh - var(--header-height)); overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }
        #lyricsArea, #editorArea { padding: 30px; font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace !important; font-size: 1.35rem; line-height: 1.35; color: var(--lyric-text); width: 100%; min-height: 100%; }
        #editorArea { display: none; white-space: pre; border: none; outline: none; background: var(--lyric-bg); color: var(--lyric-text); caret-color: var(--griffin-orange); padding-bottom: 400px; }

        .floating-unit { position: fixed; z-index: 10000; display: none; touch-action: none; }
        #chordUnit { top: 100px; left: 10px; width: 90vw; max-width: 400px; }
        .chord-bar { 
            display: flex; gap: 8px; overflow-x: auto; background: rgba(28, 28, 30, 0.9); 
            padding: 10px; border-radius: 12px; border: 1px solid #444; backdrop-filter: blur(10px);
            scrollbar-width: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        #joyUnit { bottom: 50px; right: 20px; }
        .nav-joypad {
            display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px);
            gap: 6px; background: rgba(44, 44, 46, 0.9); padding: 12px; border-radius: 50%;
            border: 2px solid var(--griffin-orange); box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .tool-btn { 
            width: 50px; height: 50px; background: #3a3a3c; color: white; border: none; 
            border-radius: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center;
        }
        .nav-btn { background: #48484a; border-radius: 50%; font-size: 1.4rem; }
        .drag-handle { grid-column: 2; grid-row: 2; background: var(--griffin-orange); border-radius: 50%; opacity: 0.9; cursor: move; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: black; font-weight: bold; }

        .songs-menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90000; }
        .songs-menu { position: fixed; top: 0; left: -33.33%; width: 33.33%; height: 100%; background: #1c1c1e; z-index: 90001; transition: left 0.3s ease; display: flex; flex-direction: column; }
        .songs-menu.open { left: 0; }
        @media (max-width: 768px) { .songs-menu { width: 85%; left: -85%; } }
        
        .index-container { position: relative; overflow: hidden; width: 100%; border-bottom: 1px solid #333; background: var(--griffin-red); }
        .index-item { position: relative; padding: 18px 20px; background: #1c1c1e; color: white; cursor: pointer; font-family: sans-serif; z-index: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: var(--griffin-red); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; }

        .full-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000000; padding: 20px; }
        .modal-box { max-width: 400px; margin: 50px auto; background: #2c2c2e; padding: 20px; border-radius: 12px; text-align: center; font-family: sans-serif; }
        .modal-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; background: var(--griffin-orange); color: white; font-weight: bold; cursor: pointer; }

        .chord-row { position: relative; height: 1.5rem; color: var(--griffin-red); font-weight: bold; pointer-events: none; }
        .chord-item { position: absolute; top: 0; white-space: pre; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 10px; }
    </style>
</head>
<body data-theme="light">
    <input type="file" id="logoInput" accept="image/png" style="display:none;">
    <input type="file" id="bulkFiles" accept=".txt" multiple style="display:none;">
    <input type="file" id="restoreInput" accept=".json" style="display:none;">

    <div class="top-bar">
        <div class="top-bar-left">
            <img id="appLogo" alt="Logo">
            <button class="top-bar-btn" onclick="toggleMenu()">Songs</button>
        </div>
        <div class="top-bar-center">
            <div class="title-row">
                <h2 id="displayTitle">TDF Core v6.10</h2>
                <div class="transpose-pill">
                    <button class="tp-btn" id="tpMin">−</button>
                    <span id="tpVal">0</span>
                    <button class="tp-btn" id="tpPlus">+</button>
                </div>
            </div>
            <p style="margin:0; font-size:0.7rem; color:var(--griffin-orange); font-weight:bold;">THE DOGGY FEW</p>
        </div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" id="scrollBtn" viewBox="0 0 24 24" style="fill:#34c759;"><path d="M8 5v14l11-7z"/></svg>
            <svg class="top-bar-icon" id="editIcon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            <svg class="top-bar-icon" id="settingsIcon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41l-0.36,2.54c-0.59,0.24-1.13,0.57-1.62,0.94L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.84,9.48l2.03,1.58C4.82,11.36,4.8,11.68,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            <button class="top-bar-btn" id="saveBtn" style="display:none;">GEREED</button>
        </div>
    </div>

    <div class="songs-menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="songs-menu" id="songsMenu">
        <div style="padding:15px; background:#2c2c2e; border-bottom:1px solid #444; color:white; font-weight:bold; display:flex; justify-content: space-between; align-items: center;">
            <span>SONGS</span>
            <button class="top-bar-btn" style="font-size: 0.8rem;" onclick="toggleMenu()">TERUG</button>
        </div>
        <div id="indexContent" style="flex-grow:1; overflow-y:auto;"></div>
    </div>

    <div id="settingsOverlay" class="full-overlay">
        <div class="modal-box">
            <h3 style="color:white; margin-top:0;">Instellingen</h3>
            <button class="modal-btn" id="themeBtn">🌓 WISSEL THEMA</button>
            <button class="modal-btn" onclick="downloadBackup()">💾 DOWNLOAD BACKUP (.JSON)</button>
            <button class="modal-btn" onclick="document.getElementById('restoreInput').click()">🔄 RESTORE BACKUP</button>
            <button class="modal-btn" onclick="document.getElementById('logoInput').click()">🖼️ UPLOAD PNG LOGO</button>
            <button class="modal-btn" style="background:var(--griffin-red);" onclick="document.getElementById('bulkFiles').click()">📂 SELECTEER BESTANDEN (.TXT)</button>
            <button class="modal-btn" style="background:#444;" onclick="document.getElementById('settingsOverlay').style.display='none'">SLUITEN</button>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Songbook geladen.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <div id="chordUnit" class="floating-unit">
        <div class="chord-bar" id="chordRow"></div>
        <div class="tool-btn" style="width:100%; margin-top:5px; border-radius:8px; color:var(--griffin-orange);" ontouchstart="event.preventDefault(); insertText('[]', 1)">[ ]</div>
    </div>

    <div id="joyUnit" class="floating-unit">
        <div class="nav-joypad">
            <div class="tool-btn nav-btn" style="grid-column:2; grid-row:1;" ontouchstart="event.preventDefault(); startNav('Up')" ontouchend="stopNav()">↑</div>
            <div class="tool-btn nav-btn" style="grid-column:1; grid-row:2;" ontouchstart="event.preventDefault(); startNav('Left')" ontouchend="stopNav()">←</div>
            <div class="drag-handle" id="joyDrag">MOVE</div>
            <div class="tool-btn nav-btn" style="grid-column:3; grid-row:2;" ontouchstart="event.preventDefault(); startNav('Right')" ontouchend="stopNav()">→</div>
            <div class="tool-btn nav-btn" style="grid-column:2; grid-row:3;" ontouchstart="event.preventDefault(); startNav('Down')" ontouchend="stopNav()">↓</div>
        </div>
    </div>

    <script>
        const APP_VERSION = "6.10";
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let cur = null, tOff = 0, navInt = null;
        const commonChords = ["C", "G", "D", "A", "E", "F", "Am", "Em", "Dm", "Bb", "B7", "G7", "D7"];

        window.onload = () => {
            if (localStorage.getItem('tdfVersion') !== APP_VERSION) {
                localStorage.setItem('tdfVersion', APP_VERSION);
                location.reload(true);
            }
            const logo = localStorage.getItem('tdfLogo');
            if(logo) { document.getElementById('appLogo').src = logo; document.getElementById('appLogo').style.display = 'block'; }
            renderIndex(); initChordBar();
            makeDraggable(document.getElementById("joyUnit"), document.getElementById("joyDrag"));
            makeDraggable(document.getElementById("chordUnit"), document.getElementById("chordUnit"));
        };

        function makeDraggable(el, handle) {
            let px = 0, py = 0, ix, iy;
            handle.addEventListener("touchstart", (e) => { ix = e.touches[0].clientX - px; iy = e.touches[0].clientY - py; }, {passive:false});
            handle.addEventListener("touchmove", (e) => { e.preventDefault(); px = e.touches[0].clientX - ix; py = e.touches[0].clientY - iy; el.style.transform = `translate3d(${px}px, ${py}px, 0)`; }, {passive:false});
        }

        function initChordBar() {
            const row = document.getElementById('chordRow'); row.innerHTML = '';
            commonChords.forEach(c => {
                const btn = document.createElement('div'); btn.className = 'tool-btn'; btn.style.minWidth = '52px'; btn.style.color = 'var(--griffin-orange)';
                btn.textContent = c; btn.ontouchstart = (e) => { e.preventDefault(); insertText(`[${c}]`); };
                row.appendChild(btn);
            });
        }

        document.getElementById('bulkFiles').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if(files.length === 0) return;
            let added = 0;
            for(let f of files) {
                const t = await f.text();
                const title = t.split('\n')[0].replace(/[\[\]\r]/g, '').trim() || f.name.replace('.txt','');
                if(!db.find(x => x.title.toLowerCase() === title.toLowerCase())) {
                    db.push({title, content: t}); added++;
                }
            }
            localStorage.setItem('tdfSongs', JSON.stringify(db));
            renderIndex(); alert(added + " songs toegevoegd.");
            document.getElementById('settingsOverlay').style.display = 'none';
            this.value = '';
        });

        function startNav(d) { moveCursor(d); navInt = setInterval(() => moveCursor(d), 120); }
        function stopNav() { clearInterval(navInt); }

        function moveCursor(d) {
            const a = document.getElementById('editorArea'); a.focus();
            const s = a.selectionStart, l = a.value.split('\n');
            let cC = 0, cL = 0;
            for(let i=0; i<l.length; i++) { if(s <= cC + l[i].length) { cL = i; break; } cC += l[i].length + 1; }
            const col = s - cC;
            if(d==='Left') a.setSelectionRange(s-1, s-1);
            else if(d==='Right') a.setSelectionRange(s+1, s+1);
            else if(d==='Up' && cL > 0) { let nP = 0; for(let i=0; i<cL-1; i++) nP += l[i].length+1; nP += Math.min(col, l[cL-1].length); a.setSelectionRange(nP, nP); }
            else if(d==='Down' && cL < l.length-1) { let nP = 0; for(let i=0; i<=cL; i++) nP += l[i].length+1; nP += Math.min(col, l[cL+1].length); a.setSelectionRange(nP, nP); }
        }

        function insertText(t, o = 0) {
            const a = document.getElementById('editorArea');
            const s = a.selectionStart, e = a.selectionEnd;
            a.value = a.value.substring(0,s)+t+a.value.substring(e);
            a.focus(); const p = s+t.length-o; a.setSelectionRange(p,p);
        }

        function renderIndex() {
            const c = document.getElementById('indexContent'); c.innerHTML = "";
            db.sort((a,b) => a.title.localeCompare(b.title)).forEach(s => {
                const div = document.createElement('div'); div.className = 'index-container';
                div.innerHTML = `<div class="delete-btn" onclick="event.stopPropagation();if(confirm('Wis ${s.title}?')){db=db.filter(x=>x.title!=='${s.title}');localStorage.setItem('tdfSongs',JSON.stringify(db));renderIndex();}">Wis</div><div class="index-item">${s.title}</div>`;
                div.querySelector('.index-item').onclick = () => { loadSong(s.title); toggleMenu(); };
                c.appendChild(div);
            });
        }

        function loadSong(t) { cur = db.find(s => s.title === t); tOff = 0; document.getElementById('tpVal').textContent = "0"; document.getElementById('displayTitle').textContent = cur.title; draw(); }
        function draw() {
            if(!cur) return; const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) { if(l[i] === '[') { let end = l.indexOf(']', i); if(end === -1) { txt += l[i]; i++; continue; } let c = l.substring(i+1, end); if(tOff !== 0) c = tpChord(c, tOff); chords.push({ p: txt.length, v: c }); i = end + 1; } else { txt += l[i]; i++; } }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            document.getElementById('lyricsArea').innerHTML = h; document.getElementById('scroller').scrollTop = 0;
        }

        function tpChord(c, o) { const n = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"]; return c.replace(/[A-G][#b]?/g, (m) => { let x = m; if(x==="Bb")x="A#"; if(x==="Eb")x="D#"; if(x==="Ab")x="G#"; if(x==="Db")x="C#"; if(x==="Gb")x="F#"; let i = n.indexOf(x); if(i===-1) return m; let j = (i+o)%12; while(j<0)j+=12; return n[j]; }); }
        function toggleMenu() { const o = document.getElementById('songsMenu').classList.toggle('open'); document.getElementById('menuOverlay').style.display = o ? 'block' : 'none'; }
        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editIcon').style.display='none'; document.getElementById('saveBtn').style.display='block'; document.getElementById('editorArea').style.display='block'; document.getElementById('joyUnit').style.display='block'; document.getElementById('chordUnit').style.display='block'; document.getElementById('editorArea').value=cur.content; setTimeout(()=>document.getElementById('editorArea').focus(),100); }
        function finishEdit() { const c = document.getElementById('editorArea').value, t = c.split('\n')[0].replace(/[\[\]]/g,'')||"Naamloos", i = db.findIndex(s=>s.title===cur.title); if(i===-1) db.push({title:t,content:c}); else db[i]={title:t,content:c}; localStorage.setItem('tdfSongs',JSON.stringify(db)); renderIndex(); loadSong(t); document.getElementById('lyricsArea').style.display='block'; document.getElementById('editIcon').style.display='block'; document.getElementById('saveBtn').style.display='none'; document.getElementById('editorArea').style.display='none'; document.getElementById('joyUnit').style.display='none'; document.getElementById('chordUnit').style.display='none'; }
        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() { if(!cur) return; const c = document.getElementById('scroller'), h = c.scrollHeight - c.clientHeight; let d = 180; const m = cur.content.match(/Duration:\s*(\d+):(\d+)/i); if(m) d = parseInt(m[1])*60 + parseInt(m[2]); const s = h/(d*1000), t = Date.now(), p = c.scrollTop; document.getElementById('scrollBtn').style.fill = 'var(--griffin-red)'; sInt = setInterval(() => { c.scrollTop = p + ((Date.now()-t)*s); if(c.scrollTop >= h) stopScroll(); }, 50); }
        function stopScroll() { clearInterval(sInt); sInt = null; document.getElementById('scrollBtn').style.fill = "#34c759"; }
        function toggleTheme() { const b = document.body; b.setAttribute('data-theme', b.getAttribute('data-theme')==='dark'?'light':'dark'); }
        function downloadBackup() { const d = JSON.stringify({date: new Date().toISOString(), data: db}), b = new Blob([d], {type: 'application/json'}), a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `TDF_Backup.json`; a.click(); }
        document.getElementById('logoInput').onchange = (e) => { const r = new FileReader(); r.onload = (ev) => { localStorage.setItem('tdfLogo', ev.target.result); location.reload(); }; r.readAsDataURL(e.target.files[0]); };
        document.getElementById('restoreInput').onchange = (e) => { const r = new FileReader(); r.onload = (ev) => { const i = JSON.parse(ev.target.result); if(i.data) { db = i.data; localStorage.setItem('tdfSongs', JSON.stringify(db)); location.reload(); } }; r.readAsText(e.target.files[0]); };
        document.getElementById('settingsIcon').onclick = () => document.getElementById('settingsOverlay').style.display='block';
        document.getElementById('editIcon').onclick = startEdit;
        document.getElementById('saveBtn').onclick = finishEdit;
        document.getElementById('scrollBtn').onclick = toggleScroll;
        document.getElementById('themeBtn').onclick = toggleTheme;
        document.getElementById('tpPlus').onclick = () => transpose(1);
        document.getElementById('tpMin').onclick = () => transpose(-1);
    </script>
</body>
</html>
