<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Master v6.71</title>
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top, 20px); 
            --header-height: calc(60px + var(--safe-top)); 
            --griffin-orange: #d48e3d; 
            --griffin-red: #c12718;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* KEIHARDE WITTE BASIS */
        html, body { 
            height: 100dvh; width: 100vw; 
            background-color: #ffffff !important; 
            color: #000000 !important;
            overflow: hidden; position: fixed; top: 0; left: 0; 
            font-family: -apple-system, system-ui, sans-serif;
        }

        /* WITTE BOVENBALK */
        .top-bar { 
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); 
            background: #ffffff !important; 
            border-bottom: 2px solid #000000; 
            z-index: 100001; display: flex; flex-direction: column; 
        }

        .top-bar-content { margin-top: var(--safe-top); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; width: 100%; }
        
        #displayTitle { color: #000 !important; font-size: 1rem; font-weight: bold; cursor: pointer; }
        #appLogo { height: 35px; width: auto; cursor: pointer; border: 1px solid #eee; }
        
        .top-bar-btn { background: none; border: none; color: #007aff !important; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        /* MENU ONDER DE BALK */
        .songs-menu { 
            position: fixed; top: var(--header-height); left: -300px; width: 280px; height: calc(100dvh - var(--header-height)); 
            background: #ffffff !important; 
            z-index: 100000; transition: left 0.3s ease; display: flex; flex-direction: column; 
            box-shadow: 5px 0 15px rgba(0,0,0,0.1); border-right: 2px solid #000;
        }
        .songs-menu.open { left: 0; }
        
        #menuSearch { width: 90%; margin: 15px auto; padding: 12px; border: 2px solid #000; border-radius: 8px; background: #fff; color: #000; font-size: 1rem; }

        .menu-scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .tag-item { padding: 15px 20px; background: #f9f9f9; color: var(--griffin-orange); border-bottom: 1px solid #ccc; font-weight: bold; cursor: pointer; }
        .song-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; color: #000 !important; font-size: 1.1rem; }

        .lyrics-container { width: 100%; height: 100dvh; padding-top: var(--header-height); background-color: #ffffff !important; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #lyricsArea { padding: 30px; font-family: ui-monospace, monospace; font-size: 1.4rem; color: #000 !important; }
        #editorArea { display: none; width: 100%; height: 70vh; padding: 20px; font-family: ui-monospace, monospace; font-size: 1.2rem; border: 2px solid #000; outline: none; background: #fff; color: #000; }
        
        .chord-row { height: 1.6rem; color: var(--griffin-red) !important; font-weight: bold; position: relative; }
        .chord-item { position: absolute; white-space: pre; background: rgba(255,255,255,0.7); }

        /* WITTE FLOATER */
        .floater { position: fixed; background: #ffffff; border: 2px solid #000; border-radius: 12px; z-index: 10001; text-align: center; padding: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 65px; }
        .f-btn { width: 100%; height: 40px; margin-top: 5px; border: 1px solid #000; border-radius: 6px; background: #fff; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-main { background: #007aff !important; color: #fff !important; border: none; }
        
        .full-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(255,255,255,0.98); z-index: 1000001; padding: 20px; }
        .modal-box { max-width: 400px; margin: 40px auto; background: #fff; padding: 25px; border-radius: 12px; border: 2px solid #000; text-align: center; }
        .modal-btn { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #000; border-radius: 8px; background: #007aff; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-content">
            <div style="display:flex; align-items:center; gap:15px;">
                <img id="appLogo" src="" alt=" " onclick="el('settingsOverlay').style.display='block'">
                <button class="top-bar-btn" onclick="toggleMenu()">MENU</button>
            </div>
            <div id="displayTitle" onclick="saveFromTitle()">TDF Master</div>
            <div style="display:flex; gap:15px;">
                <button onclick="createNewSong()" style="background:none; border:none; color:#007aff; font-size:1.8rem; font-weight:bold;">+</button>
                <button onclick="startEdit()" style="background:none; border:none; color:#007aff; font-size:1.4rem;">✎</button>
            </div>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <input type="text" id="menuSearch" placeholder="Zoek liedje..." oninput="renderMenu()">
        <div id="menuContent" class="menu-scroll-area"></div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea"></div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <div class="floater" style="right:15px; top:120px;">
        <div id="speedDisplay" style="font-size:0.7rem; font-weight:bold;">180s</div>
        <button class="f-btn" onclick="adjustSpeed(-10)">S+</button>
        <button class="f-btn" onclick="adjustSpeed(10)">S-</button>
        <hr style="margin:8px 0; border:1px solid #000;">
        <button class="f-btn" onclick="transpose(1)">b+</button>
        <button class="f-btn" onclick="transpose(-1)">b-</button>
        <button id="playBtn" class="f-btn btn-main" style="margin-top:10px;" onclick="toggleScroll()">▶</button>
    </div>

    <div id="settingsOverlay" class="full-overlay">
        <div class="modal-box">
            <h3>BEHEER</h3>
            <button class="modal-btn" onclick="location.reload()" style="background:#ff3b30;">🔄 APP VERVERSEN</button>
            <button class="modal-btn" onclick="downloadBackup()">💾 BACK-UP MAKEN</button>
            <button class="modal-btn" onclick="el('logoInput').click()">🖼️ LOGO WIJZIGEN</button>
            <button class="modal-btn" onclick="el('settingsOverlay').style.display='none'" style="background:#000;">SLUITEN</button>
            <input type="file" id="logoInput" accept="image/*" style="display:none;">
        </div>
    </div>

    <script>
        const el = (id) => document.getElementById(id);
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [], tags = JSON.parse(localStorage.getItem('tdfTags')) || {};
        let appLogoData = localStorage.getItem('tdfLogo') || "", currentTag = "ALLES", cur = null, sInt = null, scrollSpeed = 180, transOffset = 0;
        const chordMap = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

        window.onload = () => { 
            if(appLogoData) el('appLogo').src = appLogoData; 
            renderMenu(); 
        };

        function transpose(delta) { transOffset += delta; draw(); }
        function transposeChord(chord) {
            return chord.replace(/[A-G][#b]?/g, (match) => {
                let note = match;
                if(note === "Bb") note = "A#"; if(note === "Eb") note = "D#"; if(note === "Ab") note = "G#"; if(note === "Db") note = "C#"; if(note === "Gb") note = "F#";
                let idx = chordMap.indexOf(note);
                if(idx === -1) return match;
                let newIdx = (idx + transOffset) % 12;
                while(newIdx < 0) newIdx += 12;
                return chordMap[newIdx];
            });
        }

        function toggleMenu() { el('songsMenu').classList.toggle('open'); }
        function setTag(t) { currentTag = t; renderMenu(); }

        function renderMenu() {
            const c = el('menuContent'); c.innerHTML = "";
            const q = el('menuSearch').value.toLowerCase();
            if(!q) {
                const all = document.createElement('div'); all.className='tag-item'; 
                all.style.background = currentTag === 'ALLES' ? "var(--griffin-orange)" : "#f9f9f9";
                all.style.color = currentTag === 'ALLES' ? "#fff" : "var(--griffin-orange)";
                all.textContent="📜 ALLE LIEDJES"; all.onclick=()=>setTag('ALLES'); c.appendChild(all);
                Object.keys(tags).sort().forEach(t => {
                    const b = document.createElement('div'); b.className='tag-item';
                    b.style.background = currentTag === t ? "var(--griffin-orange)" : "#f9f9f9";
                    b.style.color = currentTag === t ? "#fff" : "var(--griffin-orange)";
                    b.textContent=`🏷️ ${t}`; b.onclick=()=>setTag(t); c.appendChild(b);
                });
            }
            let f = currentTag === "ALLES" ? db : db.filter(s => (tags[currentTag] || []).includes(s.title));
            if(q) f = db.filter(s => s.title.toLowerCase().includes(q));
            f.sort((a,b)=>a.title.localeCompare(b.title)).forEach(s => {
                const i = document.createElement('div'); i.className='song-item'; i.textContent=s.title;
                i.onclick=()=>loadSong(s.title); c.appendChild(i);
            });
        }

        function loadSong(t) { cur = db.find(x => x.title === t); transOffset = 0; el('displayTitle').textContent = t; draw(); el('songsMenu').classList.remove('open'); }
        
        function draw() {
            if(!cur) return; const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') { 
                        let e = l.indexOf(']', i); 
                        let c = l.substring(i+1, e);
                        chords.push({ p: txt.length, v: transposeChord(c) }); 
                        i = e + 1; 
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`);
                h += `<div class="chord-row">${r}</div><div style="white-space:pre; margin-bottom:10px;">${txt || ' '}</div>`;
            });
            el('lyricsArea').innerHTML = h; el('scroller').scrollTop = 0;
        }

        function startEdit() { if(!cur) return; el('lyricsArea').style.display='none'; el('editorArea').style.display='block'; el('editorArea').value = cur.content; el('editorArea').focus(); }
        function saveFromTitle() { 
            if(el('editorArea').style.display === 'block') { 
                const idx = db.findIndex(s => s.title === cur.title); 
                db[idx].content = el('editorArea').value; 
                localStorage.setItem('tdfSongs', JSON.stringify(db)); 
                el('lyricsArea').style.display='block'; el('editorArea').style.display='none'; draw(); 
            }
        }

        function adjustSpeed(d) { scrollSpeed = Math.max(10, scrollSpeed + d); el('speedDisplay').textContent = scrollSpeed + 's'; }
        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() { if(!cur) return; const s = el('scroller'), ch = s.scrollHeight - s.clientHeight; if(ch <= 0) return; const pMs = ch / (scrollSpeed * 1000), st = Date.now(), sp = s.scrollTop; el('playBtn').textContent = "■"; sInt = setInterval(() => { s.scrollTop = sp + ((Date.now() - st) * pMs); if(s.scrollTop >= ch) stopScroll(); }, 50); }
        function stopScroll() { clearInterval(sInt); sInt = null; el('playBtn').textContent = "▶"; }
        function createNewSong() { const t = prompt("Titel:"); if(t && t.trim()) { const nt = t.trim(); db.push({title: nt, content: nt + "\n..."}); localStorage.setItem('tdfSongs', JSON.stringify(db)); renderMenu(); loadSong(nt); }}
        function downloadBackup() { const d = JSON.stringify({ songs: db, tags: tags, logo: appLogoData }); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([d], {type: 'application/json'})); a.download = `TDF_Backup.json`; a.click(); }
        el('logoInput').onchange = (e) => { const r = new FileReader(); r.onload = (ev) => { appLogoData = ev.target.result; el('appLogo').src = appLogoData; localStorage.setItem('tdfLogo', appLogoData); }; r.readAsDataURL(e.target.files[0]); };
    </script>
</body>
</html>
