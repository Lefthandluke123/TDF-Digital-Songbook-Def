<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Stage Pilot v6.03</title>
    <style>
        :root { 
            --bg-dark: #121212; --top-bar-bg: #1a1a1a;
            --griffin-orange: #d48e3d; --griffin-red: #c12718; 
            --header-height: 65px;
            --lyric-bg: #ffffff; --lyric-text: #000000;
        }
        [data-theme="dark"] { --lyric-bg: #000000; --lyric-text: #ffffff; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
        body { font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace; display: flex; flex-direction: column; padding-top: var(--header-height); }

        .top-bar { 
            position: fixed; top: 0 !important; left: 0; width: 100%; height: var(--header-height); 
            background: var(--top-bar-bg); border-bottom: 1px solid #333; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; z-index: 99999; 
        }
        .top-bar-left, .top-bar-right { display: flex; align-items: center; gap: 12px; min-width: 140px; }
        .top-bar-center { text-align: center; flex-grow: 1; }
        .title-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .title-row h2 { margin: 0; font-size: 1.1rem; color: white; font-family: sans-serif; }
        
        .transpose-pill { display: flex; align-items: center; gap: 8px; background: #2c2c2e; padding: 2px 10px; border-radius: 20px; border: 1px solid #444; }
        .tp-btn { color: var(--griffin-orange); font-weight: bold; font-size: 1.4rem; background: none; border: none; cursor: pointer; }
        #tpVal { font-size: 0.9rem; color: #fff; min-width: 15px; }

        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; cursor: pointer; font-family: sans-serif; font-weight: bold; }
        .top-bar-icon { width: 28px; height: 28px; fill: var(--griffin-orange); cursor: pointer; }
        #appLogo { height: 42px; width: auto; max-width: 80px; object-fit: contain; display: none; }

        .lyrics-container { background: var(--lyric-bg); width: 100%; height: calc(100vh - var(--header-height)); overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }
        #lyricsArea, #editorArea { padding: 30px; font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace !important; font-size: 1.35rem; line-height: 1.35; color: var(--lyric-text); width: 100%; min-height: 100%; }
        #editorArea { display: none; white-space: pre; border: none; outline: none; background: var(--lyric-bg); color: var(--lyric-text); caret-color: var(--griffin-orange); padding-bottom: 300px; }

        /* Floating Editor Tools */
        .editor-tools { 
            display: none; position: fixed; bottom: 80px; right: 20px; 
            z-index: 10000; flex-direction: column; gap: 12px; touch-action: none;
        }
        .chord-bar { 
            display: flex; gap: 8px; overflow-x: auto; background: rgba(28, 28, 30, 0.95); 
            padding: 10px; border-radius: 14px; border: 1px solid #444; backdrop-filter: blur(10px);
            width: 85vw; max-width: 380px; align-self: center; scrollbar-width: none;
        }
        .chord-bar::-webkit-scrollbar { display: none; }

        .nav-joypad {
            display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px);
            gap: 5px; background: rgba(44, 44, 46, 0.9); padding: 12px; border-radius: 30px;
            border: 2px solid var(--griffin-orange); align-self: flex-end; box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }
        .tool-btn { 
            width: 52px; height: 52px; background: #3a3a3c; color: white; border: none; 
            border-radius: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .nav-btn { background: #48484a; border-radius: 50%; font-size: 1.4rem; color: white; }
        .drag-handle { 
            grid-column: 2; grid-row: 2; background: var(--griffin-orange); 
            border-radius: 50%; opacity: 0.8; display: flex; align-items: center; justify-content: center;
        }

        .songs-menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 90000; }
        .songs-menu { position: fixed; top: 0; left: -33.33%; width: 33.33%; height: 100%; background: #1c1c1e; z-index: 90001; transition: left 0.3s ease; display: flex; flex-direction: column; }
        .songs-menu.open { left: 0; }
        @media (max-width: 768px) { .songs-menu { width: 85%; left: -85%; } }
        
        .index-container { position: relative; overflow: hidden; width: 100%; border-bottom: 1px solid #333; background: var(--griffin-red); }
        .index-item { position: relative; padding: 18px 20px; background: #1c1c1e; color: white; cursor: pointer; font-family: sans-serif; transition: transform 0.2s ease; z-index: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-btn { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: var(--griffin-red); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 1; }

        .chord-row { position: relative; height: 1.5rem; color: var(--griffin-red); font-weight: bold; pointer-events: none; }
        .chord-item { position: absolute; top: 0; white-space: pre; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 10px; }

        .full-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000000; padding: 20px; }
        .modal-box { max-width: 400px; margin: 50px auto; background: #2c2c2e; padding: 20px; border-radius: 12px; text-align: center; font-family: sans-serif; }
        .modal-btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; background: var(--griffin-orange); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body data-theme="light">
    <input type="file" id="logoInput" accept="image/png" style="display:none;">
    <input type="file" id="bulkImportInput" accept=".txt" multiple style="display:none;">
    <input type="file" id="restoreInput" accept=".json" style="display:none;">

    <div class="top-bar">
        <div class="top-bar-left">
            <img id="appLogo" alt="Logo">
            <button class="top-bar-btn" id="songsMenuBtn">Songs</button>
        </div>
        <div class="top-bar-center">
            <div class="title-row">
                <h2 id="displayTitle">Stage Pilot v6.03</h2>
                <div class="transpose-pill">
                    <button class="tp-btn" id="tpMin">−</button>
                    <span id="tpVal">0</span>
                    <button class="tp-btn" id="tpPlus">+</button>
                </div>
            </div>
            <p style="margin:0; font-size:0.7rem; color:var(--griffin-orange); font-weight:bold;">THE DOGGY FEW</p>
        </div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" id="scrollBtn" viewBox="0 0 24 24" style="fill:#34c759;"><path d="M8 5v14l11-7z"/></svg>
            <svg class="top-bar-icon" id="editIcon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            <svg class="top-bar-icon" id="settingsIcon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41l-0.36,2.54c-0.59,0.24-1.13,0.57-1.62,0.94L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.84,9.48l2.03,1.58C4.82,11.36,4.8,11.68,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            <button class="top-bar-btn" id="saveBtn" style="display:none;">GEREED</button>
        </div>
    </div>

    <div class="songs-menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
    <div class="songs-menu" id="songsMenu">
        <div style="padding:15px; background:#2c2c2e; border-bottom:1px solid #444; color:white; font-weight:bold; display:flex; justify-content: space-between; align-items: center;">
            <span>SONGS</span>
            <button class="top-bar-btn" style="font-size: 0.8rem;" onclick="toggleMenu()">TERUG</button>
        </div>
        <div id="indexContent" style="flex-grow:1; overflow-y:auto;"></div>
    </div>

    <div id="settingsOverlay" class="full-overlay">
        <div class="modal-box">
            <h3 style="color:white; margin-top:0;">Instellingen</h3>
            <button class="modal-btn" id="themeBtn">🌓 WISSEL THEMA</button>
            <button class="modal-btn" onclick="downloadBackup()">💾 DOWNLOAD BACKUP (.JSON)</button>
            <button class="modal-btn" onclick="el('restoreInput').click()">🔄 RESTORE BACKUP</button>
            <button class="modal-btn" onclick="el('logoInput').click()">🖼️ UPLOAD PNG LOGO</button>
            <button class="modal-btn" onclick="el('bulkImportInput').click()">📂 LIEDJES IMPORTEREN</button>
            <button class="modal-btn" style="background:#444;" onclick="el('settingsOverlay').style.display='none'">SLUITEN</button>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Stage Pilot geladen.</div>
        <textarea id="editorArea" spellcheck="false" placeholder="Typ hier..."></textarea>
    </div>

    <div id="editorTools" class="editor-tools">
        <div class="chord-bar" id="chordRow"></div>
        <div class="nav-joypad" id="joypad">
            <button class="tool-btn nav-btn" style="grid-column: 2; grid-row: 1;" onmousedown="moveCursor('Up')" ontouchstart="moveCursor('Up')">↑</button>
            <button class="tool-btn nav-btn" style="grid-column: 1; grid-row: 2;" onmousedown="moveCursor('Left')" ontouchstart="moveCursor('Left')">←</button>
            <div class="drag-handle" id="joyHandle">::</div>
            <button class="tool-btn nav-btn" style="grid-column: 3; grid-row: 2;" onmousedown="moveCursor('Right')" ontouchstart="moveCursor('Right')">→</button>
            <button class="tool-btn nav-btn" style="grid-column: 2; grid-row: 3;" onmousedown="moveCursor('Down')" ontouchstart="moveCursor('Down')">↓</button>
        </div>
        <button class="tool-btn" style="width: 100%; border-radius: 14px; background: var(--griffin-orange); color: white;" onmousedown="insertText('[]', 1)" ontouchstart="insertText('[]', 1)">[ ] AKKOORD</button>
    </div>

    <script>
        const APP_VERSION = "6.03";
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let cur = null, tOff = 0, startX = 0, sInt = null;
        const commonChords = ["C", "G", "D", "A", "E", "Am", "Em", "Dm", "F", "Bb", "G7", "C7", "D7"];

        const el = (id) => document.getElementById(id);

        window.onload = () => {
            checkVersion();
            const logo = localStorage.getItem('tdfLogo');
            if(logo) { el('appLogo').src = logo; el('appLogo').style.display = 'block'; }
            renderIndex();
            initChordBar();
            initDraggable();
        };

        function checkVersion() {
            if (localStorage.getItem('tdfVersion') !== APP_VERSION) {
                localStorage.setItem('tdfVersion', APP_VERSION);
                location.reload(true);
            }
        }

        // Draggable Logic
        let isDragging = false, currentX = 0, currentY = 0, initialX, initialY, xOff = 0, yOff = 0;
        function initDraggable() {
            const tool = el("editorTools");
            const handle = el("joyHandle");
            tool.addEventListener("touchstart", (e) => {
                if(e.target === handle || e.target === el('joypad')) {
                    initialX = e.touches[0].clientX - xOff;
                    initialY = e.touches[0].clientY - yOff;
                    isDragging = true;
                }
            }, {passive: false});
            window.addEventListener("touchend", () => { isDragging = false; initialX = currentX; initialY = currentY; });
            window.addEventListener("touchmove", (e) => {
                if (isDragging) {
                    e.preventDefault();
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                    xOff = currentX; yOff = currentY;
                    tool.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
                }
            }, {passive: false});
        }

        function initChordBar() {
            const row = el('chordRow'); row.innerHTML = '';
            commonChords.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'tool-btn'; btn.style.minWidth = '55px'; btn.style.color = 'var(--griffin-orange)';
                btn.textContent = c;
                btn.onmousedown = btn.ontouchstart = (e) => { e.preventDefault(); insertText(`[${c}]`); };
                row.appendChild(btn);
            });
        }

        function insertText(text, offset = 0) {
            const area = el('editorArea');
            const s = area.selectionStart, e = area.selectionEnd;
            area.value = area.value.substring(0, s) + text + area.value.substring(e);
            area.focus();
            const p = s + text.length - offset;
            area.setSelectionRange(p, p);
        }

        function moveCursor(dir) {
            const area = el('editorArea'); area.focus();
            const start = area.selectionStart;
            if(dir === 'Left') area.setSelectionRange(start - 1, start - 1);
            else if(dir === 'Right') area.setSelectionRange(start + 1, start + 1);
            else {
                // Emuleer Arrow keys voor verticale navigatie
                const lines = area.value.substring(0, start).split('\n');
                const curLine = lines.length - 1;
                const curCol = lines[curLine].length;
                const allLines = area.value.split('\n');
                
                let targetLine = dir === 'Up' ? curLine - 1 : curLine + 1;
                if(targetLine >= 0 && targetLine < allLines.length) {
                    let newPos = 0;
                    for(let i=0; i < targetLine; i++) newPos += allLines[i].length + 1;
                    newPos += Math.min(curCol, allLines[targetLine].length);
                    area.setSelectionRange(newPos, newPos);
                }
            }
        }

        // Song Handling
        function loadSong(t) {
            stopScroll(); cur = db.find(s => s.title === t);
            tOff = 0; el('tpVal').textContent = "0";
            el('displayTitle').textContent = cur.title; draw();
        }

        function draw() {
            if(!cur) return;
            const lines = cur.content.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let end = l.indexOf(']', i); 
                        if(end === -1) { txt += l[i]; i++; continue; }
                        let c = l.substring(i+1, end);
                        if(tOff !== 0) c = tpChord(c, tOff); chords.push({ p: txt.length, v: c });
                        i = end + 1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            el('lyricsArea').innerHTML = h; el('scroller').scrollTop = 0;
        }

        function transpose(dir) {
            if(!cur) return; tOff += dir;
            el('tpVal').textContent = (tOff > 0 ? "+" : "") + tOff; draw();
        }

        const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        function tpChord(chord, off) {
            return chord.replace(/[A-G][#b]?/g, (m) => {
                let n = m;
                if(n === "Bb") n = "A#"; if(n === "Eb") n = "D#"; if(n === "Ab") n = "G#"; if(n === "Db") n = "C#"; if(n === "Gb") n = "F#";
                let idx = notes.indexOf(n); if(idx === -1) return m;
                let newIdx = (idx + off) % 12; while(newIdx < 0) newIdx += 12; return notes[newIdx];
            });
        }

        // Interface toggles
        el('songsMenuBtn').onclick = toggleMenu;
        el('settingsIcon').onclick = () => el('settingsOverlay').style.display = 'block';
        el('editIcon').onclick = startEdit;
        el('saveBtn').onclick = finishEdit;
        el('scrollBtn').onclick = toggleScroll;
        el('themeBtn').onclick = toggleTheme;
        el('tpPlus').onclick = () => transpose(1);
        el('tpMin').onclick = () => transpose(-1);

        function startEdit() {
            if(!cur) return; stopScroll();
            el('lyricsArea').style.display = 'none'; el('editIcon').style.display = 'none';
            el('saveBtn').style.display = 'block'; el('editorArea').style.display = 'block';
            el('editorTools').style.display = 'flex';
            el('editorArea').value = cur.content;
            setTimeout(() => { el('editorArea').focus(); }, 100);
        }

        function finishEdit() {
            const content = el('editorArea').value;
            const title = content.split('\n')[0].replace(/[\[\]]/g, '') || "Naamloos";
            const idx = db.findIndex(s => s.title === cur.title);
            if(idx === -1) db.push({title, content}); else db[idx] = { title, content };
            localStorage.setItem('tdfSongs', JSON.stringify(db));
            renderIndex(); loadSong(title);
            el('lyricsArea').style.display = 'block'; el('editIcon').style.display = 'block';
            el('saveBtn').style.display = 'none'; el('editorArea').style.display = 'none';
            el('editorTools').style.display = 'none';
        }

        function toggleMenu() {
            const open = el('songsMenu').classList.toggle('open');
            el('menuOverlay').style.display = open ? 'block' : 'none';
        }

        function renderIndex() {
            const c = el('indexContent'); c.innerHTML = "";
            db.sort((a,b) => a.title.localeCompare(b.title)).forEach(s => {
                const container = document.createElement('div'); container.className = 'index-container';
                const del = document.createElement('div'); del.className = 'delete-btn'; del.textContent = 'Wis';
                del.onclick = (e) => { e.stopPropagation(); if(confirm('Wissen?')) { db = db.filter(x => x.title !== s.title); localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); } };
                const item = document.createElement('div'); item.className = 'index-item'; item.textContent = s.title;
                item.onclick = () => { loadSong(s.title); toggleMenu(); };
                container.append(del, item); c.appendChild(container);
            });
        }

        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() {
            if(!cur) return;
            const container = el('scroller');
            const h = container.scrollHeight - container.clientHeight;
            let dur = 180;
            const match = cur.content.match(/Duration:\s*(\d+):(\d+)/i);
            if(match) dur = parseInt(match[1]) * 60 + parseInt(match[2]);
            const speed = h / (dur * 1000);
            const startT = Date.now(), startP = container.scrollTop;
            el('scrollBtn').style.fill = 'var(--griffin-red)';
            sInt = setInterval(() => {
                container.scrollTop = startP + ((Date.now() - startT) * speed);
                if(container.scrollTop >= h) stopScroll();
            }, 50);
        }
        function stopScroll() { clearInterval(sInt); sInt = null; el('scrollBtn').style.fill = "#34c759"; }
        function toggleTheme() {
            const b = document.body;
            b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function downloadBackup() {
            const data = JSON.stringify({date: new Date().toISOString(), data: db});
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `StagePilot_Backup.json`;
            a.click();
        }

        el('logoInput').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => { localStorage.setItem('tdfLogo', ev.target.result); location.reload(); };
            r.readAsDataURL(e.target.files[0]);
        };

        el('bulkImportInput').onchange = async (e) => {
            for (let f of e.target.files) {
                const t = await f.text();
                const title = t.split('\n')[0].replace(/[\[\]]/g, '') || f.name.replace('.txt', '');
                if(!db.find(s => s.title === title)) db.push({ title, content: t });
            }
            localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex(); el('settingsOverlay').style.display = 'none';
        };

        el('restoreInput').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const imported = JSON.parse(ev.target.result);
                if(imported.data) { db = imported.data; localStorage.setItem('tdfSongs', JSON.stringify(db)); location.reload(); }
            };
            r.readAsText(e.target.files[0]);
        };
    </script>
</body>
</html>
