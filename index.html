<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TDF Stage Pilot v7.29 - 14 numbered</title>
    <style>
        :root { --bg-dark: #0a0a0a; --top-bar-bg: #1a1a1a; --griffin-orange: #d48e3d; --griffin-red: #c12718; --header-height: 85px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; }
        body { font-family: ui-monospace, 'SF Mono', monospace; display: flex; flex-direction: column; }

        .top-bar { height: var(--header-height); background: var(--top-bar-bg); border-bottom: 1px solid #333; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 15px 12px 15px; z-index: 30000; flex-shrink: 0; }
        #appLogo { height: 42px; width: 42px; background: #333; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: var(--griffin-orange); font-size: 1.5rem; }
        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        /* Dashboard: 14 songs view */
        #setlistDashboard { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 45000; display: none; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .dash-header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .dash-list { flex-grow: 1; overflow-y: auto; padding: 10px 15px; -webkit-overflow-scrolling: touch; }
        .dash-row { display: flex; align-items: center; background: #1c1c1e; border: 1px solid #333; border-radius: 8px; margin-bottom: 6px; height: 60px; color: white; }
        .dash-num { width: 55px; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--griffin-orange); font-size: 1.6rem; font-weight: 900; border-right: 1px solid #333; background: rgba(0,0,0,0.2); }
        .dash-name { flex-grow: 1; padding: 0 20px; font-size: 1.3rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Menu */
        .songs-menu { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #1c1c1e; z-index: 40000; transition: left 0.3s ease; display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .songs-menu.open { left: 0; }
        .tab-bar { display: flex; background: #1a1a1a; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 20px; color: #666; background: none; border: none; font-weight: bold; }
        .tab-btn.active { color: var(--griffin-orange); border-bottom: 2px solid var(--griffin-orange); }
        #indexContent { flex-grow: 1; overflow-y: scroll; background: #121212; }
        
        .list-item { height: 70px; display: flex; align-items: center; border-bottom: 1px solid #333; padding: 0 10px; background: #1c1c1e; color: white; }
        .action-btn { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: var(--griffin-orange); }

        .lyrics-container { flex-grow: 1; background: #fff; overflow-y: auto; }
        #lyricsArea { padding: 35px; font-size: 1.5rem; color: #000; }
        #editorArea { display: none; width: 100%; height: 100%; padding: 30px; font-size: 1.5rem; border: none; }

        .chord-row { position: relative; height: 1.7rem; color: var(--griffin-red); font-weight: bold; margin-bottom: -5px; }
        .chord-item { position: absolute; white-space: pre; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 20px; min-height: 1.3rem; }
    </style>
</head>
<body>
    <input type="file" id="bulkFiles" multiple style="display:none;">

    <div class="top-bar">
        <div style="display:flex; gap:12px; align-items:center;">
            <div id="appLogo">🖼️</div>
            <button class="top-bar-btn" onclick="toggleMenu()">SONGS</button>
            <button class="top-bar-btn" onclick="toggleDashboard()" style="background:var(--griffin-orange);color:black;padding:6px 18px;border-radius:6px;">SET</button>
        </div>
        <h2 id="displayTitle" style="color:white; font-size:1rem; margin:0;">v7.29</h2>
        <button class="top-bar-btn" onclick="startEdit()">✎</button>
    </div>

    <div id="setlistDashboard">
        <div class="dash-header">
            <h1 style="color:white; margin:0; font-size:1.4rem;">STAGELIST</h1>
            <div style="display:flex; gap:10px;">
                <button class="top-bar-btn" onclick="copySetWhatsApp()" style="background:#25D366; color:white; width:40px; height:40px; border-radius:50%; padding:0;">🟢</button>
                <button class="top-bar-btn" onclick="toggleDashboard()" style="border:1px solid #444; padding:5px 12px; border-radius:6px;">SLUIT</button>
            </div>
        </div>
        <div class="dash-list" id="dashList"></div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div class="tab-bar">
            <button class="tab-btn active" id="tabLib" onclick="switchTab('lib')">BIBLIOTHEEK</button>
            <button class="tab-btn" id="tabSet" onclick="switchTab('set')">SETLIST</button>
        </div>
        <div id="indexContent"></div>
        <div style="padding:15px; background:#1a1a1a; display:flex; gap:10px;">
            <button class="top-bar-btn" onclick="toggleMenu()" style="flex:1; border:1px solid #444; padding:10px; border-radius:8px;">SLUIT</button>
            <button class="top-bar-btn" onclick="document.getElementById('bulkFiles').click()" style="background:#444; color:white; padding:10px; border-radius:8px;">📂 IMPORT</button>
        </div>
    </div>

    <div class="lyrics-container"><div id="lyricsArea">Selecteer een song...</div><textarea id="editorArea" spellcheck="false"></textarea></div>

    <script>
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let setlist = JSON.parse(localStorage.getItem('tdfSetlist')) || [];
        let cur = null, currentTab = 'lib';

        window.onload = () => { renderIndex(); };

        function renderIndex() {
            const c = document.getElementById('indexContent'); if(!c) return; c.innerHTML = "";
            let l = currentTab === 'lib' ? [...db].sort((a,b) => a.title.localeCompare(b.title)) : setlist;
            l.forEach((x, i) => {
                const w = document.createElement('div'); w.className = "list-item";
                w.innerHTML = `
                    <div style="flex-grow:1; font-weight:bold; font-size:1.1rem;" onclick="loadSong('${x.title.replace(/'/g, "\\'")}')">${x.title}</div>
                    <div class="action-btn" onclick="${currentTab==='lib'?'addToSet':'remFromSet'}('${x.title}',${i})">${currentTab==='lib'?'+':'×'}</div>
                `;
                c.appendChild(w);
            });
        }

        function toggleDashboard() { const d = document.getElementById('setlistDashboard'); d.style.display = (d.style.display === 'flex') ? 'none' : 'flex'; if(d.style.display==='flex') renderDashboard(); }
        
        function renderDashboard() {
            const list = document.getElementById('dashList'); list.innerHTML = "";
            setlist.forEach((s, i) => {
                const row = document.createElement('div'); row.className = "dash-row";
                row.innerHTML = `<div class="dash-num">${i+1}</div><div class="dash-name">${s.title}</div>`;
                row.onclick = () => { loadSong(s.title); toggleDashboard(); };
                list.appendChild(row);
            });
        }

        function copySetWhatsApp() { let txt = "*SETLIST:*\n\n"; setlist.forEach((s, i) => { txt += `${i+1}. ${s.title}\n`; }); navigator.clipboard.writeText(txt).then(() => alert("Kopie op klembord!")); }
        function loadSong(t) { cur = db.find(s => s.title === t) || setlist.find(s => s.title === t); document.getElementById('displayTitle').textContent = cur.title; draw(); if(document.getElementById('songsMenu').classList.contains('open')) toggleMenu(); }
        function draw() { if(!cur) return; const lines = cur.content.trim().split('\n'); let h = ""; lines.forEach(l => { let cArr = [], txt = "", i = 0; while(i < l.length) { if(l[i] === '[') { let e = l.indexOf(']', i); if(e===-1){txt+=l[i]; i++; continue;} cArr.push({p: txt.length, v: l.substring(i+1, e)}); i = e+1; } else { txt += l[i]; i++; } } let r = ""; cArr.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; }); h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`; }); document.getElementById('lyricsArea').innerHTML = h; }
        function toggleMenu() { document.getElementById('songsMenu').classList.toggle('open'); if(document.getElementById('songsMenu').classList.contains('open')) renderIndex(); }
        function switchTab(t) { currentTab = t; document.getElementById('tabLib').classList.toggle('active', t==='lib'); document.getElementById('tabSet').classList.toggle('active', t==='set'); renderIndex(); }
        function addToSet(t) { const s = db.find(x=>x.title===t); if(s) { setlist.push({...s}); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); alert("OK!"); } }
        function remFromSet(t, i) { setlist.splice(i, 1); localStorage.setItem('tdfSetlist', JSON.stringify(setlist)); renderIndex(); }
        function startEdit() { if(!cur) return; document.getElementById('lyricsArea').style.display='none'; document.getElementById('editorArea').style.display='block'; document.getElementById('editorArea').value=cur.content; }
        
        document.getElementById('bulkFiles').onchange = async (e) => {
            for(let f of Array.from(e.target.files)) {
                const t = await f.text();
                if(f.name.endsWith('.json')) { try { db = JSON.parse(t); } catch(e) {} }
                else db.push({title: f.name.replace('.txt',''), content: t});
            }
            localStorage.setItem('tdfSongs', JSON.stringify(db)); renderIndex();
        };
    </script>
</body>
</html>
