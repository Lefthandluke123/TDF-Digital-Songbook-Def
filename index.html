<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TDF Stage Pilot v6.45</title>
    <style>
        :root { 
            --bg-dark: #121212; --top-bar-bg: #1a1a1a;
            --griffin-orange: #d48e3d; --griffin-red: #c12718; 
            --header-height: 85px;
            --lyric-bg: #ffffff; --lyric-text: #000000;
        }
        [data-theme="dark"] { --lyric-bg: #000000; --lyric-text: #ffffff; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-dark); overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
        body { font-family: ui-monospace, 'SF Mono', 'Roboto Mono', monospace; display: flex; flex-direction: column; padding-top: var(--header-height); }

        .top-bar { 
            position: fixed; top: 0 !important; left: 0; width: 100%; height: var(--header-height); 
            background: var(--top-bar-bg); border-bottom: 1px solid #333; 
            display: flex; align-items: flex-end; justify-content: space-between; 
            padding: 0 15px 12px 15px; z-index: 99999; 
        }
        .top-bar-btn { background: none; border: none; color: var(--griffin-orange); font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .top-bar-icon { width: 28px; height: 28px; fill: var(--griffin-orange); cursor: pointer; }

        .songs-menu { 
            position: fixed; top: 0; left: -33.33%; width: 33.33%; height: 100%; 
            background: #1c1c1e; z-index: 90001; transition: left 0.3s ease; 
            display: flex; flex-direction: column; 
            padding-top: env(safe-area-inset-top); 
        }
        .songs-menu.open { left: 0; }
        @media (max-width: 768px) { .songs-menu { width: 85%; left: -85%; } }
        
        .menu-nav-section { padding: 25px 15px 10px 15px; background: #1a1a1a; border-bottom: 1px solid #333; }
        .manage-btn { 
            width: 100%; padding: 15px; background: none; 
            border: 2px solid var(--griffin-orange); color: var(--griffin-orange); 
            border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer;
        }
        .manage-btn.active { background: var(--griffin-orange); color: black; }

        #tagBar { display: flex; gap: 10px; overflow-x: auto; padding: 12px 15px; background: #242426; border-bottom: 1px solid #444; scrollbar-width: none; flex-shrink: 0; }
        .tag-pill { padding: 8px 16px; border-radius: 20px; background: #333; color: #aaa; font-size: 0.8rem; white-space: nowrap; cursor: pointer; }
        .tag-pill.active { background: var(--griffin-orange); color: black; font-weight: bold; }

        #indexContent { flex-grow: 1; overflow-y: auto; scroll-behavior: smooth; background: #121212; }
        .index-container { position: relative; width: 100%; border-bottom: 1px solid #222; background: #333; height: 65px; flex-shrink: 0; }
        .index-item { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 0 20px; background: #1c1c1e; color: #eee; cursor: pointer; z-index: 2; display: flex; align-items: center; transition: transform 0.2s; gap: 15px; }
        
        .tag-checkbox { width: 28px; height: 28px; accent-color: var(--griffin-orange); }

        #bulkActions { display: none; padding: 20px; background: #2c2c2e; border-top: 2px solid var(--griffin-orange); flex-direction: column; gap: 15px; overflow-y: auto; max-height: 50vh; }
        .bulk-input { background: #121212; color: white; border: 1px solid #444; padding: 15px; border-radius: 10px; font-size: 1rem; width: 100%; }
        
        .tag-editor-item { display: flex; justify-content: space-between; align-items: center; background: #3a3a3c; padding: 10px; border-radius: 8px; margin-top: 5px; }
        .tag-edit-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }

        .lyrics-container { background: var(--lyric-bg); width: 100%; height: calc(100vh - var(--header-height)); overflow-y: auto; }
        #lyricsArea, #editorArea { padding: 35px; font-family: ui-monospace, monospace; font-size: 1.4rem; line-height: 1.4; color: var(--lyric-text); width: 100%; }
        #editorArea { display: none; white-space: pre; border: none; outline: none; background: var(--lyric-bg); color: var(--lyric-text); min-height: 100%; padding-bottom: 400px; }

        .chord-row { position: relative; height: 1.6rem; color: var(--griffin-red); font-weight: bold; margin-bottom: -5px; pointer-events: none; }
        .chord-item { position: absolute; white-space: pre; font-size: 1.2rem; }
        .lyric-line { white-space: pre; display: block; margin-bottom: 18px; min-height: 1.3rem; }
    </style>
</head>
<body data-theme="light">
    <div id="toast" style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--griffin-orange); padding:10px 20px; border-radius:20px; display:none; z-index:1000000; font-weight:bold; color:black;"></div>
    <input type="file" id="bulkFiles" accept=".txt" multiple style="display:none;">

    <div class="top-bar">
        <div class="top-bar-left"><button class="top-bar-btn" id="songsBtn">Songs</button></div>
        <div class="top-bar-center">
            <h2 id="displayTitle" style="margin:0; color:white; font-size:1.1rem;">Stage Pilot v6.45</h2>
            <div class="transpose-pill" style="margin-top:5px;">
                <button class="tp-btn" id="tpDec">−</button>
                <span id="tpVal" style="color:white; font-size:0.9rem;">0</span>
                <button class="tp-btn" id="tpInc">+</button>
            </div>
        </div>
        <div class="top-bar-right">
            <svg class="top-bar-icon" id="scrollBtn" viewBox="0 0 24 24" style="fill:#34c759;"><path d="M8 5v14l11-7z"/></svg>
            <svg class="top-bar-icon" id="editIcon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
            <button class="top-bar-btn" id="saveBtn" style="display:none;">GEREED</button>
            <svg class="top-bar-icon" id="importIcon" viewBox="0 0 24 24" style="margin-left:5px;"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
    </div>

    <div class="songs-menu" id="songsMenu">
        <div class="menu-nav-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <span style="color:white; font-weight:bold; font-size:1.2rem;">SONGBOOK</span>
                <button class="top-bar-btn" id="closeMenuBtn">SLUIT</button>
            </div>
            <button class="manage-btn" id="tagModeBtn">TAGS BEHEREN</button>
        </div>
        <div id="tagBar"></div>
        <div id="indexContent"></div>
        <div id="bulkActions">
            <p style="color:var(--griffin-orange); font-size:0.8rem; margin:0;">SELECTIE TAGGEN:</p>
            <input type="text" id="bulkTagInput" class="bulk-input" placeholder="Nieuwe tagnaam...">
            <button class="top-bar-btn" style="background:var(--griffin-orange); color:black; padding:15px; border-radius:10px;" id="saveBulkBtn">VOEG TOE AAN SELECTIE</button>
            <hr style="width:100%; border:0; border-top:1px solid #444; margin:10px 0;">
            <p style="color:var(--griffin-orange); font-size:0.8rem; margin:0;">BESTAANDE TAGS AANPASSEN:</p>
            <div id="tagEditorList"></div>
        </div>
    </div>

    <div class="lyrics-container" id="scroller">
        <div id="lyricsArea">Selecteer een liedje.</div>
        <textarea id="editorArea" spellcheck="false"></textarea>
    </div>

    <script>
        const APP_VERSION = "6.45";
        let db = JSON.parse(localStorage.getItem('tdfSongs')) || [];
        let cur = null, tOff = 0, sInt = null, tagMode = false, activeTag = null;
        const $ = (id) => document.getElementById(id);
        const tEvent = 'touchstart';

        window.onload = () => {
            if (localStorage.getItem('tdfVersion') !== APP_VERSION) {
                localStorage.setItem('tdfVersion', APP_VERSION);
                location.reload(true);
            }
            renderIndex(); renderTagBar();
            setupEventListeners();
        };

        function setupEventListeners() {
            $('songsBtn').addEventListener(tEvent, toggleMenu);
            $('closeMenuBtn').addEventListener(tEvent, toggleMenu);
            $('tagModeBtn').addEventListener(tEvent, toggleTagMode);
            $('saveBulkBtn').addEventListener(tEvent, applyBulkTag);
            $('tpDec').addEventListener(tEvent, () => transpose(-1));
            $('tpInc').addEventListener(tEvent, () => transpose(1));
            $('scrollBtn').addEventListener(tEvent, toggleScroll);
            $('editIcon').addEventListener(tEvent, startEdit);
            $('saveBtn').addEventListener(tEvent, finishEdit);
            $('importIcon').addEventListener(tEvent, () => $('bulkFiles').click());
        }

        function extractTags(text) {
            if (!text) return [];
            const matches = text.match(/#(\w+)/g);
            return matches ? matches.map(m => m.substring(1).toLowerCase()) : [];
        }

        function renderTagBar() {
            const bar = $('tagBar');
            let tagsSet = new Set();
            db.forEach(s => extractTags(s.content).forEach(t => tagsSet.add(t)));
            bar.innerHTML = `<div class="tag-pill ${!activeTag ? 'active' : ''}" id="tag-all">ALLES</div>`;
            $('tag-all').addEventListener(tEvent, () => filterTag(null));
            Array.from(tagsSet).sort().forEach(t => {
                const pill = document.createElement('div');
                pill.className = `tag-pill ${activeTag === t ? 'active' : ''}`;
                pill.textContent = t.toUpperCase();
                pill.addEventListener(tEvent, () => filterTag(t));
                bar.appendChild(pill);
            });
            if(tagMode) renderTagEditor(tagsSet);
        }

        function renderTagEditor(tagsSet) {
            const list = $('tagEditorList');
            list.innerHTML = "";
            Array.from(tagsSet).sort().forEach(t => {
                const item = document.createElement('div');
                item.className = 'tag-editor-item';
                item.innerHTML = `
                    <span style="color:white; font-weight:bold;">#${t}</span>
                    <div>
                        <button class="tag-edit-btn" onclick="globalRenameTag('${t}')">✏️</button>
                        <button class="tag-edit-btn" onclick="globalDeleteTag('${t}')">🗑️</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function globalRenameTag(oldT) {
            const newT = prompt(`Hernoem #${oldT} naar (zonder #):`, oldT);
            if(newT && newT !== oldT) {
                db.forEach(s => { s.content = s.content.replace(new RegExp('#' + oldT + '\\b', 'g'), '#' + newT.toLowerCase()); });
                saveAndRefresh();
            }
        }

        function globalDeleteTag(t) {
            if(confirm(`Weet je zeker dat je #${t} uit alle liedjes wilt verwijderen?`)) {
                db.forEach(s => { s.content = s.content.replace(new RegExp('#' + t + '\\b', 'g'), ''); });
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('tdfSongs', JSON.stringify(db));
            renderTagBar(); renderIndex();
        }

        function renderIndex() {
            const c = $('indexContent'); c.innerHTML = "";
            let songs = [...db].sort((a,b) => a.title.localeCompare(b.title));
            if (activeTag) songs = songs.filter(s => extractTags(s.content).includes(activeTag));

            songs.forEach(s => {
                const container = document.createElement('div'); container.className = 'index-container';
                container.innerHTML = `
                    <div class="swipe-action rename-btn">Naam</div>
                    <div class="swipe-action delete-btn">Wis</div>
                    <div class="index-item">
                        <input type="checkbox" class="tag-checkbox" data-title="${s.title}" ${tagMode ? '' : 'style="display:none"'} onclick="event.stopPropagation()">
                        <span>${s.title}</span>
                    </div>`;
                const item = container.querySelector('.index-item');
                item.addEventListener(tEvent, () => { if(tagMode) { const cb = item.querySelector('.tag-checkbox'); cb.checked = !cb.checked; } else { loadSong(s.title); toggleMenu(); } });
                container.querySelector('.rename-btn').addEventListener(tEvent, () => renameSong(s.title));
                container.querySelector('.delete-btn').addEventListener(tEvent, () => deleteSong(s.title));
                if(!tagMode) initSwipe(item);
                c.appendChild(container);
            });
        }

        function toggleTagMode() {
            tagMode = !tagMode;
            $('tagModeBtn').textContent = tagMode ? "KLAAR" : "TAGS BEHEREN";
            $('tagModeBtn').classList.toggle('active', tagMode);
            $('bulkActions').style.display = tagMode ? "flex" : "none";
            renderIndex(); renderTagBar();
        }

        function applyBulkTag() {
            const tag = $('bulkTagInput').value.trim().toLowerCase();
            if(!tag) return;
            document.querySelectorAll('.tag-checkbox:checked').forEach(cb => {
                const s = db.find(x => x.title === cb.dataset.title);
                if(s && !extractTags(s.content).includes(tag)) s.content += "\n\n#" + tag;
            });
            $('bulkTagInput').value = "";
            saveAndRefresh();
        }

        function filterTag(t) { activeTag = t; renderIndex(); renderTagBar(); }
        function loadSong(t) { cur = db.find(s => s.title === t); tOff = 0; $('tpVal').textContent = "0"; $('displayTitle').textContent = cur.title; draw(); }
        function draw() {
            if(!cur) return;
            const contentClean = cur.content.replace(/#\w+/g, '').trim();
            const lines = contentClean.split('\n'); let h = "";
            lines.forEach(l => {
                let chords = [], txt = "", i = 0;
                while(i < l.length) {
                    if(l[i] === '[') {
                        let end = l.indexOf(']', i); if(end === -1) { txt += l[i]; i++; continue; }
                        let c = l.substring(i+1, end); if(tOff !== 0) c = tpChord(c, tOff);
                        chords.push({ p: txt.length, v: c }); i = end + 1;
                    } else { txt += l[i]; i++; }
                }
                let r = ""; chords.forEach(c => { r += `<span class="chord-item" style="left:${c.p}ch">${c.v}</span>`; });
                h += `<div class="chord-row">${r}</div><div class="lyric-line">${txt || ' '}</div>`;
            });
            $('lyricsArea').innerHTML = h; $('scroller').scrollTop = 0;
        }

        function transpose(o) { if(!cur) return; tOff += o; $('tpVal').textContent = (tOff > 0 ? "+" : "") + tOff; draw(); }
        function toggleMenu() { $('songsMenu').classList.toggle('open'); }
        function deleteSong(t) { if(confirm(`Wis ${t}?`)) { db = db.filter(s => s.title !== t); saveAndRefresh(); } }
        function renameSong(o) { const n = prompt("Hernoem naar:", o); if(n && n !== o) { const i = db.findIndex(s => s.title === o); db[i].title = n; saveAndRefresh(); if(cur && cur.title === o) loadSong(n); } }
        function startEdit() { if(!cur) return; $('lyricsArea').style.display='none'; $('editIcon').style.display='none'; $('saveBtn').style.display='block'; $('editorArea').style.display='block'; $('editorArea').value=cur.content; }
        function finishEdit() { const i = db.findIndex(s=>s.title===cur.title); db[i].content = $('editorArea').value; saveAndRefresh(); $('lyricsArea').style.display='block'; $('editIcon').style.display='block'; $('saveBtn').style.display='none'; $('editorArea').style.display='none'; draw(); }
        function toggleScroll() { sInt ? stopScroll() : startScroll(); }
        function startScroll() { if(!cur) return; const c = $('scroller'), h = c.scrollHeight - c.clientHeight; let d = 180; const s = h/(d*1000), t = Date.now(), p = c.scrollTop; $('scrollBtn').style.fill = 'var(--griffin-red)'; sInt = setInterval(() => { c.scrollTop = p + ((Date.now()-t)*s); if(c.scrollTop >= h) stopScroll(); }, 50); }
        function stopScroll() { clearInterval(sInt); sInt = null; $('scrollBtn').style.fill = "#34c759"; }
        function initSwipe(item) { let startX, moveX; item.addEventListener(tEvent, e => { startX = e.touches[0].clientX; item.style.transition = 'none'; }); item.addEventListener('touchmove', e => { moveX = e.touches[0].clientX; let d = moveX - startX; if(d < 0) item.style.transform = `translateX(${Math.max(d, -180)}px)`; }); item.addEventListener('touchend', () => { item.style.transition = 'transform 0.2s'; if(moveX - startX < -90) item.style.transform = 'translateX(-180px)'; else item.style.transform = 'translateX(0px)'; }); }
        $('bulkFiles').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            for(let f of files) {
                const t = await f.text();
                let fl = t.split('\n')[0].replace(/[\[\]\r]/g, '').trim();
                if (fl.length > 60) fl = fl.substring(0, 50) + "...";
                db.push({title: fl || f.name.replace('.txt',''), content: t});
            }
            saveAndRefresh();
        });
        function tpChord(c, o) {
            const n = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
            return c.replace(/[A-G][#b]?/g, (m) => {
                let x = m; if(x==="Bb")x="A#"; if(x==="Eb")x="D#"; if(x==="Ab")x="G#"; if(x==="Db")x="C#"; if(x==="Gb")x="F#";
                let i = n.indexOf(x); if(i===-1) return m;
                let j = (i+o)%12; while(j<0)j+=12; return n[j];
            });
        }
    </script>
</body>
</html>
